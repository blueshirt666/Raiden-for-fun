  if(e.key==='g'||e.key==='G'){invincible=!invincible;document.getElementById('btn-invincible').classList.toggle('active',invincible);refreshInfBomb();if(invincible&&endlessMode)endlessInvincibleUsed=true;}
  if(e.key==='m'||e.key==='M') toggleBGM();
  if(e.key==='t'||e.key==='T'){bgmTrack=(bgmTrack+1)%BGM_TRACKS.length;stopBGM();if(bgmEnabled&&screen==='game')startBGM();}
  if((e.key==='Escape'||e.key==='Esc')){
    if (screen==='game') {
      screen='pause'; stopBGM();
      document.getElementById('btn-pause').classList.add('active');
    } else if (screen==='pause') {
      screen='game'; if(bgmEnabled) startBGM();
      document.getElementById('btn-pause').classList.remove('active');
    } else if (screen==='death') {
      if (endlessMode) {
        submitEndlessScore(score, level, 'death-esc');
        clearEndlessSnapshot();
      }
      save.coins += sessionCoins; save.diamonds += sessionDiamonds;
      writeSave(); screen='title';
    } else if (screen==='shop' || screen==='stageSelect' || screen==='tierSelect' || screen==='codex' || screen==='titleSettings') {
      bgmDropdownOpen = false;
      screen='title';
    } else if (screen==='console') {
      showConsolePanel(false);
      screen='title';
    }
  }
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','z','Z','x','X',' ','Spacebar'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  try{getAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}catch(er){}
  if(screen==='title') clickTitle(mx,my);
  else if(screen==='shop') clickShop(mx,my);
  else if(screen==='tierSelect') clickTierSelect(mx,my);
  else if(screen==='stageSelect') clickStageSelect(mx,my);
  else if(screen==='titleSettings') clickTitleSettings(mx,my);
  else if(screen==='codex') clickCodex(mx,my);
  else if(screen==='gameover') clickGameOver(mx,my);
  else if(screen==='victory') clickVictory(mx,my);
  else if(screen==='death') clickDeath(mx,my);
  else if(screen==='pause') clickPause(mx,my);
});

canvas.addEventListener('wheel', e=>{
  if (screen === 'shop' && shopTab === 1) {
    e.preventDefault();
    const totalH = Math.ceil(BG_SKINS.length/2) * 72;
    const maxScroll = Math.max(0, totalH - 540);
    shopBGScroll = clamp(shopBGScroll + (e.deltaY>0?40:-40), 0, maxScroll);
  }
  // BGM dropdown scroll (in pause or title settings)
  if ((screen==='pause' || screen==='titleSettings') && bgmDropdownOpen) {
    e.preventDefault();
    const listH = BGM_TRACKS.length * DROPDOWN_ITEM_H;
    const maxS = Math.max(0, listH - DROPDOWN_VISIBLE_H);
    bgmDropdownScroll = clamp(bgmDropdownScroll + (e.deltaY>0?28:-28), 0, maxS);
  }
  // Codex scroll
  if (screen==='codex') {
    e.preventDefault();
    const maxS = Math.max(0, (codexContentH || 0) - 510);
    codexScroll = clamp(codexScroll + (e.deltaY>0?40:-40), 0, maxS);
  }
}, {passive:false});

function syncPauseBtn() {
  const btn = document.getElementById('btn-pause');
  if (screen === 'title') {
    btn.textContent = '⚙';
    btn.title = '设置';
  } else {
    btn.textContent = '⏸';
    btn.title = '暂停 (P)';
  }
  // Sync console DOM panel visibility with screen state
  consolePanelEl.classList.toggle('show', screen === 'console');
}
document.getElementById('btn-pause').addEventListener('click',()=>{
  if (screen==='title') {
    screen = 'titleSettings';
    return;
  }
  if (screen==='game') { screen='pause'; stopBGM(); }
  else if (screen==='pause') { screen='game'; if(bgmEnabled) startBGM(); }
  document.getElementById('btn-pause').classList.toggle('active', screen==='pause');
});
document.getElementById('btn-invincible').addEventListener('click',()=>{invincible=!invincible;document.getElementById('btn-invincible').classList.toggle('active',invincible);refreshInfBomb();if(invincible&&endlessMode)endlessInvincibleUsed=true;});
// Single cycling speed button (0.5 → 1 → 2 → 3 → 0.5 ...)
const SPEED_CYCLE = [0.5, 1, 2, 3];
const speedBtn = document.getElementById('btn-speed');
function setGameSpeed(s) {
  gameSpeed = s;
  speedBtn.textContent = s + 'x';
}
function cycleSpeed() {
  const i = SPEED_CYCLE.indexOf(gameSpeed);
  setGameSpeed(SPEED_CYCLE[(i+1) % SPEED_CYCLE.length]);
}
speedBtn.addEventListener('click', e=>{ e.preventDefault(); cycleSpeed(); });
speedBtn.addEventListener('touchstart', e=>{ e.preventDefault(); cycleSpeed(); }, {passive:false});

// Infinite-bomb button — visible only in invincible mode
const infBombBtn = document.getElementById('btn-infbomb');
function refreshInfBomb() {
  infBombBtn.classList.toggle('show', !!invincible);
}
function fireInfiniteBomb() {
  if (screen !== 'game') return;
  const p = players[0];
  if (!p || p.dead) return;
  doBomb(p); SFX.bomb();   // does NOT consume p.bombs
}
infBombBtn.addEventListener('click', e=>{ e.preventDefault(); fireInfiniteBomb(); });
infBombBtn.addEventListener('touchstart', e=>{ e.preventDefault(); fireInfiniteBomb(); }, {passive:false});

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function update() {
  if (screen === 'death') {
    if (deathTimer > 0) {
      deathTimer--;
      if (deathTimer === 0) {
        save.coins += sessionCoins; save.diamonds += sessionDiamonds;
        writeSave(); screen='title';
      }
    }
    return;
  }
  if(screen!=='game') return;
  frame++;
  updateBG();
  updateWaves();
  for(const p of players) updatePlayer(p,keys);
  updateWingmen();
  updateBullets();
  updateEnemyBullets();
  for(const e of enemies) updateEnemy(e);
  updateBoss();
  updatePickups();
  collectPickups();
  checkCollisions();
  updateExplosions();
  updateFTs();
  enemies=enemies.filter(e=>e.alive);
  if(bombFlash>0) bombFlash--;
  if(shakeT>0){shakeT--; if(shakeT===0) shakeM=0;}
  // Performance caps — drop oldest when exceeded
  capArray(bullets, MAX_BULLETS);
  capArray(enemyBullets, MAX_ENEMY_BULLETS);
  capArray(explosions, MAX_EXPLOSIONS);
  capArray(floatingTexts, MAX_FT);
  capArray(pickups, MAX_PICKUPS);
  if (enemies.length > MAX_ENEMIES) {
    // Cull the off-screen / lowest-priority enemies (those that already drifted past mid-screen)
    enemies.sort((a,b)=>a.y - b.y);
    enemies.splice(MAX_ENEMIES);
  }
}

function drawGameField() {
  cx.save();
  if (shakeT > 0) {
    const ox = (Math.random()*2-1)*shakeM;
    const oy = (Math.random()*2-1)*shakeM;
    cx.translate(ox, oy);
  }
  drawBackground();
  if(bombFlash>0){cx.fillStyle=`rgba(255,255,255,${bombFlash/22*0.7})`;cx.fillRect(0,0,W,H);}
  for(const e of enemies) drawEnemy(e);
  drawBoss();
  drawBullets();
  drawEnemyBullets();
  drawPickups();
  drawExplosions();
  drawWingmen();
  for(const p of players) drawPlayer(p);
  drawFTs();
  cx.restore();
  // HUD + joystick visual outside shake transform
  drawHUD();
  drawJoystick();
}

function draw() {
  cx.imageSmoothingEnabled=true;
  if(screen==='title') {
    frame++;
    drawTitle();
  } else if(screen==='shop') {
    drawShop();
  } else if(screen==='tierSelect') {
    frame++;
    drawTierSelect();
  } else if(screen==='stageSelect') {
    frame++;
    drawStageSelect();
  } else if(screen==='codex') {
    frame++;
    drawCodex();
  } else if(screen==='titleSettings') {
    frame++;
    drawTitleSettings();
  } else if(screen==='console') {
    fillPx('#000818',0,0,W,H);   // DOM panel covers the canvas
  } else if(screen==='game') {
    drawGameField();
  } else if(screen==='pause') {
    frame++;
    drawGameField();
    drawPause();
  } else if(screen==='death') {
    frame++;
    drawGameField();
    drawDeath();
  } else if(screen==='victory') {
    frame++;
    drawVictory();
  } else if(screen==='gameover') {
    frame++;
    drawGameOver();
  }
}

function loop() {
  speedAccum += gameSpeed;
  let safetyCap = 6;
  while (speedAccum >= 1 && safetyCap-- > 0) {
    update();
    speedAccum -= 1;
  }
  if (speedAccum < 0) speedAccum = 0;
  draw();
  refreshBombCount();
  syncPauseBtn();
  requestAnimationFrame(loop);
}

let consoleActiveTab = 'player';
const consolePanelEl = document.getElementById('console-panel');
const consoleTabsEl  = document.getElementById('console-tabs');
const consoleBodyEl  = document.getElementById('console-body');

function renderConsole() {
  // Tabs
  consoleTabsEl.innerHTML = '';
  for (const t of CONSOLE_TABS) {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id===consoleActiveTab?' active':'');
    el.textContent = t.label;
    el.addEventListener('click', ()=>{ consoleActiveTab = t.id; renderConsole(); });
    consoleTabsEl.appendChild(el);
  }
  // Fields
  consoleBodyEl.innerHTML = '';
  const tab = CONSOLE_TABS.find(t=>t.id===consoleActiveTab);
  const C = save.console || (save.console = defaultConsole());
  for (const f of tab.fields) {
    const row = document.createElement('div'); row.className='row';
    const lab = document.createElement('label'); lab.textContent = f.name;
    if (f.desc) {
      const d = document.createElement('span'); d.className='desc'; d.textContent = f.desc;
      lab.appendChild(d);
    }
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.min = f.min; inp.max = f.max; inp.step = f.step;
    inp.value = C[f.k];
    inp.addEventListener('change', ()=>{
      let v = parseFloat(inp.value);
      if (isNaN(v)) v = defaultConsole()[f.k];
      v = Math.max(f.min, Math.min(f.max, v));
      C[f.k] = v;
      inp.value = v;
      writeSave();
    });
    row.appendChild(lab); row.appendChild(inp);
    consoleBodyEl.appendChild(row);
  }
}
function showConsolePanel(show) {
  consolePanelEl.classList.toggle('show', !!show);
  if (show) renderConsole();
}
document.getElementById('console-back').addEventListener('click', ()=>{
  showConsolePanel(false);
  screen = 'title';
});
document.getElementById('console-reset').addEventListener('click', ()=>{
  if (confirm('重置所有控制台数据为默认?')) {
    save.console = defaultConsole();
    writeSave();
    renderConsole();
  }
});

// ─── PIXEL RESOLUTION ────────────────────────────────────────────────────────
const PIXEL_SCALE_MIN = 0.5, PIXEL_SCALE_MAX = 3.0;
function applyResolution() {
  const s = clamp(save.pixelScale || 1, PIXEL_SCALE_MIN, PIXEL_SCALE_MAX);
  canvas.width = Math.round(W * s);
  canvas.height = Math.round(H * s);
  cx.imageSmoothingEnabled = true;
  cx.setTransform(s, 0, 0, s, 0, 0);
  // Caches depending on canvas size are invalidated
  if (typeof bgStaticCache !== 'undefined') {
    for (const k in bgStaticCache) delete bgStaticCache[k];
  }
}

initBGStars('space');
applyResolution();
loop();
