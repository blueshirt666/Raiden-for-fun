  {name:'水瓶·阿夸',    color:'#44ccff', acc:'#aaffff', hp:3100},
  {name:'双鱼·皮西斯',  color:'#ff66aa', acc:'#aaffff', hp:3500},
];

// Endless 难度上限 (hell plateau) — 到此分以上难度不再升, 但内容随机化
const ENDLESS_DIFF_CAP = 100;
function bossIndex() {
  if (endlessMode && level > BOSS_DEFS.length) {
    // 超过 12 关后随机抽一个 boss, 增加随机性
    return rndInt(0, BOSS_DEFS.length-1);
  }
  return clamp(level-1, 0, BOSS_DEFS.length-1);
}

function spawnBoss() {
  bossActive=true;
  SFX.bossAppear();
  const idx = bossIndex();
  const def = BOSS_DEFS[idx];
  const C = save.console || defaultConsole();
  // 难度封顶: 关卡分量取 min(level, ENDLESS_DIFF_CAP), 之后保持地狱难度
  const cappedLv = Math.min(level, ENDLESS_DIFF_CAP);
  const barCount = clamp(Math.round((1 + Math.floor((cappedLv-1)/2)) * (C.bossBarMul||1)), 1, 9);
  const hp = (def.hp + cappedLv*150) * barCount * C.bossHpMul;
  boss = {
    bossType: idx,
    x: W/2, y: -80, px:W/2|0, py:-80,
    hp, maxHp: hp,
    barCount,
    w:80, h:60, alive:true,
    phase:0, moveTimer:0, shootTimer:0,
    vx: 1.5, entryDone:false,
    pts: 5000 + cappedLv*500,
    extra:0, extra2:0,
    color: def.color, acc: def.acc, name: def.name,
    bannerTime: 120, bannerLabel: 'WARNING · BOSS',  // 2s spawn banner
  };
}

function updateBoss() {
  if(!boss||!boss.alive) return;
  boss.moveTimer++;
  if(!boss.entryDone){
    boss.y+=2;
    if(boss.y>=80){
      boss.entryDone=true;
      boss.y=80;
      boss.anchorX = boss.x;
      boss.anchorY = boss.y;
    }
    boss.px=boss.x|0;boss.py=boss.y|0;
    return;
  }
  // Phase tracking — 100% initial / 70% second form / 40% RAGE
  const hr=boss.hp/boss.maxHp;
  if(hr<0.7&&boss.phase===0){
    boss.phase=1;
    addFT('PHASE 2', boss.x, boss.y-30, '#ffaa00');
    triggerShake(10,22);
  }
  if(hr<0.4&&boss.phase===1){
    boss.phase=2;
    boss.bannerTime = 60;                  // 1s rage banner
    boss.bannerLabel = 'RAGE · 狂  怒';
    addFT(boss.name + ' 进入狂怒形态!', W/2, H/2-15, '#ffff44');
    triggerShake(22, 60);
    bombFlash = 14;
  }
  // Per-boss firing logic runs first (may mutate position; we override below)
  bossLogic(boss);
  // Full-screen 4-mode movement — overrides bossLogic's positional drift
  applyBossMovement(boss);
  // Phase 1 (70%~40%): can move + periodic dash toward player
  if (boss.phase === 1) {
    if (!boss.dashState) boss.dashState = {state:'idle', timer:0, tx:0};
    const ds = boss.dashState;
    ds.timer++;
    if (ds.state === 'idle' && ds.timer > 200) {
      ds.state='lunge';
      ds.timer=0;
      const t = players.find(p=>!p.dead);
      ds.tx = t ? t.x : W/2;
      addFT('!突进!', boss.x, boss.y-20, '#ff4444');
    } else if (ds.state === 'lunge') {
      boss.y += 4.5;
      if (Math.abs(boss.x - ds.tx) > 4) boss.x += Math.sign(ds.tx - boss.x) * 2.2;
      if (ds.timer > 32 || boss.y > H*0.55) { ds.state='retreat'; ds.timer=0; triggerShake(8, 12); }
    } else if (ds.state === 'retreat') {
      boss.y -= 3;
      if (boss.y <= 80) { boss.y = 80; ds.state='idle'; ds.timer=0; }
    }
  }
  // Phase 2 (rage <40%): summon mobs every ~4s
  if (boss.phase === 2) {
    if (!boss.summonTimer) boss.summonTimer = 0;
    boss.summonTimer++;
    if (boss.summonTimer >= 240 && enemies.length < MAX_ENEMIES - 4) {
      boss.summonTimer = 0;
      const types = ['scout','dart','swarmlet','speeder','zigzag'];
      const t = types[rndInt(0, types.length-1)];
      for (let i=-1;i<=1;i++) {
        if (enemies.length < MAX_ENEMIES) enemies.push(mkEnemy(t, boss.x + i*40, boss.y + 50));
      }
      addFT('召 唤 援 军', boss.x, boss.y-30, '#ff6688');
      triggerShake(6, 14);
    }
  }
  // Clamp
  boss.x=clamp(boss.x,60,W-60);
  boss.y=clamp(boss.y,40,H-100);
  boss.px=boss.x|0;boss.py=boss.y|0;
}

// Boss full-screen movement — 4 modes rotating every ~4s; each boss has unique
// per-mode parameters so trajectories never feel identical between fights.
function applyBossMovement(b) {
  const t = b.moveTimer;
  if (!b.movePhase) b.movePhase = 0;
  // Mode rotates every 240 frames (~4s), seeded by bossType so order varies
  const modeSeq = [
    [0,1,2,3],[1,3,0,2],[2,0,3,1],[3,2,1,0],
    [0,2,1,3],[1,0,3,2],[2,3,0,1],[3,1,2,0],
    [0,3,2,1],[1,2,0,3],[2,1,3,0],[3,0,1,2],
  ][b.bossType % 12];
  const mode = modeSeq[Math.floor(t/240) % 4];
  // Per-boss tunings — each boss gets a unique speed/amplitude profile
  const SP = 0.025 + (b.bossType * 0.0042) % 0.04;
  const AMP_X = 130 + (b.bossType * 17) % 60;     // 130~190
  const AMP_Y = 70 + (b.bossType * 13) % 50;      // 70~120
  const cy = 130 + (b.bossType * 11) % 60;        // 130~190 base center y
  const tx = t * SP;
  switch (mode) {
    case 0: // Horizontal sine sweep
      b.x = W/2 + Math.sin(tx) * AMP_X;
      b.y = cy + Math.sin(tx*1.7) * AMP_Y * 0.4;
      break;
    case 1: // Figure-8 / lemniscate
      b.x = W/2 + Math.sin(tx*1.5) * AMP_X;
      b.y = cy + Math.sin(tx*3.0) * AMP_Y;
      break;
    case 2: // Wide circular orbit
      b.x = W/2 + Math.cos(tx) * AMP_X;
      b.y = cy + Math.sin(tx) * AMP_Y;
      break;
    case 3: { // Erratic dashes — short bursts toward random points
      if (!b.dashTarget || (t - b.dashSetT|0) > 80) {
        b.dashTarget = { x: rnd(80, W-80), y: rnd(60, H*0.55) };
        b.dashSetT = t;
      }
      const dx = b.dashTarget.x - b.x, dy = b.dashTarget.y - b.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      b.x += dx/d * 2.8;
      b.y += dy/d * 2.0;
      break;
    }
  }
}

// Boss-specific behavior table
function bossLogic(b) {
  const phase=b.phase, mt=b.moveTimer;
  const C = save.console || defaultConsole();
  // Rage now triggers at 40% (phase 2). Fire 2.5× faster + periodic radial burst.
  const rageMul = phase>=2 ? 0.4 : 1.0;
  const fireMul = (endlessMode ? 1.4 : 1.0) * rageMul * C.bossFireRateMul;
  if (phase >= 2 && mt % 35 === 0) {
    for (let a=0;a<18;a++) {
      const ag = (a/18)*Math.PI*2;
      enemyBullets.push({x:b.x,y:b.y,px:b.x|0,py:b.y|0,
        vx:Math.cos(ag)*3.4, vy:Math.sin(ag)*3.4, alive:true, color:'#ff0033'});
    }
  }
  switch(b.bossType) {
    case 0: { // 凤凰: 7-spread + bursts that intensify
      b.x += b.vx; if(b.x<70||b.x>W-70) b.vx*=-1;
      const fr = (phase>=2?20:phase>=1?28:38) * fireMul;
      if(mt%(fr|0)===0) {
        for(let i=-3;i<=3;i++)
          enemyBullets.push({x:b.x,y:b.y+30,px:b.x|0,py:(b.y+30)|0,vx:i*1.4,vy:3.6,alive:true,color:'#ff8800'});
      }
      if(phase>=1 && mt%(80*fireMul|0)===0) {
        for(let a=0;a<10;a++){const ag=(a/10)*Math.PI*2;enemyBullets.push({x:b.x,y:b.y,px:b.x|0,py:b.y|0,vx:Math.cos(ag)*3.2,vy:Math.sin(ag)*3.2,alive:true,color:'#ff4422'});}
      }
      break;
    }
    case 1: { // 漩涡: rotating spiral arms
      b.x = W/2 + Math.sin(mt*0.025)*100;
      const fr = phase>=2?5:phase>=1?7:10;
      if(mt%fr===0) {
        const arms = phase>=1?6:4;
        for(let a=0;a<arms;a++){
          const ag = (a/arms)*Math.PI*2 + mt*0.05;
          enemyBullets.push({x:b.x,y:b.y,px:b.x|0,py:b.y|0,vx:Math.cos(ag)*2.6,vy:Math.sin(ag)*2.6,alive:true,color:'#aa44ff'});
        }
      }
      break;
    }
    case 2: { // 狙击: aimed triple lasers (warning then high-speed shot)
      b.x += b.vx*0.4; if(b.x<80||b.x>W-80) b.vx*=-1;
      const cycle = phase>=2?60:phase>=1?80:110;
      const t=players.find(p=>!p.dead);
      if(t) {
        if(mt%cycle===cycle-15) {
          // warn — visualized in draw
          b.extra = mt;
          b.extra2 = Math.atan2(t.y-b.y, t.x-b.x);
        }
        if(mt%cycle===0) {
          for(let off=-1;off<=1;off++) {
            const a = b.extra2 + off*0.18;
            enemyBullets.push({x:b.x,y:b.y+10,px:b.x|0,py:(b.y+10)|0,vx:Math.cos(a)*5,vy:Math.sin(a)*5,alive:true,color:'#ff66ff'});
          }
        }
      }
      break;
    }
    case 3: { // 蜂群母舰: spawns swarmlets + occasional spread
      b.x += b.vx*0.6; if(b.x<80||b.x>W-80) b.vx*=-1;
      const sp = phase>=2?80:phase>=1?120:160;
      if(mt%sp===0 && enemies.length<35) {
        for(let i=-1;i<=1;i++) enemies.push(mkEnemy('swarmlet', b.x+i*20, b.y+30));
      }
      if(mt%((50*fireMul)|0)===0)
        for(let i=-2;i<=2;i++)
          enemyBullets.push({x:b.x,y:b.y+30,px:b.x|0,py:(b.y+30)|0,vx:i*0.9,vy:3.2,alive:true,color:'#cc44ff'});
      break;
    }
    case 4: { // 镜像: fast lateral, mirrored bullet walls
      b.x = W/2 + Math.sin(mt*0.04)*140;
      const fr = phase>=2?14:phase>=1?20:28;
      if(mt%(fr|0)===0) {
        // Wall pattern (left-right alternation)
        const dir = (mt/fr|0)%2===0 ? -1 : 1;
        for(let i=0;i<7;i++){
          const offY = i*18;
          enemyBullets.push({x:b.x+dir*40,y:b.y+offY,px:0,py:0,vx:dir*-2.8,vy:1.6,alive:true,color:'#88ddff'});
        }
      }
      if(phase>=1 && mt%70===0)
        for(let i=-3;i<=3;i++) enemyBullets.push({x:b.x,y:b.y+30,px:0,py:0,vx:i*1.2,vy:3,alive:true,color:'#aaffff'});
      break;
    }
    case 5: { // 雷霆: drops vertical lightning columns
      b.x += b.vx; if(b.x<70||b.x>W-70) b.vx*=-1;
      const fr = phase>=2?60:phase>=1?80:110;
      if(mt%fr===0) {
        const t = players.find(p=>!p.dead);
        const tx = t? t.x : W/2;
        // Column of falling sparks
        for(let i=0;i<14;i++) {
          enemyBullets.push({x:tx+rnd(-8,8),y:b.y+30+i*2,px:0,py:0,vx:rnd(-.4,.4),vy:5+rnd(0,1),alive:true,color:'#ffff44'});
        }
      }
      if(mt%((40*fireMul)|0)===0) for(let i=-2;i<=2;i++) enemyBullets.push({x:b.x,y:b.y+30,px:0,py:0,vx:i*1.0,vy:3.0,alive:true,color:'#ffff88'});
      break;
    }
    case 6: { // 冰之女皇: expanding crystal rings + slow walls
      b.x = W/2 + Math.sin(mt*0.02)*80;
      const fr = phase>=2?70:phase>=1?100:140;
      if(mt%fr===0) {
        const n = phase>=1 ? 16 : 12;
        for(let a=0;a<n;a++) {
          const ag=(a/n)*Math.PI*2;
          const b1={x:b.x,y:b.y,px:0,py:0,vx:Math.cos(ag)*1.8,vy:Math.sin(ag)*1.8,alive:true,color:'#aaeeff'};
          enemyBullets.push(b1);
        }
      }
      if(mt%((90*fireMul)|0)===0) {
        for(let i=-3;i<=3;i++) enemyBullets.push({x:b.x,y:b.y+30,px:0,py:0,vx:i*0.7,vy:2.4,alive:true,color:'#ddffff'});
      }
      break;
    }
    case 7: { // 等离子: rapid plasma orbs + radial burst
      b.x += b.vx*1.2; if(b.x<70||b.x>W-70) b.vx*=-1;
      const fr = phase>=2?12:phase>=1?16:22;
      if(mt%fr===0) {
        const t=players.find(p=>!p.dead);
        const tx = t? t.x : W/2, ty = t? t.y : H-100;
        const dx=tx-b.x,dy=ty-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        enemyBullets.push({x:b.x,y:b.y+20,px:0,py:0,vx:dx/d*4,vy:dy/d*4,alive:true,color:'#ff00cc'});
      }
      if(phase>=1 && mt%90===0) {
        for(let a=0;a<14;a++){const ag=(a/14)*Math.PI*2;enemyBullets.push({x:b.x,y:b.y,px:0,py:0,vx:Math.cos(ag)*3,vy:Math.sin(ag)*3,alive:true,color:'#ff66ff'});}
      }
      break;
    }
    case 8: { // 龙卷: rotating spiral with thick arms
      b.x = W/2 + Math.cos(mt*0.018)*120;
      const ang = mt*0.08;
      if(mt%6===0) {
        const arms = phase>=1?5:3;
        for(let a=0;a<arms;a++) {
          const aa=ang+(a/arms)*Math.PI*2;
          enemyBullets.push({x:b.x+Math.cos(aa)*30,y:b.y+Math.sin(aa)*30+10,px:0,py:0,vx:Math.cos(aa)*2.4,vy:Math.sin(aa)*2.4+1.0,alive:true,color:'#ff8800'});
        }
      }
      break;
    }
    case 10: { // 水瓶·Aquarius — 倾倒水流弹 + 落雨周期
      b.x += b.vx*0.7; if(b.x<70||b.x>W-70) b.vx*=-1;
      // Pouring stream — frequent fast downward droplets
      if (mt%((10*fireMul)|0)===0) {
        for (let i=-1;i<=1;i++) {
          enemyBullets.push({x:b.x+18+i*4, y:b.y+10, px:0,py:0,
            vx: i*0.6+rnd(-0.3,0.3), vy: 4.2+rnd(0,1.2), alive:true, color:'#88ccff'});
        }
      }
      // Periodic rain wall — wide spread of slow drops
      if (mt%((90*fireMul)|0)===0) {
        for (let i=0;i<9;i++) {
          enemyBullets.push({x:rnd(20,W-20), y:b.y+30, px:0,py:0,
            vx:0, vy:2.4+rnd(0,1), alive:true, color:'#aaeeff'});
        }
      }
      if (phase>=1 && mt%80===0) {
        for (let a=0;a<10;a++) {
          const ag=(a/10)*Math.PI*2;
          enemyBullets.push({x:b.x,y:b.y,px:0,py:0,
            vx:Math.cos(ag)*2.6, vy:Math.sin(ag)*2.6, alive:true, color:'#44ccff'});
        }
      }
      break;
    }
    case 11: { // 双鱼·Pisces — 阴阳追击 + 双向螺旋
      b.x += b.vx*0.5; if(b.x<70||b.x>W-70) b.vx*=-1;
      // Twin fish bullets that curve outward
      const fr = phase>=2 ? 8 : phase>=1 ? 14 : 22;
      if (mt%(fr|0)===0) {
        const ang = mt*0.07;
        for (let s=-1;s<=1;s+=2) {
          const a = ang*s + (s>0?0:Math.PI);
          enemyBullets.push({x:b.x, y:b.y+10, px:0,py:0,
            vx:Math.cos(a)*2.2, vy:Math.sin(a)*2.2+1.6, alive:true,
            color:s>0?'#ff66aa':'#aaffff'});
        }
      }
      // Aimed twin homing-ish shots toward player
      if (mt%((45*fireMul)|0)===0) {
        const t = players.find(p=>!p.dead);
        if (t) {
          const dx = t.x - b.x, dy = t.y - b.y, d = Math.sqrt(dx*dx+dy*dy)||1;
          for (let off=-1; off<=1; off+=2) {
            enemyBullets.push({x:b.x+off*16, y:b.y+10, px:0,py:0,
              vx:dx/d*3.4 + off*0.6, vy:dy/d*3.4, alive:true,
              color: off<0?'#ff66aa':'#aaffff'});
          }
        }
      }
      // Phase 1: spinning yin-yang ring; phase 2: dense radial
      if (phase>=1 && mt%70===0) {
        for (let a=0;a<12;a++) {
          const ag=(a/12)*Math.PI*2 + mt*0.04;
          const col = a%2===0 ? '#ff66aa' : '#aaffff';
          enemyBullets.push({x:b.x,y:b.y,px:0,py:0,
            vx:Math.cos(ag)*2.4, vy:Math.sin(ag)*2.4, alive:true, color:col});
        }
      }
      break;
    }
    case 9: { // 终极要塞: alternating barrages + cross beams
      b.x += b.vx*0.7; if(b.x<70||b.x>W-70) b.vx*=-1;
      const segment = (mt/30|0)%4;
      if(mt%((22*fireMul)|0)===0) {
        if(segment===0) {
          for(let i=-3;i<=3;i++) enemyBullets.push({x:b.x,y:b.y+30,px:0,py:0,vx:i*1.2,vy:3.4,alive:true,color:'#ff2244'});
        } else if(segment===1) {
          for(let a=0;a<12;a++){const ag=(a/12)*Math.PI*2;enemyBullets.push({x:b.x,y:b.y,px:0,py:0,vx:Math.cos(ag)*2.6,vy:Math.sin(ag)*2.6,alive:true,color:'#ffaa44'});}
        } else if(segment===2) {
          const t=players.find(p=>!p.dead);
          if(t){const dx=t.x-b.x,dy=t.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;
            for(let i=-1;i<=1;i++) enemyBullets.push({x:b.x,y:b.y+20,px:0,py:0,vx:dx/d*3.5+i*0.7,vy:dy/d*3.5,alive:true,color:'#ff4422'});}
        } else {
          for(let i=-4;i<=4;i++) enemyBullets.push({x:b.x+i*8,y:b.y+30,px:0,py:0,vx:0,vy:3.8,alive:true,color:'#ffcc44'});
        }
      }
      if(phase>=2 && mt%150===0) {
        for(let a=0;a<24;a++){const ag=(a/24)*Math.PI*2;enemyBullets.push({x:b.x,y:b.y,px:0,py:0,vx:Math.cos(ag)*3.5,vy:Math.sin(ag)*3.5,alive:true,color:'#ffffff'});}
      }
      break;
    }
  }
}

// Per-boss visual
function drawBoss() {
  if(!boss||!boss.alive) return;
  const b=boss;
  const x=b.px, y=b.py;
  // Boss banner (spawn 2s / rage 1s) — flashing semi-transparent strip across center
  if (b.bannerTime > 0) {
    const flash = Math.sin(b.bannerTime * 0.5) * 0.35 + 0.55;
    const isRage = b.bannerLabel && b.bannerLabel.indexOf('狂') >= 0;
    const baseCol = isRage ? '#ff0033' : '#ffaa00';
    cx.save();
    // Diagonal stripe pattern background
    const bandY = H/2 - 36, bandH = 72;
    cx.fillStyle = `rgba(20,0,0,${0.35*flash})`;
    cx.fillRect(0, bandY, W, bandH);
    // Glowing borders
    cx.fillStyle = baseCol;
    cx.globalAlpha = flash;
    cx.fillRect(0, bandY-2, W, 3);
    cx.fillRect(0, bandY+bandH-1, W, 3);
    // Animated diagonal stripes
    cx.globalAlpha = 0.25 * flash;
    for (let i=-bandH; i<W+bandH; i+=20) {
      cx.beginPath();
      const off = (frame * 2) % 20;
      cx.moveTo(i + off, bandY);
      cx.lineTo(i + off + bandH, bandY + bandH);
      cx.lineTo(i + off + bandH + 8, bandY + bandH);
      cx.lineTo(i + off + 8, bandY);
      cx.closePath();
      cx.fillStyle = baseCol;
      cx.fill();
    }
    // Banner text
    cx.globalAlpha = flash;
    cx.textAlign = 'center';
    cx.fillStyle = '#000';
    cx.font = "bold 26px 'Courier New', monospace";
    cx.fillText(b.bannerLabel || 'BOSS', W/2 + 2, H/2 + 8);
    cx.fillStyle = isRage ? '#ffeeaa' : '#ffffff';
    cx.fillText(b.bannerLabel || 'BOSS', W/2, H/2 + 6);
    cx.fillStyle = baseCol;
    cx.font = "11px 'Courier New', monospace";
    cx.fillText(b.name, W/2, H/2 + 26);
    cx.restore();
    cx.textAlign = 'left';
    b.bannerTime--;
  }
  // Wide ground-shadow blob
  cx.fillStyle = 'rgba(0,0,0,0.45)';
  cx.beginPath(); cx.ellipse(x + 6, y + 56, 70, 12, 0, 0, Math.PI*2); cx.fill();
  cx.save(); cx.translate(x, y);
  drawBossShape(b);
  // Top-edge specular highlight (universal — adds metallic realism)
  const hg = cx.createLinearGradient(0,-50,0,-15);
  hg.addColorStop(0, 'rgba(255,255,255,0.45)');
  hg.addColorStop(1, 'rgba(255,255,255,0)');
  cx.fillStyle = hg;
  cx.beginPath(); cx.ellipse(0, -36, 35, 16, 0, 0, Math.PI*2); cx.fill();
  // Bottom inner shadow for depth
  const sg = cx.createLinearGradient(0, 20, 0, 55);
  sg.addColorStop(0, 'rgba(0,0,0,0)');
  sg.addColorStop(1, 'rgba(0,0,0,0.45)');
  cx.fillStyle = sg;
  cx.beginPath(); cx.ellipse(0, 38, 50, 12, 0, 0, Math.PI*2); cx.fill();
  cx.restore();

  // HP bar at TOP (under HUD); shows current segment + xN remaining
  const bpw=300, bpx=(W-bpw)/2, bpy=42;
  const segs = b.barCount || 1;
  const segHp = b.maxHp / segs;
  const barsLeft = Math.max(1, Math.ceil(b.hp / segHp));
  const fillRatio = clamp((b.hp - (barsLeft-1)*segHp) / segHp, 0, 1);

  cx.fillStyle='rgba(0,0,0,0.75)'; cx.fillRect(bpx-2,bpy-14,bpw+4,28);
  // Title row
  cx.fillStyle='#fff'; cx.font="bold 11px sans-serif"; cx.textAlign='center';
  cx.fillText('★ '+b.name+' ★', (W/2)|0, bpy-2);
  // HP fill
  cx.fillStyle='#220011'; cx.fillRect(bpx|0,bpy|0,bpw,10);
  const bHpGrad=cx.createLinearGradient(bpx,0,bpx+bpw,0);
  bHpGrad.addColorStop(0,b.color); bHpGrad.addColorStop(1,b.acc);
  cx.fillStyle=bHpGrad; cx.fillRect(bpx|0,bpy|0,(bpw*fillRatio)|0,10);
  // x N indicator
  cx.fillStyle='#ffcc44'; cx.font="bold 11px 'Courier New', monospace"; cx.textAlign='left';
  cx.fillText('x'+barsLeft, bpx+bpw+6, bpy+9);
  cx.textAlign='left';
}

function drawBossShape(b) {
  const t=b.moveTimer;
  // Outer glow shared
  const og=cx.createRadialGradient(0,0,20,0,0,70);
  og.addColorStop(0,b.color+'88'); og.addColorStop(1,b.color+'00');
  cx.fillStyle=og; cx.beginPath(); cx.arc(0,0,70,0,Math.PI*2); cx.fill();
  // Sharper render: stronger linework defaults
  cx.lineCap='round'; cx.lineJoin='round';
  // Rage red aura
  if (b.phase>=3) {
    const rg=cx.createRadialGradient(0,0,30,0,0,100);
    rg.addColorStop(0,'rgba(255,0,0,0.4)'); rg.addColorStop(1,'rgba(255,0,0,0)');
    cx.fillStyle=rg; cx.beginPath(); cx.arc(0,0,100,0,Math.PI*2); cx.fill();
  }
  switch(b.bossType) {
    case 0: { // 白羊·Aries — ram with curling horns
      cx.fillStyle=b.color;
      cx.beginPath(); cx.ellipse(0,5,32,38,0,0,Math.PI*2); cx.fill();
      // Curling horns (spirals)
      cx.strokeStyle=b.acc; cx.lineWidth=4;
      cx.beginPath();
      cx.arc(-22,-30,12,Math.PI*0.2,Math.PI*1.4); cx.stroke();
      cx.beginPath();
      cx.arc( 22,-30,12,-Math.PI*0.4,Math.PI*0.8); cx.stroke();
      // Eyes
      cx.fillStyle='#fff';
      cx.beginPath(); cx.arc(-9,-2,3,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc( 9,-2,3,0,Math.PI*2); cx.fill();
      cx.fillStyle='#000'; cx.beginPath(); cx.arc(-9,-2,1.5,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc( 9,-2,1.5,0,Math.PI*2); cx.fill();
      // Snout
      cx.fillStyle='#553311';
      cx.beginPath(); cx.ellipse(0,18,8,6,0,0,Math.PI*2); cx.fill();
      break;
    }
    case 1: { // 金牛·Taurus — bull head + sharp horns
      cx.fillStyle=b.color;
      cx.beginPath(); cx.ellipse(0,5,38,34,0,0,Math.PI*2); cx.fill();
      // Two big curving horns
      cx.fillStyle=b.acc;
      cx.beginPath(); cx.moveTo(-30,-12); cx.lineTo(-58,-32); cx.lineTo(-22,-22); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo( 30,-12); cx.lineTo( 58,-32); cx.lineTo( 22,-22); cx.closePath(); cx.fill();
      // Glowing red eyes
      cx.fillStyle='#ff2222';
      cx.beginPath(); cx.arc(-12,0,4,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc( 12,0,4,0,Math.PI*2); cx.fill();
      // Nose ring
      cx.strokeStyle='#ffcc44'; cx.lineWidth=2;
      cx.beginPath(); cx.arc(0,22,5,0,Math.PI*2); cx.stroke();
      break;
    }
    case 2: { // 双子·Gemini — twin silhouettes
      const sway = Math.sin(t*0.06)*4;
      for (const sx of [-1,1]) {
        cx.save(); cx.translate(sx*22 + sx*sway, 0);
        cx.fillStyle=b.color;
        cx.beginPath(); cx.ellipse(0,-22,12,14,0,0,Math.PI*2); cx.fill();   // head
        cx.beginPath(); cx.moveTo(0,-10); cx.lineTo(-14,30); cx.lineTo(14,30); cx.closePath(); cx.fill(); // body
        cx.fillStyle=b.acc;
        cx.beginPath(); cx.arc(0,-22,5,0,Math.PI*2); cx.fill();   // face glow
        cx.restore();
      }
      // Linking energy beam between twins
      cx.strokeStyle=b.acc; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(-20,0); cx.lineTo(20,0); cx.stroke();
      break;
    }
    case 3: { // 巨蟹·Cancer — body with two giant pincers
      cx.fillStyle=b.color;
      cx.beginPath(); cx.ellipse(0,8,42,28,0,0,Math.PI*2); cx.fill();
      // Pincers on each side (open/close animation)
      const pinch = Math.abs(Math.sin(t*0.07))*8;
      for (const sx of [-1,1]) {
        cx.save(); cx.translate(sx*46, -10);
        cx.fillStyle=b.color;
        // upper claw
        cx.beginPath(); cx.moveTo(0,0); cx.lineTo(sx*22,-pinch); cx.lineTo(sx*32,-3); cx.lineTo(sx*16,8); cx.closePath(); cx.fill();
        // lower claw
        cx.beginPath(); cx.moveTo(0,4); cx.lineTo(sx*22, pinch+10); cx.lineTo(sx*32, 12); cx.lineTo(sx*16,12); cx.closePath(); cx.fill();
        cx.restore();
      }
      // Eye stalks
      cx.fillStyle=b.acc;
      cx.beginPath(); cx.arc(-10,-12,4,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc( 10,-12,4,0,Math.PI*2); cx.fill();
      cx.strokeStyle=b.color; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(-10,-12); cx.lineTo(-12,-2); cx.stroke();
      cx.beginPath(); cx.moveTo( 10,-12); cx.lineTo( 12,-2); cx.stroke();
      break;
    }
    case 4: { // 狮子·Leo — lion head with mane
      // Mane
      cx.fillStyle=b.acc;
      for (let i=0;i<14;i++) {
        const ang = (i/14)*Math.PI*2;
        const r = 44 + Math.sin(t*0.1+i)*4;
        cx.beginPath();
        cx.moveTo(Math.cos(ang)*22, Math.sin(ang)*22);
        cx.lineTo(Math.cos(ang+0.1)*r, Math.sin(ang+0.1)*r);
        cx.lineTo(Math.cos(ang-0.1)*r, Math.sin(ang-0.1)*r);
        cx.closePath(); cx.fill();
      }
      // Face
      cx.fillStyle=b.color;
      cx.beginPath(); cx.arc(0,0,28,0,Math.PI*2); cx.fill();
      // Eyes
      cx.fillStyle='#fff';
      cx.beginPath(); cx.arc(-9,-5,4,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc( 9,-5,4,0,Math.PI*2); cx.fill();
      cx.fillStyle='#000';
      cx.beginPath(); cx.arc(-9,-5,2,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc( 9,-5,2,0,Math.PI*2); cx.fill();
      // Snarling mouth
      cx.fillStyle='#220011';
      cx.beginPath(); cx.ellipse(0,12,10,6,0,0,Math.PI); cx.fill();
      // Fangs
      cx.fillStyle='#fff';
      cx.beginPath(); cx.moveTo(-6,12); cx.lineTo(-4,18); cx.lineTo(-2,12); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo( 6,12); cx.lineTo( 4,18); cx.lineTo( 2,12); cx.closePath(); cx.fill();
      break;
    }
    case 5: { // 处女·Virgo — maiden silhouette holding a star
      cx.fillStyle=b.color;
      // Robe
      cx.beginPath(); cx.moveTo(-30,40); cx.lineTo(-12,0); cx.lineTo(12,0); cx.lineTo(30,40); cx.closePath(); cx.fill();
      // Head
      cx.fillStyle=b.acc;
      cx.beginPath(); cx.arc(0,-18,15,0,Math.PI*2); cx.fill();
      // Halo
      cx.strokeStyle=b.acc; cx.lineWidth=2;
      cx.beginPath(); cx.ellipse(0,-22,22,8,0,0,Math.PI*2); cx.stroke();
      // Star in hand
      cx.fillStyle='#ffff66';
      const hx = -22+Math.sin(t*0.08)*2, hy = 8;
      cx.beginPath();
      for (let i=0;i<10;i++) {
        const a = (i/10)*Math.PI*2 - Math.PI/2;
        const r = i%2===0 ? 8 : 3.5;
        const px = hx+Math.cos(a)*r, py = hy+Math.sin(a)*r;
        i===0?cx.moveTo(px,py):cx.lineTo(px,py);
      }
      cx.closePath(); cx.fill();
      // Eyes
      cx.fillStyle='#000';
      cx.beginPath(); cx.arc(-5,-18,1.5,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc( 5,-18,1.5,0,Math.PI*2); cx.fill();
      break;
    }
    case 6: { // 天秤·Libra — beam scales
      // Vertical pillar
      cx.fillStyle=b.color;
      cx.fillRect(-3,-20,6,55);
      // Horizontal beam (tilts based on phase)
      const tilt = Math.sin(t*0.05)*0.15 + (b.phase*0.05);
      cx.save(); cx.rotate(tilt);
      cx.fillRect(-58,-22,116,5);
      // Two pans
      for (const sx of [-50,50]) {
        cx.fillStyle=b.acc;
        cx.beginPath(); cx.arc(sx,-12,4,0,Math.PI*2); cx.fill();
        cx.strokeStyle=b.color; cx.lineWidth=2;
        cx.beginPath(); cx.moveTo(sx,-12); cx.lineTo(sx-12,8); cx.lineTo(sx+12,8); cx.closePath(); cx.stroke();
        cx.fillStyle=b.color+'66';
        cx.fillRect(sx-12,8,24,3);
      }
      cx.restore();
      // Pivot gem
      cx.fillStyle='#fff';
      cx.beginPath(); cx.arc(0,-20,5,0,Math.PI*2); cx.fill();
      break;
    }
    case 7: { // 天蝎·Scorpio — segmented body + curling tail with stinger
      cx.fillStyle=b.color;
      // Body segments
      for (let i=0;i<5;i++) {
        cx.beginPath();
        cx.arc(-30+i*15, 8, 12-i*0.5, 0, Math.PI*2);
        cx.fill();
      }
      // Pincers in front
      for (const sx of [-1,1]) {
        cx.save(); cx.translate(sx*-44, 8);
        cx.fillStyle=b.color;
        cx.beginPath(); cx.moveTo(0,0); cx.lineTo(sx*-12,-8); cx.lineTo(sx*-18,0); cx.lineTo(sx*-10,6); cx.closePath(); cx.fill();
        cx.beginPath(); cx.moveTo(0,4); cx.lineTo(sx*-12, 12); cx.lineTo(sx*-18, 4); cx.closePath(); cx.fill();
        cx.restore();
      }
      // Curling tail (multiple segments)
      const wig = Math.sin(t*0.1)*8;
      const segs = [
        [40, 0], [56, -10], [62, -28], [54, -44], [38, -52]
      ];
      cx.fillStyle=b.color;
      for (let i=0;i<segs.length;i++) {
        const [sx,sy] = segs[i];
        cx.beginPath(); cx.arc(sx + (i*wig*0.05), sy, 8-i*1, 0, Math.PI*2); cx.fill();
      }
      // Stinger
      cx.fillStyle=b.acc;
      cx.beginPath();
      cx.moveTo(38, -52); cx.lineTo(28, -68); cx.lineTo(46, -56); cx.closePath(); cx.fill();
      // Eyes
      cx.fillStyle='#fff';
      cx.beginPath(); cx.arc(-32,2,2,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(-26,2,2,0,Math.PI*2); cx.fill();
      break;
    }
    case 8: { // 射手·Sagittarius — centaur with bow
      cx.fillStyle=b.color;
      // Horse body (lower)
      cx.beginPath(); cx.ellipse(0,18,40,18,0,0,Math.PI*2); cx.fill();
      // Legs
      for (const lx of [-26,-10,10,26]) {
        cx.fillRect(lx-2, 30, 4, 14);
      }
      // Human torso (upper)
      cx.fillStyle=b.acc;
      cx.beginPath(); cx.moveTo(-10,8); cx.lineTo(-8,-12); cx.lineTo(8,-12); cx.lineTo(10,8); cx.closePath(); cx.fill();
      // Head
      cx.beginPath(); cx.arc(0,-20,9,0,Math.PI*2); cx.fill();
      // Bow
      cx.strokeStyle=b.acc; cx.lineWidth=2;
      cx.beginPath();
      cx.arc(20,-8, 16, -Math.PI/2-0.6, Math.PI/2+0.6);
      cx.stroke();
      // Arrow
      const aimY = Math.sin(t*0.05)*4;
      cx.strokeStyle='#ffff66'; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(20,-8+aimY); cx.lineTo(60,-8+aimY); cx.stroke();
      cx.fillStyle='#ffff66';
      cx.beginPath(); cx.moveTo(60,-8+aimY); cx.lineTo(56,-12+aimY); cx.lineTo(56,-4+aimY); cx.closePath(); cx.fill();
      break;
    }
    case 9: { // 摩羯·Capricorn — goat head + fish tail
      cx.fillStyle=b.color;
      // Goat head
      cx.beginPath(); cx.ellipse(-10,-10,22,20,0,0,Math.PI*2); cx.fill();
      // Horns curling back
      cx.strokeStyle=b.acc; cx.lineWidth=4;
      cx.beginPath(); cx.arc(-22,-30,10,Math.PI*0.3,Math.PI*1.3); cx.stroke();
      cx.beginPath(); cx.arc(  4,-30,10,-Math.PI*0.3,Math.PI*0.7); cx.stroke();
      // Fish tail (right side)
      cx.fillStyle=b.acc;
      cx.beginPath(); cx.moveTo(8, 0); cx.bezierCurveTo(40, 5, 50, 30, 30, 38);
      cx.bezierCurveTo(50, 30, 60, 25, 56, 0);
      cx.bezierCurveTo(50, 16, 30, 12, 8, 0);
      cx.closePath(); cx.fill();
      // Tail fin
      cx.beginPath(); cx.moveTo(56, 0); cx.lineTo(70, -10); cx.lineTo(64, 8); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(30, 38); cx.lineTo(20, 50); cx.lineTo(40, 44); cx.closePath(); cx.fill();
      // Eye
      cx.fillStyle='#fff';
      cx.beginPath(); cx.arc(-14,-12,3,0,Math.PI*2); cx.fill();
      cx.fillStyle='#000';
      cx.beginPath(); cx.arc(-14,-12,1.4,0,Math.PI*2); cx.fill();
      break;
    }
    case 10: { // 水瓶·Aquarius — humanoid with jar pouring water
      cx.fillStyle=b.color;
      // Robe
      cx.beginPath(); cx.moveTo(-26,38); cx.lineTo(-10,-4); cx.lineTo(10,-4); cx.lineTo(26,38); cx.closePath(); cx.fill();
      // Head
      cx.fillStyle=b.acc;
      cx.beginPath(); cx.arc(0,-20,12,0,Math.PI*2); cx.fill();
      // Jar (right side)
      cx.fillStyle=b.color;
      cx.beginPath(); cx.roundRect(20,-5,18,22,4); cx.fill();
      cx.fillStyle=b.acc;
      cx.fillRect(22,-9,14,4);
      // Pouring water (animated streams)
      cx.strokeStyle='#88ccff';
      cx.lineWidth=2;
      for (let i=0;i<3;i++) {
        const off = (t*4 + i*30) % 60;
        cx.beginPath();
        cx.moveTo(38, 17 + off*0.4);
        cx.lineTo(45, 17 + off*0.45);
        cx.stroke();
      }
      // Wave drops
      cx.fillStyle='#aaeeff';
      for (let i=0;i<4;i++) {
        const wy = 30 + ((t*3 + i*20) % 50);
        cx.beginPath(); cx.arc(40+i*4, wy, 2, 0, Math.PI*2); cx.fill();
      }
      break;
    }
    case 11: { // 双鱼·Pisces — two fish in yin-yang
      cx.save(); cx.rotate(t*0.03);
      // Fish 1
      for (const dir of [1,-1]) {
        cx.save(); cx.rotate(dir>0?0:Math.PI);
        cx.fillStyle = dir>0 ? b.color : b.acc;
        cx.beginPath();
        cx.ellipse(20, 0, 22, 10, 0, 0, Math.PI*2);
        cx.fill();
        // Tail
        cx.beginPath();
        cx.moveTo(40, 0); cx.lineTo(52, -10); cx.lineTo(52, 10); cx.closePath();
        cx.fill();
        // Eye
        cx.fillStyle='#fff';
        cx.beginPath(); cx.arc(8, -2, 2.5, 0, Math.PI*2); cx.fill();
        cx.fillStyle='#000';
        cx.beginPath(); cx.arc(8, -2, 1, 0, Math.PI*2); cx.fill();
        cx.restore();
      }
      cx.restore();
      // Connecting binding line
      cx.strokeStyle=b.acc; cx.lineWidth=1.5;
      cx.beginPath(); cx.arc(0,0,30,0,Math.PI*2); cx.stroke();
      break;
    }
  }
}

// ─── PICKUPS ─────────────────────────────────────────────────────────────────
function spawnPickup(x,y,type,value) {
  pickups.push({x,y,px:x|0,py:y|0,type,value:value||1,alive:true,vy:1.5,bob:rnd(0,Math.PI*2)});
}

function updatePickups() {
  for(const pk of pickups){pk.y+=pk.vy;pk.px=pk.x|0;pk.py=pk.y|0;if(pk.y>H+20)pk.alive=false;}
  pickups=pickups.filter(p=>p.alive);
}

// 10 wingmen — each with a distinct firing style.  (Index 2 'shield' removed; replaced by 散弹.)
const WINGMAN_NAMES = [
  '激光僚机','导弹僚机','散弹僚机','轰炸僚机','等离子僚机',
  '闪电僚机','冰晶僚机','火焰僚机','双管僚机','轨道僚机',
];
const WINGMAN_COLORS = [
  '#00ffff','#ffcc00','#ff8800','#ff4488','#aa44ff',
  '#88ffff','#aaeeff','#ff5522','#dddddd','#ffdd44',
];

function drawPickupIcon(pk) {
  const x=pk.px, y=pk.py;
  const bob=Math.sin(frame*0.08+pk.bob)*2;
  cx.save(); cx.translate(x, y+bob);

  switch(pk.type) {
    case 'coin': {
      const g=cx.createRadialGradient(-2,-2,1,0,0,9);
      g.addColorStop(0,'#ffff99'); g.addColorStop(0.5,'#ffcc00'); g.addColorStop(1,'#cc8800');
      cx.fillStyle=g; cx.beginPath(); cx.arc(0,0,9,0,Math.PI*2); cx.fill();
      cx.strokeStyle='#ffaa00'; cx.lineWidth=1; cx.stroke();
      cx.fillStyle='#884400'; cx.font='bold 10px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
      cx.fillText('$',0,1); cx.textBaseline='alphabetic';
      break;
    }
    case 'diamond': {
      const g=cx.createLinearGradient(-8,-10,8,10);
      g.addColorStop(0,'#aaeeff'); g.addColorStop(0.4,'#0099ff'); g.addColorStop(1,'#003399');
      cx.fillStyle=g;
      cx.beginPath(); cx.moveTo(0,-11); cx.lineTo(9,-3); cx.lineTo(9,3); cx.lineTo(0,11); cx.lineTo(-9,3); cx.lineTo(-9,-3); cx.closePath(); cx.fill();
      cx.strokeStyle='#55ddff'; cx.lineWidth=1; cx.stroke();
      // Inner shine
      cx.fillStyle='rgba(255,255,255,0.4)';
      cx.beginPath(); cx.moveTo(0,-8); cx.lineTo(5,-2); cx.lineTo(0,0); cx.lineTo(-5,-2); cx.closePath(); cx.fill();
      break;
    }
    case 'weapon': {
      const wn=pk.value%10;
      const wColors=['#00ffff','#ff8800','#ff2200','#ffcc00','#aa00ff','#ffffff','#ff6600','#00ff88','#88ffff','#ffaaff'];
      const g=cx.createRadialGradient(0,0,2,0,0,11);
      g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,wColors[wn]); g.addColorStop(1,wColors[wn]+'44');
      cx.fillStyle=g; cx.beginPath(); cx.arc(0,0,11,0,Math.PI*2); cx.fill();
      cx.strokeStyle=wColors[wn]; cx.lineWidth=1.5; cx.stroke();
      // Weapon type letter
      cx.fillStyle='#000'; cx.font='bold 9px monospace'; cx.textAlign='center'; cx.textBaseline='middle';
      cx.fillText('W'+(wn+1),0,1); cx.textBaseline='alphabetic';
      break;
    }
    case 'star': {
      const pts=5, outer=10, inner=5;
      const g=cx.createRadialGradient(0,0,2,0,0,outer);
      g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,'#ffff00'); g.addColorStop(1,'#ff8800');
      cx.fillStyle=g;
      cx.beginPath();
      for(let i=0;i<pts*2;i++){
        const a=(i/pts/2)*Math.PI*2-Math.PI/2;
        const r=i%2===0?outer:inner;
        i===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      cx.closePath(); cx.fill();
      cx.strokeStyle='#ffaa00'; cx.lineWidth=1; cx.stroke();
      break;
    }
    case 'life': {
      const g=cx.createRadialGradient(0,0,2,0,0,10);
      g.addColorStop(0,'#ffaaaa'); g.addColorStop(1,'#cc0000');
      cx.fillStyle=g;
      cx.beginPath(); cx.arc(-4,-3,5,Math.PI,0); cx.arc(4,-3,5,Math.PI,0); cx.lineTo(0,10); cx.closePath(); cx.fill();
      cx.strokeStyle='#ff4444'; cx.lineWidth=1; cx.stroke();
      cx.fillStyle='rgba(255,255,255,0.3)';
      cx.beginPath(); cx.arc(-4,-4,3,Math.PI,0); cx.closePath(); cx.fill();
      break;
    }
    case 'bomb': {
      // 核弹外观: 锥形弹头 + 圆柱弹体 + 警告条 + 辐射符号 + 尾翼
      // 弹头 (red cone)
      cx.fillStyle = '#dd2222';
      cx.beginPath(); cx.moveTo(0,-13); cx.lineTo(-5,-5); cx.lineTo(5,-5); cx.closePath(); cx.fill();
      cx.fillStyle = '#aa0000';
      cx.beginPath(); cx.moveTo(0,-13); cx.lineTo(2,-5); cx.lineTo(5,-5); cx.closePath(); cx.fill();
      // 弹体 (white cylinder with metallic shading)
      cx.fillStyle = '#e8e8f0';
      cx.fillRect(-5,-5,10,12);
      cx.fillStyle = 'rgba(0,0,0,0.25)'; cx.fillRect(2,-5,3,12);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.fillRect(-5,-5,2,12);
      // 警告色带 (黄黑相间)
      cx.fillStyle = '#ffcc00'; cx.fillRect(-5,-3,10,2);
      cx.fillStyle = '#000';     cx.fillRect(-5,-1,10,1);
      // 辐射符号 (trefoil) on body
      cx.fillStyle = '#000';
      cx.beginPath(); cx.arc(0,4,1.4,0,Math.PI*2); cx.fill();
      for (let i=0;i<3;i++) {
        const a = (i/3)*Math.PI*2 - Math.PI/2;
        cx.beginPath();
        cx.moveTo(0+Math.cos(a-0.5)*1.4, 4+Math.sin(a-0.5)*1.4);
        cx.arc(0, 4, 3.4, a-0.45, a+0.45);
        cx.lineTo(0+Math.cos(a+0.5)*1.4, 4+Math.sin(a+0.5)*1.4);
        cx.closePath(); cx.fill();
      }
      // 尾翼
      cx.fillStyle = '#ff4422';
      cx.beginPath(); cx.moveTo(-5,7); cx.lineTo(-9,11); cx.lineTo(-5,11); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo( 5,7); cx.lineTo( 9,11); cx.lineTo( 5,11); cx.closePath(); cx.fill();
      // 尾喷
      cx.fillStyle = 'rgba(255,200,80,0.7)';
      cx.fillRect(-2,11,4,3);
      // 外缘描边
      cx.strokeStyle = '#660000'; cx.lineWidth = 0.7;
      cx.beginPath();
      cx.moveTo(0,-13); cx.lineTo(-5,-5); cx.lineTo(-5,7); cx.lineTo(5,7); cx.lineTo(5,-5); cx.closePath();
      cx.stroke();
      break;
    }
    case 'shield': {
      const g=cx.createLinearGradient(-9,-10,9,10);
      g.addColorStop(0,'#88ffee'); g.addColorStop(1,'#006655');
      cx.fillStyle=g;
      cx.beginPath(); cx.moveTo(0,-11); cx.lineTo(9,-5); cx.lineTo(9,3); cx.lineTo(0,10); cx.lineTo(-9,3); cx.lineTo(-9,-5); cx.closePath(); cx.fill();
      cx.strokeStyle='#00ffcc'; cx.lineWidth=1.5; cx.stroke();
      cx.fillStyle='rgba(0,255,200,0.25)';
      cx.beginPath(); cx.moveTo(0,-9); cx.lineTo(7,-4); cx.lineTo(0,-1); cx.lineTo(-7,-4); cx.closePath(); cx.fill();
      break;
    }
    case 'wingman': {
      const wt=pk.value;
      const wc=WINGMAN_COLORS[wt];
      const g=cx.createRadialGradient(0,0,2,0,0,12);
      g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,wc); g.addColorStop(1,wc+'33');
      cx.fillStyle=g; cx.beginPath(); cx.arc(0,0,12,0,Math.PI*2); cx.fill();
      cx.strokeStyle=wc; cx.lineWidth=1.5; cx.stroke();
      // Mini plane silhouette
      cx.fillStyle='#000000cc';
      cx.beginPath(); cx.moveTo(0,-7); cx.lineTo(-5,4); cx.lineTo(5,4); cx.closePath(); cx.fill();
      cx.fillRect(-8,1,16,2);
      // Label
      cx.fillStyle=wc; cx.font='bold 6px sans-serif'; cx.textAlign='center'; cx.textBaseline='bottom';
      cx.fillText('W'+(wt+1),0,13); cx.textBaseline='alphabetic';
      break;
    }
  }
  cx.restore();
}

function drawPickups() {
  for(const pk of pickups) drawPickupIcon(pk);
}

function collectPickups() {
  for(const p of players) {
    if(p.dead) continue;
    for(const pk of pickups) {
      if(!pk.alive) continue;
      if(Math.abs(p.x-pk.x)<20&&Math.abs(p.y-pk.py)<20) {
        pk.alive=false;
        switch(pk.type) {
          case 'coin':
            score+=pk.value; sessionCoins+=pk.value;
            addFT('+'+pk.value,pk.x,pk.y,'#ffcc00'); SFX.pickupCoin(); break;
          case 'diamond':
            sessionDiamonds+=pk.value;
            addFT('+'+pk.value+'💎',pk.x,pk.y,'#00aaff'); SFX.pickupDiamond(); break;
          case 'weapon': {
            const newW = pk.value%10;
            if (p.weapon === newW) {
              // Same weapon — bump level
              if (p.weaponLevel < 5) { p.weaponLevel++; SFX.levelUp(); }
              else SFX.pickupStar();
            } else {
              // Switching weapon — KEEP existing level
              p.weapon = newW;
              SFX.pickupWeapon();
            }
            addFT(WEAPON_NAMES[p.weapon]+' Lv'+p.weaponLevel,pk.x,pk.y,'#ff8800');
            break;
          }
          case 'star':
            if(p.weaponLevel<5){
              p.weaponLevel++;
              SFX.levelUp();
              addFT('★UP',pk.x,pk.y,'#ffff00');
            } else {
              // Already Lv5 → grant LV MAX duration (stacks; from console)
              const Cx = save.console || defaultConsole();
              p.weaponMax = (p.weaponMax || 0) + Math.round((Cx.starMaxDuration||5)*60);
              SFX.levelUp();
              triggerShake(6, 12);
              addFT('★ LV MAX ★', pk.x, pk.y, '#ff66ff');
            }
            break;
          case 'life':
            p.lives++; addFT('+1UP',pk.x,pk.y,'#ff4444'); SFX.pickupLife(); break;
          case 'bomb':
            p.bombs++; addFT('+BOMB',pk.x,pk.y,'#4444ff'); break;
          case 'shield':
            p.shield=420; p.shieldHits=3;
            addFT('SHIELD x3',pk.x,pk.y,'#00ffcc'); SFX.pickupShield(); break;
          case 'wingman':
            spawnWingman(p, pk.value);
            addFT(WINGMAN_NAMES[pk.value],pk.x,pk.y,WINGMAN_COLORS[pk.value]); SFX.pickupWeapon(); break;
        }
      }
    }
  }
}

// ─── WINGMEN ─────────────────────────────────────────────────────────────────
// wType: 0=laser, 1=missile, 2=shield, 3=spread, 4=bomber
const WINGMAN_OFFSETS=[
  {dx:-36,dy:-10},{dx:36,dy:-10},{dx:-60,dy:0},{dx:60,dy:0},{dx:0,dy:-50}
];

const WINGMAN_MAX = 2;
// Pick a wingman type for drops; types the player already owns are 2× more likely
function rollWingmanType() {
  const p = players.find(p=>!p.dead) || players[0];
  const owned = p ? wingmen.filter(w=>w.owner===p && w.alive).map(w=>w.wType) : [];
  const total = WINGMAN_NAMES.length;
  let sum = 0;
  const w = [];
  for (let i=0;i<total;i++) {
    const wt = owned.includes(i) ? 2 : 1;
    w.push(wt); sum += wt;
  }
  let r = Math.random() * sum;
  for (let i=0;i<total;i++) {
    r -= w[i];
    if (r <= 0) return i;
  }
  return rndInt(0, total-1);
}
function spawnWingman(player, wType) {
  const owned = wingmen.filter(w=>w.owner===player&&w.alive);
  // Same color picked again → level up existing one (max 5)
  const same = owned.find(w=>w.wType===wType);
  if (same) {
    if ((same.level||1) < 5) {
      same.level = (same.level||1) + 1;
      addFT(WINGMAN_NAMES[wType]+' Lv'+same.level, player.x, player.y-30, WINGMAN_COLORS[wType]);
      SFX.levelUp();
    } else {
      addFT('Lv MAX', player.x, player.y-30, WINGMAN_COLORS[wType]);
      SFX.pickupStar();
    }
    return;
  }
  // Different color: cap at 2.
  // - At cap: replace LOWEST-level wingman, INHERIT its level + slot position
  //   (so left/right slots stay populated, no visual gap)
  // - Below cap: take whichever side (left/right) is empty
  let inheritedLevel = 1;
  let slotDx = WINGMAN_OFFSETS[0].dx, slotDy = WINGMAN_OFFSETS[0].dy;
  if (owned.length >= WINGMAN_MAX) {
    let lowest = owned[0];
    for (const w of owned) if ((w.level||1) < (lowest.level||1)) lowest = w;
    inheritedLevel = lowest.level || 1;   // inherit replaced wingman's level
    slotDx = lowest.dx; slotDy = lowest.dy; // inherit slot position
    lowest.alive = false;
  } else {
    // Pick the empty slot (the one not used by any current wingman)
    const usedDxs = new Set(owned.map(w=>w.dx));
    if (!usedDxs.has(WINGMAN_OFFSETS[0].dx)) { slotDx = WINGMAN_OFFSETS[0].dx; slotDy = WINGMAN_OFFSETS[0].dy; }
    else                                    { slotDx = WINGMAN_OFFSETS[1].dx; slotDy = WINGMAN_OFFSETS[1].dy; }
  }
  wingmen.push({
    owner:player, wType, alive:true, level: inheritedLevel,
    x:player.x, y:player.y, fireTimer:0,
    dx: slotDx, dy: slotDy,
  });
  if (inheritedLevel > 1) {
    addFT(WINGMAN_NAMES[wType]+' 继承 Lv'+inheritedLevel, player.x, player.y-30, WINGMAN_COLORS[wType]);
  } else {
    addFT(WINGMAN_NAMES[wType], player.x, player.y-30, WINGMAN_COLORS[wType]);
  }
}
// Drop all wingman levels by 1 on player damage; remove if at level 1
function damageWingmen(player) {
  for (const w of wingmen) {
    if (!w.alive || w.owner !== player) continue;
    const lv = w.level||1;
    if (lv <= 1) { w.alive = false; spawnExplosion(w.x, w.y, 'small'); }
    else { w.level = lv - 1; }
  }
}

function updateWingmen() {
  for(const w of wingmen) {
    if(!w.alive) continue;
    if(w.owner.dead) { w.alive=false; continue; }
    const tx=w.owner.x+w.dx, ty=w.owner.y+w.dy;
    w.x+=(tx-w.x)*0.12; w.y+=(ty-w.y)*0.12;
    w.fireTimer++;
    const lv = w.level||1;
    // Fire intervals per type (10 wingmen)
    const rates=[20,35,11,50,28, 14,22,18,16,24];
    const fireRate = Math.max(4, rates[w.wType] - (lv-1)*3);
    if(w.fireTimer>=fireRate) {
      w.fireTimer=0;
      fireWingmanBullet(w);
    }
  }
  wingmen=wingmen.filter(w=>w.alive);
}

function fireWingmanBullet(w) {
  const x=w.x, y=w.y, lv=w.level||1;
  const dmgMul = 1 + (lv-1) * 0.45;
  switch(w.wType) {
    case 0: // 激光
      bullets.push(mkB(x,y,0,-14,'#00ffff',2+Math.floor(lv/2),16,w.owner, Math.round(12*dmgMul),true));
      break;
    case 1: // 导弹
      bullets.push(mkB(x,y,0,-8,'#ffcc00',4,8,w.owner, Math.round(22*dmgMul)));
      if (lv>=3) bullets.push(mkB(x-6,y+4,-1,-8,'#ffaa00',3,7,w.owner, Math.round(14*dmgMul)));
      if (lv>=5) bullets.push(mkB(x+6,y+4, 1,-8,'#ffaa00',3,7,w.owner, Math.round(14*dmgMul)));
      break;
    case 2: { // 散弹 — multi-pellet
      const num = 3 + (lv-1);
      for (let i=0;i<num;i++) {
        const t = num>1 ? (i/(num-1)-0.5)*4 : 0;
        bullets.push(mkB(x,y,t,-10,'#ff8800',3,5,w.owner, Math.round(9*dmgMul)));
      }
      break;
    }
    case 3: // 轰炸 — heavy slow shot
      bullets.push(mkB(x,y,0,-5,'#ff44aa',8+lv,8+lv,w.owner, Math.round(40*dmgMul)));
      break;
    case 4: { // 等离子 — large orb + side wave
      const sz = 7 + lv;
      bullets.push(mkB(x,y,0,-7,'#aa44ff',sz,sz,w.owner, Math.round(28*dmgMul)));
      if (lv>=3) {
        bullets.push(mkB(x-8,y+2,-0.6,-6,'#cc66ff',sz-2,sz-2,w.owner, Math.round(14*dmgMul)));
        bullets.push(mkB(x+8,y+2, 0.6,-6,'#cc66ff',sz-2,sz-2,w.owner, Math.round(14*dmgMul)));
      }
      break;
    }
    case 5: { // 闪电 — chained jagged bolt
      const lCount = 1 + Math.ceil(lv/2);
      for (let i=0;i<lCount;i++) {
        const ox = (i-(lCount-1)/2)*8;
        const b = mkB(x+ox,y,ox*0.04,-13,'#88ffff',3,12,w.owner, Math.round(15*dmgMul));
        b.lightning = true;
        bullets.push(b);
      }
      break;
    }
    case 6: { // 冰晶 — slow piercing crystals
      const cCount = 3 + lv;
      for (let i=0;i<cCount;i++) {
        const ag = (i/cCount)*Math.PI - Math.PI/2;
        const b = mkB(x,y, Math.cos(ag)*2.4, Math.sin(ag)*2.4-7, '#aaeeff', 5+Math.floor(lv/2), 5+Math.floor(lv/2), w.owner, Math.round(16*dmgMul));
        b.crystal = true; b.slowF = 0.97;
        bullets.push(b);
      }
      break;
    }
    case 7: { // 火焰 — three forward fire pellets that flicker
      for (let i=-1;i<=1;i++) {
        bullets.push(mkB(x + i*4, y - i*1, i*0.6, -11, '#ff5522', 5, 7, w.owner, Math.round(14*dmgMul)));
      }
      if (lv>=4) bullets.push(mkB(x, y-6, 0, -13, '#ffaa00', 7, 9, w.owner, Math.round(22*dmgMul)));
      break;
    }
    case 8: { // 双管 — parallel chrome rounds
      bullets.push(mkB(x-4,y,0,-15,'#dddddd',3,8,w.owner, Math.round(13*dmgMul)));
      bullets.push(mkB(x+4,y,0,-15,'#dddddd',3,8,w.owner, Math.round(13*dmgMul)));
      if (lv>=3) bullets.push(mkB(x,y-2,0,-15,'#ffffff',2,7,w.owner, Math.round(10*dmgMul)));
      if (lv>=5) {
        bullets.push(mkB(x-9,y+2,-0.3,-14,'#cccccc',2,6,w.owner, Math.round(10*dmgMul)));
        bullets.push(mkB(x+9,y+2, 0.3,-14,'#cccccc',2,6,w.owner, Math.round(10*dmgMul)));
      }
      break;
    }
    case 9: { // 轨道 — orbiting / homing rounds
      const num = 1 + Math.ceil(lv/2);
      for (let i=0;i<num;i++) {
        const off = (i - (num-1)/2) * 6;
        const b = mkB(x+off, y, off*0.05, -9, '#ffdd44', 4, 8, w.owner, Math.round(18*dmgMul));
        b.homing = true; b.homingStr = 0.06 + lv*0.01;
        bullets.push(b);
      }
      break;
    }
  }
}

function drawWingmen() {
  for(const w of wingmen) {
    if(!w.alive||w.owner.dead) continue;
    const wc = WINGMAN_COLORS[w.wType];
    const wcD = shadeHex(wc, -35);
    const wcL = shadeHex(wc, 35);
    const lv = w.level||1;
    // Track lateral velocity → bank
    if (typeof w.lastX !== 'number') w.lastX = w.x;
    const dxw = w.x - w.lastX;
    w.lastX = w.x;
    w.bank = (w.bank||0) * 0.7 + dxw * 0.18;
    const bk = clamp(w.bank, -0.85, 0.85);

    // Shape-aware shadow
    cx.save();
    cx.globalAlpha = 0.30;
    cx.fillStyle = '#000010';
    cx.translate((w.x|0)+3, (w.y|0)+10);
    cx.beginPath(); cx.ellipse(0, 0, 9, 3, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(-7, 1, 6, 2, 0.2, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse( 7, 1, 6, 2,-0.2, 0, Math.PI*2); cx.fill();
    cx.restore();

    // Plane body
    cx.save();
    cx.translate(w.x|0, w.y|0);
    if (bk) {
      cx.rotate(bk * 0.18);
      cx.scale(1 - 0.25*Math.abs(bk), 1);
    }
    // Halo (level-scaled)
    cx.strokeStyle = wc;
    cx.lineWidth = 1 + Math.floor((lv-1)/2);
    cx.globalAlpha = 0.35 + 0.10*lv + Math.sin(frame*0.15)*0.18;
    cx.beginPath(); cx.ellipse(0, 0, 14+lv, 14+lv, 0, 0, Math.PI*2); cx.stroke();
    cx.globalAlpha = 1;

    // Lower wing (deep)
    cx.fillStyle = wcD;
    cx.beginPath(); cx.moveTo(-2,1); cx.lineTo(-15,7); cx.lineTo(-13,10); cx.lineTo(-3,4); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo( 2,1); cx.lineTo( 15,7); cx.lineTo( 13,10); cx.lineTo( 3,4); cx.closePath(); cx.fill();
    // Upper wing (highlight)
    cx.fillStyle = wc;
    cx.beginPath(); cx.moveTo(-2,1); cx.lineTo(-12,5); cx.lineTo(-11,7); cx.lineTo(-3,3); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo( 2,1); cx.lineTo( 12,5); cx.lineTo( 11,7); cx.lineTo( 3,3); cx.closePath(); cx.fill();
    // Wingtip lights
    cx.fillStyle = '#ff4444'; cx.fillRect(-15, 6, 1.6, 1.5);
    cx.fillStyle = '#44ff44'; cx.fillRect( 13, 6, 1.6, 1.5);

    // Slim fuselage with vertical gradient
    const bg = cx.createLinearGradient(-4, -10, 4, 12);
    bg.addColorStop(0, wcL);
    bg.addColorStop(0.5, wc);
    bg.addColorStop(1, wcD);
    cx.fillStyle = bg;
    cx.beginPath();
    cx.moveTo(0,-10); cx.lineTo(-3,-5); cx.lineTo(-4,8); cx.lineTo(-1,11); cx.lineTo(1,11); cx.lineTo(4,8); cx.lineTo(3,-5); cx.closePath();
    cx.fill();
    // Center crease
    cx.strokeStyle='rgba(0,0,0,0.55)'; cx.lineWidth=0.5;
    cx.beginPath(); cx.moveTo(0,-10); cx.lineTo(0,11); cx.stroke();
    // Tail fin
    cx.fillStyle = wcD;
    cx.beginPath(); cx.moveTo(-1,4); cx.lineTo(-1,10); cx.lineTo(0,11); cx.lineTo(1,10); cx.lineTo(1,4); cx.closePath(); cx.fill();
    // Cockpit canopy
    cx.fillStyle = '#aaeeff';
    cx.beginPath(); cx.ellipse(0, -2, 1.6, 3.2, 0, 0, Math.PI*2); cx.fill();
    cx.strokeStyle='rgba(0,0,0,0.5)'; cx.lineWidth=0.4; cx.stroke();
    // Cannon
    cx.fillStyle = '#1a1a1a';
    cx.fillRect(-0.6, -8, 1.2, 4);
    // Engine afterburner
    const eg = cx.createRadialGradient(0, 12, 1, 0, 12, 6);
    eg.addColorStop(0, '#ffffff');
    eg.addColorStop(0.4, wc);
    eg.addColorStop(1, wc + '00');
    cx.fillStyle = eg;
    cx.beginPath(); cx.arc(0, 12, 6, 0, Math.PI*2); cx.fill();
    cx.restore();

    // Level pips above (no banking)
    cx.save();
    cx.translate(w.x|0, w.y|0);
    cx.fillStyle = '#ffffff';
    for (let i=0;i<lv;i++) cx.fillRect(-6+i*3, -16, 2, 2);
    cx.restore();
  }
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function checkCollisions() {
  for(const b of bullets) {
    if(!b.alive) continue;
    if(b.isLaserBeam) {
      for(const e of enemies) {
        if(!e.alive) continue;
        if(Math.abs(e.x-b.x)<b.w/2+e.w/2&&e.y>0&&e.y<b.h) {
          e.hp-=b.dmg; if(Math.random()<0.25)SFX.hitEnemy(); if(e.hp<=0)killEnemy(e);
        }
      }
      // Lasers also burn through cancelable enemy bullets
      for(const eb of enemyBullets) {
        if(!eb.alive || !eb.cancelable) continue;
        if(Math.abs(eb.x-b.x)<b.w/2+6 && eb.y<b.h) {
          eb.hp = (eb.hp||1) - b.dmg;
          if (eb.hp<=0) { eb.alive=false; spawnExplosion(eb.x, eb.y, 'small'); }
        }
      }
      if(boss&&boss.alive&&Math.abs(boss.x-b.x)<b.w/2+44&&boss.y<b.h) {
        boss.hp-=b.dmg; if(boss.hp<=0)killBoss();
      }
      continue;
    }
    for(const e of enemies) {
      if(!e.alive) continue;
      if(Math.abs(b.x-e.x)<(b.w/2+e.w/2)&&Math.abs(b.y-e.y)<(b.h/2+e.h/2)) {
        e.hp-=b.dmg; b.alive=false; SFX.hitEnemy();
        if(e.hp<=0) killEnemy(e);
        break;
      }
    }
    if(!b.alive) continue;
    // Player bullets can shoot down cancelable enemy bullets (mines, shells)
    for(const eb of enemyBullets) {
      if(!eb.alive || !eb.cancelable) continue;
      if(Math.abs(b.x-eb.x)<8 && Math.abs(b.y-eb.y)<8) {
        eb.hp = (eb.hp||1) - b.dmg;
        b.alive = false;
        if (eb.hp<=0) { eb.alive = false; spawnExplosion(eb.x, eb.y, 'small'); SFX.hitEnemy(); }
        break;
      }
    }
    if(!b.alive) continue;
    if(boss&&boss.alive&&Math.abs(b.x-boss.x)<44&&Math.abs(b.y-boss.y)<34) {
      boss.hp-=b.dmg; b.alive=false; SFX.hitEnemy();
      if(boss.hp<=0) killBoss();
    }
  }
  for(const p of players) {
    if(p.dead||p.invTimer>0||invincible) continue;
    // Hit zone is the cockpit red-dot only — small area at p.x, p.y-12
    const hcx = p.x, hcy = p.y - 12, hr = 4;
    for(const b of enemyBullets) {
      if(!b.alive) continue;
      const dx = b.x - hcx, dy = b.y - hcy;
      if (dx*dx + dy*dy < hr*hr + 9) { b.alive=false; hitPlayer(p); break; }
    }
    for(const e of enemies) {
      if(!e.alive) continue;
      const dx = e.x - hcx, dy = e.y - hcy;
      // ramming damage uses cockpit dot vs enemy body
      if (Math.abs(dx) < e.w/2 && Math.abs(dy) < e.h/2) {
        hitPlayer(p); e.hp -= 30; if(e.hp<=0) killEnemy(e); break;
      }
    }
    if(boss&&boss.alive){
      const dx=boss.x-hcx, dy=boss.y-hcy;
      if (Math.abs(dx)<48 && Math.abs(dy)<38) hitPlayer(p);
    }
  }
}

function hitPlayer(p) {
  if(p.invTimer>0) return;
  if(p.shield>0){
    p.shieldHits=(p.shieldHits||1)-1;
    if(p.shieldHits<=0){p.shield=0;p.shieldHits=0;}
    else p.invTimer=20;
    SFX.hitPlayer(); return;
  }
  SFX.hitPlayer(); p.lives--;
  triggerShake(7, 14);
  // Damage drops weapon level by 1
  if (p.weaponLevel > 1) {
    p.weaponLevel--;
    addFT('武器降级!',p.x,p.y-20,'#ff8888');
  }
  // Damage also degrades wingmen
  damageWingmen(p);
  spawnExplosion(p.x,p.y,'medium');
  if(p.lives<=0){p.dead=true;p.lives=0;spawnExplosion(p.x,p.y,'large');checkGameOver();}
  else{p.dead=true;p.respawnTimer=120;}
}

let deathTimer = 0;          // counts down from 600 frames (10s @ 60fps)
let deathReviveCost = 1;     // diamonds

function checkGameOver() {
  if(players.every(p=>p.lives<=0)) {
    setTimeout(()=>{
      finalScore=score;
      stopBGM();
      deathTimer = 600;       // 10 seconds
      screen='death';
    },1000);
  }
}

function doRevive() {
  // Costs 1 diamond from session pool, fallback to save bank
  if (sessionDiamonds + save.diamonds < deathReviveCost) return false;
  if (sessionDiamonds >= deathReviveCost) sessionDiamonds -= deathReviveCost;
  else { const need = deathReviveCost - sessionDiamonds; sessionDiamonds = 0; save.diamonds -= need; writeSave(); }
  // Restore player(s) — revive grants console-configured bomb count
  const C = save.console || defaultConsole();
  for (const p of players) {
    p.lives = C.playerLives; p.dead = false; p.respawnTimer = 0;
    p.invTimer = 180; p.shield = 240; p.shieldHits = 3;
    p.x = p.pNum===1 ? W*0.65 : W*0.35; p.y = H-120;
    p.bombs = C.reviveBombs;
  }
  // Wipe field hazards
  enemyBullets.length = 0;
  for (const e of enemies) e.alive = false;
  enemies = enemies.filter(e=>e.alive);
  bombFlash = 25;
  screen = 'game';
  if (bgmEnabled) startBGM();
  SFX.pickupLife();
}

function killEnemy(e) {
  if(!e.alive) return;
  e.alive=false; score+=e.pts; killCount++;
  spawnExplosion(e.x,e.y,e.type==='carrier'||e.type==='tank'||e.type==='elite'?'large':'medium');
  addFT('+'+e.pts,e.x,e.y,'#ffffff');
  // Auto-credit coins (no physical drops)
  const cvBase={basic:8,zigzag:12,bomber:25,gunship:20,tank:40,speeder:6,carrier:50,
            dart:8,saucer:22,scout:5,sniper:24,mortar:20,swarmlet:3,hive:36,
            turret:24,stealth:18,splitter:18,minelayer:26,jet:9,elite:55}[e.type]||8;
  const C = save.console || defaultConsole();
  const cv = Math.max(1, Math.round(cvBase * C.coinMul));
  sessionCoins += cv;
  score += cv;
  addFT('🪙+'+cv, e.x+10, e.y, '#ffcc00');
  SFX.pickupCoin();
  // Splitter pops into 2 smaller mobs (only the original parent splits)
  if (e.type==='splitter' && !e.splitChild) {
    for (const dx of [-12,12]) {
      const c = mkEnemy('swarmlet', e.x+dx, e.y);
      c.splitChild = true; c.hp *= 0.6; c.maxHp = c.hp;
      enemies.push(c);
    }
  }
  // Power-up drops (console-tunable multiplier)
  const dropMul = clamp(C.dropRateMul || 1, 0, 5);
  const dr = Math.random() / dropMul;
  if(dr<0.10)       spawnPickup(e.x,e.y,'weapon',rndInt(0,9));
  else if(dr<0.22)  spawnPickup(e.x,e.y,'star',1);
  else if(dr<0.27)  spawnPickup(e.x,e.y,'life',1);
  else if(dr<0.32)  spawnPickup(e.x,e.y,'bomb',1);
  else if(dr<0.40)  spawnPickup(e.x,e.y,'wingman', rollWingmanType());
  else if(dr<0.45)  spawnPickup(e.x,e.y,'shield',1);
  SFX[e.type==='carrier'||e.type==='tank'||e.type==='elite'?'killBig':'killBasic']();
}

function killBoss() {
  if(!boss||!boss.alive) return;
  const wasLvl = level;
  boss.alive=false; score+=boss.pts; bossActive=false;
  triggerShake(18, 50);
  SFX.bossDefeat(); spawnExplosion(boss.x,boss.y,'huge');
  // Auto-credit diamonds + bonus coins (console multipliers)
  const C = save.console || defaultConsole();
  const dGain = Math.max(1, Math.round((2 + Math.floor(wasLvl/2) + (endlessMode?1:0)) * C.diamondMul));
  const cGain = Math.max(1, Math.round((80 + wasLvl*30) * C.coinMul));
  sessionDiamonds += dGain;
  sessionCoins += cGain;
  score += cGain;
  addFT('💎+'+dGain, boss.x-10, boss.y, '#44ccff');
  addFT('🪙+'+cGain, boss.x+10, boss.y+18, '#ffcc00');
  addFT('+'+boss.pts,boss.x,boss.y-18,'#ff88ff');
  SFX.pickupDiamond();
  // Enemies all clear after boss
  for(const e of enemies){if(e.alive)spawnExplosion(e.x,e.y,'small');e.alive=false;}
  for(const eb of enemyBullets) eb.alive=false;
  boss=null;
  // Stage mode lvl 12 boss → tier victory + medal; otherwise advance
  if (!endlessMode && wasLvl >= 12) {
    setTimeout(()=>{
      finalScore = score;
      save.coins += sessionCoins;
      save.diamonds += sessionDiamonds;
      const tier = currentTier();
      if (!save.stageProgress) save.stageProgress = {novice:1, veteran:0, hell:0};
      save.stageProgress[tier] = 13;   // marks "complete"
      save.medals[tier] = true;
      // Unlock next tier
      if (tier === 'novice' && (save.stageProgress.veteran||0) < 1) save.stageProgress.veteran = 1;
      if (tier === 'veteran' && (save.stageProgress.hell||0) < 1) save.stageProgress.hell = 1;
      writeSave(); stopBGM(); screen='victory';
    }, 1400);
    return;
  }
  // Endless mode: never ends — just keep advancing levels indefinitely
  // Clear sticky boomerangs at level transition
  for (const bb of bullets) if (bb.boomerang) bb.alive = false;
  level++; killCount=0; waveTimer=0;
  if (!endlessMode && level <= 12) {
    const tier = currentTier();
    if (!save.stageProgress) save.stageProgress = {novice:1, veteran:0, hell:0};
    if ((save.stageProgress[tier]||0) < level) {
      save.stageProgress[tier] = level;
      writeSave();
    }
  }
  SFX.levelUp(); addFT('LEVEL '+level,W/2,H/2-20,'#ffff00');
}

const EXP_COLORS=['#ff8800','#ffcc00','#ff4400','#ffffff','#ffff44'];

function spawnExplosion(x,y,size) {
  const n=size==='huge'?30:size==='large'?20:size==='medium'?12:6;
  const r=size==='huge'?50:size==='large'?30:size==='medium'?18:10;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=rnd(0.5,r/8);
    explosions.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rndInt(15,35),maxLife:35,size:rndInt(2,size==='huge'?8:size==='large'?6:4),color:EXP_COLORS[rndInt(0,4)]});
  }
}

function updateExplosions() {
  for(const e of explosions){e.x+=e.vx;e.y+=e.vy;e.vy+=0.05;e.life--;}
  explosions=explosions.filter(e=>e.life>0);
}

function drawExplosions() {
  for(const e of explosions){cx.globalAlpha=e.life/e.maxLife;fillPx(e.color,(e.x-e.size/2)|0,(e.y-e.size/2)|0,e.size,e.size);}
  cx.globalAlpha=1;
}

// ─── WAVE SPAWNING ───────────────────────────────────────────────────────────
// Per-level enemy pool (stage 1 easiest → stage 10 hardest). Endless reuses cycling.
const WAVE_POOLS = [
  ['basic','basic','speeder','scout'],
  ['basic','zigzag','speeder','scout','dart'],
  ['basic','zigzag','dart','jet','saucer'],
  ['zigzag','dart','jet','saucer','bomber','splitter'],
  ['zigzag','bomber','splitter','gunship','minelayer','stealth'],
  ['bomber','gunship','minelayer','stealth','sniper','mortar'],
  ['gunship','minelayer','sniper','mortar','tank','hive','swarmlet'],
  ['gunship','tank','hive','swarmlet','sniper','elite','turret'],
  ['tank','elite','turret','sniper','mortar','carrier','splitter'],
  ['elite','tank','carrier','turret','sniper','minelayer','hive','jet'],
  ['elite','tank','carrier','turret','sniper','mortar','minelayer','hive','stealth'],
  ['elite','tank','carrier','turret','sniper','mortar','minelayer','hive','stealth','splitter','dart','jet'],
];

function poolForLevel(lv) {
  return WAVE_POOLS[clamp(lv-1, 0, WAVE_POOLS.length-1)];
}

// Difficulty scales gently. Endless: caps at lv 100; Stage: 12 levels x tier.
function getDiff() {
  const lv = Math.min(level, 12);
  const endlessLv = endlessMode ? Math.min(level, 100) : lv;
  const C = save.console || defaultConsole();
  let d;
  if (endlessMode) {
    // 难度在到达 ENDLESS_DIFF_CAP (=100) 关之后封顶, 之后只随机化内容
    const cap = Math.min(level, ENDLESS_DIFF_CAP);
    d = {
      spawnRate: Math.max(170 - cap*1.4, 60),
      formRate:  Math.max(460 - cap*3, 180),
      enemyCount: 1 + Math.floor(cap/6),
      bulletSpd:  Math.min(0.55 + cap*0.018, 1.6),
      hpMult:     Math.min(1 + cap*0.045, 5),
    };
  } else {
    const m = TIER_MUL[currentTier()];
    d = {
      spawnRate: Math.max(95 - lv*5, 40),
      formRate:  Math.max(260 - lv*12, 110),
      enemyCount: 2 + Math.floor(lv/2),
      bulletSpd:  (0.5 + lv*0.06) * m,
      hpMult:     (1 + lv*0.12) * m,
    };
  }
  // Apply console multipliers
  d.spawnRate  = Math.max(15, Math.round(d.spawnRate * C.spawnRateMul));
  d.formRate   = Math.max(40, Math.round(d.formRate  * C.spawnRateMul));
  d.enemyCount = Math.max(1, Math.round(d.enemyCount * C.enemyCountMul));
  d.bulletSpd  = d.bulletSpd * C.enemyBulletSpdMul;
  d.hpMult     = d.hpMult    * C.enemyHpMul;
  return d;
}

function updateWaves() {
  waveTimer++;
  if(bossActive) return;

  // Boss trigger: kill quota met → enter boss IMMEDIATELY (clear any stragglers)
  const C = save.console || defaultConsole();
  let baseThr = BOSS_KILL_THRESHOLD[Math.min(level-1, BOSS_KILL_THRESHOLD.length-1)];
  // Endless 超过 12 关: 阈值在 ±20% 随机浮动, 让节奏不再固定
  if (endlessMode && level > BOSS_KILL_THRESHOLD.length) {
    if (boss === null && !boss && killCount === 0 && waveTimer < 30) {
      // Stable per-level — seed by level so every visit to lv N is the same threshold
      baseThr = Math.round(baseThr * (0.85 + ((level * 9301 + 49297) % 233) / 233 * 0.4));
    }
  }
  const threshold = Math.max(3, Math.round(baseThr * (C.bossKillMul || 1)));
  if(killCount>=threshold) {
    for (const e of enemies) {
      if (e.alive) { spawnExplosion(e.x, e.y, 'medium'); e.alive=false; }
    }
    spawnBoss();
    return;
  }

  const d=getDiff();
  // Endless: random pool blend; Stage: strict pool per level
  let pool;
  if (endlessMode) {
    if (level > WAVE_POOLS.length) {
      // 超过 12 关: 完全随机抽取若干池组合, 增加每关的随机感
      pool = [];
      const slots = 3 + rndInt(0, 3);  // 3~6 个池
      for (let s = 0; s < slots; s++) {
        const pi = rndInt(0, WAVE_POOLS.length-1);
        pool = pool.concat(WAVE_POOLS[pi]);
      }
    } else if (level >= 5) {
      // 5~12 关: 全部池混合
      pool = [];
      for (const p of WAVE_POOLS) pool = pool.concat(p);
    } else {
      const idx = Math.min(level-1, WAVE_POOLS.length-1);
      const idx2 = Math.max(0, idx-1);
      pool = WAVE_POOLS[idx].concat(WAVE_POOLS[idx2]);
    }
  } else {
    pool = poolForLevel(level);
  }

  if(waveTimer%d.spawnRate===0 && enemies.length < MAX_ENEMIES) {
    const type=pool[rndInt(0,pool.length-1)];
    const count=rndInt(1,d.enemyCount+1);
    for(let i=0;i<count;i++) setTimeout(()=>{
      if (screen==='game' && enemies.length < MAX_ENEMIES)
        enemies.push(mkEnemy(type,rnd(30,W-30),-30));
    },i*250);
  }
  if(waveTimer%d.formRate===0 && enemies.length < MAX_ENEMIES - 6) {
    const type=pool[rndInt(0,pool.length-1)];
    const safeType = type==='turret' ? 'basic' : type;
    const n=3+Math.min(level,4);
    for(let i=0;i<n && enemies.length < MAX_ENEMIES;i++)
      enemies.push(mkEnemy(safeType,50+i*(W-100)/(n-1)||W/2,-50-i*18));
  }
}

function drawResSlider(x, y, w) {
  const v = save.pixelScale || 1;
  const t = (v - PIXEL_SCALE_MIN) / (PIXEL_SCALE_MAX - PIXEL_SCALE_MIN);
  cx.fillStyle='#88ccee'; cx.font="11px 'Courier New'"; cx.textAlign='left';
  cx.fillText('画质', x-50, y+10);
  cx.fillStyle='#0a1828'; cx.fillRect(x, y+6, w, 6);
  cx.strokeStyle='#244466'; cx.strokeRect(x+0.5, y+6.5, w-1, 5);
  cx.fillStyle='#ffcc44'; cx.fillRect(x, y+6, w*t, 6);
  cx.fillStyle='#ffffff';
  cx.fillRect(x+w*t-4, y+1, 8, 16);
  cx.strokeStyle='#ffcc44'; cx.lineWidth=1; cx.strokeRect(x+w*t-4+0.5, y+1.5, 7, 15);
  cx.fillStyle='#ffcc00'; cx.font="11px 'Courier New'"; cx.textAlign='left';
  cx.fillText(v.toFixed(2)+'x', x+w+8, y+10);
}
function hitResSlider(mx, my, x, y, w) {
  if (my>=y && my<=y+18 && mx>=x-8 && mx<=x+w+8) {
    let t = (mx - x) / w;
    t = Math.max(0, Math.min(1, t));
    save.pixelScale = +(PIXEL_SCALE_MIN + (PIXEL_SCALE_MAX-PIXEL_SCALE_MIN)*t).toFixed(2);
    writeSave();
    applyResolution();
    return true;
  }
  return false;
}
function clickTitleSettings(mx, my) {
  if (mx>=20 && mx<=130 && my>=655 && my<=691) {
    bgmDropdownOpen = false; screen='title'; return;
  }
  // Dropdown picks first
  if (bgmDropdownOpen) {
    const lx=250, ly=338+36+2, lw=170, itemH=DROPDOWN_ITEM_H, visH=DROPDOWN_VISIBLE_H;
    if (mx>=lx && mx<=lx+lw && my>=ly && my<=ly+visH) {
      const localY = (my - ly) + bgmDropdownScroll;
      const idx = Math.floor(localY / itemH);
      if (idx>=0 && idx<BGM_TRACKS.length) {
        bgmTrack = idx; stopBGM(); if (bgmEnabled) startBGM(); SFX.buySuccess();
      }
      bgmDropdownOpen = false;
      return;
    }
    if (!(mx>=250 && mx<=420 && my>=338 && my<=374)) bgmDropdownOpen = false;
  }
  if (hitResSlider(mx, my, 70, 142, 340)) return;
  if (hitSensSlider(mx, my, 70, 240, 340, 'moveSensX')) return;
  if (hitSensSlider(mx, my, 70, 270, 340, 'moveSensY')) return;
  // BGM toggle
  if (mx>=60 && mx<=230 && my>=338 && my<=374) { toggleBGM(); return; }
  // Dropdown header
  if (mx>=250 && mx<=420 && my>=338 && my<=374) { bgmDropdownOpen = !bgmDropdownOpen; return; }
}

  // Tabs
  const tabsY = 92, tabH = 28, gap = 4;
  const totalW = W - 40;
  const tabW = (totalW - gap*4) / 5;
  for (let i=0;i<CODEX_TABS.length;i++) {
    const tx = 20 + i*(tabW+gap);
    const t = CODEX_TABS[i];
    const active = t.id===codexTab;
    cx.fillStyle = active?'#114466':'#0a1828';
    cx.fillRect(tx, tabsY, tabW, tabH);
    cx.strokeStyle = active?'#00ffff':'#244466';

    cx.fillStyle = active?'#aaffff':'#7799bb';
    cx.font="bold 12px 'Courier New', monospace";
    cx.fillText(t.label, tx+tabW/2, tabsY+18);
  }

  // Body (scroll-clipped)
  const bodyY = 130, bodyH = 510;
  cx.save();
  cx.beginPath(); cx.rect(0, bodyY, W, bodyH); cx.clip();
  let totalContentH = 0;
  if      (codexTab==='weapons') totalContentH = drawCodexWeapons(bodyY - codexScroll);
  else if (codexTab==='enemies') totalContentH = drawCodexEnemies(bodyY - codexScroll);

  else if (codexTab==='wingmen') totalContentH = drawCodexWingmen(bodyY - codexScroll);
  else if (codexTab==='pickups') totalContentH = drawCodexPickups(bodyY - codexScroll);
  cx.restore();

  // Scrollbar
  const maxScroll = Math.max(0, totalContentH - bodyH);
  if (maxScroll > 0) {
    const trackH = bodyH - 8;
    const knobH = Math.max(20, trackH * (bodyH/totalContentH));
    const knobY = bodyY + 4 + (trackH - knobH) * (codexScroll/maxScroll);
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    cx.fillRect(W - 8, bodyY+4, 3, trackH);
    cx.fillStyle = '#00ffff';
    cx.fillRect(W - 8, knobY, 3, knobH);
  }
  // Cache for scroll handler
  codexContentH = totalContentH;

  drawButton(20, 655, 110, 36, '← 返回', false);
  cx.textAlign='left';
}

function clickShop(mx,my) {
  if(mx>=20&&mx<=130&&my>=655&&my<=691){screen='title';shopSelectedPlane=-1;shopSelectedBG=-1;return;}
  if(mx>=350&&mx<=460&&my>=655&&my<=691){equipSelected();return;}
  if(mx>=160&&mx<=330&&my>=655&&my<=691){save.coins+=9999;save.diamonds+=99;writeSave();SFX.buySuccess();return;}
  if(my>=68&&my<=102){if(mx>=20&&mx<=230){shopTab=0;shopSelectedPlane=-1;}else if(mx>=250&&mx<=460){shopTab=1;shopSelectedBG=-1;}return;}
  if(shopTab===0){
    const cols=4,cw=110,ch=110,sx=10,sy=115;
    for(let i=0;i<PLANE_SKINS.length;i++){
      const bx=sx+(i%cols)*cw, by=sy+Math.floor(i/cols)*ch;
      if(mx>=bx&&mx<=bx+cw&&my>=by&&my<=by+ch){
        if(!save.planes[i]){
          const sk=PLANE_SKINS[i];
          if(sk[2]==='free'){save.planes[i]=true;writeSave();SFX.buySuccess();shopSelectedPlane=i;}
          else if(sk[2]==='g'){if(save.coins>=sk[1]){save.coins-=sk[1];save.planes[i]=true;writeSave();SFX.buySuccess();shopSelectedPlane=i;}else SFX.buyFail();}
          else if(sk[2]==='d'){if(save.diamonds>=sk[1]){save.diamonds-=sk[1];save.planes[i]=true;writeSave();SFX.buySuccess();shopSelectedPlane=i;}else SFX.buyFail();}
        } else shopSelectedPlane=i;
        return;
      }
    }
  } else {
    const cols=2,cw=220,ch=72,sx=15,sy=115;
    for(let i=0;i<BG_SKINS.length;i++){
      const bx=sx+(i%cols)*cw, by=sy+Math.floor(i/cols)*ch - shopBGScroll;
      if(my < sy-2 || my > sy+540) break;
      if(mx>=bx&&mx<=bx+cw&&my>=by&&my<=by+ch){
        if(!save.bgs[i]){
          const bg=BG_SKINS[i];
          if(bg[2]==='free'){save.bgs[i]=true;writeSave();SFX.buySuccess();shopSelectedBG=i;}
          else if(bg[2]==='g'){if(save.coins>=bg[1]){save.coins-=bg[1];save.bgs[i]=true;writeSave();SFX.buySuccess();shopSelectedBG=i;}else SFX.buyFail();}
          else if(bg[2]==='d'){if(save.diamonds>=bg[1]){save.diamonds-=bg[1];save.bgs[i]=true;writeSave();SFX.buySuccess();shopSelectedBG=i;}else SFX.buyFail();}
        } else shopSelectedBG=i;
        return;
      }
    }
  }
}

function equipSelected() {
  if(shopTab===0&&shopSelectedPlane>=0&&save.planes[shopSelectedPlane]){
    if(save.selP1!==shopSelectedPlane) save.selP1=shopSelectedPlane;
    else if(save.selP2!==shopSelectedPlane) save.selP2=shopSelectedPlane;

  }
  if(shopTab===1&&shopSelectedBG>=0&&save.bgs[shopSelectedBG]){
    save.selBG=shopSelectedBG; writeSave(); SFX.buySuccess();
  }
}

let bgmDropdownOpen = false;
let bgmDropdownScroll = 0;
const DROPDOWN_VISIBLE_H = 180;       // visible list height
const DROPDOWN_ITEM_H    = 28;
function dropdownListBounds(x, y, w, h) {
  return { lx: x, ly: y + h + 2, lw: w, lh: DROPDOWN_VISIBLE_H };
}
function drawDropdown(x, y, w, h, items, selectedIdx, open) {
  // Header showing current value
  cx.fillStyle = open ? '#003344' : '#001828';
  cx.fillRect(x, y, w, h);
  cx.strokeStyle = open ? '#00ffff' : '#446688';
  cx.lineWidth = 2;
  cx.strokeRect(x+1, y+1, w-2, h-2);
  cx.fillStyle = '#88ccee';
  cx.font="bold 12px 'Courier New', monospace";
  cx.textAlign='left';
  cx.fillText('♬ '+items[selectedIdx], x+10, y+h/2+4);
  cx.fillStyle = '#88ccee';
  cx.font="bold 14px 'Courier New', monospace";
  cx.fillText(open ? '▲' : '▼', x+w-22, y+h/2+5);
  cx.textAlign='left';
  // Open list overlay (scrollable)
  if (open) {
    const itemH = DROPDOWN_ITEM_H;
    const listFullH = items.length * itemH;
    const visH = Math.min(DROPDOWN_VISIBLE_H, listFullH);
    const maxScroll = Math.max(0, listFullH - visH);
    bgmDropdownScroll = clamp(bgmDropdownScroll, 0, maxScroll);
    const lx = x, ly = y + h + 2;
    // Background + clip
    cx.fillStyle='#001828';
    cx.fillRect(lx, ly, w, visH);
    cx.strokeStyle='#00ffff';
    cx.lineWidth = 2;
    cx.strokeRect(lx+1, ly+1, w-2, visH-2);
    cx.save();
    cx.beginPath(); cx.rect(lx+2, ly+2, w-4, visH-4); cx.clip();
    for (let i=0;i<items.length;i++) {
      const iy = ly + i*itemH - bgmDropdownScroll;
      if (iy + itemH < ly || iy > ly + visH) continue;
      const sel = i===selectedIdx;
      if (sel) {
        cx.fillStyle = '#005577';
        cx.fillRect(lx+2, iy+1, w-4, itemH-2);
      }
      cx.fillStyle = sel ? '#ffffff' : '#88ccee';
      cx.font="bold 11px 'Courier New', monospace";
      cx.fillText('#'+(i+1)+'  '+items[i], lx+10, iy+itemH/2+4);
    }
    cx.restore();
    // Scroll indicator
    if (maxScroll > 0) {
      const trackH = visH - 8;
      const knobH = Math.max(20, trackH * (visH/listFullH));
      const knobY = ly + 4 + (trackH - knobH) * (bgmDropdownScroll / maxScroll);
      cx.fillStyle = 'rgba(255,255,255,0.18)';
      cx.fillRect(lx + w - 6, ly + 4, 3, trackH);
      cx.fillStyle = '#00ffff';
      cx.fillRect(lx + w - 6, knobY, 3, knobH);
    }
  }
}

const SENS_MIN = 0.3, SENS_MAX = 2.0;
function drawSensSlider(x, y, w, label, key) {
  const v = (typeof save[key] === 'number') ? save[key] : 1;
  const t = (v - SENS_MIN) / (SENS_MAX - SENS_MIN);
  // Label left
  cx.fillStyle='#88ccee'; cx.font="11px 'Courier New'"; cx.textAlign='left';
  cx.fillText(label, x-50, y+10);
  // Bar background
  cx.fillStyle='#0a1828'; cx.fillRect(x, y+6, w, 6);
  cx.strokeStyle='#244466'; cx.strokeRect(x+0.5, y+6.5, w-1, 5);
  // Filled portion
  cx.fillStyle='#00ffcc'; cx.fillRect(x, y+6, w*t, 6);
  // Thumb
  cx.fillStyle='#ffffff';
  cx.fillRect(x+w*t-4, y+1, 8, 16);
  cx.strokeStyle='#00ffff'; cx.lineWidth=1;
  cx.strokeRect(x+w*t-4+0.5, y+1.5, 7, 15);
  // Value
  cx.fillStyle='#ffcc00'; cx.font="11px 'Courier New'"; cx.textAlign='left';
  cx.fillText(v.toFixed(2)+'x', x+w+8, y+10);
}
function hitSensSlider(mx, my, x, y, w, key) {
  if (my>=y && my<=y+18 && mx>=x-8 && mx<=x+w+8) {
    let t = (mx - x) / w;
    t = Math.max(0, Math.min(1, t));
    save[key] = +(SENS_MIN + (SENS_MAX-SENS_MIN)*t).toFixed(2);
    writeSave();
    return true;
  }
  return false;
}

function clickPause(mx,my) {
  for (const btn of pauseBtns) {
    if (mx>=btn.x && mx<=btn.x+btn.w && my>=btn.y && my<=btn.y+btn.h) {
      if (btn.act==='resume') { screen='game'; if(bgmEnabled) startBGM(); }
      else if (btn.act==='restart') {
        if (endlessMode) clearEndlessSnapshot();
        startGame(twoPlayer, endlessMode, endlessMode?1:level);
      }
      else if (btn.act==='home') {
        // Endless: keep snapshot for resume + record this run on the leaderboard
        if (endlessMode) {
          saveEndlessSnapshot();
          submitEndlessScore(score, level, 'pause-home');
        }
        save.coins += sessionCoins; save.diamonds += sessionDiamonds;
        sessionCoins = 0; sessionDiamonds = 0;
        writeSave(); stopBGM(); screen='title';
      }
      return;
    }
  }
  // Dropdown open: handle item picks first (covers area below header)
  if (bgmDropdownOpen) {
    const lx=250, ly=478+36+2, lw=170, itemH=DROPDOWN_ITEM_H, visH=DROPDOWN_VISIBLE_H;
    if (mx>=lx && mx<=lx+lw && my>=ly && my<=ly+visH) {
      const localY = (my - ly) + bgmDropdownScroll;
      const idx = Math.floor(localY / itemH);
      if (idx>=0 && idx<BGM_TRACKS.length) {
        bgmTrack = idx;
        stopBGM();
        if (bgmEnabled) startBGM();
        SFX.buySuccess();
      }
      bgmDropdownOpen = false;
      return;
    }
    // Click outside list (and outside header) closes
    if (!(mx>=250 && mx<=420 && my>=478 && my<=514)) {
      bgmDropdownOpen = false;
    }
  }
  // Sensitivity sliders
  if (hitSensSlider(mx, my, 70, 392, 340, 'moveSensX')) return;
  if (hitSensSlider(mx, my, 70, 422, 340, 'moveSensY')) return;
  // BGM toggle
  if (mx>=60 && mx<=230 && my>=478 && my<=514) {
    toggleBGM();
    return;
  }
  // Track dropdown header → toggle open/close
  if (mx>=250 && mx<=420 && my>=478 && my<=514) {
    bgmDropdownOpen = !bgmDropdownOpen;
    return;
  }
}

function submitEndlessScore(scoreVal, lvVal, exitReason) {
  if (!Array.isArray(save.endlessLeaderboard)) save.endlessLeaderboard = [];
  const durationSec = endlessStartTime ? Math.max(1, Math.round((Date.now()-endlessStartTime)/1000)) : 0;
  save.endlessLeaderboard.push({
    score: scoreVal|0, level: lvVal|0,
    durationSec, dateMs: Date.now(),
    invincible: !!endlessInvincibleUsed,
    exit: exitReason || 'unknown',
  });
  save.endlessLeaderboard.sort((a,b)=>b.score-a.score);

  save.endlessLeaderboard = save.endlessLeaderboard.slice(0, 50);
  writeSave();
}

const keys={};
// Mobile detection — true when device has touch + coarse pointer (real phones/tablets)
const IS_MOBILE = (('ontouchstart' in window) || (navigator.maxTouchPoints||0) > 0)
                  && window.matchMedia('(pointer: coarse)').matches;
if (IS_MOBILE) document.body.classList.add('is-mobile');

// Virtual joystick state for mobile movement
const joy = { active:false, id:-1, sx:0, sy:0, x:0, y:0, dx:0, dy:0, rad:60 };

function canvasCoord(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top)  * (H / rect.height),
  };
}

function startJoystick(t) {
  const p = canvasCoord(t);
  joy.active = true; joy.id = t.identifier;
  joy.sx = p.x; joy.sy = p.y;
  joy.x = p.x; joy.y = p.y;
  joy.dx = 0; joy.dy = 0;
}
function moveJoystick(t) {
  const p = canvasCoord(t);
  let ddx = p.x - joy.sx, ddy = p.y - joy.sy;
  const dist = Math.hypot(ddx, ddy);
  if (dist > joy.rad) { ddx = ddx/dist*joy.rad; ddy = ddy/dist*joy.rad; }
  joy.x = joy.sx + ddx; joy.y = joy.sy + ddy;
  // Normalized -1..1 with small dead-zone
  const dz = 8;
  if (dist < dz) { joy.dx = 0; joy.dy = 0; }
  else { joy.dx = ddx/joy.rad; joy.dy = ddy/joy.rad; }
}
function endJoystick() {
  joy.active = false; joy.id = -1; joy.dx = 0; joy.dy = 0;
}

// Joystick visual hidden on mobile (touch-drag still controls direction)
function drawJoystick() { /* no-op: joystick is invisible by design */ }

let lastTapTime = 0;
const DOUBLE_TAP_MS = 280;
function handleTouchStart(e) {
  if (screen !== 'game') {
    // Touch acts like a click for menu screens
    for (const t of e.changedTouches) {
      const p = canvasCoord(t);
      try{getAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}catch(_){}
      if (screen==='title') clickTitle(p.x, p.y);
      else if (screen==='shop') clickShop(p.x, p.y);
      else if (screen==='tierSelect') clickTierSelect(p.x, p.y);
      else if (screen==='stageSelect') clickStageSelect(p.x, p.y);
      else if (screen==='titleSettings') clickTitleSettings(p.x, p.y);
      else if (screen==='codex') clickCodex(p.x, p.y);
      else if (screen==='gameover') clickGameOver(p.x, p.y);
      else if (screen==='victory') clickVictory(p.x, p.y);
      else if (screen==='death') clickDeath(p.x, p.y);
      else if (screen==='pause') clickPause(p.x, p.y);
    }
    e.preventDefault();
    return;
  }
  // Double-tap fires bomb (mobile manual trigger)
  const now = performance.now();
  if (now - lastTapTime < DOUBLE_TAP_MS) {
    triggerBomb();
    lastTapTime = 0;
    e.preventDefault();
    return;
  }
  lastTapTime = now;
  // Single tap → start invisible joystick (last finger wins)
  for (const t of e.changedTouches) {
    startJoystick(t);
    break;
  }
  e.preventDefault();
}
function handleTouchMove(e) {
  if (!joy.active) return;
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) { moveJoystick(t); break; }
  }
  e.preventDefault();
}
function handleTouchEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) { endJoystick(); break; }
  }
  e.preventDefault();
}
canvas.addEventListener('touchstart', handleTouchStart, {passive:false});
canvas.addEventListener('touchmove',  handleTouchMove,  {passive:false});
canvas.addEventListener('touchend',   handleTouchEnd,   {passive:false});
canvas.addEventListener('touchcancel',handleTouchEnd,   {passive:false});

// Bomb trigger — desktop: X key; mobile: double-tap anywhere on canvas
function triggerBomb() {
  if (screen !== 'game') return;
  const p = players[0];
  if (!p || p.dead || p.bombs <= 0) return;
  p.bombs--; doBomb(p); SFX.bomb();
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
