<!DOCTYPE html>
<html lang="zh">
<head>

<title>RAIDEN 雷电</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { background:#000; width:100%; height:100%; overflow:hidden; touch-action:none; overscroll-behavior:none; -webkit-user-select:none; user-select:none; }
body { display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:100dvh; }
#wrap { position:relative; width:480px; height:700px; max-width:100vw; max-height:100dvh; }
canvas { display:block; width:100%; height:100%; image-rendering:auto; }
.side-btn {
  position:absolute; right:-52px; width:44px; height:44px;
  background:#111; border:2px solid #444; color:#fff;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  border-radius:4px; user-select:none;
  z-index:5;
}
#btn-pause { top:10px; }
#btn-invincible { top:64px; }
.side-btn:hover { background:#333; border-color:#888; }
.side-btn.active { border-color:#0ff; background:#002233; }
#btn-speed {
  position:absolute; right:-52px; top:118px; width:44px; height:44px;
  background:#221a00; border:2px solid #ffaa00; color:#ffcc44;
  font-size:14px; font-weight:bold; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:4px; user-select:none; z-index:5;
}
#btn-speed:hover { background:#332200; border-color:#ffcc44; }
#btn-infbomb {
  position:absolute; right:-52px; top:172px; width:44px; height:44px;
  background:#221122; border:2px solid #ff44ff; color:#ffaaff;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:4px; user-select:none; z-index:5;
  display:none;
}
#btn-infbomb.show { display:flex; }
#btn-infbomb:active { transform:scale(0.92); }
/* Mobile-only on-screen bomb / pause; hidden on desktop */
.touch-only { display:none; }
@media (hover: none) and (pointer: coarse), (max-width: 640px) {
  body.is-mobile #wrap { width:100vw; height:auto; aspect-ratio:480/700; max-height:100dvh; }
  body.is-mobile .side-btn { right:auto; width:36px; height:36px; font-size:14px; }
  body.is-mobile #btn-pause { top:6px; left:6px; }
  body.is-mobile #btn-invincible { top:6px; left:48px; opacity:.55; }
  body.is-mobile .touch-only { display:flex; }
  body.is-mobile #btn-speed   { right:auto; left:90px;  top:6px; width:36px; height:36px; font-size:11px; }
  body.is-mobile #btn-infbomb { right:auto; left:132px; top:6px; width:36px; height:36px; font-size:14px; }
}
#btn-bomb {
  position:absolute; right:14px; bottom:18px;
  width:52px; height:52px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #6688ff, #1133aa 60%, #001144);
  border:2px solid #88aaff; color:#fff; font-size:22px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 10px rgba(80,120,255,0.55); user-select:none;
  z-index:6; padding:0;
}
#btn-bomb:active { transform:scale(0.92); background:radial-gradient(circle at 30% 30%, #aabbff, #4477ff 60%, #002288); }
#btn-bomb .count { position:absolute; top:-4px; right:-4px; background:#ff4422; border-radius:50%; min-width:18px; height:18px; font-size:10px; display:flex; align-items:center; justify-content:center; padding:0 3px; font-weight:bold; }
#console-panel {
  position:absolute; left:0; top:0; right:0; bottom:0;
  background:rgba(0,8,24,0.97);
  display:none; flex-direction:column;
  color:#fff; font-family:'Courier New', monospace;
  z-index:40; padding:14px 12px; overflow:hidden;
}
#console-panel.show { display:flex; }
#console-panel h2 { font-size:18px; color:#00ffff; margin-bottom:6px; text-align:center; letter-spacing:3px; }
#console-panel .sub { font-size:10px; color:#88aacc; text-align:center; margin-bottom:10px; }
#console-panel .tabs { display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap; }
#console-panel .tab { flex:1; padding:6px 4px; background:#0a1828; border:1px solid #244466; color:#88aacc; font-size:11px; cursor:pointer; text-align:center; border-radius:3px; }
#console-panel .tab.active { background:#114466; border-color:#00ffff; color:#aaffff; }
#console-panel .body { flex:1; overflow-y:auto; padding:6px 2px; font-size:11px; }
#console-panel .row { display:flex; align-items:center; padding:4px 6px; gap:6px; border-bottom:1px dashed #1f3a5a; }
#console-panel .row label { flex:1; color:#aaccee; font-size:11px; }
#console-panel .row .desc { color:#557799; font-size:9px; }
#console-panel input[type=number] { width:64px; background:#001828; border:1px solid #335577; color:#ffcc44; font-family:inherit; font-size:11px; padding:3px 5px; border-radius:2px; text-align:right; -moz-appearance:textfield; }
#console-panel input[type=number]::-webkit-inner-spin-button, #console-panel input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
#console-panel .footer { display:flex; gap:8px; margin-top:8px; }
#console-panel .footer button { flex:1; padding:8px; background:#112233; border:2px solid #4488aa; color:#88ccee; font-family:inherit; font-size:12px; cursor:pointer; border-radius:3px; }
#console-panel .footer button:hover { background:#226688; border-color:#00ffff; color:#fff; }
#console-panel .footer button.warn { border-color:#aa4444; color:#ff8888; }
#console-panel .footer button.warn:hover { background:#660000; }
</style>

<body>
<div id="wrap">
  <canvas id="c" width="480" height="700"></canvas>
  <button class="side-btn" id="btn-pause" title="Pause (P)">⏸</button>
  <button class="side-btn" id="btn-invincible" title="Invincible (G)">💀</button>
  <!-- BGM mute / track switch removed — use Pause menu instead -->
  <button id="btn-speed" title="切换倍速">1.0x</button>
  <button id="btn-infbomb" title="无限核弹">💥∞</button>
  <!-- Bomb hidden: 移动端双击屏幕触发，桌面端 X 键 -->
  <div id="console-panel">
    <h2>🛠 控制台</h2>
    <div class="sub">实时调整游戏数据 · 自动保存</div>
    <div class="tabs" id="console-tabs"></div>
    <div class="body" id="console-body"></div>
    <div class="footer">
      <button id="console-reset" class="warn">重置默认</button>
      <button id="console-back">← 返回排行榜</button>
    </div>
  </div>
</div>
<script>
'use strict';
window.addEventListener('error', e => {
  document.body.style.background='#300';
  const d=document.createElement('div');
  d.style.cssText='color:#f88;font:14px monospace;position:fixed;top:0;left:0;padding:8px;z-index:9999;white-space:pre';
  d.textContent='JS ERROR: '+e.message+'\nLine: '+e.lineno+':'+e.colno;
  document.body.appendChild(d);
});

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────

const W = 480, H = 700;

// ─── SAVE DATA ───────────────────────────────────────────────────────────────
// Tier multipliers for stage difficulty (must be defined before loadSave runs)
const TIER_MUL = { novice:1.0, veteran:1.55, hell:2.4 };
function currentTier() {
  return (save && save.tier && TIER_MUL[save.tier]) ? save.tier : 'novice';
}
function defaultSave() {
  return {
    coins: 500, diamonds: 2,
    planes: Array(20).fill(false).map((_,i)=>i===0),
    bgs: Array(BG_SKINS.length).fill(false).map((_,i)=>i===0),
    selP1: 0, selP2: 1, selBG: 0,
    stageProgress: { novice:1, veteran:0, hell:0 },
    medals: { novice:false, veteran:false, hell:false },
    tier: 'novice',
    moveSensX: 1.0, moveSensY: 1.0,
    pixelScale: 1.0,
    endlessState: null,
    endlessLeaderboard: [],
    console: defaultConsole(),
  };
}
function defaultConsole() {
  return {
    // Player
    playerSpeed: 4,         // base move speed (px/frame)
    playerLives: 3,         // initial lives
    playerBombs: 3,         // initial bombs
    weaponDmgMul: 1.0,      // global player bullet damage multiplier
    fireRateMul: 1.0,       // shoot interval multiplier (>1 slower, <1 faster)
    bulletSpeedMul: 1.0,    // player bullet velocity multiplier
    starMaxDuration: 5,     // LV MAX seconds when picking star at Lv5
    reviveBombs: 5,         // bombs granted on revive
    // Enemy
    enemyHpMul: 1.0,        // global enemy HP multiplier
    enemySpeedMul: 1.0,     // enemy move speed multiplier
    enemyBulletSpdMul: 1.0, // enemy bullet velocity multiplier
    enemyFireRateMul: 1.0,  // enemy fire interval multiplier
    spawnRateMul: 1.0,      // spawn frequency multiplier (lower → faster)
    enemyCountMul: 1.0,     // wave size multiplier
    // Boss
    bossHpMul: 1.0,         // boss HP multiplier
    bossFireRateMul: 1.0,   // boss attack interval multiplier
    bossBarMul: 1.0,        // bar count multiplier
    // Pickups & Difficulty
    dropRateMul: 1.0,       // overall drop rate multiplier (cap 95%)
    coinMul: 1.0,           // coin reward multiplier
    diamondMul: 1.0,        // diamond reward multiplier
    bossKillMul: 1.0,       // boss-kill threshold multiplier (more kills needed)
  };
}
let save = defaultSave();
function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d) {
      save = defaultSave();
      if (typeof d.coins === 'number') save.coins = d.coins;
      if (typeof d.diamonds === 'number') save.diamonds = d.diamonds;
      if (Array.isArray(d.planes) && d.planes.length === 20) save.planes = d.planes;
      if (Array.isArray(d.bgs)) {
        // forward-compat: pad shorter arrays to current BG_SKINS length
        for (let i=0; i<Math.min(d.bgs.length, save.bgs.length); i++) save.bgs[i] = !!d.bgs[i];
      }
      if (typeof d.selP1 === 'number') save.selP1 = d.selP1;
      if (typeof d.selP2 === 'number') save.selP2 = d.selP2;
      if (typeof d.selBG === 'number' && d.selBG < BG_SKINS.length) save.selBG = d.selBG;
      // stageProgress: migrate legacy number → {novice,veteran,hell}
      if (typeof d.stageProgress === 'number') {
        save.stageProgress = { novice: Math.max(1, d.stageProgress), veteran:0, hell:0 };
      } else if (d.stageProgress && typeof d.stageProgress === 'object') {
        save.stageProgress = {
          novice: d.stageProgress.novice || 1,
          veteran: d.stageProgress.veteran || 0,
          hell: d.stageProgress.hell || 0,
        };
      }
      if (d.medals && typeof d.medals === 'object') {
        save.medals = {
          novice: !!d.medals.novice,
          veteran: !!d.medals.veteran,
          hell: !!d.medals.hell,
        };
      }
      if (typeof d.tier === 'string' && TIER_MUL[d.tier]) save.tier = d.tier;
      if (typeof d.moveSensX === 'number') save.moveSensX = d.moveSensX;
      if (typeof d.moveSensY === 'number') save.moveSensY = d.moveSensY;
      if (typeof d.pixelScale === 'number') save.pixelScale = d.pixelScale;
      if (d.endlessState && typeof d.endlessState === 'object') save.endlessState = d.endlessState;
      if (Array.isArray(d.endlessLeaderboard)) save.endlessLeaderboard = d.endlessLeaderboard.slice(0,10);
      if (d.console && typeof d.console === 'object') {
        const def = defaultConsole();
        for (const k in def) {
          if (typeof d.console[k] === 'number') def[k] = d.console[k];
        }
        save.console = def;
      }
    }
  } catch(e) {}
}
function writeSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e) {}
}
loadSave();

const E4=329.63,F4s=369.99;
const MELODY_T3=[
  [E5,2],[G5,1],[A5,1],[B5,1],[C6,1],[B5,1],[A5,1],

function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.65;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

function playNote(freq, type, vol, startTime, duration, dest) {
  if (!freq || freq === 0) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
  } catch(e) {}
}

function playKick(startTime, dest) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, startTime);
    osc.frequency.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    gain.gain.setValueAtTime(0.4, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    osc.connect(gain);
    gain.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + 0.2);
  } catch(e) {}
}

function scheduleBGM() {
  if (!bgmEnabled || !bgmScheduled) return;
  try {
    const ctx = getAudio();
    const LOOKAHEAD = 0.5;
    const now = ctx.currentTime;
    const scheduleUntil = now + LOOKAHEAD;

    let bassIdx = Math.floor(bgmNoteIdx / 2) % BASS_BGM.length;

    const track=BGM_TRACKS[bgmTrack]||BGM_TRACKS[0];
    const isSax = !!track.sax;
    const tempo = track.tempo || 1;
    const meloWave = isSax ? 'triangle' : 'square';
    const bassWave = isSax ? 'sine'     : 'sawtooth';
    const meloVol  = isSax ? 0.11 : 0.09;
    const bassVol  = isSax ? 0.06 : 0.07;
    while (bgmStartTime < scheduleUntil) {
      const [mf, md] = track.m[bgmNoteIdx % track.m.length];
      const [bf, bd] = track.b[Math.floor(bgmNoteIdx / 2) % track.b.length];
      const dur = EIGHTH * tempo;
      playNote(mf, meloWave, meloVol, bgmStartTime, dur * md * 0.9, masterGain);
      if (bgmNoteIdx % 2 === 0) playNote(bf, bassWave, bassVol, bgmStartTime, dur * bd * 0.85, masterGain);
      // Harmony layer
      if (mf && bgmNoteIdx % 4 === 2) {
        playNote(mf*0.75, isSax?'sine':'triangle', isSax?0.05:0.04, bgmStartTime, dur * md * 0.7, masterGain);
      }
      const posInBar = bgmNoteIdx % 8;
      // Sax tracks → softer brushed feel: kick on 1 only, soft hat on offbeats; no harsh snare
      if (isSax) {
        if (posInBar === 0) playKick(bgmStartTime, masterGain);
        if (posInBar % 2 === 1) {
          try {
            const hatBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.04, audioCtx.sampleRate);
            const hd = hatBuf.getChannelData(0);
            for(let si=0;si<hd.length;si++) hd[si]=(Math.random()*2-1)*0.4*(1-si/hd.length);
            const hSrc = audioCtx.createBufferSource(), hG = audioCtx.createGain();
            hG.gain.setValueAtTime(0.05, bgmStartTime);
            hG.gain.exponentialRampToValueAtTime(0.001, bgmStartTime+0.04);
            hSrc.buffer=hatBuf; hSrc.connect(hG); hG.connect(masterGain);
            hSrc.start(bgmStartTime); hSrc.stop(bgmStartTime+0.05);
          } catch(e) {}
        }
      } else {
        if (posInBar === 0 || posInBar === 4) playKick(bgmStartTime, masterGain);
        if (posInBar === 2 || posInBar === 6) {
          try {
            const snBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.08, audioCtx.sampleRate);
            const sd = snBuf.getChannelData(0);
            for(let si=0;si<sd.length;si++) sd[si]=(Math.random()*2-1)*(1-si/sd.length);
            const snSrc = audioCtx.createBufferSource(), snG = audioCtx.createGain();
            snG.gain.setValueAtTime(0.12, bgmStartTime);
            snG.gain.exponentialRampToValueAtTime(0.001, bgmStartTime+0.08);
            snSrc.buffer=snBuf; snSrc.connect(snG); snG.connect(masterGain);
            snSrc.start(bgmStartTime); snSrc.stop(bgmStartTime+0.09);
          } catch(e) {}
        }
      }
      bgmStartTime += dur;
      bgmNoteIdx++;
      if (bgmNoteIdx >= track.m.length) bgmNoteIdx = 0;
    }
  } catch(e) {}

  bgmTimeout = setTimeout(scheduleBGM, 200);
}

function startBGM() {
  if (bgmScheduled) return;
  try {
    getAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    bgmScheduled = true;
    bgmStartTime = audioCtx.currentTime + 0.1;
    bgmNoteIdx = 0;
    scheduleBGM();
  } catch(e) {}
}

function stopBGM() {
  bgmScheduled = false;
  if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
}

function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  if (!bgmEnabled) stopBGM();
  else if (screen === 'game') startBGM();
}

      [80,60,40].forEach((f,i)=>{

        osc.type='sawtooth'; osc.frequency.value=f;
        g.gain.setValueAtTime(0.14, ctx.currentTime+i*0.2);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.2+0.4);
        osc.connect(g); g.connect(masterGain);

function fillPx(color, x, y, w, h) {
  cx.fillStyle = color;
  cx.fillRect(x|0, y|0, w|0, h|0);
}

// Draw a smooth vector plane. shapeIdx 0-3 = different silhouettes.
// colors = [body, cockpit, wing, engine_glow]
// cx must be in identity transform when called.
// Shade a hex color: amt > 0 lightens, < 0 darkens
function shadeHex(hex, amt) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const f = v => Math.max(0, Math.min(255, v + amt));
  return '#'+[f(r),f(g),f(b)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

    // Connecting wing between fuselages
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-11,2); cx2.lineTo(11,2); cx2.lineTo(13,8); cx2.lineTo(-13,8); cx2.closePath(); cx2.fill();
    // Outer wings
    cx2.fillStyle = wcD;
    cx2.beginPath(); cx2.moveTo(-12,4); cx2.lineTo(-22,12); cx2.lineTo(-18,15); cx2.lineTo(-11,8); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 12,4); cx2.lineTo( 22,12); cx2.lineTo( 18,15); cx2.lineTo( 11,8); cx2.closePath(); cx2.fill();
    // Wingtip lights
    cx2.fillStyle='#ff4444'; cx2.fillRect(-22,11,2,2);
    cx2.fillStyle='#44ff44'; cx2.fillRect( 20,11,2,2);
    // Center cockpit pod (suspended between fuselages)
    cx2.fillStyle = bcD;
    cx2.beginPath(); cx2.ellipse(0, -2, 4, 6, 0, 0, Math.PI*2); cx2.fill();
    cx2.fillStyle = cc;
    cx2.beginPath(); cx2.ellipse(0, -2, 2.6, 4.2, 0, 0, Math.PI*2); cx2.fill();
    // Tail fins on each pod
    cx2.fillStyle = bcD;
    cx2.beginPath(); cx2.moveTo(-7, 10); cx2.lineTo(-7, 17); cx2.lineTo(-6, 17); cx2.lineTo(-6, 10); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 7, 10); cx2.lineTo( 7, 17); cx2.lineTo( 6, 17); cx2.lineTo( 6, 10); cx2.closePath(); cx2.fill();
    // Cannons (one on each fuselage nose)
    cx2.fillStyle = '#1a1a1a';
    cx2.fillRect(-7.7, -14, 1.4, 6); cx2.fillRect( 6.3, -14, 1.4, 6);
    // Panel lines
    cx2.strokeStyle = 'rgba(0,0,0,0.4)'; cx2.lineWidth = 0.5;
    cx2.beginPath();
    cx2.moveTo(-7,-18); cx2.lineTo(-7,17); cx2.moveTo(7,-18); cx2.lineTo(7,17);
    cx2.stroke();

  } else if (shapeIdx === 7) {
    // ─ Forward-swept aggressor ─
    cx2.fillStyle = wcD;
    cx2.beginPath(); cx2.moveTo(-4,4); cx2.lineTo(-22,-2); cx2.lineTo(-22,8); cx2.lineTo(-6,12); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 4,4); cx2.lineTo( 22,-2); cx2.lineTo( 22,8); cx2.lineTo( 6,12); cx2.closePath(); cx2.fill();
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-4,5); cx2.lineTo(-19,0); cx2.lineTo(-19,7); cx2.lineTo(-6,11); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 4,5); cx2.lineTo( 19,0); cx2.lineTo( 19,7); cx2.lineTo( 6,11); cx2.closePath(); cx2.fill();
    // Wingtip missiles
    cx2.fillStyle = '#888'; cx2.fillRect(-22,-2,2,5); cx2.fillRect(20,-2,2,5);
    cx2.fillStyle = '#ff4422'; cx2.fillRect(-22,2,2,1); cx2.fillRect(20,2,2,1);
    // Slim aerodynamic body
    const bg = cx2.createLinearGradient(-6,-22, 6,18);
    bg.addColorStop(0, bcL); bg.addColorStop(0.5, bc); bg.addColorStop(1, bcD);
    cx2.fillStyle = bg;
    cx2.beginPath();
    cx2.moveTo(0,-22); cx2.lineTo(-3,-14); cx2.lineTo(-5,0); cx2.lineTo(-6,16); cx2.lineTo(-2,18); cx2.lineTo(2,18); cx2.lineTo(6,16); cx2.lineTo(5,0); cx2.lineTo(3,-14); cx2.closePath();
    cx2.fill();
    // Canard (small forward wing)
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-3,-10); cx2.lineTo(-12,-7); cx2.lineTo(-12,-5); cx2.lineTo(-3,-7); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 3,-10); cx2.lineTo( 12,-7); cx2.lineTo( 12,-5); cx2.lineTo( 3,-7); cx2.closePath(); cx2.fill();
    // Panel + center stripe
    cx2.strokeStyle='rgba(0,0,0,0.5)'; cx2.lineWidth=0.6;
    cx2.beginPath();
    cx2.moveTo(0,-22); cx2.lineTo(0,18);
    cx2.moveTo(-5,2); cx2.lineTo(5,2);
    cx2.stroke();
    // Central single tail fin (tall)
    cx2.fillStyle = bcD;
    cx2.beginPath(); cx2.moveTo(-1,4); cx2.lineTo(-1,18); cx2.lineTo(0,20); cx2.lineTo(1,18); cx2.lineTo(1,4); cx2.closePath(); cx2.fill();
    // Cannon
    cx2.fillStyle='#1a1a1a'; cx2.fillRect(-1,-18,2,8);
    // Outline
    cx2.strokeStyle = bcD; cx2.lineWidth = 0.7;
    cx2.beginPath();
    cx2.moveTo(0,-22); cx2.lineTo(-3,-14); cx2.lineTo(-5,0); cx2.lineTo(-6,16); cx2.lineTo(-2,18); cx2.lineTo(2,18); cx2.lineTo(6,16); cx2.lineTo(5,0); cx2.lineTo(3,-14); cx2.closePath();
    cx2.stroke();

  } else {
    // ─ Heavy gunship (wide-body, gun pods) ─
    cx2.fillStyle = wcD;
    cx2.beginPath(); cx2.moveTo(-4,-4); cx2.lineTo(-25,12); cx2.lineTo(-22,2); cx2.lineTo(-10,-2); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 4,-4); cx2.lineTo( 25,12); cx2.lineTo( 22,2); cx2.lineTo( 10,-2); cx2.closePath(); cx2.fill();
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-4,-4); cx2.lineTo(-22,9); cx2.lineTo(-20,3); cx2.lineTo(-10,-1); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 4,-4); cx2.lineTo( 22,9); cx2.lineTo( 20,3); cx2.lineTo( 10,-1); cx2.closePath(); cx2.fill();
    // 4 wing-mounted gun pods
    cx2.fillStyle = bcD;
    for (const px2 of [-15,-9,9,15]) {
      cx2.fillRect(px2-1.5, 1, 3, 12);
      cx2.fillStyle = '#1a1a1a'; cx2.fillRect(px2-0.7, 12, 1.5, 3);
      cx2.fillStyle = bcD;
    }
    // Wing missile rails
    cx2.fillStyle = '#ff4422';
    cx2.fillRect(-22,7,2,1); cx2.fillRect(20,7,2,1);
    // Wide fuselage
    const bg = cx2.createLinearGradient(-9,-18, 9,20);
    bg.addColorStop(0, bcL); bg.addColorStop(0.5, bc); bg.addColorStop(1, bcD);
    cx2.fillStyle = bg;
    cx2.beginPath();
    cx2.moveTo(0,-18); cx2.lineTo(-5,-8); cx2.lineTo(-9,3); cx2.lineTo(-7,18); cx2.lineTo(-2,20); cx2.lineTo(2,20); cx2.lineTo(7,18); cx2.lineTo(9,3); cx2.lineTo(5,-8); cx2.closePath();
    cx2.fill();
    // Heavy panel lines
    cx2.strokeStyle='rgba(0,0,0,0.5)'; cx2.lineWidth=0.7;
    cx2.beginPath();
    cx2.moveTo(0,-18); cx2.lineTo(0,20);
    cx2.moveTo(-8,5); cx2.lineTo(8,5);
    cx2.moveTo(-7,12); cx2.lineTo(7,12);
    cx2.stroke();
    // Twin tail fins
    cx2.fillStyle = bcD;
    cx2.beginPath(); cx2.moveTo(-3,10); cx2.lineTo(-3,18); cx2.lineTo(-2,18); cx2.lineTo(-2,10); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 3,10); cx2.lineTo( 3,18); cx2.lineTo( 2,18); cx2.lineTo( 2,10); cx2.closePath(); cx2.fill();
    // Heavy nose cannon
    cx2.fillStyle = '#1a1a1a';
    cx2.fillRect(-2,-13,4,8);
    cx2.fillStyle = '#ff8800';
    cx2.fillRect(-2,-14,4,1);
    // Outline
    cx2.strokeStyle = bcD; cx2.lineWidth = 0.8;
    cx2.beginPath();
    cx2.moveTo(0,-18); cx2.lineTo(-5,-8); cx2.lineTo(-9,3); cx2.lineTo(-7,18); cx2.lineTo(-2,20); cx2.lineTo(2,20); cx2.lineTo(7,18); cx2.lineTo(9,3); cx2.lineTo(5,-8); cx2.closePath();
    cx2.stroke();
  }

  // Cockpit canopy (multi-layer for sharpness)
  const cg = cx2.createLinearGradient(0,-15, 0,-2);
  cg.addColorStop(0, '#ffffff');
  cg.addColorStop(0.35, cc);
  cg.addColorStop(1, shadeHex(cc, -50));
  cx2.fillStyle = cg;
  cx2.beginPath(); cx2.ellipse(0, -8, 3.5, 6.5, 0, 0, Math.PI*2); cx2.fill();
  // Canopy frame
  cx2.strokeStyle = 'rgba(0,0,0,0.6)';
  cx2.lineWidth = 0.6;
  cx2.beginPath(); cx2.ellipse(0, -8, 3.5, 6.5, 0, 0, Math.PI*2); cx2.stroke();
  // Canopy split line
  cx2.beginPath(); cx2.moveTo(0,-14); cx2.lineTo(0,-2); cx2.stroke();
  // Highlight
  cx2.fillStyle = 'rgba(255,255,255,0.6)';
  cx2.beginPath(); cx2.ellipse(-1, -10, 1.2, 2.8, -0.2, 0, Math.PI*2); cx2.fill();

  cx2.restore();
}

function drawButton(bx, by, bw, bh, text, highlighted) {
  fillPx('#000', bx+3, by+3, bw, bh);
  fillPx(highlighted ? '#226688' : '#112233', bx, by, bw, bh);
  cx.strokeStyle = highlighted ? '#00ffff' : '#4488aa';
  cx.lineWidth = 2;
  cx.strokeRect((bx+1)|0, (by+1)|0, (bw-2)|0, (bh-2)|0);
  cx.fillStyle = highlighted ? '#00ffff' : '#88ccee';
  cx.font = "bold 16px 'Courier New', monospace";
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, (bx + bw/2)|0, (by + bh/2)|0);
  cx.textAlign = 'left';
  cx.textBaseline = 'alphabetic';
}

function shiftColor(hex, db) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return '#'+[r,g,clamp(b+db,0,255)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
function initBGStars(type) {
  bgStars = [];
  const count = type==='arctic' ? 40 : 100;
  for (let i=0;i<count;i++) {
    bgStars.push({
      x: rnd(0,W), y: rnd(0,H),
      speed: rnd(0.3,1.5),
      size: rndInt(1,2),
      color: getBGStarColor(type),
    });
  }
  bgTerrain = [];
  for (let i=0;i<10;i++) {
    bgTerrain.push({
      x: rnd(0,W-80), y: rnd(H*0.3, H),
      w: rndInt(20,80), h: rndInt(10,40),
      speed: rnd(0.4,1.2),
    });
  }
}

function getBGStarColor(type) {
  if (type==='nebula') return ['#ff88ff','#aaaaff','#88ffff','#ffffff'][rndInt(0,3)];
  if (type==='arctic') return '#ffffff';
  if (type==='volcanic') return ['#ff4400','#ffaa00','#ff6600'][rndInt(0,2)];
  if (type==='cyber') return ['#00ffcc','#0088ff','#88ff00'][rndInt(0,2)];
  return '#ffffff';
}

// ─── ANIME BG: stylized waifu silhouette + animated effects ─────────────────
const ANIME_PALETTES = {
  animeSakura:  {hair:'#ffaaaa', skin:'#ffe2cc', acc:'#ff66aa', glow:'#ffccdd', flake:'#ffaadd'},
  animeStar:    {hair:'#88aaff', skin:'#e0e8ff', acc:'#ffffff', glow:'#aaccff', flake:'#ffffff'},
  animeMoon:    {hair:'#ddccff', skin:'#f0e0e8', acc:'#aaaaff', glow:'#ffffaa', flake:'#aaccff'},
  animeSnow:    {hair:'#aaeeff', skin:'#e8f4ff', acc:'#ddeeff', glow:'#ffffff', flake:'#ffffff'},
  animeFlame:   {hair:'#ff4422', skin:'#ffd0aa', acc:'#ffaa00', glow:'#ffaa44', flake:'#ff6622'},
  animeOcean:   {hair:'#33ccff', skin:'#dde8f0', acc:'#88eeff', glow:'#aaffff', flake:'#88ccee'},
  animeNeon:    {hair:'#ff00cc', skin:'#ffd0ff', acc:'#00ffcc', glow:'#ff44ff', flake:'#00ffff'},
  animeDusk:    {hair:'#cc6688', skin:'#ffd0c0', acc:'#ff88aa', glow:'#ff8866', flake:'#ffaa88'},
  animeRainbow: {hair:'#ff44aa', skin:'#ffe0e8', acc:'#88ffcc', glow:'#aaffff', flake:'#ffffaa'},
  animeGoddess: {hair:'#ffeeaa', skin:'#fff0e0', acc:'#ffcc44', glow:'#ffffaa', flake:'#ffeeaa'},
};

// Helper: draw a soft drop shadow under a path
function drawAnimeWaifu(type) {
  const pal = ANIME_PALETTES[type] || ANIME_PALETTES.animeSakura;
  const t = frame * 0.02;

  // ── Stage-1: distant aura / godrays ───────────────────────────────────────
  const halo = cx.createRadialGradient(W/2, H*0.55, 40, W/2, H*0.55, 380);
  halo.addColorStop(0, pal.glow + '70');
  halo.addColorStop(0.45, pal.glow + '20');
  halo.addColorStop(1, 'transparent');
  cx.fillStyle = halo;
  cx.fillRect(0, 0, W, H);

  // Volumetric god-rays (radial streaks)
  cx.save();
  cx.globalAlpha = 0.18;
  cx.translate(W/2, H*0.45);
  for (let r = 0; r < 14; r++) {
    cx.save();
    cx.rotate(r * Math.PI/7 + t*0.4);
    const rg = cx.createLinearGradient(0,0,260,0);
    rg.addColorStop(0, pal.glow + 'cc');
    rg.addColorStop(1, 'transparent');
    cx.fillStyle = rg;
    cx.fillRect(0, -2, 260, 4);
    cx.restore();
  }
  cx.restore();

  // ── Stage-2: foreground ambient particles ───────────────────────────────
  const flakes = 36;
  for (let i = 0; i < flakes; i++) {
    const fx = ((i * 91 + frame * (0.35 + (i % 4) * 0.12)) % (W + 40)) - 20;
    const fy = ((i * 137 + frame * (0.28 + (i % 5) * 0.08)) % (H + 40)) - 20;
    const sw = 2 + (i % 3);
    const drift = Math.sin(frame * 0.04 + i) * 6;
    cx.globalAlpha = 0.45 + Math.sin(frame * 0.05 + i) * 0.25;
    if (type === 'animeSakura' || type === 'animeDusk') {
      cx.fillStyle = pal.flake;
      cx.beginPath();
      cx.ellipse(fx + drift, fy, sw + 1, sw + 2, frame * 0.04 + i, 0, Math.PI * 2);
      cx.fill();
    } else if (type === 'animeStar' || type === 'animeMoon' || type === 'animeGoddess') {
      cx.fillStyle = pal.flake;
      cx.fillRect((fx + drift) | 0, fy | 0, sw, sw);
      cx.fillRect((fx + drift - 1) | 0, (fy + 1) | 0, sw + 2, sw - 1);
    } else if (type === 'animeSnow') {
      cx.fillStyle = pal.flake;
      cx.beginPath(); cx.arc(fx + drift, fy, sw * 0.9, 0, Math.PI * 2); cx.fill();
    } else if (type === 'animeFlame') {
      const fg = cx.createRadialGradient(fx, fy, 0, fx, fy, 5);
      fg.addColorStop(0, pal.flake); fg.addColorStop(1, 'transparent');
      cx.fillStyle = fg;
      cx.beginPath(); cx.arc(fx, fy, 5, 0, Math.PI * 2); cx.fill();
    } else if (type === 'animeNeon' || type === 'animeRainbow') {
      cx.fillStyle = ['#ff00aa', '#00ffcc', '#ffff00', '#ff66ff'][i % 4];
      cx.fillRect((fx + drift) | 0, fy | 0, sw, sw);
    } else {
      cx.strokeStyle = pal.flake; cx.lineWidth = 1;
      cx.beginPath(); cx.arc(fx + drift, fy, sw * 1.5, 0, Math.PI * 2); cx.stroke();
    }
  }
  cx.globalAlpha = 1;

  // ── Stage-3: HD anime portrait, anchored center-bottom ───────────────────
  const cxX = W / 2 + Math.sin(t) * 3;
  const cxY = H * 0.66 + Math.sin(t * 1.2) * 2;
  const breath = 1 + Math.sin(t * 1.1) * 0.015;

  cx.save();
  cx.translate(cxX, cxY);
  cx.scale(breath, breath);

  // Color shorthands
  const skin   = pal.skin;
  const skinSh = '#cc8a8a';
  const hair   = pal.hair;
  const hairSh = '#1a0a14';
  const eye    = pal.acc;
  const cloth  = pal.acc;
  const cheek  = '#ff7c9a';

  // ─ Long flowing hair (back layer, wavy + multi-strand) ─
  cx.save();
  cx.fillStyle = hairSh;
  cx.beginPath();
  cx.moveTo(-110, -90);
  for (let i = -110; i <= 110; i += 5) {
    const wy = 120 + Math.sin(i * 0.04 + t * 1.6) * 16 + Math.cos(i * 0.02 + t) * 8;
    cx.lineTo(i, wy);
  }
  cx.lineTo(110, -90);
  cx.closePath();
  cx.fill();
  // Mid strands (lighter)
  cx.fillStyle = hair;
  cx.beginPath();
  cx.moveTo(-90, -85);
  for (let i = -90; i <= 90; i += 5) {
    const wy = 100 + Math.sin(i * 0.05 + t * 2.0) * 14 + Math.cos(i * 0.03 + t) * 6;
    cx.lineTo(i, wy);
  }
  cx.lineTo(90, -85);
  cx.closePath();
  cx.fill();
  // Highlight strand
  cx.strokeStyle = '#ffffff66';
  cx.lineWidth = 1.4;
  for (let i = -70; i <= 70; i += 18) {
    cx.beginPath();
    cx.moveTo(i, -60);
    cx.bezierCurveTo(i - 4, 0, i + 4, 50, i + Math.sin(t)*4, 100);
    cx.stroke();
  }
  cx.restore();

  // ─ Shoulders + collarbone shadow ─
  cx.fillStyle = skin;
  cx.beginPath();
  cx.moveTo(-44, -22);
  cx.bezierCurveTo(-44, -10, -36, 4, -22, 12);
  cx.lineTo(22, 12);
  cx.bezierCurveTo(36, 4, 44, -10, 44, -22);
  cx.bezierCurveTo(44, -32, 38, -38, 22, -38);
  cx.lineTo(-22, -38);
  cx.bezierCurveTo(-38, -38, -44, -32, -44, -22);
  cx.closePath();
  cx.fill();
  cx.strokeStyle = skinSh + '44';
  cx.lineWidth = 1.2;
  cx.beginPath();
  cx.moveTo(-18, -10); cx.bezierCurveTo(-6, -6, 6, -6, 18, -10);
  cx.stroke();

  // ─ Dress / Outfit (gown with bust line) ─
  const dressG = cx.createLinearGradient(0, -10, 0, 130);
  dressG.addColorStop(0, cloth);
  dressG.addColorStop(0.5, '#1a1a2c');
  dressG.addColorStop(1, '#08081a');
  cx.fillStyle = dressG;
  cx.beginPath();
  cx.moveTo(-32, -8);
  cx.bezierCurveTo(-30, 12, -20, 16, -10, 18);
  cx.lineTo(0, 6);   // V-neck
  cx.lineTo(10, 18);
  cx.bezierCurveTo(20, 16, 30, 12, 32, -8);
  cx.lineTo(46, 14);
  cx.lineTo(60, 96);
  cx.lineTo(72, 130);
  cx.lineTo(-72, 130);
  cx.lineTo(-60, 96);
  cx.lineTo(-46, 14);
  cx.closePath();
  cx.fill();
  // Bust shading
  cx.fillStyle = '#00000033';
  cx.beginPath(); cx.ellipse(-12, 10, 8, 4, -0.3, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( 12, 10, 8, 4,  0.3, 0, Math.PI*2); cx.fill();
  // Dress trim
  cx.fillStyle = pal.glow + 'aa';
  cx.fillRect(-46, 14, 92, 3);
  cx.fillRect(-72, 128, 144, 4);
  // Waist ribbon
  cx.fillStyle = eye;
  cx.fillRect(-28, 50, 56, 8);
  cx.fillStyle = '#ffffff66';
  cx.fillRect(-28, 50, 56, 1.5);

  // ─ Stockings / thighs (peek under skirt) ─
  cx.fillStyle = '#1a1a2c';
  cx.fillRect(-22, 130, 18, 30);
  cx.fillRect(  4, 130, 18, 30);
  cx.fillStyle = skin;
  cx.fillRect(-22, 130, 18, 4);
  cx.fillRect(  4, 130, 18, 4);

  // ─ Neck ─
  cx.fillStyle = skin;
  cx.beginPath();
  cx.moveTo(-7, -52); cx.lineTo(7, -52);
  cx.lineTo(7, -36); cx.lineTo(-7, -36);
  cx.closePath();
  cx.fill();
  cx.fillStyle = skinSh + '55';
  cx.fillRect(-7, -38, 14, 2);

  // ─ Choker ─
  cx.fillStyle = '#1a1a2a';
  cx.fillRect(-8, -42, 16, 3);
  cx.fillStyle = pal.glow;
  cx.beginPath(); cx.arc(0, -40, 1.6, 0, Math.PI*2); cx.fill();

  // ─ Head shape ─
  cx.fillStyle = skin;
  cx.beginPath(); cx.ellipse(0, -72, 26, 30, 0, 0, Math.PI * 2); cx.fill();
  // Jaw shading
  cx.fillStyle = skinSh + '33';
  cx.beginPath(); cx.ellipse(0, -56, 14, 10, 0, 0, Math.PI*2); cx.fill();

  // ─ Hair fringe (thick + side bangs) ─
  cx.fillStyle = hair;
  cx.beginPath();
  cx.moveTo(-28, -82);
  cx.bezierCurveTo(-22, -106, 22, -106, 28, -82);
  cx.lineTo(24, -64);
  cx.lineTo(16, -78);
  cx.lineTo(8, -62);
  cx.lineTo(0, -78);
  cx.lineTo(-8, -62);
  cx.lineTo(-16, -78);
  cx.lineTo(-24, -64);
  cx.closePath();
  cx.fill();
  // Hair sheen
  cx.fillStyle = '#ffffff55';
  cx.beginPath();
  cx.ellipse(-6, -94, 9, 3, -0.3, 0, Math.PI*2);
  cx.fill();
  // Side hair tufts
  cx.fillStyle = hair;
  cx.beginPath(); cx.ellipse(-30, -64, 10, 26, 0.18, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse( 30, -64, 10, 26, -0.18, 0, Math.PI * 2); cx.fill();
  // Hair sub-shadow
  cx.fillStyle = hairSh + '88';
  cx.beginPath(); cx.ellipse(-30, -56, 6, 14, 0.18, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( 30, -56, 6, 14,-0.18, 0, Math.PI*2); cx.fill();

  // ─ Cheek blush ─
  cx.fillStyle = cheek + '99';
  cx.beginPath(); cx.ellipse(-12, -64, 5, 2.5, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( 12, -64, 5, 2.5, 0, 0, Math.PI*2); cx.fill();

  // ─ Eyes (HD multi-layer anime) ─
  const blink = Math.sin(t * 6) > 0.985 ? 0.1 : 1;
  cx.save();
  for (const ex of [-10, 10]) {
    cx.save();
    cx.translate(ex, -70);
    cx.scale(1, blink);
    // Eye-white
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.ellipse(0, 0, 5.6, 7, 0, 0, Math.PI*2); cx.fill();
    // Iris outer ring
    cx.fillStyle = '#0a0a22';
    cx.beginPath(); cx.ellipse(0, 0, 4.6, 6.2, 0, 0, Math.PI*2); cx.fill();
    // Iris gradient
    const ig = cx.createRadialGradient(0, -1, 0.5, 0, 0, 5.5);
    ig.addColorStop(0, '#ffffff');
    ig.addColorStop(0.35, eye);
    ig.addColorStop(0.85, '#1a1a3a');
    ig.addColorStop(1, '#000010');
    cx.fillStyle = ig;
    cx.beginPath(); cx.ellipse(0, 0, 4, 5.6, 0, 0, Math.PI*2); cx.fill();
    // Pupil
    cx.fillStyle = '#000010';
    cx.beginPath(); cx.ellipse(0, 0.5, 1.4, 2.2, 0, 0, Math.PI*2); cx.fill();
    // Big anime catch-light
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.ellipse(-1.4, -2.4, 1.8, 2.4, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse( 1.4,  2.4, 0.9, 1.2, 0, 0, Math.PI*2); cx.fill();
    cx.restore();
    // Eyelashes (above eye, outside scaling)
    cx.fillStyle = '#0a0010';
    cx.fillRect(ex - 6, -77, 12, 1.4);
    cx.beginPath();
    cx.moveTo(ex - 6, -77); cx.lineTo(ex - 8, -79); cx.lineTo(ex - 4, -76); cx.fill();
    cx.beginPath();
    cx.moveTo(ex + 6, -77); cx.lineTo(ex + 8, -79); cx.lineTo(ex + 4, -76); cx.fill();
    // Eyebrow
    cx.fillStyle = hairSh;
    cx.fillRect(ex - 7, -82, 14, 1.6);
  }
  cx.restore();

  // ─ Mouth (small smile + glossy lip) ─
  cx.strokeStyle = '#aa3355';
  cx.lineWidth = 1.4;
  cx.beginPath();
  cx.moveTo(-3, -56);
  cx.quadraticCurveTo(0, -54, 3, -56);
  cx.stroke();
  cx.fillStyle = '#ff8aa6';
  cx.fillRect(-2, -55, 4, 0.8);

  // ─ Nose hint ─
  cx.fillStyle = skinSh + '66';
  cx.fillRect(-0.4, -64, 1, 2);

  // ─ Hair accessory (varies per palette) ─
  cx.fillStyle = pal.acc;
  if (type === 'animeStar' || type === 'animeGoddess' || type === 'animeRainbow') {
    const ax = -22, ay = -94;
    cx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? 7 : 2.8;
      const px = ax + Math.cos(a) * r;
      const py = ay + Math.sin(a) * r;
      i === 0 ? cx.moveTo(px, py) : cx.lineTo(px, py);
    }
    cx.closePath(); cx.fill();
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.arc(ax, ay, 1.6, 0, Math.PI*2); cx.fill();
  } else {
    // ribbon bow
    cx.beginPath();
    cx.moveTo(-26, -98); cx.lineTo(-12, -90); cx.lineTo(-26, -82); cx.closePath(); cx.fill();
    cx.beginPath();
    cx.moveTo(  2, -98); cx.lineTo(-12, -90); cx.lineTo(  2, -82); cx.closePath(); cx.fill();
    cx.fillStyle = pal.glow;
    cx.beginPath(); cx.arc(-12, -90, 2.6, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#ffffff88';
    cx.fillRect(-26, -91, 28, 1);
  }

  // ─ Floating glow orb in raised hand ─
  const orbR = 22 + Math.sin(t * 3) * 4;
  const og = cx.createRadialGradient(48, 30, 1, 48, 30, orbR);
  og.addColorStop(0, '#ffffff');
  og.addColorStop(0.3, pal.glow);
  og.addColorStop(0.8, pal.glow + '44');
  og.addColorStop(1, 'transparent');
  cx.fillStyle = og;
  cx.beginPath(); cx.arc(48, 30, orbR, 0, Math.PI * 2); cx.fill();
  // Hand silhouette holding orb
  cx.fillStyle = skin;
  cx.beginPath();
  cx.ellipse(40, 36, 6, 9, 0.3, 0, Math.PI*2);
  cx.fill();

  cx.restore();

  // ── Stage-4: subtle vignette to push focus center ──────────────────────
  const vg = cx.createRadialGradient(W/2, H/2, 220, W/2, H/2, 460);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  cx.fillStyle = vg;
  cx.fillRect(0, 0, W, H);
}

function drawBackground() {
  const bgType = BG_SKINS[save.selBG][3];
  const colors = getBGColors(bgType);
  fillPx(colors.sky, 0, 0, W, H);

  if (bgType.startsWith('anime')) {
    // Subtle gradient sky
    if (colors.atmos) {
      const sg = cx.createLinearGradient(0, 0, 0, H);
      sg.addColorStop(0, colors.sky);
      sg.addColorStop(0.6, colors.atmos + '40');
      sg.addColorStop(1, colors.terrain);
      cx.fillStyle = sg;
      cx.fillRect(0, 0, W, H);
    }
    for (const star of bgStars) fillPx(star.color, star.x | 0, star.y | 0, star.size, star.size);
    drawAnimeWaifu(bgType);
    return;
  }

  if (bgType==='nebula') {
    for (let i=0;i<3;i++) {
      const ny = ((frame*0.3+i*200)%(H+100))-50;
      cx.fillStyle='rgba(80,0,120,0.07)';
      cx.fillRect(0,ny|0,W,120);
    }
  }
  if (bgType==='cyber') {
    cx.strokeStyle='rgba(0,80,80,0.18)';
    cx.lineWidth=1;
    const go=(frame*0.5)%20;
    for (let x=0;x<W;x+=20){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for (let y=-go;y<H;y+=20){cx.beginPath();cx.moveTo(0,y|0);cx.lineTo(W,y|0);cx.stroke();}
  }
  if (bgType==='sunset') {
    for (let i=0;i<5;i++) {
      const ly=(frame*0.4+i*140)%(H+60)-30;
      cx.fillStyle=`rgba(180,60,0,0.07)`;
      cx.fillRect(0,ly|0,W,30);
    }
  }
  if (bgType==='rift') {
    cx.strokeStyle='rgba(120,0,180,0.15)';
    cx.lineWidth=1;
    for (let i=0;i<3;i++) {
      const ry=(frame*0.4+i*233)%(H+100)-50;
      cx.beginPath(); cx.moveTo(rndInt(0,100),ry|0); cx.lineTo(rndInt(300,480),(ry+20)|0); cx.stroke();
    }
  }

  for (const star of bgStars) {
    fillPx(star.color, star.x|0, star.y|0, star.size, star.size);
  }

  const tc = colors.terrain;
  if (bgType==='city') {
    for (let b=0;b<10;b++) {
      const bx=((b*48+(frame*0.2|0))%(W+48))-48;
      const bh=40+(b*17)%60;
      fillPx('#0a1a3a',bx|0,(H-bh)|0,40,bh);
      fillPx('#112244',(bx+2)|0,(H-bh)|0,36,bh);
      for (let wy=H-bh+5;wy<H-5;wy+=8)
        for (let wx=bx+4;wx<bx+36;wx+=8)
          if ((wx+wy+frame/30|0)%3!==0) fillPx('#ffff88',wx|0,wy|0,4,4);
    }
  } else if (bgType==='ocean') {
    for (let i=0;i<3;i++) {
      const wo=(frame*(0.8+i*0.3))%W;
      for (let wx=-wo;wx<W+20;wx+=20) {
        const wy=H-30-i*15+Math.sin((wx+frame*0.5)*0.1)*4;
        fillPx(i===0?'#0066cc':'#004488',wx|0,wy|0,18,5);
      }
    }
    fillPx('#003366',0,H-20,W,20);
  } else if (bgType==='volcanic') {
    fillPx('#330000',0,H-40,W,40);
    for (let l=0;l<6;l++) {
      const lx=((l*80+frame*0.3)|0)%(W+80)-80;
      fillPx('#ff4400',lx,(H-8)|0,60,8);
      fillPx('#ff8800',(lx+10)|0,(H-12)|0,40,4);
    }
  } else {
    for (const t of bgTerrain) {
      fillPx(tc, t.x|0, t.y|0, t.w, t.h);
    }
  }
}

function updateBG() {
  const bgType = BG_SKINS[save.selBG][3];
  for (const s of bgStars) {
    s.y += s.speed;
    if (s.y > H) { s.y=-2; s.x=rnd(0,W); }
  }
  if (bgType!=='city'&&bgType!=='ocean'&&bgType!=='volcanic') {
    for (const t of bgTerrain) {
      t.y+=t.speed;
      if (t.y>H) { t.y=-40; t.x=rnd(0,W-80); }
    }
  }
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const WEAPON_NAMES=['标准炮','散弹枪','激光炮','制导弹','等离子','闪电链','回旋镖','波动炮','龙卷炮','冰晶炮'];

function createPlayer(pNum, skinIdx) {
  const C = save.console || defaultConsole();
  return {
    x: pNum===1 ? W*0.65 : W*0.35,
    y: H-120,
    px:0, py:0,
    speed: C.playerSpeed,
    lives: C.playerLives, bombs: C.playerBombs,
    skinIdx,
    weapon:0, weaponLevel:1,
    weaponMax:0,            // frames remaining of LV MAX state
    bank:0,                 // -1..1 banking factor (left/right roll)
    shield:0, invTimer:0, shootTimer:0,
    pNum, dead:false, respawnTimer:0,
    _bombHeld:false,
  };
}

function drawPlayer(p) {
  if (p.dead) return;
  if (p.invTimer>0 && Math.floor(p.invTimer/4)%2===1) return;
  const skin = PLANE_SKINS[p.skinIdx];
  const colors = [...skin[4]];
  if (p.pNum===2) colors[0]=shiftColor(colors[0],30);
  // Shape-aware shadow: re-render the plane silhouette in dark + offset
  cx.save();
  cx.globalAlpha = 0.34;
  drawVectorPlane(skin[3], ['#0a0a14','#000010','#06060a','#000000'], cx,
    p.px + 6, p.py + 14, 1, false, p.bank || 0);
  cx.restore();
  // Soft ground oval underneath for grounding cue
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.beginPath();
  cx.ellipse(p.px + 6, p.py + 26, 16 * (1 - 0.25*Math.abs(p.bank||0)), 3.2, 0, 0, Math.PI*2);
  cx.fill();
  // LV MAX rainbow halo behind plane
  if (p.weaponMax > 0) {
    const t = frame * 0.3;
    for (let i = 0; i < 3; i++) {
      const ag = t + i * 2.094;
      cx.strokeStyle = `hsl(${(t*40+i*120)%360}, 100%, 65%)`;
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.ellipse(p.px, p.py, 24 + i*3, 30 + i*3, ag, 0, Math.PI * 1.4);
      cx.stroke();
    }
  }
  drawVectorPlane(skin[3], colors, cx, p.px, p.py, 1, false, p.bank || 0);
  // Vulnerability indicator: tiny red dot on cockpit head
  cx.fillStyle = `rgba(255, 60, 60, ${0.7 + Math.sin(frame*0.4)*0.3})`;
  cx.beginPath(); cx.arc(p.px, p.py - 12, 2.4, 0, Math.PI*2); cx.fill();
  cx.fillStyle = 'rgba(255,200,200,0.9)';
  cx.beginPath(); cx.arc(p.px, p.py - 12, 1, 0, Math.PI*2); cx.fill();
  if (p.shield>0) {
    cx.strokeStyle=`rgba(0,200,255,${0.4+Math.sin(frame*0.2)*0.3})`;
    cx.lineWidth=2;
    cx.beginPath(); cx.ellipse(p.px,p.py,22,28,0,0,Math.PI*2); cx.stroke();
  }
}

function updatePlayer(p, keys) {
  if (p.dead) {
    if (p.respawnTimer>0) p.respawnTimer--;
    if (p.respawnTimer===0&&p.lives>0) {
      p.dead=false;
      p.x=p.pNum===1?W*0.65:W*0.35; p.y=H-120;
      p.invTimer=120; p.shield=0;
    }
    return;
  }
  if (p.invTimer>0) p.invTimer--;
  if (p.shootTimer>0) p.shootTimer--;
  if (p.shield>0) p.shield--;
  // Lv MAX countdown — when it ends, weapon falls back to Lv5 (still maxed level)
  if (p.weaponMax > 0) {
    p.weaponMax--;
    if (p.weaponMax === 0) addFT('LV MAX 已结束', p.x, p.y-22, '#ffaaaa');
  }

  let dx=0,dy=0;
  if (p.pNum===1) {
    if (keys['ArrowLeft']) dx=-1;
    if (keys['ArrowRight']) dx=1;
    if (keys['ArrowUp']) dy=-1;
    if (keys['ArrowDown']) dy=1;
    // Mobile virtual joystick (P1 only)
    if (IS_MOBILE && joy.active) {
      dx = joy.dx;
      dy = joy.dy;
    }
  } else {
    if (keys['a']||keys['A']) dx=-1;
    if (keys['d']||keys['D']) dx=1;
    if (keys['w']||keys['W']) dy=-1;
    if (keys['s']||keys['S']) dy=1;
  }
  const sX = (typeof save.moveSensX === 'number') ? save.moveSensX : 1;
  const sY = (typeof save.moveSensY === 'number') ? save.moveSensY : 1;
  p.x+=dx*p.speed*sX; p.y+=dy*p.speed*sY;
  p.x=clamp(p.x,12,W-12); p.y=clamp(p.y,12,H-12);
  p.px=p.x|0; p.py=p.y|0;
  // Banking — eased toward current dx; gives wing-roll feel
  p.bank = (p.bank||0)*0.82 + dx*0.18;

  // Fire: P1 auto-fires (mobile + desktop); P2 keeps manual key J
  let fireKey;
  if (p.pNum===1) {
    fireKey = true;
  } else {
    fireKey = keys['j']||keys['J'];
  }
  if (fireKey&&p.shootTimer<=0) { fireBullet(p); SFX.shoot(p.weapon); }

  // Bomb: keyboard on desktop (P1 = Space, P2 = K); mobile uses double-tap
  if (!IS_MOBILE) {
    const bombKey=p.pNum===1?(keys[' ']||keys['Spacebar']):(keys['k']||keys['K']);
    if (bombKey&&!p._bombHeld&&p.bombs>0) {
      p._bombHeld=true; p.bombs--; doBomb(p); SFX.bomb();
    }
    if (!bombKey) p._bombHeld=false;
  }
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
function mkB(x,y,vx,vy,color,w,h,owner,dmg) {
  // Player bullets honor console multipliers; enemy/wingman bullets pass owner so we
  // only scale player-owned. (Wingman bullets count as player damage too.)
  const C = save.console || defaultConsole();
  const isPlayer = !!owner && (owner.pNum !== undefined);
  const finalDmg = (dmg || 10) * (isPlayer ? C.weaponDmgMul : 1);
  const sm = isPlayer ? C.bulletSpeedMul : 1;
  return {x, y, px:x|0, py:y|0,
          vx: vx*sm, vy: vy*sm,
          color, w, h, owner,
          dmg: finalDmg, alive:true};
}
function mkLaser(x,playerY,wl,owner) {
  return {x,y:0,px:x|0,py:0,vx:0,vy:0,color:'#ff2200',w:3+wl*2,h:playerY+12,
          owner,dmg:(4+wl*3)*0.5,alive:true,isLaserBeam:true,life:4,wl};
}

// ─── LV MAX FIRE FORMS — flashy & overpowered (5s) ──────────────────────────
function fireBulletMax(p) {
  const x=p.x, y=p.y;
  switch (p.weapon) {
    case 0: { // 标准炮 MAX → 三排齐射 + 中央白色加农
      for (let row=0; row<3; row++) {
        const ry = y - 8 - row*6;
        for (let i=-3;i<=3;i++) {
          bullets.push(mkB(x + i*9, ry, i*0.4, -14, i===0?'#ffffff':'#aaffff', 4, 8, p, 28));
        }
      }
      p.shootTimer = 2;
      break;
    }
    case 1: { // 散弹枪 MAX → 全角度满屏散弹
      const num = 17, spread = 1.5;
      for (let i=0;i<num;i++) {
        const t = (i/(num-1)-0.5)*2*spread;
        bullets.push(mkB(x, y-6, t*4.5, -9 + Math.abs(t)*-1.2, '#ff8800', 5, 6, p, 18));
      }
      for (let i=-2;i<=2;i++) bullets.push(mkB(x, y-12, i*1.2, -12, '#ffffff', 6, 8, p, 30));
      p.shootTimer = 5;
      break;
    }
    case 2: { // 激光炮 MAX → 7 道大型彩虹光柱
      for (let i=-3;i<=3;i++) {
        const lb = mkLaser(x + i*42, y, 5, p);
        lb.color = i===0 ? '#ffffff' : (i%2===0 ? '#ff44ff' : '#44ffff');
        lb.w = i===0 ? 9 : 6;
        lb.dmg = 12;
        bullets.push(lb);
      }
      p.shootTimer = 2;
      break;
    }
    case 3: { // 制导导弹 MAX → 7 枚紫色追踪弹
      for (let i=0;i<7;i++) {
        const off = (i-3)*10;
        const b = mkB(x+off, y-10, off*0.04, -8-(i%2), '#ff44ff', 6, 12, p, 80);
        b.homing = true; b.homingStr = 0.18; bullets.push(b);
      }
      p.shootTimer = 6;
      break;
    }
    case 4: { // 等离子炮 MAX → 巨型核心 + 卫星轨道弹
      bullets.push(mkB(x, y-12, 0, -6, '#ffffff', 26, 26, p, 220));
      for (let i=0;i<10;i++) {
        const ag = (i/10)*Math.PI*2 + frame*0.05;
        bullets.push(mkB(x, y, Math.cos(ag)*5, Math.sin(ag)*5-3, '#ff00ff', 8, 8, p, 35));
      }
      p.shootTimer = 5;
      break;
    }
    case 5: { // 闪电链 MAX → 5 道粗闪电
      for (let i=-2;i<=2;i++) {
        const b = mkB(x + i*12, y-10, i*0.18, -16, '#ffffff', 6, 18, p, 42);
        b.lightning = true;
        bullets.push(b);
      }
      p.shootTimer = 3;
      break;
    }
    case 6: { // 回旋镖 MAX → 8 道环绕回旋镖（持续到下一关）
      for (let i=0;i<8;i++) {
        const ag = (i/8)*Math.PI*2;
        const b = mkB(x, y, Math.cos(ag)*5, Math.sin(ag)*5-2, '#00ff88', 7, 7, p, 30);
        b.boomerang = true; b.bTimer = 0; b.boomerangSticky = true;
        bullets.push(b);
      }
      p.shootTimer = 8;
      break;
    }
    case 7: { // 波动炮 MAX → 7 路相位错开的正弦波
      for (let i=0;i<7;i++) {
        const ph = (i/6)*Math.PI*2;
        bullets.push({x,y,px:x|0,py:y|0,vx:0,vy:-12,color:'#ffffff',w:7,h:10,
          owner:p,dmg:48,alive:true,wave:true,wPhase:ph,wAmp:32,baseX:x});
      }
      p.shootTimer = 4;
      break;
    }
    case 8: { // 龙卷炮 MAX → 高密度旋风
      const n=18, baseAng = frame*0.25;
      for (let i=0;i<n;i++) {
        const ag = (i/n)*Math.PI*2 + baseAng;
        bullets.push(mkB(x, y, Math.cos(ag)*6, Math.sin(ag)*6-8, '#ff44ff', 6, 6, p, 26));
      }
      p.shootTimer = 3;
      break;
    }
    case 9: { // 冰晶炮 MAX → 冰风暴 + 巨型核心
      for (let i=0;i<14;i++) {
        const ag = (i/14)*Math.PI*2-Math.PI/2;
        const b = mkB(x, y, Math.cos(ag)*4.5, Math.sin(ag)*4.5-5, '#aaffff', 9, 9, p, 50);
        b.crystal = true; b.slowF = 0.97;
        bullets.push(b);
      }
      const big = mkB(x, y-12, 0, -3, '#ffffff', 22, 22, p, 220);
      big.crystal = true; big.slowF = 0.985;
      bullets.push(big);
      p.shootTimer = 6;
      break;
    }
  }
}

function fireBullet(p) {
  const x=p.x, y=p.y, wl=p.weaponLevel;
  const C = save.console || defaultConsole();
  const delays=[7,11,3,18,11,8,20,10,18,14];
  p.shootTimer=Math.max(1, Math.round((delays[p.weapon]-(wl-1)*1) * C.fireRateMul));

  // ─ LV MAX 超级形态 (5s) ─
  if (p.weaponMax > 0) {
    fireBulletMax(p);
    return;
  }

  switch(p.weapon) {
    case 0: { // 标准炮 - 5 levels, more barrels + speed
      bullets.push(mkB(x,y-12,0,-12,'#00ffff',3,7,p,14+wl*4));
      if(wl>=2){bullets.push(mkB(x-9,y-6,-.15,-12,'#00aaff',3,6,p,11));bullets.push(mkB(x+9,y-6,.15,-12,'#00aaff',3,6,p,11));}
      if(wl>=3){bullets.push(mkB(x-18,y,-.45,-11,'#0077ff',2,5,p,9));bullets.push(mkB(x+18,y,.45,-11,'#0077ff',2,5,p,9));}
      if(wl>=4){p.shootTimer=Math.max(1,p.shootTimer-1);}
      if(wl>=5){bullets.push(mkB(x-27,y,-.8,-10,'#44aaff',2,4,p,7));bullets.push(mkB(x+27,y,.8,-10,'#44aaff',2,4,p,7));}
      break;
    }
    case 1: { // 散弹枪 - spread, more pellets per level
      const num=3+wl*2, spread=0.7+wl*0.15;
      for(let i=0;i<num;i++){
        const t=num>1?(i/(num-1)-0.5)*2*spread:0;
        bullets.push(mkB(x,y-8,t*3.5,-9+Math.abs(t)*-.3,'#ff8800',3+Math.floor(wl/2),4,p,8+wl*3));
      }
      break;
    }
    case 2: { // 激光炮 - persistent beam
      const b=mkLaser(x,y,wl,p);
      bullets.push(b);
      if(wl>=3){bullets.push({...mkLaser(x-12,y,wl-1,p),color:'#ff4400'});bullets.push({...mkLaser(x+12,y,wl-1,p),color:'#ff4400'});}
      if(wl>=5){bullets.push({...mkLaser(x-24,y,wl-2,p),color:'#ff6600'});bullets.push({...mkLaser(x+24,y,wl-2,p),color:'#ff6600'});}
      p.shootTimer=3;
      break;
    }
    case 3: { // 制导导弹 - homing, more missiles per level
      const mCount=Math.min(1+Math.floor(wl/2)*2,5);
      const xOffsets=[-18,-8,0,8,18].slice(0,mCount).map((v,i,a)=>a[i]-(a[a.length-1]+a[0])/2);
      for(let i=0;i<mCount;i++){
        const b=mkB(x+(xOffsets[i]||0)*0.7,y-10,(xOffsets[i]||0)*0.06,-7-(i%2),'#ffcc00',4,8,p,22+wl*6);
        b.homing=true; b.homingStr=0.07+wl*0.015; bullets.push(b);
      }
      break;
    }
    case 4: { // 等离子炮 - large orbs
      const sz=8+wl*2;
      bullets.push(mkB(x,y-10,0,-7,'#cc00ff',sz,sz,p,28+wl*10));
      if(wl>=2){bullets.push(mkB(x-14,y-4,-.4,-7,'#aa00dd',sz-3,sz-3,p,18+wl*4));bullets.push(mkB(x+14,y-4,.4,-7,'#aa00dd',sz-3,sz-3,p,18+wl*4));}
      if(wl>=4){for(let i=0;i<6;i++){const ag=(i/6)*Math.PI*2;bullets.push(mkB(x,y,Math.cos(ag)*4,Math.sin(ag)*4-5,'#dd44ff',5,5,p,10+wl*2));}}
      if(wl>=5){bullets.push(mkB(x,y-10,0,-4,'#ffffff',sz+4,sz+4,p,50));}
      break;
    }
    case 5: { // 闪电链 - chain lightning bolts
      const lCount=1+wl;
      for(let i=0;i<lCount;i++){
        const ox=(i-(lCount-1)/2)*9;
        const b=mkB(x+ox,y-10,ox*.04,-13+Math.abs(ox)*.03,'#88ffff',3,12,p,16+wl*5);
        b.lightning=true; bullets.push(b);
      }
      break;
    }
    case 6: { // 回旋镖 - 持续整关，下关清除
      const bCount=Math.ceil(wl/2);
      for(const s of[-1,1]){
        for(let i=0;i<bCount;i++){
          const b=mkB(x,y-8,s*(3+i*1.2),-9+i*.3,'#00ff88',5,5,p,13+wl*4);
          b.boomerang=true; b.bTimer=0; b.boomerangSticky=true;
          bullets.push(b);
        }
      }
      if(wl===5) {
        const bb = mkB(x,y-14,0,-12,'#00ffaa',6,6,p,20);
        bb.boomerang=true; bb.bTimer=0; bb.boomerangSticky=true;
        bullets.push(bb);
      }
      break;
    }
    case 7: { // 波动炮 - sinusoidal wave shots [NEW]
      const wCount=Math.min(wl,5);
      for(let i=0;i<wCount;i++){
        const ph=(i/Math.max(wCount-1,1))*Math.PI*1.5;
        const b={x,y,px:x|0,py:y|0,vx:0,vy:-10,color:'#00ddff',w:5,h:7,
                 owner:p,dmg:13+wl*4,alive:true,wave:true,wPhase:ph,wAmp:10+wl*2,baseX:x};
        bullets.push(b);
      }
      if(wl>=4) bullets.push(mkB(x,y-10,0,-14,'#66eeff',3,8,p,18+wl*4));
      break;
    }
    case 8: { // 龙卷炮 - tornado spiral rings [NEW]
      const rings=1+Math.floor(wl/2);
      for(let r=0;r<rings;r++){
        const n=8, baseAng=frame*0.15+r*(Math.PI/8);
        for(let i=0;i<n;i++){
          const ag=(i/n)*Math.PI*2+baseAng;
          bullets.push(mkB(x,y,Math.cos(ag)*4.5,Math.sin(ag)*4.5-10,'#ff44ff',4,4,p,10+wl*3+r*4));
        }
      }
      break;
    }
    case 9: { // 冰晶炮 - slow spreading ice crystals [NEW]
      const cCount=4+wl*2;
      for(let i=0;i<cCount;i++){
        const ag=(i/cCount)*Math.PI*2-Math.PI/2;
        const spd=4.5+wl;
        const b=mkB(x,y,Math.cos(ag)*spd*.55,(Math.sin(ag)*spd*.55)-5.5,'#aaeeff',5+wl,5+wl,p,20+wl*6);
        b.crystal=true; b.slowF=0.96; bullets.push(b);
      }
      if(wl>=5){const b=mkB(x,y-10,0,-3,'#ffffff',14,14,p,90);b.crystal=true;b.slowF=0.98;bullets.push(b);}
      break;
    }
  }
}

function updateBullets() {
  for(const b of bullets) {
    if(!b.alive) continue;
    if(b.isLaserBeam){b.life--;if(b.life<=0)b.alive=false;continue;}
    if(b.wave){b.wPhase+=0.2;b.x=b.baseX+Math.sin(b.wPhase)*b.wAmp;b.px=b.x|0;}
    if(b.crystal){b.vx*=b.slowF;b.vy*=b.slowF;if(Math.abs(b.vx)<0.15&&Math.abs(b.vy)<0.15){b.alive=false;continue;}}
    if(b.homing){
      // Pick the NEAREST visible enemy; fall back to boss
      let tgt = null, bestD = Infinity;
      for (const e of enemies) {
        if (!e.alive || e.y < -10 || e.y > H+10) continue;
        const dx = e.x - b.x, dy = e.y - b.y;
        const d = dx*dx + dy*dy;
        if (d < bestD) { bestD = d; tgt = e; }
      }
      if (!tgt && boss && boss.alive) tgt = boss;
      if (tgt) {
        const dx = tgt.x - b.x, dy = tgt.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        // Boost steering strength so missiles can fully reverse direction
        const str = (b.homingStr || 0.07) * 1.6;
        b.vx += dx/d * str;
        b.vy += dy/d * str;
        const sp = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        if (sp > 12) { b.vx = b.vx/sp*12; b.vy = b.vy/sp*12; }
      }
    }
    if(b.boomerang){
      if (b.boomerangSticky) {
        // Bounce off screen edges, never die — cleared at level change
        if (b.x < 12 && b.vx < 0) b.vx = -b.vx;
        if (b.x > W-12 && b.vx > 0) b.vx = -b.vx;
        if (b.y < 12 && b.vy < 0) b.vy = -b.vy;
        if (b.y > H-12 && b.vy > 0) b.vy = -b.vy;
      } else {
        b.bTimer++; if(b.bTimer>22) b.vx*=0.91;
        if(b.bTimer>32){b.vy=Math.abs(b.vy)*.25;}
      }
    }
    b.x+=b.vx; b.y+=b.vy;
    b.px=b.x|0; b.py=b.y|0;
    if (!b.boomerangSticky && (b.x<-40||b.x>W+40||b.y<-40||b.y>H+40)) b.alive=false;
  }
  bullets=bullets.filter(b=>b.alive);
}

function updateEnemyBullets() {
  for(const b of enemyBullets){b.x+=b.vx;b.y+=b.vy;b.px=b.x|0;b.py=b.y|0;if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+20)b.alive=false;}
  enemyBullets=enemyBullets.filter(b=>b.alive);
}

function drawBullets() {
  for(const b of bullets) {
    if (b.px < -20 || b.px > W+20 || b.py < -40 || b.py > H+20) continue;
    if(b.isLaserBeam) {
      const alpha=b.life/5;
      const lg=cx.createLinearGradient(b.px-b.w*3,0,b.px+b.w*3,0);
      lg.addColorStop(0,'transparent'); lg.addColorStop(.5,b.color+'88'); lg.addColorStop(1,'transparent');
      cx.fillStyle=lg; cx.fillRect(b.px-b.w*3,0,b.w*6,b.h);
      cx.fillStyle=b.color+'cc'; cx.fillRect(b.px-b.w/2,0,b.w,b.h);
      cx.fillStyle='rgba(255,255,255,0.6)'; cx.fillRect(b.px-1,0,2,b.h);
      continue;
    }
    if(b.wave||b.crystal||b.homing) {
      const rg=cx.createRadialGradient(b.px,b.py,0,b.px,b.py,b.w*1.8);
      rg.addColorStop(0,'#ffffffcc'); rg.addColorStop(.4,b.color); rg.addColorStop(1,b.color+'00');
      cx.fillStyle=rg; cx.beginPath(); cx.arc(b.px,b.py,b.w*1.8,0,Math.PI*2); cx.fill();
      continue;
    }
    if(b.lightning) {
      cx.strokeStyle=b.color; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(b.px,b.py);
      for(let s=0;s<3;s++) cx.lineTo(b.px+rnd(-4,4),(b.py-b.h/2)+s*(b.h/2));
      cx.stroke();
      cx.fillStyle=b.color+'aa'; cx.beginPath(); cx.arc(b.px,b.py,4,0,Math.PI*2); cx.fill();
      continue;
    }
    // Normal bullets with glow
    cx.fillStyle=b.color+'44'; cx.fillRect((b.px-b.w)|0,(b.py-b.h)|0,b.w*2,b.h*2);
    cx.fillStyle=b.color; cx.fillRect((b.px-b.w/2)|0,(b.py-b.h/2)|0,b.w,b.h);
  }
}

function drawEnemyBullets() {
  for(const b of enemyBullets) {
    if (b.px < -20 || b.px > W+20 || b.py < -20 || b.py > H+20) continue;
    const rg=cx.createRadialGradient(b.px,b.py,0,b.px,b.py,7);
    rg.addColorStop(0,'#ffaa44'); rg.addColorStop(.4,b.color||'#ff4400'); rg.addColorStop(1,(b.color||'#ff4400')+'00');
    cx.fillStyle=rg; cx.beginPath(); cx.arc(b.px,b.py,7,0,Math.PI*2); cx.fill();
    cx.fillStyle='#ffeeaa'; cx.beginPath(); cx.arc(b.px,b.py,2,0,Math.PI*2); cx.fill();
    if (b.cancelable) {
      // Pulsing white outline marks "shootable" hazard
      cx.strokeStyle = `rgba(255,255,255,${0.45+Math.sin(frame*0.2)*0.35})`;
      cx.lineWidth = 1.5;
      cx.beginPath(); cx.arc(b.px, b.py, 9, 0, Math.PI*2); cx.stroke();
      if (b.kind === 'mine') {
        cx.strokeStyle = '#ffffff'; cx.lineWidth = 1;
        cx.beginPath();
        cx.moveTo(b.px-3, b.py); cx.lineTo(b.px+3, b.py);
        cx.moveTo(b.px, b.py-3); cx.lineTo(b.px, b.py+3);
        cx.stroke();
      }
    }
  }
}

function doBomb(p) {
  bombFlash=22;
  triggerShake(10, 22);
  // Clear all small enemies entirely
  for(const e of enemies){
    if(!e.alive) continue;
    spawnExplosion(e.x,e.y,'large');
    e.hp = 0;
    killEnemy(e);
  }
  // Boss takes ~1/3 of MAX hp
  if(boss&&boss.alive){
    const dmg = Math.ceil(boss.maxHp / 3);
    boss.hp -= dmg;
    spawnExplosion(boss.x,boss.y,'huge');
    addFT('-'+dmg, boss.x, boss.y-30, '#ffff44');
    if(boss.hp<=0) killBoss();
  }
  // Wipe enemy bullets
  for(const b of enemyBullets) b.alive=false;
}

// ─── ENEMIES (20 types) ──────────────────────────────────────────────────────
const ENEMY_CFG = {
  basic:    {hp:20, spd:1.5,pts:100,w:20,h:18,col:'#ff4444',cv:1},
  zigzag:   {hp:30, spd:2,  pts:150,w:18,h:16,col:'#ff8800',cv:2},
  bomber:   {hp:60, spd:1,  pts:300,w:28,h:22,col:'#aa44ff',cv:3},
  gunship:  {hp:80, spd:1.2,pts:250,w:30,h:24,col:'#44aaff',cv:2},
  tank:     {hp:150,spd:0.7,pts:400,w:36,h:28,col:'#44ff44',cv:4},
  speeder:  {hp:15, spd:3.5,pts:80, w:14,h:12,col:'#ffff00',cv:1},
  carrier:  {hp:200,spd:0.5,pts:600,w:50,h:40,col:'#ff44aa',cv:5},
  // Additional 13 types
  dart:     {hp:18, spd:3,  pts:90, w:14,h:18,col:'#ffaaaa',cv:1},
  saucer:   {hp:60, spd:0.9,pts:280,w:30,h:18,col:'#aaffaa',cv:2},
  scout:    {hp:10, spd:4.2,pts:60, w:12,h:12,col:'#ffffaa',cv:1},
  sniper:   {hp:80, spd:0.4,pts:320,w:24,h:24,col:'#ff66ff',cv:2},
  mortar:   {hp:50, spd:0.6,pts:240,w:24,h:22,col:'#cc8855',cv:2},
  swarmlet: {hp:8,  spd:2.6,pts:40, w:10,h:10,col:'#ff77aa',cv:1},
  hive:     {hp:140,spd:0.7,pts:480,w:36,h:30,col:'#cc44ff',cv:4},
  turret:   {hp:120,spd:0.0,pts:280,w:24,h:24,col:'#888888',cv:2},
  stealth:  {hp:35, spd:1.6,pts:220,w:22,h:18,col:'#553388',cv:2},
  splitter: {hp:50, spd:1.1,pts:240,w:24,h:22,col:'#88ddff',cv:2},
  minelayer:{hp:90, spd:0.7,pts:330,w:26,h:22,col:'#aaaa44',cv:3},
  jet:      {hp:25, spd:5,  pts:110,w:14,h:22,col:'#88ccff',cv:1},
  elite:    {hp:260,spd:0.9,pts:700,w:38,h:32,col:'#ff2244',cv:5},
};

function mkEnemy(type, x, y) {
  const c=ENEMY_CFG[type]||ENEMY_CFG.basic;
  const diff=getDiff();
  const C = save.console || defaultConsole();
  const sp = c.spd*(0.7+level*0.03)*C.enemySpeedMul;
  return {
    type,x,y,px:x|0,py:y|0,
    hp:c.hp*diff.hpMult, maxHp:c.hp*diff.hpMult,
    speed:sp, pts:c.pts, w:c.w, h:c.h, col:c.col, cv:c.cv,
    alive:true, moveTimer:0, vx:rnd(-1,1), vy:sp,
    splitChild:false,
  };
}

function updateEnemy(e) {
  if(!e.alive) return;
  e.moveTimer++;
  // Density relief: in endless mode, scale firing intervals up; console also multiplies
  const C = save.console || defaultConsole();
  const fireMul = (endlessMode ? 1.6 : 1.0) * C.enemyFireRateMul;
  switch(e.type) {
    case 'basic':   e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.03)*0.5; break;
    case 'zigzag':  e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.08)*3; break;
    case 'bomber':
      e.y+=e.speed*0.7;
      if(e.moveTimer%((90*fireMul)|0)===0) fireEB(e,0,3);
      break;
    case 'gunship':
      e.y+=e.speed*0.5; e.x+=Math.sin(e.moveTimer*0.04)*2;
      if(e.moveTimer%((65*fireMul)|0)===0){fireEB(e,-1,3);fireEB(e,1,3);}
      break;
    case 'tank':
      e.y+=e.speed*0.4;
      if(e.moveTimer%((75*fireMul)|0)===0) for(let i=-2;i<=2;i++) fireEB(e,i*0.8,3);
      break;
    case 'speeder':
      e.y+=e.speed; e.x+=e.vx;
      if(e.x<10||e.x>W-10) e.vx*=-1;
      break;
    case 'carrier':
      e.y+=e.speed*0.3; e.x+=Math.sin(e.moveTimer*0.02)*1.5;
      if(e.moveTimer%((50*fireMul)|0)===0){fireEB(e,-2,3);fireEB(e,0,3);fireEB(e,2,3);}
      if(e.moveTimer%160===0) enemies.push(mkEnemy('speeder',e.x+rnd(-30,30),e.y+10));
      break;
    case 'dart':
      // Steep dive; one fast bullet
      e.y+=e.speed*1.2;
      if(e.moveTimer===28) fireEB(e,0,4.2);
      break;
    case 'saucer':
      // Sweeps horizontally; shoots ring
      e.y+=e.speed*0.5; e.x+=Math.cos(e.moveTimer*0.06)*2.5;
      if(e.moveTimer%((100*fireMul)|0)===0)
        for(let i=0;i<6;i++){
          const ag=(i/6)*Math.PI*2 + e.moveTimer*0.02;
          enemyBullets.push({x:e.x,y:e.y,px:e.x|0,py:e.y|0,vx:Math.cos(ag)*2.4,vy:Math.sin(ag)*2.4,alive:true,color:'#aaffaa'});
        }
      break;
    case 'scout':
      // Fast rammer, no shoot
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.12)*2.5;
      break;
    case 'sniper':
      // Glide to top zone, then aimed laser-like burst
      e.y+=e.speed; if(e.y>110) e.y=110;
      if(e.moveTimer%((140*fireMul)|0)===90) fireEB(e,0,4.5);
      break;
    case 'mortar':
      // Lobs slow arcing shells — can be shot down (cancelable)
      e.y+=e.speed*0.6;
      if(e.moveTimer%((90*fireMul)|0)===0)
        for(let i=-1;i<=1;i++) {
          const t=players.find(p=>!p.dead);
          const tx=t?t.x:W/2;
          const dx=(tx-e.x)/60;
          enemyBullets.push(mkEBSpecial(e.x, e.y, dx+i*0.6, 1.5, '#cc8855', 2, 'shell'));
        }
      break;
    case 'swarmlet':
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.18+e.x*0.03)*2;
      break;
    case 'hive':
      e.y+=e.speed*0.4;
      if(e.moveTimer%180===0) {
        for(let i=-1;i<=1;i++) {
          if (enemies.length<60) enemies.push(mkEnemy('swarmlet',e.x+i*16,e.y+18));
        }
      }
      break;
    case 'turret':
      // Stationary; descends to fixed Y then fires sweep
      if(e.y<80) e.y+=1.2;
      if(e.moveTimer%((45*fireMul)|0)===0) {
        const ag = (e.moveTimer*0.05) % (Math.PI*2);
        for(const a of [ag, ag+Math.PI*0.66, ag+Math.PI*1.33])
          enemyBullets.push({x:e.x,y:e.y,px:e.x|0,py:e.y|0,vx:Math.cos(a)*2.6,vy:Math.sin(a)*2.6+1,alive:true,color:'#ddccaa'});
      }
      break;
    case 'stealth':
      // Fades visibility periodically
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.05)*1.5;
      if(e.moveTimer%((110*fireMul)|0)===0) fireEB(e,0,3.4);
      break;
    case 'splitter':
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.04)*1.5;
      if(e.moveTimer%((80*fireMul)|0)===0) fireEB(e,0,3);
      break;
    case 'minelayer':
      e.y+=e.speed*0.6;
      if(e.moveTimer%((70*fireMul)|0)===0) {
        // Drop slow-falling MINES — can be shot down by player
        enemyBullets.push(mkEBSpecial(e.x, e.y+10, rnd(-.5,.5), 0.9, '#ffff66', 4, 'mine'));
      }
      break;
    case 'jet':
      e.y+=e.speed; // pure speed, no shooting
      break;
    case 'elite':
      e.y+=e.speed*0.5; e.x+=Math.sin(e.moveTimer*0.03)*2;
      if(e.moveTimer%((55*fireMul)|0)===0)
        for(let i=-2;i<=2;i++) fireEB(e,i*0.7,2.6);
      if(e.moveTimer%((180*fireMul)|0)===0) {
        for(let a=0;a<8;a++){
          const ag=(a/8)*Math.PI*2;
          enemyBullets.push({x:e.x,y:e.y,px:e.x|0,py:e.y|0,vx:Math.cos(ag)*2.4,vy:Math.sin(ag)*2.4,alive:true,color:'#ff66aa'});
        }
      }
      break;
  }
  e.x=clamp(e.x,e.w/2,W-e.w/2);
  e.px=e.x|0; e.py=e.y|0;
  if(e.y>H+60) e.alive=false;
}

function fireEB(e, dvx, dvy) {
  const t=players.find(p=>!p.dead);
  const sm=getDiff().bulletSpd;
  let vx=dvx*sm, vy=dvy*sm;
  if(t){const dx=t.x-e.x,dy=t.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;vx+=dx/d*(1+sm*0.8);vy+=dy/d*(1+sm*0.8);}
  enemyBullets.push({x:e.x,y:e.y+e.h/2,px:e.x|0,py:(e.y+e.h/2)|0,vx,vy,alive:true,color:'#ff4400'});
}
// Cancelable enemy bullet (mines / homing missiles): can be shot down by player
function mkEBSpecial(x, y, vx, vy, color, hp, kind) {
  return {x, y, px:x|0, py:y|0, vx, vy, alive:true,
          color: color || '#ffff66', cancelable:true, hp: hp||3, kind: kind||'mine'};
}

function drawEnemy(e) {
  if(!e.alive) return;
  const x=e.px, y=e.py;
  // Off-screen cull — skip work entirely
  if (x < -e.w || x > W + e.w || y < -e.h || y > H + e.h) return;
  // Track horizontal velocity for banking
  if (typeof e.lastX !== 'number') e.lastX = e.x;
  const dxDelta = e.x - e.lastX;
  e.lastX = e.x;
  e.bank = clamp((e.bank||0)*0.7 + dxDelta*0.18, -1, 1);
  // Shape-aware shadow: body silhouette + two wing blobs offset down/right
  cx.save();
  cx.globalAlpha = 0.30;
  cx.translate(x + 5, y + 10);
  if (e.bank) {
    cx.rotate(e.bank * 0.15);
    cx.scale(1 - 0.22*Math.abs(e.bank), 1);
  }
  cx.fillStyle = '#000010';
  // Body shadow
  cx.beginPath();
  cx.ellipse(0, 0, e.w*0.32, e.h*0.5, 0, 0, Math.PI*2); cx.fill();
  // Wing shadows
  cx.beginPath();
  cx.ellipse(-e.w*0.32, e.h*0.05, e.w*0.22, e.h*0.18, 0.18, 0, Math.PI*2); cx.fill();
  cx.beginPath();
  cx.ellipse( e.w*0.32, e.h*0.05, e.w*0.22, e.h*0.18,-0.18, 0, Math.PI*2); cx.fill();
  cx.restore();
  // Tight ground oval
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.beginPath();
  cx.ellipse(x + 5, y + e.h*0.55 + 2, e.w*0.42*(1-0.25*Math.abs(e.bank)), 3, 0, 0, Math.PI*2);
  cx.fill();
  cx.save(); cx.translate(x, y);
  // Banking transform
  if (e.bank) {
    cx.rotate(e.bank * 0.15);
    cx.scale(1 - 0.22*Math.abs(e.bank), 1);
  }
  const rg=cx.createRadialGradient(0,-e.h*0.15,2,0,0,e.w*0.65);
  rg.addColorStop(0,'#ffffffaa'); rg.addColorStop(0.3,e.col); rg.addColorStop(1,e.col+'22');

  // Engine exhaust at top (rear of plane flying downward)
  const eg=cx.createRadialGradient(0,-e.h*.4,1,0,-e.h*.4,9);
  eg.addColorStop(0,'#ff8844cc'); eg.addColorStop(1,'transparent');
  cx.fillStyle=eg; cx.beginPath(); cx.arc(0,-e.h*.4,9,0,Math.PI*2); cx.fill();

  switch(e.type) {
    case 'basic': {

      cx.fillStyle=rg; // body
      cx.beginPath(); cx.moveTo(0,e.h*.55); cx.lineTo(-e.w*.18,e.h*.1); cx.lineTo(-e.w*.15,-e.h*.5); cx.lineTo(e.w*.15,-e.h*.5); cx.lineTo(e.w*.18,e.h*.1); cx.closePath(); cx.fill();
      // Panel lines + outline for HD feel
      cx.strokeStyle='rgba(0,0,0,0.55)'; cx.lineWidth=0.8;
      cx.beginPath();
      cx.moveTo(0,-e.h*.5); cx.lineTo(0,e.h*.55);
      cx.moveTo(-e.w*.16,-e.h*.05); cx.lineTo(e.w*.16,-e.h*.05);
      cx.stroke();
      // Wing-tip lights
      cx.fillStyle='#ff4444'; cx.fillRect(-e.w*.5,-e.h*.16,2,1.5);

      cx.beginPath(); cx.ellipse(0,e.h*.2,2.6,4.5,0,0,Math.PI*2); cx.fill();

      // armor lines (multi-segment plating)
      cx.strokeStyle='rgba(0,0,0,.5)'; cx.lineWidth=1;
      cx.beginPath(); cx.moveTo(-e.w*.5,-e.h*.2); cx.lineTo(e.w*.5,-e.h*.2); cx.stroke();
      cx.beginPath(); cx.moveTo(-e.w*.5, e.h*.1); cx.lineTo(e.w*.5, e.h*.1); cx.stroke();
      cx.beginPath(); cx.moveTo(0,-e.h*.5); cx.lineTo(0,e.h*.5); cx.stroke();
      // Twin cannons
      cx.fillStyle='#220011';
      cx.fillRect(-e.w*.32,-e.h*.6,5,e.h*.4);
      cx.fillRect(e.w*.27,-e.h*.6,5,e.h*.4);
      cx.fillStyle='#ff8800';
      cx.fillRect(-e.w*.32,-e.h*.62,5,1.5);
      cx.fillRect(e.w*.27,-e.h*.62,5,1.5);
      // Wing extensions
      cx.fillStyle=e.col+'66';
      cx.beginPath(); cx.moveTo(-e.w*.5,-e.h*.1); cx.lineTo(-e.w*.85,e.h*.2); cx.lineTo(-e.w*.5,e.h*.3); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(e.w*.5,-e.h*.1); cx.lineTo(e.w*.85,e.h*.2); cx.lineTo(e.w*.5,e.h*.3); cx.closePath(); cx.fill();
      cx.fillStyle=e.col;
      cx.beginPath(); cx.moveTo(-e.w*.5,-e.h*.05); cx.lineTo(-e.w*.78,e.h*.18); cx.lineTo(-e.w*.5,e.h*.25); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(e.w*.5,-e.h*.05); cx.lineTo(e.w*.78,e.h*.18); cx.lineTo(e.w*.5,e.h*.25); cx.closePath(); cx.fill();
      // Cockpit
      cx.fillStyle='rgba(255,80,120,.85)';
      cx.beginPath(); cx.ellipse(0,-e.h*.1,4.5,5,0,0,Math.PI*2); cx.fill();
      cx.strokeStyle='rgba(0,0,0,0.6)'; cx.lineWidth=0.7; cx.stroke();
      // Centerpiece pulse light
      cx.fillStyle='#ffffff';
      cx.beginPath(); cx.arc(0,e.h*.18,1.6,0,Math.PI*2); cx.fill();
      break;
    }
  }
  cx.restore();
  // Health bar
  if(e.hp<e.maxHp){
    const hbx=x-e.w/2, hby=y-e.h/2-6;
    const hr=e.hp/e.maxHp;
    cx.fillStyle='#220000'; cx.fillRect(hbx|0,hby|0,e.w,3);
    cx.fillStyle=hr>.5?'#00ff44':hr>.25?'#ffcc00':'#ff2200';
    cx.fillRect(hbx|0,hby|0,(e.w*hr)|0,3);
  }
}

  {name:'金牛·陶罗斯',  color:'#aa6633', acc:'#ffcc88', hp:1300},
  {name:'双子·杰米尼',  color:'#88ccff', acc:'#ffff88', hp:1500},
  {name:'巨蟹·坎瑟尔',  color:'#ff66cc', acc:'#ffccff', hp:1700},
  {name:'狮子·利奥',    color:'#ffcc44', acc:'#ff8800', hp:1900},
  {name:'处女·维戈',    color:'#aaffaa', acc:'#ffffff', hp:2100},
  {name:'天秤·利布拉',  color:'#ddaaff', acc:'#ffeeff', hp:2300},
  {name:'天蝎·斯科皮奥',color:'#cc2244', acc:'#ff4488', hp:2500},
  {name:'射手·萨吉塔',  color:'#ff8866', acc:'#ffcc44', hp:2700},
