      if(Math.abs(b.x-e.x)<(b.w/2+e.w/2)&&Math.abs(b.y-e.y)<(b.h/2+e.h/2)) {
        applyRuneOnHit(e, b);
        e.hp-=b.dmg; b.alive=false; SFX.hitEnemy();
        if(e.hp<=0) killEnemy(e);
        break;
      }
    }
    if(!b.alive) continue;
    // Player bullets can shoot down cancelable enemy bullets (mines, shells)
    for(const eb of enemyBullets) {
      if(!eb.alive || !eb.cancelable) continue;
      if(Math.abs(b.x-eb.x)<8 && Math.abs(b.y-eb.y)<8) {
        eb.hp = (eb.hp||1) - b.dmg;
        b.alive = false;
        if (eb.hp<=0) { eb.alive = false; spawnExplosion(eb.x, eb.y, 'small'); SFX.hitEnemy(); }
        break;
      }
    }
    if(!b.alive) continue;
    if(boss&&boss.alive&&Math.abs(b.x-boss.x)<44&&Math.abs(b.y-boss.y)<34) {
      applyRuneOnHit(boss, b);
      boss.hp-=b.dmg; b.alive=false; SFX.hitEnemy(); bossModeRollPickup();
      if(boss.hp<=0) killBoss();
    }
    if (b.alive && boss2 && boss2.alive && Math.abs(b.x - boss2.x) < 44 && Math.abs(b.y - boss2.y) < 34) {
      applyRuneOnHit(boss2, b);
      boss2.hp -= b.dmg; b.alive = false; SFX.hitEnemy(); bossModeRollPickup();
      if (boss2.hp <= 0) {
        const _o = boss; boss = boss2; boss._isSecondary = true; killBoss();
        if (!boss || !boss.alive) boss2 = null; else boss2 = boss;
        boss = _o;
      }
    }
  }
  for(const p of players) {
    if(p.dead||p.invTimer>0||invincible) continue;
    // Hit zone is the cockpit red-dot only — small area at p.x, p.y-12
    const hcx = p.x, hcy = p.y - 12, hr = 4;
    for(const b of enemyBullets) {
      if(!b.alive) continue;
      const dx = b.x - hcx, dy = b.y - hcy;
      if (dx*dx + dy*dy < hr*hr + 9) { b.alive=false; hitPlayer(p); break; }
    }
    for(const e of enemies) {
      if(!e.alive) continue;
      const dx = e.x - hcx, dy = e.y - hcy;
      // ramming damage uses cockpit dot vs enemy body
      if (Math.abs(dx) < e.w/2 && Math.abs(dy) < e.h/2) {
        hitPlayer(p); e.hp -= 30; if(e.hp<=0) killEnemy(e); break;
      }
    }
    if(boss&&boss.alive){
      const dx=boss.x-hcx, dy=boss.y-hcy;
      if (Math.abs(dx)<48 && Math.abs(dy)<38) hitPlayer(p);
    }
    if (boss2 && boss2.alive) {
      const dx2 = boss2.x - hcx, dy2 = boss2.y - hcy;
      if (Math.abs(dx2) < 48 && Math.abs(dy2) < 38) hitPlayer(p);
    }
  }
}

function hitPlayer(p) {
  if(p.invTimer>0) return;
  // Dodge rune — full evasion roll happens BEFORE shields/lives consume.
  if (isRuneEquipped('dodge') && Math.random() < runeProb('dodge')) {
    p.invTimer = 14;
    addFT('💨 闪避', p.x, p.y - 14, '#aaffee');
    SFX.hitPlayer();
    return;
  }
  if(p.shield>0){
    p.shieldHits=(p.shieldHits||1)-1;
    if(p.shieldHits<=0){p.shield=0;p.shieldHits=0;}
    else p.invTimer=20;
    SFX.hitPlayer(); return;
  }
  SFX.hitPlayer(); p.lives--;
  triggerShake(7, 14);
  // Damage drops weapon level by 1
  if (p.weaponLevel > 1) {
    p.weaponLevel--;
    addFT('武器降级!',p.x,p.y-20,'#ff8888');
  }
  // (Wingmen no longer degrade on damage — they persist with their levels)
  spawnExplosion(p.x,p.y,'medium');
  if(p.lives<=0){p.dead=true;p.lives=0;spawnExplosion(p.x,p.y,'large');checkGameOver();}
  else{p.dead=true;p.respawnTimer=120;}
}

let deathTimer = 0;          // counts down from 600 frames (10s @ 60fps)
let deathReviveCost = 1;     // diamonds

function checkGameOver() {
  if(players.every(p=>p.lives<=0)) {
    setTimeout(()=>{
      finalScore=score;
      stopBGM();
      deathTimer = 600;       // 10 seconds
      screen='death';
    },1000);
  }
}

function doRevive() {
  // Costs 1 diamond from session pool, fallback to save bank
  if (sessionDiamonds + save.diamonds < deathReviveCost) return false;
  if (sessionDiamonds >= deathReviveCost) sessionDiamonds -= deathReviveCost;
  else { const need = deathReviveCost - sessionDiamonds; sessionDiamonds = 0; save.diamonds -= need; writeSave(); }
  // Restore player(s) — revive grants console-configured bomb count
  const C = save.console || defaultConsole();
  for (const p of players) {
    p.lives = C.playerLives; p.dead = false; p.respawnTimer = 0;
    p.invTimer = Math.max(30, Math.round((C.reviveInvSec || 3) * 60));
    p.shield = 240; p.shieldHits = 3;
    p.x = p.pNum===1 ? W*0.65 : W*0.35; p.y = H-120;
    p.bombs = C.reviveBombs;
  }
  // Wipe field hazards
  enemyBullets.length = 0;
  for (const e of enemies) e.alive = false;
  enemies = enemies.filter(e=>e.alive);
  bombFlash = 25;
  screen = 'game';
  if (bgmEnabled) startBGM();
  SFX.pickupLife();
}

function killEnemy(e) {
  if(!e.alive) return;
  // Exploder — entering kill state starts a 2s fuse instead of dying.
  // The actual `alive=false` happens in the fuse-tick branch in updateEnemy.
  if (e.type === 'exploder' && !e.fuse) {
    e.fuse = 120;       // 2 seconds @ 60fps
    e.hp = 1;           // keep it "alive" for the fuse window
    killCount++;
    addFT('!倒计时!', e.x, e.y - 12, '#ffcc44');
    SFX.bossAppear();   // tense sting
    return;
  }
  e.alive=false; score+=e.pts; killCount++;
  spawnExplosion(e.x,e.y,e.type==='carrier'||e.type==='tank'||e.type==='elite'?'large':'medium');
  addFT('+'+e.pts,e.x,e.y,'#ffffff');
  // Auto-credit coins (no physical drops)
  const cvBase={basic:8,zigzag:12,bomber:25,gunship:20,tank:40,speeder:6,carrier:50,
            dart:8,saucer:22,scout:5,sniper:24,mortar:20,swarmlet:3,hive:36,
            turret:24,stealth:18,splitter:18,minelayer:26,jet:9,elite:55}[e.type]||8;
  const C = save.console || defaultConsole();
  const cv = Math.max(1, Math.round(cvBase * C.coinMul));
  sessionCoins += cv;
  score += cv;
  addFT('🪙+'+cv, e.x+10, e.y, '#ffcc00');
  SFX.pickupCoin();
  // Splitter pops into 2 smaller mobs (only the original parent splits)
  if (e.type==='splitter' && !e.splitChild) {
    for (const dx of [-12,12]) {
      const c = mkEnemy('swarmlet', e.x+dx, e.y);
      c.splitChild = true; c.hp *= 0.6; c.maxHp = c.hp;
      enemies.push(c);
    }
  }
  // Power-up drops (console-tunable multiplier)
  const dropMul = clamp(C.dropRateMul || 1, 0, 5);
  const dr = Math.random() / dropMul;
  if(dr<0.10)       spawnPickup(e.x,e.y,'weapon',rndInt(0,9));
  else if(dr<0.22)  spawnPickup(e.x,e.y,'star',1);
  else if(dr<0.27)  spawnPickup(e.x,e.y,'life',1);
  else if(dr<0.32)  spawnPickup(e.x,e.y,'bomb',1);
  else if(dr<0.40)  spawnPickup(e.x,e.y,'wingman', rollWingmanType());
  else if(dr<0.45)  spawnPickup(e.x,e.y,'shield',1);
  SFX[e.type==='carrier'||e.type==='tank'||e.type==='elite'?'killBig':'killBasic']();
}

// Helper: advance to next boss-mode level (used by both primary AND secondary
// kill paths so dual-boss fights can finish even if boss2 dies last).
function advanceBossModeLevel() {
  level++; waveTimer = 0; bossActive = false;
  // Clear secondary so the next fight spawns fresh
  boss2 = null;
  if (level > 13) {
    bossModeCycle = Math.max(1, bossModeCycle + 1);
    level = 1;
    // Do NOT wipe bossTiers — tiers keep accumulating so each cycle the same
    // boss reappears as 二阶 / 三阶 / 四阶 ... infinite progression.
    const tierWord = ['二','三','四','五','六','七','八','九','十'][Math.min(bossModeCycle - 1, 8)] || (bossModeCycle + 1);
    addFT('全员击破 · 进入第 ' + (bossModeCycle + 1) + ' 轮 · ' + tierWord + ' 阶 BOSS',
          W/2, H/2-30, '#ffff44');
  } else {
    const totalSlot = 13;
    addFT('BOSS ' + level + ' / ' + totalSlot, W/2, H/2-20, '#ff66aa');
  }
  SFX.levelUp();
}

function killBoss() {
  if(!boss||!boss.alive) return;
  // Secondary boss (boss2 swapped in via updateBosses) — clear it without
  // advancing the level. If the primary is also gone, advance the level here.
  if (boss._isSecondary) {
    boss.alive = false;
    score += boss.pts || 0;
    spawnExplosion(boss.x, boss.y, 'large');
    addFT('+'+(boss.pts||0), boss.x, boss.y-18, '#ff88ff');
    sessionCoins += 50;
    SFX.bossDefeat();
    // If both bosses are now dead in boss mode, advance the level here so
    // a new boss spawns immediately. Caller will null-out boss2 after we return.
    setTimeout(() => {
      // Defer to end of frame so caller can finish its swap-back logic.
      if (bossMode && (!boss || !boss.alive) && (!boss2 || !boss2.alive)) {
        advanceBossModeLevel();
      }
    }, 0);
    return;
  }
  const wasLvl = level;
  boss.alive=false; score+=boss.pts; bossActive=false;
  triggerShake(18, 50);
  SFX.bossDefeat(); spawnExplosion(boss.x,boss.y,'huge');
  // Auto-credit diamonds + bonus coins (console multipliers)
  const C = save.console || defaultConsole();
  const dGain = Math.max(1, Math.round((2 + Math.floor(wasLvl/2) + (endlessMode?1:0)) * C.diamondMul));
  const cGain = Math.max(1, Math.round((80 + wasLvl*30) * C.coinMul));
  sessionDiamonds += dGain;
  sessionCoins += cGain;
  score += cGain;
  addFT('💎+'+dGain, boss.x-10, boss.y, '#44ccff');
  addFT('🪙+'+cGain, boss.x+10, boss.y+18, '#ffcc00');
  addFT('+'+boss.pts,boss.x,boss.y-18,'#ff88ff');
  SFX.pickupDiamond();
  // Enemies all clear after boss
  for(const e of enemies){if(e.alive)spawnExplosion(e.x,e.y,'small');e.alive=false;}
  for(const eb of enemyBullets) eb.alive=false;
  boss=null;
  // Boss-rush mode: boss-only progression. Wait for boss2 if present.
  if (bossMode) {
    if (boss2 && boss2.alive) {
      // Primary died first — secondary still alive. Player must finish boss2.
      // Keep bossActive=true so the wave loop won't re-spawn a primary mid-fight.
      addFT('再战 BOSS 2!', W/2, H/2 - 20, '#ff88ff');
      bossActive = true;
      return;
    }
    // Single boss (or both) gone — advance immediately.
    advanceBossModeLevel();
    return;
  }
  // Stage mode lvl 12 boss → tier victory + medal; otherwise advance
  if (!endlessMode && wasLvl >= 12) {
    setTimeout(()=>{
      finalScore = score;
      save.coins += sessionCoins;
      save.diamonds += sessionDiamonds;
      const tier = currentTier();
      if (!save.stageProgress) save.stageProgress = {novice:1, veteran:0, hell:0};
      save.stageProgress[tier] = 13;   // marks "complete"
      save.medals[tier] = true;
      // Unlock next tier
      if (tier === 'novice' && (save.stageProgress.veteran||0) < 1) save.stageProgress.veteran = 1;
      if (tier === 'veteran' && (save.stageProgress.hell||0) < 1) save.stageProgress.hell = 1;
      writeSave(); stopBGM(); screen='victory';
    }, 1400);
    return;
  }
  // Endless mode: never ends — just keep advancing levels indefinitely
  // Clear sticky boomerangs at level transition
  for (const bb of bullets) if (bb.boomerang) bb.alive = false;
  level++; killCount=0; waveTimer=0;
  if (!endlessMode && level <= 12) {
    const tier = currentTier();
    if (!save.stageProgress) save.stageProgress = {novice:1, veteran:0, hell:0};
    if ((save.stageProgress[tier]||0) < level) {
      save.stageProgress[tier] = level;
      writeSave();
    }
  }
  SFX.levelUp(); addFT('LEVEL '+level,W/2,H/2-20,'#ffff00');
  // Mirror level removed — the clone fighter is now a proper boss (BOSS_DEFS[12]).
  mirrorLevel = false;
}

// Spawn a single mirror clone — visually identical to the player but acts as enemy.
function spawnMirrorClone() {

// ─── EXPLOSIONS ──────────────────────────────────────────────────────────────
const EXP_COLORS=['#ff8800','#ffcc00','#ff4400','#ffffff','#ffff44'];

function spawnExplosion(x,y,size) {
  const n=size==='huge'?30:size==='large'?20:size==='medium'?12:6;
  const r=size==='huge'?50:size==='large'?30:size==='medium'?18:10;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=rnd(0.5,r/8);
    explosions.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rndInt(15,35),maxLife:35,size:rndInt(2,size==='huge'?8:size==='large'?6:4),color:EXP_COLORS[rndInt(0,4)]});
  }
}

function updateExplosions() {
  for(const e of explosions){e.x+=e.vx;e.y+=e.vy;e.vy+=0.05;e.life--;}
  explosions=explosions.filter(e=>e.life>0);
}

function drawExplosions() {
  for(const e of explosions){cx.globalAlpha=e.life/e.maxLife;fillPx(e.color,(e.x-e.size/2)|0,(e.y-e.size/2)|0,e.size,e.size);}
  cx.globalAlpha=1;
}

// ─── WAVE SPAWNING ───────────────────────────────────────────────────────────
// Per-level enemy pool (stage 1 easiest → stage 10 hardest). Endless reuses cycling.
const WAVE_POOLS = [
  ['basic','basic','speeder','scout'],
  ['basic','zigzag','speeder','scout','dart'],
  ['basic','zigzag','dart','jet','saucer'],
  ['zigzag','dart','jet','saucer','bomber','splitter'],
  ['zigzag','bomber','splitter','gunship','minelayer','stealth'],
  ['bomber','gunship','minelayer','stealth','sniper','mortar'],
  ['gunship','minelayer','sniper','mortar','tank','hive','swarmlet','exploder'],
  ['gunship','tank','hive','swarmlet','sniper','elite','turret','ramship','eliteHomer','exploder'],
  ['tank','elite','turret','sniper','mortar','carrier','splitter','ramship','eliteHomer','eliteClone','exploder'],
  ['elite','tank','carrier','turret','sniper','minelayer','hive','jet','ramship','eliteTank','eliteHomer','eliteClone','exploder'],
  ['elite','tank','carrier','turret','sniper','mortar','minelayer','hive','stealth','ramship','eliteTank','eliteHomer','eliteClone','exploder'],
  ['elite','tank','carrier','turret','sniper','mortar','minelayer','hive','stealth','splitter','dart','jet','asteroid','ramship','eliteTank','eliteHomer','eliteClone'],
];

function poolForLevel(lv) {
  return WAVE_POOLS[clamp(lv-1, 0, WAVE_POOLS.length-1)];
}

// Difficulty scales gently. Endless: caps at lv 100; Stage: 12 levels x tier.
function getDiff() {
  const lv = Math.min(level, 12);
  const endlessLv = endlessMode ? Math.min(level, 100) : lv;
  const C = save.console || defaultConsole();
  let d;
  if (endlessMode) {
    // 难度在到达 ENDLESS_DIFF_CAP (=100) 关之后封顶, 之后只随机化内容
    const cap = Math.min(level, ENDLESS_DIFF_CAP);
    d = {
      spawnRate: Math.max(170 - cap*1.4, 60),
      formRate:  Math.max(460 - cap*3, 180),
      enemyCount: 1 + Math.floor(cap/6),
      bulletSpd:  Math.min(0.55 + cap*0.018, 1.6),
      hpMult:     Math.min(1 + cap*0.045, 5),
    };
  } else {
    const m = TIER_MUL[currentTier()];
    d = {
      spawnRate: Math.max(95 - lv*5, 40),
      formRate:  Math.max(260 - lv*12, 110),
      enemyCount: 2 + Math.floor(lv/2),
      bulletSpd:  (0.5 + lv*0.06) * m,
      hpMult:     (1 + lv*0.12) * m,
    };
  }
  // Apply console multipliers
  d.spawnRate  = Math.max(15, Math.round(d.spawnRate * C.spawnRateMul));
  d.formRate   = Math.max(40, Math.round(d.formRate  * C.spawnRateMul));
  d.enemyCount = Math.max(1, Math.round(d.enemyCount * C.enemyCountMul));
  d.bulletSpd  = d.bulletSpd * C.enemyBulletSpdMul;
  d.hpMult     = d.hpMult    * C.enemyHpMul;
  return d;
}

function updateWaves() {
  waveTimer++;
  if(bossActive) return;

  // Boss-rush mode — skip waves entirely, spawn boss(es) the moment we land here.
  if (bossMode) {
    spawnBoss();
    if (bossModeCycle >= 1) spawnSecondBoss();
    return;
  }

  // Boss trigger: kill quota met → enter boss IMMEDIATELY (clear any stragglers)
  const C = save.console || defaultConsole();
  let baseThr = BOSS_KILL_THRESHOLD[Math.min(level-1, BOSS_KILL_THRESHOLD.length-1)];
  // Endless mode: first 10 levels are easier — only 30 kills instead of 60.
  if (endlessMode && level <= 10) baseThr = 30;
  // Endless 超过 12 关: 阈值在 ±20% 随机浮动, 让节奏不再固定
  if (endlessMode && level > BOSS_KILL_THRESHOLD.length) {
    if (boss === null && !boss && killCount === 0 && waveTimer < 30) {
      // Stable per-level — seed by level so every visit to lv N is the same threshold
      baseThr = Math.round(baseThr * (0.85 + ((level * 9301 + 49297) % 233) / 233 * 0.4));
    }
  }
  const threshold = Math.max(3, Math.round(baseThr * (C.bossKillMul || 1)));
  if(killCount>=threshold) {
    for (const e of enemies) {
      if (e.alive) { spawnExplosion(e.x, e.y, 'medium'); e.alive=false; }
    }
    spawnBoss();
    return;
  }

  const d=getDiff();
  // Endless: random pool blend; Stage: strict pool per level
  let pool;
  if (endlessMode) {
    if (level > WAVE_POOLS.length) {
      // 超过 12 关: 完全随机抽取若干池组合, 增加每关的随机感
      pool = [];
      const slots = 3 + rndInt(0, 3);  // 3~6 个池
      for (let s = 0; s < slots; s++) {
        const pi = rndInt(0, WAVE_POOLS.length-1);
        pool = pool.concat(WAVE_POOLS[pi]);
      }
    } else if (level >= 5) {
      // 5~12 关: 全部池混合
      pool = [];
      for (const p of WAVE_POOLS) pool = pool.concat(p);
    } else {
      const idx = Math.min(level-1, WAVE_POOLS.length-1);
      const idx2 = Math.max(0, idx-1);
      pool = WAVE_POOLS[idx].concat(WAVE_POOLS[idx2]);
    }
    // Endless lv 5+ — giant asteroids start as occasional hazards;
    // at high levels they become a steady downward shower.
    if (level >= 5) {
      // Number of asteroid copies in the pool scales with level so the random
      // pick rate grows: ~1× at lv5, ~3× at lv25, ~6× at lv50, capped at 8×.
      const asteroidWeight = Math.min(8, 1 + Math.floor((level - 5) / 8));
      for (let k = 0; k < asteroidWeight; k++) pool.push('asteroid');
    }
  } else {
    pool = poolForLevel(level);
  }

  if (mirrorLevel) {
    // Mirror level: only mirror clones spawn; pace is steadier
    if (waveTimer % Math.max(120, d.spawnRate * 2) === 0 && enemies.length < MAX_ENEMIES - 4) {
      spawnMirrorClone();
    }
  } else if(waveTimer%d.spawnRate===0 && enemies.length < MAX_ENEMIES) {
    const type=pool[rndInt(0,pool.length-1)];
    const count=rndInt(1,d.enemyCount+1);
    for(let i=0;i<count;i++) setTimeout(()=>{
      if (screen==='game' && enemies.length < MAX_ENEMIES)
        enemies.push(mkEnemy(type,rnd(30,W-30),-30));
    },i*250);
  }
  if(waveTimer%d.formRate===0 && enemies.length < MAX_ENEMIES - 6) {
    const type=pool[rndInt(0,pool.length-1)];
    const safeType = type==='turret' ? 'basic' : type;
    const n=3+Math.min(level,4);
    for(let i=0;i<n && enemies.length < MAX_ENEMIES;i++)
      enemies.push(mkEnemy(safeType,50+i*(W-100)/(n-1)||W/2,-50-i*18));
  }
}

    hell:    { rim:'#aa8800', face:'#ffd700', hi:'#ffffaa', shadow:'#664400', label:'I'   },
  }[key];
  if (!palette) return;
  // Ribbon (V-shape) above the disc
  cx.fillStyle = '#aa2233';
  cx.beginPath();
  cx.moveTo(x - 9, y - 18);
  cx.lineTo(x - 5, y - 8);
  cx.lineTo(x - 1, y - 14);
  cx.lineTo(x + 5, y - 8);
  cx.lineTo(x + 9, y - 18);
  cx.lineTo(x + 4, y - 22);
  cx.lineTo(x - 4, y - 22);
  cx.closePath();
  cx.fill();
  cx.strokeStyle = '#660011';
  cx.lineWidth = 0.6;
  cx.stroke();
  // Outer rim
  cx.fillStyle = palette.shadow;
  cx.beginPath(); cx.arc(x, y, 12, 0, Math.PI*2); cx.fill();
  cx.fillStyle = palette.rim;
  cx.beginPath(); cx.arc(x, y, 11, 0, Math.PI*2); cx.fill();
  // Face with directional highlight
  const g = cx.createRadialGradient(x - 4, y - 4, 1, x, y, 10);
  g.addColorStop(0, palette.hi);
  g.addColorStop(0.45, palette.face);
  g.addColorStop(1, palette.shadow);
  cx.fillStyle = g;
  cx.beginPath(); cx.arc(x, y, 9, 0, Math.PI*2); cx.fill();
  // Inner ring engraving
  cx.strokeStyle = palette.shadow;
  cx.lineWidth = 0.8;
  cx.beginPath(); cx.arc(x, y, 6.5, 0, Math.PI*2); cx.stroke();
  // Roman numeral
  cx.fillStyle = palette.shadow;
  cx.font = "bold 8px 'Courier New', monospace";
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(palette.label, x, y + 1);
  cx.textBaseline = 'alphabetic';
  // Specular shine
  cx.fillStyle = 'rgba(255,255,255,0.35)';
  cx.beginPath();
  cx.ellipse(x - 3, y - 4, 3, 2, -0.4, 0, Math.PI*2);
  cx.fill();
}
function endlessButtonText() {
  if (save.endlessState) return '继续无尽 · LV '+save.endlessState.level;
  return '无 尽 模 式';
}

function ownedPlaneIndices() {
  const out = [];
  for (let i = 0; i < PLANE_SKINS.length; i++) if (save.planes[i]) out.push(i);
  return out.length ? out : [0];
}
function clampShowcase() {
  const owned = ownedPlaneIndices();
  // If the saved plane is owned, prefer it as the canonical showcase target —
  // keeps title and shop in sync regardless of which one was edited last.
  const sIdx = owned.indexOf(save.selP1);
  if (sIdx >= 0) showcaseIdx = sIdx;
  if (showcaseIdx >= owned.length) showcaseIdx = 0;
  if (showcaseIdx < 0) showcaseIdx = owned.length - 1;
  save.selP1 = owned[showcaseIdx];
}

function drawTitle() {
  // Deep tech-blue base
  const bg = cx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#020815');
  bg.addColorStop(0.5, '#040a18');
  bg.addColorStop(1, '#000208');
  cx.fillStyle = bg;
  cx.fillRect(0, 0, W, H);
  // Hex grid panel pattern (faint)
  cx.strokeStyle = 'rgba(80,140,200,0.10)';
  cx.lineWidth = 1;
  for (let yy = 0; yy < H + 40; yy += 36) {
    for (let xx = -20; xx < W + 40; xx += 60) {
      const ox = (yy/36) % 2 === 0 ? 0 : 30;
      cx.beginPath();
      const cx0 = xx + ox, cy0 = yy;
      for (let k = 0; k < 6; k++) {
        const a = (k/6) * Math.PI * 2;
        cx.lineTo(cx0 + Math.cos(a) * 18, cy0 + Math.sin(a) * 18);
      }
      cx.closePath();
      cx.stroke();
    }
  }
  // Distant stars
  for (let i = 0; i < 60; i++) {
    const sx = (i*73 + frame*0.3) % W, sy = (i*97 + frame*(0.18 + (i%3)*0.08)) % H;
    fillPx(i%5===0 ? '#aaccff' : '#ffffff', sx|0, sy|0, i%3===0?2:1, i%3===0?2:1);
  }
  // ─ Random irregular lightning bolts ─
  // Random bursts: every ~50-90 frames a new bolt appears at a random spot.
  if (!window._titleBolts) window._titleBolts = [];
  if (frame % (50 + (frame * 7) % 40) === 0) {
    const start = { x: rnd(20, W - 20), y: rnd(0, 100) };
    const end =   { x: rnd(20, W - 20), y: rnd(180, H - 40) };
    const points = [start];
    let cx0 = start.x, cy0 = start.y;
    while (cy0 < end.y - 20) {
      cy0 += rnd(10, 28);
      cx0 += rnd(-22, 22);
      points.push({ x: cx0, y: cy0 });
    }
    points.push(end);
    // Random branch (40% chance)
    let branch = null;
    if (Math.random() < 0.4 && points.length > 3) {
      const bp = points[1 + Math.floor(Math.random() * (points.length - 2))];
      branch = [bp];
      let bx = bp.x, by = bp.y;
      for (let k = 0; k < 4 + (Math.random() * 3 | 0); k++) {
        bx += rnd(-18, 18); by += rnd(8, 22);
        branch.push({ x: bx, y: by });
      }
    }
    window._titleBolts.push({ points, branch, life: 18, maxLife: 18 });
  }
  // Render & decay
  for (const bolt of window._titleBolts) {
    const a = bolt.life / bolt.maxLife;
    cx.strokeStyle = `rgba(180,230,255,${a * 0.85})`;
    cx.lineWidth = 2.5;
    cx.beginPath();
    for (let i = 0; i < bolt.points.length; i++) {
      const p = bolt.points[i];
      if (i === 0) cx.moveTo(p.x, p.y);
      else         cx.lineTo(p.x, p.y);
    }
    cx.stroke();
    cx.strokeStyle = `rgba(255,255,255,${a})`;
    cx.lineWidth = 1;
    cx.stroke();
    if (bolt.branch) {
      cx.strokeStyle = `rgba(180,230,255,${a * 0.6})`;
      cx.lineWidth = 1.5;
      cx.beginPath();
      for (let i = 0; i < bolt.branch.length; i++) {
        const p = bolt.branch[i];
        if (i === 0) cx.moveTo(p.x, p.y);
        else         cx.lineTo(p.x, p.y);
      }
      cx.stroke();
    }
    bolt.life--;
  }
  window._titleBolts = window._titleBolts.filter(b => b.life > 0);
  // Tiny floating sparks (subtle ambience)
  for (let i = 0; i < 12; i++) {
    const px = (i * 73 + frame * (0.3 + (i % 3) * 0.1)) % W;
    const py = (i * 211 + frame * 0.5) % H;
    const a = 0.25 + Math.sin(frame * 0.05 + i) * 0.18;
    cx.fillStyle = i % 2 === 0 ? `rgba(120,220,255,${a})` : `rgba(255,200,140,${a})`;
    cx.fillRect(px | 0, py | 0, 1, 1);
  }
  // Title text (compact)
  cx.textAlign='center';
  cx.fillStyle='#886600';cx.font="bold 50px 'Courier New', monospace";cx.fillText('RAIDEN',W/2+3,93);
  cx.fillStyle='#00ffff';cx.fillText('RAIDEN',W/2,90);
  // Lightning glow under the title
  const tg = cx.createRadialGradient(W/2, 100, 5, W/2, 100, 90);
  tg.addColorStop(0, 'rgba(0,200,255,0.18)');
  tg.addColorStop(1, 'rgba(0,200,255,0)');
  cx.fillStyle = tg;
  cx.fillRect(0, 50, W, 110);
  cx.fillStyle='#ff2200';cx.font="bold 22px 'Courier New', monospace";cx.fillText('雷  电',W/2,122);
  // Decorative tech bracket lines
  cx.strokeStyle = '#3377aa';
  cx.lineWidth = 1.5;
  cx.beginPath();
  cx.moveTo(20, 145); cx.lineTo(140, 145); cx.lineTo(150, 155);
  cx.moveTo(W-20, 145); cx.lineTo(W-140, 145); cx.lineTo(W-150, 155);
  cx.stroke();

  // ─── Plane showcase (center) ──────────────────
  clampShowcase();
  const owned = ownedPlaneIndices();
  const skinIdx = owned[showcaseIdx];
  const skin = PLANE_SKINS[skinIdx];
  // Halo behind plane
  const halo = cx.createRadialGradient(W/2, 248, 20, W/2, 248, 110);
  halo.addColorStop(0, skin[4][0]+'66');
  halo.addColorStop(1, 'transparent');
  cx.fillStyle = halo;
  cx.fillRect(0, 165, W, 195);
  // Big plane
  drawVectorPlane(skin[3], skin[4], cx, W/2, 248, 2.6, false, 0);
  // Skin name + index
  cx.fillStyle = '#aaeeff';
  cx.font = "bold 16px 'Courier New', monospace";
  cx.textAlign = 'center';
  cx.fillText(skin[0], W/2, 350);
  cx.fillStyle = '#557799';

  cx.fillText('★ 出战机 · '+(showcaseIdx+1)+' / '+owned.length+' ★', W/2, 372);

  // ─── Quick equip strip: 4 equal cards (Map / Trail / Rune-A / Rune-B) ──
  const trailIdx = save.selTrail || 0;
  const trailDef = TRAIL_DEFS[trailIdx];
  const ey = TITLE_EQUIP.y, eh = TITLE_EQUIP.h, ew = TITLE_EQUIP.cardW;
  const drawCard = (i, accent, lit) => {
    const x = titleEquipCardX(i);

    cx.fillRect(x, ey, ew, eh);

  // Card 0 — Map
  {

  // Card 1 — Trail

    tg2.addColorStop(1, trailDef[4] + '00');
    cx.fillStyle = tg2;
    cx.beginPath(); cx.arc(tcx, tcy, 11, 0, Math.PI*2); cx.fill();
    cx.fillStyle = trailDef[4];
    cx.font = "bold 10px 'Courier New', monospace"; cx.textAlign = 'left';
    cx.fillText('残  影', x + 32, ey + 16);
    cx.font = "bold 11px 'Courier New', monospace";
    cx.fillText(trailDef[0].length > 6 ? trailDef[0].slice(0,6) : trailDef[0], x + 32, ey + 30);
  }
  // Cards 2 & 3 — Rune slots
  for (let s = 0; s < 2; s++) {
    const eqKey = (save.equippedRunes || [])[s];

    const accent = def ? def.col : '#335577';

    if (def) {
      const lv = save.runes[def.key] || 0;

      rg2.addColorStop(0, '#ffffff');
      rg2.addColorStop(0.4, def.col);
      rg2.addColorStop(1, def.col + '00');
      cx.fillStyle = rg2;
      cx.beginPath(); cx.arc(tcx, tcy, 11, 0, Math.PI*2); cx.fill();
      cx.fillStyle = '#0a1828';
      cx.font = "bold 12px sans-serif"; cx.textAlign = 'center';

      cx.fillStyle = def.col;
      cx.font = "bold 10px 'Courier New', monospace"; cx.textAlign = 'left';
      cx.fillText('符文 ' + (s+1), x + 32, ey + 16);
      cx.font = "bold 10px 'Courier New', monospace";
      cx.fillText(def.name.slice(0,2) + ' Lv' + lv, x + 32, ey + 30);
    } else {
      cx.fillStyle = '#446688';
      cx.beginPath(); cx.arc(tcx, tcy, 10, 0, Math.PI*2); cx.stroke();
      cx.fillStyle = '#557799';
      cx.font = "bold 10px 'Courier New', monospace"; cx.textAlign = 'left';
      cx.fillText('符文 ' + (s+1), x + 32, ey + 16);
      cx.font = "10px 'Courier New', monospace";
      cx.fillText('点击装备', x + 32, ey + 30);
    }
  }
  cx.textAlign = 'left';
  // Plane navigation arrows (only if multiple planes owned)
  if (owned.length > 1) {
    const aA = 0.7 + Math.sin(frame*0.1)*0.25;
    cx.fillStyle = `rgba(0,255,255,${aA})`;
    cx.font = "bold 36px 'Courier New', monospace";
    cx.textAlign = 'center';
    cx.fillText('‹', 50, 260);
    cx.fillText('›', W-50, 260);
    cx.textAlign = 'left';
  }

  // ─── Mode tabs (with medal/trash inside the box) ──────
  const medals = save.medals || {};
  let topKey = null;
  if (medals.hell) topKey = 'hell';
  else if (medals.veteran) topKey = 'veteran';
  else if (medals.novice) topKey = 'novice';
  for (const btn of titleBtns) {
    const isEndless = btn.act === 'endless';

    tg.addColorStop(1, isActive ? '#163a4d' : '#1a2c3a');

    cx.fillRect(btn.x, btn.y, btn.w, btn.h);
    // Hairline diagonal sheen
    cx.save();
    cx.beginPath(); cx.rect(btn.x, btn.y, btn.w, btn.h); cx.clip();
    cx.strokeStyle = 'rgba(255,255,255,0.07)';
    cx.lineWidth = 1;
    for (let i = -btn.h; i < btn.w + btn.h; i += 6) {
      cx.beginPath();
      cx.moveTo(btn.x + i, btn.y);
      cx.lineTo(btn.x + i + btn.h, btn.y + btn.h);
      cx.stroke();
    }
    cx.restore();
    // Bevel
    cx.strokeStyle = isActive ? '#00ffff' : '#5599cc';

    cx.strokeRect(btn.x+1, btn.y+1, btn.w-2, btn.h-2);

    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(btn.x+3, btn.y+3); cx.lineTo(btn.x+btn.w-3, btn.y+3);
    cx.moveTo(btn.x+3, btn.y+3); cx.lineTo(btn.x+3, btn.y+btn.h-3);
    cx.stroke();
    // Tab label — auto-sized for narrower 3-tab layout

  // ─── Currency badge (top-right corner) ─────────────────────────────────

  }

  // Hint line below the mode tabs (replaces orphan footer)
  cx.fillStyle = '#557799';
  cx.font = "11px 'Courier New', monospace";
  cx.textAlign = 'center';
  cx.fillText('点击模式开始 · 侧栏可访问商城 / 图鉴 / 设置', W/2, 540);
  cx.textAlign = 'left';
}

function clickTitle(mx,my) {
  // Trash icon (inside the bottom-right corner of 无尽模式 tab box)
  if (save.endlessState) {
    const eb = titleBtns[1]; // endless tab
    const tx = eb.x + eb.w - 22, ty = eb.y + eb.h - 18;
    const dx = mx - tx, dy = my - ty;
    if (dx*dx + dy*dy < 18*18) {
      clearEndlessSnapshot();
      SFX.buyFail();
      return;
    }
  }
  // Quick equip strip (4 cards: Map / Trail / Rune-A / Rune-B)
  const ey = TITLE_EQUIP.y, eh = TITLE_EQUIP.h, ew = TITLE_EQUIP.cardW;
  if (my >= ey && my <= ey + eh) {
    for (let i = 0; i < 4; i++) {
      const cx0 = titleEquipCardX(i);
      if (mx < cx0 || mx > cx0 + ew) continue;
      if (i === 0) {
        // Map quick switch (cycles owned + random sentinel)
        const ownedBgs = BG_SKINS.map((_, k) => save.bgs && save.bgs[k] ? k : -1).filter(x => x >= 0);
        if (!ownedBgs.length) { SFX.buyFail(); return; }
        const order = ownedBgs.concat([-1]);
        const cur = (typeof save.selBG === 'number' && save.bgRandom !== true) ? save.selBG : -1;
        const ci = order.indexOf(save.bgRandom ? -1 : cur);
        const nextRaw = order[(ci + 1) % order.length];
        if (nextRaw === -1) {
          save.bgRandom = true;
          save.selBG = ownedBgs[Math.floor(Math.random() * ownedBgs.length)];
        } else {
          save.bgRandom = false;
          save.selBG = nextRaw;
        }
        writeSave(); SFX.buySuccess();
      } else if (i === 1) {
        // Trail cycle
        const ownedTrails = TRAIL_DEFS.map((d, k) => save.trails && save.trails[k] ? k : -1).filter(x => x >= 0);
        if (!ownedTrails.length) { SFX.buyFail(); return; }
        const cur = ownedTrails.indexOf(save.selTrail || 0);
        const next = ownedTrails[(cur + 1) % ownedTrails.length];
        save.selTrail = next;
        writeSave(); SFX.buySuccess();
      } else {
        // Rune slot (i = 2 or 3 → s = 0 or 1)
        const s = i - 2;
        const ownedRunes = RUNE_DEFS.filter(r => (save.runes[r.key] || 0) > 0).map(r => r.key);
        if (!ownedRunes.length) { SFX.buyFail(); return; }
        const eq = [
          (save.equippedRunes && save.equippedRunes[0]) || null,
          (save.equippedRunes && save.equippedRunes[1]) || null,
        ];
        const otherSlot = eq[1 - s];
        const candidates = ownedRunes.filter(k => k !== otherSlot);
        if (!candidates.length) { SFX.buyFail(); return; }
        const cur = eq[s];
        const ci = cur ? candidates.indexOf(cur) : -1;
        eq[s] = candidates[(ci + 1) % candidates.length];
        save.equippedRunes = eq.filter(x => x);
        writeSave(); SFX.buySuccess();
      }
      return;
    }
  }
  // Plane arrows (left/right of showcase)
  const owned = ownedPlaneIndices();
  if (owned.length > 1) {
    if (mx>=20 && mx<=80 && my>=215 && my<=295) {
      showcaseIdx = (showcaseIdx - 1 + owned.length) % owned.length;
      save.selP1 = owned[showcaseIdx];
      writeSave(); SFX.buySuccess();
      return;
    }
    if (mx>=W-80 && mx<=W-20 && my>=215 && my<=295) {
      showcaseIdx = (showcaseIdx + 1) % owned.length;
      save.selP1 = owned[showcaseIdx];
      writeSave(); SFX.buySuccess();
      return;
    }
  }
  // Mode tabs
  for (const btn of titleBtns) {
    if (mx>=btn.x && mx<=btn.x+btn.w && my>=btn.y && my<=btn.y+btn.h) {
      if (btn.act === 'solo') screen = 'tierSelect';
      else if (btn.act === 'endless') startGame(false, true);
      else if (btn.act === 'bossMode') startBossMode();
      return;
    }
  }
}

function drawTitleSettings() {
  fillPx('#000818',0,0,W,H);

  cx.fillText('音乐 · 灵敏度 · 画面分辨率 · 控制台', W/2, 80);

  // Resolution

function hitVolumeSlider(mx, my, x, y, w, key, fn) {

    screen='console';

  }
  // Dropdown picks (header now spans 70..410, y=332..362)
  if (bgmDropdownOpen) {
    // Dropdown opens UPWARD from header at y=498. List sits at 316..496.
    // Dropdown opens DOWNWARD from header at y=446. List sits at 478..658.
    const lx=70, ly=478, lw=340, itemH=DROPDOWN_ITEM_H, visH=DROPDOWN_VISIBLE_H;

// Crisp pickup-style weapon thumbnail — looks like the in-game ★/W drop
function drawWeaponThumb(weaponIdx, cxC, cyC, col) {
  // Soft halo (dim, not blurry W#)
  const halo = cx.createRadialGradient(cxC, cyC, 1, cxC, cyC, 16);
  halo.addColorStop(0, col + 'aa');
  halo.addColorStop(0.5, col + '44');
  halo.addColorStop(1, col + '00');
  cx.fillStyle = halo;
  cx.beginPath(); cx.arc(cxC, cyC, 16, 0, Math.PI*2); cx.fill();
  // Crisp star body (mirrors pickup look)
  cx.save();
  cx.translate(cxC, cyC);
  cx.fillStyle = col;
  cx.strokeStyle = '#ffffff';
  cx.lineWidth = 1;
  cx.beginPath();
  for (let k = 0; k < 10; k++) {
    const r = (k % 2 === 0) ? 11 : 4.5;
    const a = -Math.PI/2 + k * (Math.PI / 5);
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (k === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
  }
  cx.closePath();
  cx.fill(); cx.stroke();
  // Inner number — readable on top of the star
  cx.fillStyle = '#ffffff';
  cx.font = "bold 9px 'Courier New', monospace";
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(String(weaponIdx + 1), 0, 1);
  cx.textBaseline = 'alphabetic';
  cx.restore();
}

}

// Double-click detection for shop: clicking the same already-owned card twice
// within 350ms equips it (shortcut for the bottom 装备 button).
let shopLastClickT = 0;
let shopLastClickKey = '';
function clickShop(mx,my) {
  if(mx>=20&&mx<=130&&my>=655&&my<=691){screen='title';shopSelectedPlane=-1;shopSelectedBG=-1;return;}
  if(mx>=350&&mx<=460&&my>=655&&my<=691){equipSelected();return;}
  if(my>=68&&my<=102){
    if      (mx>=20  && mx<=126) { shopTab=0; shopSelectedPlane=-1; }
    else if (mx>=132 && mx<=238) { shopTab=1; shopSelectedBG=-1; shopBGScroll=0; }
    else if (mx>=244 && mx<=350) { shopTab=2; }
    else if (mx>=356 && mx<=460) { shopTab=3; shopTrailScroll=0; }
    return;
  }
  if(shopTab===2){clickShopRunes(mx,my);return;}
  if(shopTab===3){clickShopTrails(mx,my);return;}
  if(shopTab===0){
    const cols=4,cw=110,ch=110,sx=10,sy=115;
    for(let i=0;i<PLANE_SKINS.length;i++){
      const bx=sx+(i%cols)*cw, by=sy+Math.floor(i/cols)*ch - shopPlaneScroll;
      if(my < sy-2 || my > sy+540) continue;
      if(mx>=bx&&mx<=bx+cw&&my>=by&&my<=by+ch){
        const key = 'plane:'+i;
        const now = performance.now();
        const isDouble = (now - shopLastClickT < 350) && shopLastClickKey === key;
        shopLastClickT = now; shopLastClickKey = key;
        if(!save.planes[i]){
          const sk=PLANE_SKINS[i];
          if(sk[2]==='free'){save.planes[i]=true;writeSave();SFX.buySuccess();shopSelectedPlane=i;}
          else if(sk[2]==='g'){if(save.coins>=sk[1]){save.coins-=sk[1];save.planes[i]=true;writeSave();SFX.buySuccess();shopSelectedPlane=i;}else SFX.buyFail();}
          else if(sk[2]==='d'){if(save.diamonds>=sk[1]){save.diamonds-=sk[1];save.planes[i]=true;writeSave();SFX.buySuccess();shopSelectedPlane=i;}else SFX.buyFail();}
        } else {
          shopSelectedPlane=i;
          if (isDouble) equipSelected();   // double-click owned plane = equip
        }
        return;
      }
    }
  } else {
    const cols=2,cw=220,ch=72,sx=15,sy=115;
    for(let i=0;i<BG_SKINS.length;i++){
      const bx=sx+(i%cols)*cw, by=sy+Math.floor(i/cols)*ch - shopBGScroll;
      if(my < sy-2 || my > sy+540) break;
      if(mx>=bx&&mx<=bx+cw&&my>=by&&my<=by+ch){
        const key = 'bg:'+i;
        const now = performance.now();
        const isDouble = (now - shopLastClickT < 350) && shopLastClickKey === key;
        shopLastClickT = now; shopLastClickKey = key;
        if(!save.bgs[i]){
          const bg=BG_SKINS[i];
          if(bg[2]==='free'){save.bgs[i]=true;writeSave();SFX.buySuccess();shopSelectedBG=i;}
          else if(bg[2]==='g'){if(save.coins>=bg[1]){save.coins-=bg[1];save.bgs[i]=true;writeSave();SFX.buySuccess();shopSelectedBG=i;}else SFX.buyFail();}
          else if(bg[2]==='d'){if(save.diamonds>=bg[1]){save.diamonds-=bg[1];save.bgs[i]=true;writeSave();SFX.buySuccess();shopSelectedBG=i;}else SFX.buyFail();}
        } else {
          shopSelectedBG=i;
          if (isDouble) equipSelected();   // double-click owned bg = equip
        }
        return;
      }
    }
  }
}

function equipSelected() {
  if(shopTab===0&&shopSelectedPlane>=0&&save.planes[shopSelectedPlane]){
    save.selP1=shopSelectedPlane;
    // Sync title showcase to the equipped plane so both views show the same plane
    const owned = ownedPlaneIndices();
    const idx = owned.indexOf(shopSelectedPlane);
    if (idx >= 0) showcaseIdx = idx;
    writeSave(); SFX.buySuccess();
  }
  if(shopTab===1&&shopSelectedBG>=0&&save.bgs[shopSelectedBG]){
    save.selBG=shopSelectedBG; writeSave(); SFX.buySuccess();
  }
}

let bgmDropdownOpen = false;
let bgmDropdownScroll = 0;
const DROPDOWN_VISIBLE_H = 180;       // visible list height
const DROPDOWN_ITEM_H    = 28;
function dropdownListBounds(x, y, w, h) {
  return { lx: x, ly: y + h + 2, lw: w, lh: DROPDOWN_VISIBLE_H };
}
function drawDropdown(x, y, w, h, items, selectedIdx, open, openUp) {
  // Header showing current value
  cx.fillStyle = open ? '#003344' : '#001828';
  cx.fillRect(x, y, w, h);
  cx.strokeStyle = open ? '#00ffff' : '#446688';
  cx.lineWidth = 2;
  cx.strokeRect(x+1, y+1, w-2, h-2);
  cx.fillStyle = '#88ccee';
  cx.font="bold 12px 'Courier New', monospace";
  cx.textAlign='left';
  cx.fillText('♬ '+items[selectedIdx], x+10, y+h/2+4);
  cx.fillStyle = '#88ccee';
  cx.font="bold 14px 'Courier New', monospace";
  cx.fillText(open ? (openUp ? '▼' : '▲') : (openUp ? '▲' : '▼'), x+w-22, y+h/2+5);
  cx.textAlign='left';
  // Open list overlay (scrollable). If openUp, the list rises above the header.
  if (open) {
    const itemH = DROPDOWN_ITEM_H;
    const listFullH = items.length * itemH;
    const visH = Math.min(DROPDOWN_VISIBLE_H, listFullH);
    const maxScroll = Math.max(0, listFullH - visH);
    bgmDropdownScroll = clamp(bgmDropdownScroll, 0, maxScroll);
    const lx = x, ly = openUp ? (y - 2 - visH) : (y + h + 2);
    // Background + clip
    cx.fillStyle='#001828';
    cx.fillRect(lx, ly, w, visH);
    cx.strokeStyle='#00ffff';
    cx.lineWidth = 2;
    cx.strokeRect(lx+1, ly+1, w-2, visH-2);
    cx.save();
    cx.beginPath(); cx.rect(lx+2, ly+2, w-4, visH-4); cx.clip();
    for (let i=0;i<items.length;i++) {
      const iy = ly + i*itemH - bgmDropdownScroll;
      if (iy + itemH < ly || iy > ly + visH) continue;
      const sel = i===selectedIdx;
      if (sel) {
        cx.fillStyle = '#005577';
        cx.fillRect(lx+2, iy+1, w-4, itemH-2);
      }
      cx.fillStyle = sel ? '#ffffff' : '#88ccee';
      cx.font="bold 11px 'Courier New', monospace";
      cx.fillText('#'+(i+1)+'  '+items[i], lx+10, iy+itemH/2+4);
    }
    cx.restore();
    // Scroll indicator
    if (maxScroll > 0) {
      const trackH = visH - 8;
      const knobH = Math.max(20, trackH * (visH/listFullH));
      const knobY = ly + 4 + (trackH - knobH) * (bgmDropdownScroll / maxScroll);
      cx.fillStyle = 'rgba(255,255,255,0.18)';
      cx.fillRect(lx + w - 6, ly + 4, 3, trackH);
      cx.fillStyle = '#00ffff';
      cx.fillRect(lx + w - 6, knobY, 3, knobH);
    }
  }
}

const SENS_MIN = 0.3, SENS_MAX = 4.0;
function drawSensSlider(x, y, w, label, key) {
  const v = (typeof save[key] === 'number') ? save[key] : 1;
  const t = (v - SENS_MIN) / (SENS_MAX - SENS_MIN);
  // Label left
  cx.fillStyle='#88ccee'; cx.font="11px 'Courier New'"; cx.textAlign='left';
  cx.fillText(label, x-50, y+10);
  // Bar background
  cx.fillStyle='#0a1828'; cx.fillRect(x, y+6, w, 6);
  cx.strokeStyle='#244466'; cx.strokeRect(x+0.5, y+6.5, w-1, 5);
  // Filled portion
  cx.fillStyle='#00ffcc'; cx.fillRect(x, y+6, w*t, 6);
  // Thumb
  cx.fillStyle='#ffffff';
  cx.fillRect(x+w*t-4, y+1, 8, 16);
  cx.strokeStyle='#00ffff'; cx.lineWidth=1;
  cx.strokeRect(x+w*t-4+0.5, y+1.5, 7, 15);
  // Value
  cx.fillStyle='#ffcc00'; cx.font="11px 'Courier New'"; cx.textAlign='left';
  cx.fillText(v.toFixed(2)+'x', x+w+8, y+10);
}
function hitSensSlider(mx, my, x, y, w, key) {
  if (my>=y && my<=y+18 && mx>=x-8 && mx<=x+w+8) {
    let t = (mx - x) / w;
    t = Math.max(0, Math.min(1, t));
    save[key] = +(SENS_MIN + (SENS_MAX-SENS_MIN)*t).toFixed(2);
    writeSave();
    return true;
  }
  return false;
}

function clickPause(mx,my) {
  for (const btn of pauseBtns) {
    if (mx>=btn.x && mx<=btn.x+btn.w && my>=btn.y && my<=btn.y+btn.h) {
      if (btn.act==='resume') { screen='game'; if(bgmEnabled) startBGM(); }
      else if (btn.act==='console') { showConsolePanel(true); pauseConsoleReturn = true; screen='console'; }
      else if (btn.act==='restart') {
        if (endlessMode) clearEndlessSnapshot();
        startGame(twoPlayer, endlessMode, endlessMode?1:level);
      }
      else if (btn.act==='home') {
        // Endless: keep snapshot for resume + record this run on the leaderboard
        if (endlessMode) {
          saveEndlessSnapshot();
          submitEndlessScore(score, level, 'pause-home');
        }
        save.coins += sessionCoins; save.diamonds += sessionDiamonds;
        sessionCoins = 0; sessionDiamonds = 0;
        writeSave(); stopBGM(); screen='title';
      }
      return;
    }
  }
  // Dropdown open: handle item picks first
  if (bgmDropdownOpen) {
    const lx=70, ly=480+30+2, lw=340, itemH=DROPDOWN_ITEM_H, visH=DROPDOWN_VISIBLE_H;
    if (mx>=lx && mx<=lx+lw && my>=ly && my<=ly+visH) {
      const localY = (my - ly) + bgmDropdownScroll;
      const idx = Math.floor(localY / itemH);
      if (idx>=0 && idx<BGM_TRACKS.length) {
        bgmTrack = idx;
        stopBGM();
        if (bgmEnabled) startBGM();
        SFX.buySuccess();
      }
      bgmDropdownOpen = false;
      return;
    }
    if (!(mx>=70 && mx<=410 && my>=480 && my<=510)) {
      bgmDropdownOpen = false;
    }
  }
  // Sensitivity sliders
  if (hitSensSlider(mx, my, 70, 328, 340, 'moveSensX')) return;
  if (hitSensSlider(mx, my, 70, 358, 340, 'moveSensY')) return;
  // Volume sliders (full-width row above the dropdown)
  if (hitVolumeSlider(mx, my, 70, 420, 280, 'bgmVol', t => setBgmVol(t))) return;
  if (hitVolumeSlider(mx, my, 70, 450, 280, 'sfxVol', t => setSfxVol(t))) return;
  // Track dropdown header (full-width row)
  if (mx>=70 && mx<=410 && my>=480 && my<=510) {
    bgmDropdownOpen = !bgmDropdownOpen;
    return;
  }
}

let endlessStartTime = 0;       // ms when current endless run started
let endlessInvincibleUsed = false; // whether 💀 was ever toggled in this run
function submitEndlessScore(scoreVal, lvVal, exitReason) {
  if (!Array.isArray(save.endlessLeaderboard)) save.endlessLeaderboard = [];
  const durationSec = endlessStartTime ? Math.max(1, Math.round((Date.now()-endlessStartTime)/1000)) : 0;
  save.endlessLeaderboard.push({
    score: scoreVal|0, level: lvVal|0,
    durationSec, dateMs: Date.now(),
    invincible: !!endlessInvincibleUsed,
    exit: exitReason || 'unknown',
  });
  save.endlessLeaderboard.sort((a,b)=>b.score-a.score);
  // Permanent local file: keep up to 50 entries (was 10)
  save.endlessLeaderboard = save.endlessLeaderboard.slice(0, 50);
  writeSave();
}
function fmtDuration(s) {
  const m = (s/60)|0, sec = s%60;
  return m+'分'+String(sec).padStart(2,'0')+'秒';
}
function fmtDate(ms) {
  const d = new Date(ms);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function snapshotEndless() {
  if (!endlessMode) return null;
  const p = players[0];
  if (!p || p.dead) return null;
  return {
    level, score, killCount, sessionCoins, sessionDiamonds,
    bossActive, bossHp: boss && boss.alive ? boss.hp : 0,
    bossType: boss && boss.alive ? boss.bossType : -1,
    p: {x:p.x, y:p.y, lives:p.lives, bombs:p.bombs, weapon:p.weapon, weaponLevel:p.weaponLevel,
        shield:p.shield, shieldHits:p.shieldHits||0, skinIdx:p.skinIdx},
    wingmen: wingmen.filter(w=>w.alive).map(w=>({wType:w.wType, level:w.level||1})),
  };
}
function saveEndlessSnapshot() {
  if (!endlessMode) return;
  save.endlessState = snapshotEndless();
  writeSave();
}
function clearEndlessSnapshot() {
  save.endlessState = null;
  writeSave();
}

function startGame(_unused, endless, startLv) {
  twoPlayer=false; endlessMode=!!endless;
  bossMode=false; bossModeCycle=0; boss2=null; bossActive=false;
  players=[]; wingmen=[]; bullets=[]; enemyBullets=[]; enemies=[]; pickups=[]; explosions=[]; floatingTexts=[];
  screenMissiles=[]; lastMissileSpawn=0; blackHoles=[];
  score=0; level=Math.max(1,(startLv|0)||1); waveTimer=0; killCount=0; bossActive=false; boss=null; bombFlash=0;
  sessionCoins=0; sessionDiamonds=0; finalScore=0; frame=0;
  // Boss tiers reset every fresh run so encounters scale with the boss-appearance count
  // within THIS playthrough (stage = full reset, endless resume keeps progression).
  if (!endlessMode || !save.endlessState) save.bossTiers = {};
  players.push(createPlayer(1,save.selP1));
  // Random-map mode: pick a fresh owned bg per run (does not persist as selection)
  if (save.bgRandom) {
    const ownedBgs = BG_SKINS.map((_, i) => save.bgs && save.bgs[i] ? i : -1).filter(x => x >= 0);
    if (ownedBgs.length) save.selBG = ownedBgs[Math.floor(Math.random() * ownedBgs.length)];
  }
  initBGStars(BG_SKINS[save.selBG][3]);
  if (endlessMode) {
    endlessStartTime = Date.now();
    endlessInvincibleUsed = !!invincible;   // already on at start? count it
  }
  // Restore endless snapshot if present
  if (endlessMode && save.endlessState) {
    const s = save.endlessState;
    level = s.level || 1;
    score = s.score || 0;
    killCount = s.killCount || 0;
    sessionCoins = s.sessionCoins || 0;
    sessionDiamonds = s.sessionDiamonds || 0;
    const p = players[0];
    if (s.p) {
      p.x = s.p.x; p.y = s.p.y;
      p.lives = s.p.lives || 3;
      p.bombs = s.p.bombs || 3;
      p.weapon = s.p.weapon || 0;
      p.weaponLevel = s.p.weaponLevel || 1;
      p.shield = s.p.shield || 0;
      p.shieldHits = s.p.shieldHits || 0;
      p.invTimer = 90;
    }
    if (Array.isArray(s.wingmen)) {
      for (const w of s.wingmen) {
        spawnWingman(p, w.wType);
        const last = wingmen[wingmen.length-1];
        if (last) last.level = w.level || 1;
      }
    }
    addFT('继续无尽 · LV '+level, W/2, H/2-40, '#ffff44');
  }
  screen='game';
  if(bgmEnabled) startBGM();
  if (IS_MOBILE) addFT('滑动控制 · 双击发射导弹', W/2, H/2-30, '#88ccff');
}

const keys={};
// Mobile detection — true when device has touch + coarse pointer (real phones/tablets)
const IS_MOBILE = (('ontouchstart' in window) || (navigator.maxTouchPoints||0) > 0)
                  && window.matchMedia('(pointer: coarse)').matches;
if (IS_MOBILE) document.body.classList.add('is-mobile');

// Virtual joystick state for mobile movement
const joy = { active:false, id:-1, sx:0, sy:0, x:0, y:0, dx:0, dy:0, rad:60 };

function canvasCoord(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top)  * (H / rect.height),
  };
}

function startJoystick(t) {
  const p = canvasCoord(t);
  joy.active = true; joy.id = t.identifier;
  joy.sx = p.x; joy.sy = p.y;
  joy.x = p.x; joy.y = p.y;
  joy.dx = 0; joy.dy = 0;
}
function moveJoystick(t) {
  const p = canvasCoord(t);
  let ddx = p.x - joy.sx, ddy = p.y - joy.sy;
  const dist = Math.hypot(ddx, ddy);
  if (dist > joy.rad) { ddx = ddx/dist*joy.rad; ddy = ddy/dist*joy.rad; }
  joy.x = joy.sx + ddx; joy.y = joy.sy + ddy;
  // Normalized -1..1 with small dead-zone
  const dz = 8;
  if (dist < dz) { joy.dx = 0; joy.dy = 0; }
  else { joy.dx = ddx/joy.rad; joy.dy = ddy/joy.rad; }
}
function endJoystick() {

const DOUBLE_TAP_MS = 280;
function handleTouchStart(e) {
  if (screen !== 'game') {
    // Touch acts like a click for menu screens
    for (const t of e.changedTouches) {
      const p = canvasCoord(t);
      try{getAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}catch(_){}
      if (screen==='title') clickTitle(p.x, p.y);
      else if (screen==='shop') clickShop(p.x, p.y);
      else if (screen==='tierSelect') clickTierSelect(p.x, p.y);
      else if (screen==='stageSelect') clickStageSelect(p.x, p.y);
      else if (screen==='titleSettings') clickTitleSettings(p.x, p.y);
      else if (screen==='codex') clickCodex(p.x, p.y);
      else if (screen==='gameover') clickGameOver(p.x, p.y);
      else if (screen==='victory') clickVictory(p.x, p.y);
      else if (screen==='death') clickDeath(p.x, p.y);
      else if (screen==='pause') clickPause(p.x, p.y);
    }
    e.preventDefault();
    return;
  }
  // Double-tap fires bomb (mobile manual trigger)
  const now = performance.now();
  if (now - lastTapTime < DOUBLE_TAP_MS) {
    triggerBomb();
    lastTapTime = 0;
    e.preventDefault();
    return;
  }
  lastTapTime = now;
  // Single tap → start invisible joystick (last finger wins)
  for (const t of e.changedTouches) {
    startJoystick(t);
    break;
  }
  e.preventDefault();
}
function handleTouchMove(e) {
  if (!joy.active) return;
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) { moveJoystick(t); break; }
  }
  e.preventDefault();
}
function handleTouchEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) { endJoystick(); break; }
  }
  e.preventDefault();
}

// Slider drag tracking — when mouse is held over a slider, dragging updates value continuously
let _draggingSlider = null;   // {x, y, w, key, type:'sens'|'res'}
function pickSliderUnder(mx, my) {
  // Title settings sliders (positions match drawTitleSettings)
  if (screen === 'titleSettings') {
    if (my >= 128 - 6 && my <= 128 + 22 && mx >= 70 - 12 && mx <= 70 + 340 + 12) {
      return { x:70, y:128, w:340, type:'res' };
    }
    if (my >= 216 - 6 && my <= 216 + 22 && mx >= 70 - 12 && mx <= 70 + 340 + 12) {
      return { x:70, y:216, w:340, type:'sens', key:'moveSensX' };
    }
    if (my >= 244 - 6 && my <= 244 + 22 && mx >= 70 - 12 && mx <= 70 + 340 + 12) {
      return { x:70, y:244, w:340, type:'sens', key:'moveSensY' };
    }
    if (my >= 300 - 6 && my <= 300 + 22 && mx >= 70 - 12 && mx <= 70 + 280 + 12) {
      return { x:70, y:300, w:280, type:'vol', key:'bgmVol' };
    }
    if (my >= 328 - 6 && my <= 328 + 22 && mx >= 70 - 12 && mx <= 70 + 280 + 12) {
      return { x:70, y:328, w:280, type:'vol', key:'sfxVol' };
    }
  }
  // Pause-page sliders (sensitivity + volume — match drawPause coords)
  if (screen === 'pause') {
    if (my >= 328 - 6 && my <= 328 + 22 && mx >= 70 - 12 && mx <= 70 + 340 + 12) {
      return { x:70, y:328, w:340, type:'sens', key:'moveSensX' };
    }
    if (my >= 358 - 6 && my <= 358 + 22 && mx >= 70 - 12 && mx <= 70 + 340 + 12) {
      return { x:70, y:358, w:340, type:'sens', key:'moveSensY' };
    }
    if (my >= 420 - 6 && my <= 420 + 22 && mx >= 70 - 12 && mx <= 70 + 280 + 12) {
      return { x:70, y:420, w:280, type:'vol', key:'bgmVol' };
    }
    if (my >= 450 - 6 && my <= 450 + 22 && mx >= 70 - 12 && mx <= 70 + 280 + 12) {
      return { x:70, y:450, w:280, type:'vol', key:'sfxVol' };
    }
  }
  return null;
}
function applyDragSlider(mx) {
  if (!_draggingSlider) return;
  const s = _draggingSlider;
  let t = (mx - s.x) / s.w;
  t = Math.max(0, Math.min(1, t));
  if (s.type === 'res') {
    save.pixelScale = +(PIXEL_SCALE_MIN + (PIXEL_SCALE_MAX - PIXEL_SCALE_MIN) * t).toFixed(2);
    writeSave();
    applyResolution();
  } else if (s.type === 'sens') {
    save[s.key] = +(SENS_MIN + (SENS_MAX - SENS_MIN) * t).toFixed(2);
    writeSave();
  } else if (s.type === 'vol') {
    if (s.key === 'bgmVol') setBgmVol(t);
    else if (s.key === 'sfxVol') setSfxVol(t);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function update() {
  // Death-screen countdown is handled in loop() at real wall-clock cadence so
  // 倍速 (2x/3x/10x) cannot accelerate the revive timer.
  if (screen === 'death') return;
  if(screen!=='game') return;
  frame++;
  updateBG();
  updateWaves();
  for(const p of players) updatePlayer(p,keys);
  updateWingmen();
  updateBullets();
  updateEnemyBullets();
  for(const e of enemies) updateEnemy(e);
  updateBoss();
  // Update boss2 by swapping it into the boss slot temporarily
  if (boss2 && boss2.alive) {
    const _orig = boss;
    boss = boss2;
    boss._isSecondary = true;
    updateBoss();
    if (boss) boss._isSecondary = false;
    boss2 = (boss && boss.alive) ? boss : null;
    boss = _orig;
  }
  updateScreenMissiles();
  updateBlackHoles();
  updatePickups();
  collectPickups();
  checkCollisions();
  updateExplosions();
  updateFTs();
  enemies=enemies.filter(e=>e.alive);
  if(bombFlash>0) bombFlash--;
  if(shakeT>0){shakeT--; if(shakeT===0) shakeM=0;}
  // Performance caps — drop oldest when exceeded
  capArray(bullets, MAX_BULLETS);
  capArray(enemyBullets, MAX_ENEMY_BULLETS);
  capArray(explosions, MAX_EXPLOSIONS);
  capArray(floatingTexts, MAX_FT);
  capArray(pickups, MAX_PICKUPS);
  if (enemies.length > MAX_ENEMIES) {
    // Cull the off-screen / lowest-priority enemies (those that already drifted past mid-screen)
    enemies.sort((a,b)=>a.y - b.y);
    enemies.splice(MAX_ENEMIES);
  }
}

function drawGameField() {
  cx.save();
  if (shakeT > 0) {
    const ox = (Math.random()*2-1)*shakeM;
    const oy = (Math.random()*2-1)*shakeM;
    cx.translate(ox, oy);
  }
  drawBackground();
  if(bombFlash>0){cx.fillStyle=`rgba(255,255,255,${bombFlash/22*0.7})`;cx.fillRect(0,0,W,H);}
  for(const e of enemies) drawEnemy(e);
  drawBoss();
  if (boss2 && boss2.alive) {
    const _orig = boss;
    boss = boss2;
    drawBoss();
    boss = _orig;
  }
  drawBullets();
  drawPickups();
  drawExplosions();
  drawWingmen();
  for(const p of players) drawPlayer(p);
  drawScreenMissiles();
  drawBlackHoles();
  // Enemy bullets render LAST among gameplay layers so they always sit on top
  // and are never visually covered by enemies, the player, or pickups.
  drawEnemyBullets();
  drawFTs();
  cx.restore();
  // HUD + joystick visual outside shake transform
  drawHUD();
  drawJoystick();
}

function draw() {
  cx.imageSmoothingEnabled=true;
  if(screen==='title') {
    frame++;
    drawTitle();
  } else if(screen==='shop') {
    drawShop();
  } else if(screen==='tierSelect') {
    frame++;
    drawTierSelect();
  } else if(screen==='stageSelect') {
    frame++;
    drawStageSelect();
  } else if(screen==='codex') {
    frame++;
    drawCodex();
  } else if(screen==='titleSettings') {
    frame++;
    drawTitleSettings();
  } else if(screen==='console') {
    fillPx('#000818',0,0,W,H);   // DOM panel covers the canvas
  } else if(screen==='game') {
    drawGameField();
  } else if(screen==='pause') {
    frame++;
    drawGameField();
    drawPause();
  } else if(screen==='death') {
    frame++;
    drawGameField();
    drawDeath();
  } else if(screen==='victory') {
    frame++;
    drawVictory();
  } else if(screen==='gameover') {
    frame++;
    drawGameOver();
  }
}

function loop() {
  speedAccum += gameSpeed;
  let safetyCap = 6;
  while (speedAccum >= 1 && safetyCap-- > 0) {
    update();
    speedAccum -= 1;
  }
  if (speedAccum < 0) speedAccum = 0;
  // Clamp residual accumulator so a previous high-speed run can't carry over
  // and keep ticking fast after the player drops back to 1×.
  if (speedAccum > gameSpeed) speedAccum = gameSpeed;
  // Death countdown ticks once per real frame (60fps), independent of 倍速.
  // 1x label -> 0.5 internal pace would otherwise halve the visible second count;
  // by ticking here it always matches the real wall clock.
  if (screen === 'death' && deathTimer > 0) {
    deathTimer--;
    if (deathTimer === 0) {
      save.coins += sessionCoins; save.diamonds += sessionDiamonds;
      writeSave(); screen='title';
    }
  }
  draw();
  refreshBombCount();
  syncPauseBtn();
  requestAnimationFrame(loop);
}

    {k:'bhPullMul',            name:'黑洞引力倍率',     min:0,    max:10,  step:0.05,desc:'×拉力(0=关闭)'},
    {k:'bhMaxCount',           name:'黑洞同屏上限',     min:0,    max:10,  step:1,   desc:'个'},
    {k:'bhSpawnIntervalMul',   name:'黑洞生成间隔倍率', min:0.1,  max:20,  step:0.1, desc:'×间隔(>1 慢)'},
    {k:'missileWarnSec',       name:'导弹警告秒数',     min:0.5,  max:15,  step:0.1, desc:'秒'},
    {k:'missileFireSec',       name:'导弹光束秒数',     min:0.1,  max:5,   step:0.05,desc:'秒'},
    {k:'missileMaxAxis',       name:'导弹同轴上限',     min:1,    max:10,  step:1,   desc:'同行/列警告数'},
    {k:'missileSpawnIntervalMul',name:'导弹生成间隔倍率', min:0.1,  max:20,  step:0.1, desc:'×间隔'},
  ]},
  { id:'rune', label:'符文', fields: [
    {k:'runeProcMul',   name:'触发概率倍率',  min:0,  max:50, step:0.1, desc:'×概率(过高会被钳到100%)'},
    {k:'burnDmgMul',    name:'燃烧伤害倍率',  min:0,  max:50, step:0.1, desc:'×%血/帧'},
    {k:'plagueDmgMul',  name:'疫病伤害倍率',  min:0,  max:50, step:0.1, desc:'×%血/帧'},
    {k:'poisonSlowMul', name:'中毒减速倍率',  min:0.1,max:10, step:0.1, desc:'×敌方射速间隔'},
    {k:'critDmgMul',    name:'暴击倍率',      min:0.5,max:20, step:0.1, desc:'×伤害(基础2x)'},
  ]},
  // ─── 细分: 单个敌人/Boss/武器/符文 ──────────────────────────────────
  // bucket = save.console.<bucketKey>; key = inner subKey (e.g. 'basic' / 0 / 'burn')
  { id:'eachEnemy', label:'细·敌人', dynamic: 'eachEnemy' },
  { id:'eachBoss',  label:'细·Boss', dynamic: 'eachBoss' },
  { id:'eachWeapon',label:'细·武器', dynamic: 'eachWeapon' },
  { id:'eachRune',  label:'细·符文', dynamic: 'eachRune' },

    {k:'__coins',    name:'当前金币',  min:0, max:9999999, step:1, desc:'直接修改账户余额', live:true},
    {k:'__diamonds', name:'当前钻石',  min:0, max:9999999, step:1, desc:'直接修改账户余额', live:true},

// Build dynamic field rows for the per-entity tabs.
// Each row binds to save.console[bucketKey][innerKey].
function buildDynamicConsoleFields(kind) {
  const rows = [];
  if (kind === 'eachEnemy') {
    const labels = {
      basic:'基础机', zigzag:'锯齿机', bomber:'轰炸机', gunship:'炮舰',
      tank:'坦克', speeder:'速度王', carrier:'母舰', dart:'飞镖机',
      saucer:'UFO', scout:'侦察机', sniper:'狙击手', mortar:'迫击炮',
      swarmlet:'蜂群虫', hive:'蜂巢', turret:'炮塔', stealth:'隐形机',
      splitter:'分裂机', minelayer:'布雷舰', jet:'喷气机', elite:'精英',
      asteroid:'大陨石', ramship:'撞击船',
      eliteTank:'精英坦克', eliteHomer:'精英追踪', eliteClone:'精英克隆',
      exploder:'爆炸怪',
    };
    for (const k of Object.keys(labels)) {
      rows.push({bucket:'enemyHpEach',  key:k, name:labels[k]+' · 血量×',  min:0.1, max:50, step:0.1});
      rows.push({bucket:'enemySpdEach', key:k, name:labels[k]+' · 速度×',  min:0.1, max:5,  step:0.1});
    }
  } else if (kind === 'eachBoss') {
    const names = ['白羊·阿瑞斯','金牛·陶罗斯','双子·杰米尼','巨蟹·坎瑟尔','狮子·利奥',
                   '处女·维戈','天秤·利布拉','天蝎·斯科皮奥','射手·萨吉塔','摩羯·卡普',
                   '水瓶·阿夸','双鱼·皮西斯','克隆战机·镜'];
    for (let i = 0; i < names.length; i++) {
      rows.push({bucket:'bossHpEach',       key:i, name:names[i]+' · 血量×',  min:0.1, max:50, step:0.1});
      rows.push({bucket:'bossFireRateEach', key:i, name:names[i]+' · 攻速×',  min:0.1, max:10, step:0.1});
      rows.push({bucket:'bossBarEach',      key:i, name:names[i]+' · 血条×',  min:0.1, max:5,  step:0.1});
    }
  } else if (kind === 'eachWeapon') {
    const wnames = ['标准炮','散弹枪','激光炮','制导弹','等离子','闪电链','回旋镖','波动炮','龙卷炮','冰晶炮'];
    for (let i = 0; i < wnames.length; i++) {
      rows.push({bucket:'weaponDmgEach',  key:i, name:wnames[i]+' · 伤害×', min:0.1, max:50, step:0.1});
      rows.push({bucket:'weaponFireEach', key:i, name:wnames[i]+' · 间隔×', min:0.1, max:10, step:0.1});
    }
  } else if (kind === 'eachRune') {
    const rnames = {burn:'燃烧',poison:'淬毒',freeze:'冰冻',plague:'疫病',crit:'暴击',decap:'斩首',dodge:'闪避'};
    for (const k of Object.keys(rnames)) {
      rows.push({bucket:'runeProcEach', key:k, name:rnames[k]+' · 触发概率×', min:0, max:50, step:0.1});
    }
  }
  return rows;
}
let consoleActiveTab = 'player';
const consolePanelEl = document.getElementById('console-panel');
const consoleTabsEl  = document.getElementById('console-tabs');
const consoleBodyEl  = document.getElementById('console-body');

function renderConsole() {
  // Tabs
  consoleTabsEl.innerHTML = '';
  for (const t of CONSOLE_TABS) {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id===consoleActiveTab?' active':'');
    el.textContent = t.label;
    el.addEventListener('click', ()=>{ consoleActiveTab = t.id; renderConsole(); });
    consoleTabsEl.appendChild(el);
  }
  // Fields
  consoleBodyEl.innerHTML = '';
  const tab = CONSOLE_TABS.find(t=>t.id===consoleActiveTab);
  const C = save.console || (save.console = defaultConsole());
  // Dynamic tabs (per-entity grids)
  if (tab.dynamic) {
    const rows = buildDynamicConsoleFields(tab.dynamic);
    for (const f of rows) {
      const row = document.createElement('div'); row.className='row';
      const lab = document.createElement('label'); lab.textContent = f.name;
      const d = document.createElement('span'); d.className='desc'; d.textContent='1.0=原版';
      lab.appendChild(d);
      const inp = document.createElement('input');
      inp.type = 'number'; inp.min = f.min; inp.max = f.max; inp.step = f.step;
      const bucket = (C[f.bucket] = C[f.bucket] || {});
      inp.value = (typeof bucket[f.key] === 'number') ? bucket[f.key] : 1;
      inp.addEventListener('change', ()=>{
        let v = parseFloat(inp.value);
        if (isNaN(v)) v = 1;
        v = Math.max(f.min, Math.min(f.max, v));
        bucket[f.key] = v;
        inp.value = v;
        writeSave();
      });
      row.appendChild(lab); row.appendChild(inp);
      consoleBodyEl.appendChild(row);
    }
    return;
  }
  for (const f of tab.fields) {
    const row = document.createElement('div'); row.className='row';
    const lab = document.createElement('label'); lab.textContent = f.name;
    if (f.desc) {
      const d = document.createElement('span'); d.className='desc'; d.textContent = f.desc;
      lab.appendChild(d);
    }
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.min = f.min; inp.max = f.max; inp.step = f.step;
    // Live wallet fields read directly from save (not save.console)
    if (f.k === '__coins')          inp.value = save.coins;
    else if (f.k === '__diamonds')  inp.value = save.diamonds;
    else                            inp.value = C[f.k];
    inp.addEventListener('change', ()=>{
      let v = parseFloat(inp.value);
      if (isNaN(v)) v = (f.k === '__coins') ? save.coins
                     : (f.k === '__diamonds') ? save.diamonds
                     : defaultConsole()[f.k];
      v = Math.max(f.min, Math.min(f.max, v));
      if (f.k === '__coins')         save.coins = v|0;
      else if (f.k === '__diamonds') save.diamonds = v|0;
      else                           C[f.k] = v;
      inp.value = (f.k === '__coins' || f.k === '__diamonds') ? (v|0) : v;
      writeSave();
    });
    row.appendChild(lab); row.appendChild(inp);
    consoleBodyEl.appendChild(row);
  }
}
function showConsolePanel(show) {
  consolePanelEl.classList.toggle('show', !!show);
  if (show) renderConsole();
}
let pauseConsoleReturn = false;
document.getElementById('console-back').addEventListener('click', ()=>{
  showConsolePanel(false);
  if (pauseConsoleReturn) { pauseConsoleReturn = false; screen = 'pause'; }
  else screen = 'titleSettings';
});
document.getElementById('console-reset').addEventListener('click', ()=>{
  if (confirm('重置所有控制台数据为默认?')) {
    save.console = defaultConsole();
    writeSave();
    renderConsole();
  }
});
document.getElementById('console-unlock-shop').addEventListener('click', ()=>{
  if (!confirm('解锁所有飞机/背景/残影并将所有符文升至 Lv 10?')) return;
  for (let i = 0; i < PLANE_SKINS.length; i++) save.planes[i] = true;
  for (let i = 0; i < BG_SKINS.length; i++)    save.bgs[i]    = true;
  for (let i = 0; i < TRAIL_DEFS.length; i++)  save.trails[i] = true;
  for (const k of Object.keys(save.runes))     save.runes[k]  = 10;
  writeSave();
  alert('全部商品已解锁, 符文已满级.');
});
document.getElementById('console-unlock-stage').addEventListener('click', ()=>{
  if (!confirm('解锁全部 3 难度 12 关卡 + 全部奖牌?')) return;
  save.stageProgress = { novice: 12, veteran: 12, hell: 12 };
  save.medals = { novice: true, veteran: true, hell: true };
  writeSave();
  alert('关卡 + 奖牌已全部解锁.');
});
document.getElementById('console-endless-pick').addEventListener('click', ()=>{
  const v = prompt('从无尽模式哪一关开始 (1-100)?', '1');
  if (!v) return;
  const lv = clamp(parseInt(v, 10) || 1, 1, 100);
  showConsolePanel(false);
  pauseConsoleReturn = false;
  // Wipe any stale endless snapshot so the chosen level is the actual start.
  save.endlessState = null; writeSave();
  startGame(false, true, lv);
});

// ─── PIXEL RESOLUTION ────────────────────────────────────────────────────────
const PIXEL_SCALE_MIN = 0.5, PIXEL_SCALE_MAX = 3.0;
function applyResolution() {
  const s = clamp(save.pixelScale || 1, PIXEL_SCALE_MIN, PIXEL_SCALE_MAX);
  canvas.width = Math.round(W * s);
  canvas.height = Math.round(H * s);
  cx.imageSmoothingEnabled = true;
  cx.setTransform(s, 0, 0, s, 0, 0);
  // Caches depending on canvas size are invalidated
  if (typeof bgStaticCache !== 'undefined') {
    for (const k in bgStaticCache) delete bgStaticCache[k];
  }
}

initBGStars('space');
applyResolution();
loop();
</script>
