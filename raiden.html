function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.65;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

function playNote(freq, type, vol, startTime, duration, dest) {
  if (!freq || freq === 0) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
  } catch(e) {}
}

function playKick(startTime, dest) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, startTime);
    osc.frequency.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    gain.gain.setValueAtTime(0.4, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    osc.connect(gain);
    gain.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + 0.2);
  } catch(e) {}
}

function scheduleBGM() {
  if (!bgmEnabled || !bgmScheduled) return;
  try {
    const ctx = getAudio();
    const LOOKAHEAD = 0.5;
    const now = ctx.currentTime;
    const scheduleUntil = now + LOOKAHEAD;

    let bassIdx = Math.floor(bgmNoteIdx / 2) % BASS_BGM.length;

    const track=BGM_TRACKS[bgmTrack]||BGM_TRACKS[0];
    while (bgmStartTime < scheduleUntil) {
      const [mf, md] = track.m[bgmNoteIdx % track.m.length];
      const [bf, bd] = track.b[Math.floor(bgmNoteIdx / 2) % track.b.length];
      const dur = EIGHTH;
      playNote(mf, 'square', 0.09, bgmStartTime, dur * md * 0.85, masterGain);
      if (bgmNoteIdx % 2 === 0) playNote(bf, 'sawtooth', 0.07, bgmStartTime, dur * bd * 0.85, masterGain);
      // Add a harmony a fifth below occasionally
      if (mf && bgmNoteIdx % 4 === 2) playNote(mf*0.75, 'triangle', 0.04, bgmStartTime, dur * md * 0.7, masterGain);
      const posInBar = bgmNoteIdx % 8;
      if (posInBar === 0 || posInBar === 4) playKick(bgmStartTime, masterGain);
      // Snare on beats 2 and 4
      if (posInBar === 2 || posInBar === 6) {
        try {
          const snBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.08, audioCtx.sampleRate);
          const sd = snBuf.getChannelData(0);
          for(let si=0;si<sd.length;si++) sd[si]=(Math.random()*2-1)*(1-si/sd.length);
          const snSrc = audioCtx.createBufferSource(), snG = audioCtx.createGain();
          snG.gain.setValueAtTime(0.12, bgmStartTime);
          snG.gain.exponentialRampToValueAtTime(0.001, bgmStartTime+0.08);
          snSrc.buffer=snBuf; snSrc.connect(snG); snG.connect(masterGain);
          snSrc.start(bgmStartTime); snSrc.stop(bgmStartTime+0.09);
        } catch(e) {}
      }
      bgmStartTime += dur;
      bgmNoteIdx++;
      if (bgmNoteIdx >= MELODY_BGM.length) bgmNoteIdx = 0;
    }
  } catch(e) {}

  bgmTimeout = setTimeout(scheduleBGM, 200);
}

function startBGM() {
  if (bgmScheduled) return;
  try {
    getAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    bgmScheduled = true;
    bgmStartTime = audioCtx.currentTime + 0.1;
    bgmNoteIdx = 0;
    scheduleBGM();
  } catch(e) {}
}

function stopBGM() {
  bgmScheduled = false;
  if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
}

function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  document.getElementById('btn-bgm').classList.toggle('active', !bgmEnabled);
  if (!bgmEnabled) stopBGM();
  else if (screen === 'game') startBGM();
}

      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = wt === 2 ? 'sawtooth' : 'square';
      osc.frequency.value = wt === 2 ? 1200 : (400 + wt * 100);
      g.gain.setValueAtTime(0.05, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      osc.connect(g); g.connect(masterGain);
      osc.start(); osc.stop(ctx.currentTime + 0.07);
    } catch(e) {}
  },
  killBasic() {
    try {
      const ctx = getAudio();
      const buf = ctx.createBuffer(1, ctx.sampleRate*0.12, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
      const src = ctx.createBufferSource();
      const g = ctx.createGain();
      const osc = ctx.createOscillator();
      const og = ctx.createGain();
      src.buffer = buf;
      osc.type='sine';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime+0.12);
      og.gain.setValueAtTime(0.1, ctx.currentTime);

// ─── UTILITY ─────────────────────────────────────────────────────────────────
function rnd(min, max) { return Math.random()*(max-min)+min; }
function rndInt(min, max) { return (Math.random()*(max-min+1)+min)|0; }
function clamp(v, min, max) { return v<min?min:v>max?max:v; }

// ─── DRAWING HELPERS ─────────────────────────────────────────────────────────
function fillPx(color, x, y, w, h) {
  cx.fillStyle = color;
  cx.fillRect(x|0, y|0, w|0, h|0);
}

// Draw a smooth vector plane. shapeIdx 0-3 = different silhouettes.
// colors = [body, cockpit, wing, engine_glow]
// cx must be in identity transform when called.
function drawVectorPlane(shapeIdx, colors, cx2, px, py, sc, flip) {
  const [bc, cc, wc, gc] = colors;
  const s = sc || 1;
  cx2.save();
  cx2.translate(px, py);
  cx2.scale(s, flip ? -s : s);

  // Engine glow
  const gg = cx2.createRadialGradient(0, 16, 1, 0, 16, 11);
  gg.addColorStop(0, gc + 'ff');
  gg.addColorStop(1, gc + '00');
  cx2.fillStyle = gg;
  cx2.beginPath(); cx2.arc(0, 16, 11, 0, Math.PI*2); cx2.fill();

  if (shapeIdx === 0) {
    // Sleek interceptor
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(0,-10); cx2.lineTo(-18,12); cx2.lineTo(-10,6); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo(0,-10); cx2.lineTo(18,12); cx2.lineTo(10,6); cx2.closePath(); cx2.fill();
    const bg = cx2.createLinearGradient(-6,-20,6,20);
    bg.addColorStop(0, cc); bg.addColorStop(0.4, bc); bg.addColorStop(1, wc);
    cx2.fillStyle = bg;
    cx2.beginPath(); cx2.moveTo(0,-20); cx2.lineTo(-6,0); cx2.lineTo(-5,16); cx2.lineTo(5,16); cx2.lineTo(6,0); cx2.closePath(); cx2.fill();
  } else if (shapeIdx === 1) {
    // Wide wing fighter
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-2,0); cx2.lineTo(-22,14); cx2.lineTo(-20,4); cx2.lineTo(-8,-2); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo(2,0); cx2.lineTo(22,14); cx2.lineTo(20,4); cx2.lineTo(8,-2); cx2.closePath(); cx2.fill();
    const bg = cx2.createLinearGradient(-7,-18,7,18);
    bg.addColorStop(0, cc); bg.addColorStop(0.4, bc); bg.addColorStop(1, wc);
    cx2.fillStyle = bg;
    cx2.beginPath(); cx2.moveTo(0,-18); cx2.lineTo(-7,2); cx2.lineTo(-5,16); cx2.lineTo(5,16); cx2.lineTo(7,2); cx2.closePath(); cx2.fill();
  } else if (shapeIdx === 2) {
    // Arrow-head assault
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(0,-8); cx2.lineTo(-20,8); cx2.lineTo(-14,2); cx2.lineTo(-4,6); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo(0,-8); cx2.lineTo(20,8); cx2.lineTo(14,2); cx2.lineTo(4,6); cx2.closePath(); cx2.fill();
    // Twin engines
    cx2.fillStyle = gc+'99';
    cx2.fillRect(-9,12,5,8); cx2.fillRect(4,12,5,8);
    const bg = cx2.createLinearGradient(-5,-22,5,16);
    bg.addColorStop(0, cc); bg.addColorStop(0.5, bc); bg.addColorStop(1, wc);
    cx2.fillStyle = bg;
    cx2.beginPath(); cx2.moveTo(0,-22); cx2.lineTo(-5,-2); cx2.lineTo(-5,16); cx2.lineTo(5,16); cx2.lineTo(5,-2); cx2.closePath(); cx2.fill();
  } else {
    // Heavy gunship
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-4,-4); cx2.lineTo(-24,10); cx2.lineTo(-22,2); cx2.lineTo(-10,-2); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo(4,-4); cx2.lineTo(24,10); cx2.lineTo(22,2); cx2.lineTo(10,-2); cx2.closePath(); cx2.fill();
    // Gun pods
    cx2.fillStyle = bc+'bb';
    cx2.fillRect(-14,0,4,10); cx2.fillRect(10,0,4,10);
    const bg = cx2.createLinearGradient(-8,-16,8,18);
    bg.addColorStop(0, cc); bg.addColorStop(0.4, bc); bg.addColorStop(1, wc);
    cx2.fillStyle = bg;
    cx2.beginPath(); cx2.moveTo(0,-16); cx2.lineTo(-8,0); cx2.lineTo(-7,18); cx2.lineTo(7,18); cx2.lineTo(8,0); cx2.closePath(); cx2.fill();
  }

  // Cockpit canopy
  cx2.fillStyle = cc + 'cc';
  cx2.beginPath(); cx2.ellipse(0, -8, 4, 7, 0, 0, Math.PI*2); cx2.fill();
  // Highlight
  cx2.fillStyle = 'rgba(255,255,255,0.35)';
  cx2.beginPath(); cx2.ellipse(-1, -10, 2, 4, -0.2, 0, Math.PI*2); cx2.fill();

  cx2.restore();
}

function drawButton(bx, by, bw, bh, text, highlighted) {
  fillPx('#000', bx+3, by+3, bw, bh);
  fillPx(highlighted ? '#226688' : '#112233', bx, by, bw, bh);
  cx.strokeStyle = highlighted ? '#00ffff' : '#4488aa';
  cx.lineWidth = 2;
  cx.strokeRect((bx+1)|0, (by+1)|0, (bw-2)|0, (bh-2)|0);
  cx.fillStyle = highlighted ? '#00ffff' : '#88ccee';
  cx.font = "bold 16px 'Courier New', monospace";
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, (bx + bw/2)|0, (by + bh/2)|0);
  cx.textAlign = 'left';
  cx.textBaseline = 'alphabetic';
}

function shiftColor(hex, db) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return '#'+[r,g,clamp(b+db,0,255)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
function initBGStars(type) {
  bgStars = [];
  const count = type==='arctic' ? 40 : 100;
  for (let i=0;i<count;i++) {
    bgStars.push({
      x: rnd(0,W), y: rnd(0,H),
      speed: rnd(0.3,1.5),
      size: rndInt(1,2),
      color: getBGStarColor(type),
    });
  }
  bgTerrain = [];
  for (let i=0;i<10;i++) {
    bgTerrain.push({
      x: rnd(0,W-80), y: rnd(H*0.3, H),
      w: rndInt(20,80), h: rndInt(10,40),
      speed: rnd(0.4,1.2),
    });
  }
}

function getBGStarColor(type) {
  if (type==='nebula') return ['#ff88ff','#aaaaff','#88ffff','#ffffff'][rndInt(0,3)];
  if (type==='arctic') return '#ffffff';
  if (type==='volcanic') return ['#ff4400','#ffaa00','#ff6600'][rndInt(0,2)];
  if (type==='cyber') return ['#00ffcc','#0088ff','#88ff00'][rndInt(0,2)];
  return '#ffffff';
}

function getBGColors(type) {
  const m = {
    space:    {sky:'#000010',terrain:'#223344',atmos:null},
    nebula:   {sky:'#100020',terrain:'#442266',atmos:'#330055'},
    city:     {sky:'#050518',terrain:'#112244',atmos:'#0a0a30'},
    ocean:    {sky:'#000820',terrain:'#0044aa',atmos:'#002266'},
    arctic:   {sky:'#d0eeff',terrain:'#aaddff',atmos:'#eef8ff'},
    volcanic: {sky:'#150000',terrain:'#441100',atmos:'#220000'},
    cyber:    {sky:'#000008',terrain:'#003333',atmos:'#001122'},
    sunset:   {sky:'#1a0808',terrain:'#441100',atmos:'#cc3300'},
    ruins:    {sky:'#0a0808',terrain:'#332222',atmos:'#221111'},
    rift:     {sky:'#080010',terrain:'#220044',atmos:'#110033'},
  };
  return m[type] || m.space;
}

function drawBackground() {
  const bgType = BG_SKINS[save.selBG][3];
  const colors = getBGColors(bgType);
  fillPx(colors.sky, 0, 0, W, H);

  if (bgType==='nebula') {
    for (let i=0;i<3;i++) {
      const ny = ((frame*0.3+i*200)%(H+100))-50;
      cx.fillStyle='rgba(80,0,120,0.07)';
      cx.fillRect(0,ny|0,W,120);
    }
  }
  if (bgType==='cyber') {
    cx.strokeStyle='rgba(0,80,80,0.18)';
    cx.lineWidth=1;
    const go=(frame*0.5)%20;
    for (let x=0;x<W;x+=20){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for (let y=-go;y<H;y+=20){cx.beginPath();cx.moveTo(0,y|0);cx.lineTo(W,y|0);cx.stroke();}
  }
  if (bgType==='sunset') {
    for (let i=0;i<5;i++) {
      const ly=(frame*0.4+i*140)%(H+60)-30;
      cx.fillStyle=`rgba(180,60,0,0.07)`;
      cx.fillRect(0,ly|0,W,30);
    }
  }
  if (bgType==='rift') {
    cx.strokeStyle='rgba(120,0,180,0.15)';
    cx.lineWidth=1;
    for (let i=0;i<3;i++) {
      const ry=(frame*0.4+i*233)%(H+100)-50;
      cx.beginPath(); cx.moveTo(rndInt(0,100),ry|0); cx.lineTo(rndInt(300,480),(ry+20)|0); cx.stroke();
    }
  }

  for (const star of bgStars) {
    fillPx(star.color, star.x|0, star.y|0, star.size, star.size);
  }

  const tc = colors.terrain;
  if (bgType==='city') {
    for (let b=0;b<10;b++) {
      const bx=((b*48+(frame*0.2|0))%(W+48))-48;
      const bh=40+(b*17)%60;
      fillPx('#0a1a3a',bx|0,(H-bh)|0,40,bh);
      fillPx('#112244',(bx+2)|0,(H-bh)|0,36,bh);
      for (let wy=H-bh+5;wy<H-5;wy+=8)
        for (let wx=bx+4;wx<bx+36;wx+=8)
          if ((wx+wy+frame/30|0)%3!==0) fillPx('#ffff88',wx|0,wy|0,4,4);
    }
  } else if (bgType==='ocean') {
    for (let i=0;i<3;i++) {
      const wo=(frame*(0.8+i*0.3))%W;
      for (let wx=-wo;wx<W+20;wx+=20) {
        const wy=H-30-i*15+Math.sin((wx+frame*0.5)*0.1)*4;
        fillPx(i===0?'#0066cc':'#004488',wx|0,wy|0,18,5);
      }
    }
    fillPx('#003366',0,H-20,W,20);
  } else if (bgType==='volcanic') {
    fillPx('#330000',0,H-40,W,40);
    for (let l=0;l<6;l++) {
      const lx=((l*80+frame*0.3)|0)%(W+80)-80;
      fillPx('#ff4400',lx,(H-8)|0,60,8);
      fillPx('#ff8800',(lx+10)|0,(H-12)|0,40,4);
    }
  } else {
    for (const t of bgTerrain) {
      fillPx(tc, t.x|0, t.y|0, t.w, t.h);
    }
  }
}

function updateBG() {
  const bgType = BG_SKINS[save.selBG][3];
  for (const s of bgStars) {
    s.y += s.speed;
    if (s.y > H) { s.y=-2; s.x=rnd(0,W); }
  }
  if (bgType!=='city'&&bgType!=='ocean'&&bgType!=='volcanic') {
    for (const t of bgTerrain) {
      t.y+=t.speed;
      if (t.y>H) { t.y=-40; t.x=rnd(0,W-80); }
    }
  }
}

function drawPlayer(p) {
  if (p.dead) return;
  if (p.invTimer>0 && Math.floor(p.invTimer/4)%2===1) return;
  const skin = PLANE_SKINS[p.skinIdx];
  const colors = [...skin[4]];
  if (p.pNum===2) colors[0]=shiftColor(colors[0],30);
  drawVectorPlane(skin[3], colors, cx, p.px, p.py, 1, false);
  if (p.shield>0) {
    cx.strokeStyle=`rgba(0,200,255,${0.4+Math.sin(frame*0.2)*0.3})`;
    cx.lineWidth=2;
    cx.beginPath(); cx.ellipse(p.px,p.py,22,28,0,0,Math.PI*2); cx.stroke();
  }
}

function updatePlayer(p, keys) {
  if (p.dead) {
    if (p.respawnTimer>0) p.respawnTimer--;
    if (p.respawnTimer===0&&p.lives>0) {
      p.dead=false;
      p.x=p.pNum===1?W*0.65:W*0.35; p.y=H-120;
      p.invTimer=120; p.shield=0;
    }
    return;
  }
  if (p.invTimer>0) p.invTimer--;
  if (p.shootTimer>0) p.shootTimer--;
  if (p.shield>0) p.shield--;

  let dx=0,dy=0;
  if (p.pNum===1) {
    if (keys['ArrowLeft']) dx=-1;
    if (keys['ArrowRight']) dx=1;
    if (keys['ArrowUp']) dy=-1;
    if (keys['ArrowDown']) dy=1;
  } else {
    if (keys['a']||keys['A']) dx=-1;
    if (keys['d']||keys['D']) dx=1;
    if (keys['w']||keys['W']) dy=-1;
    if (keys['s']||keys['S']) dy=1;
  }
  p.x+=dx*p.speed; p.y+=dy*p.speed;
  p.x=clamp(p.x,12,W-12); p.y=clamp(p.y,12,H-12);
  p.px=p.x|0; p.py=p.y|0;

  const fireKey=p.pNum===1?(keys['z']||keys['Z']):(keys['j']||keys['J']);
  if (fireKey&&p.shootTimer<=0) { fireBullet(p); SFX.shoot(p.weapon); }

  const bombKey=p.pNum===1?(keys['x']||keys['X']):(keys['k']||keys['K']);
  if (bombKey&&!p._bombHeld&&p.bombs>0) {
    p._bombHeld=true; p.bombs--; doBomb(p); SFX.bomb();
  }
  if (!bombKey) p._bombHeld=false;
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
function mkB(x,y,vx,vy,color,w,h,owner,dmg) {
  return {x,y,px:x|0,py:y|0,vx,vy,color,w,h,owner,dmg:dmg||10,alive:true};
}
function mkLaser(x,playerY,wl,owner) {
  return {x,y:0,px:x|0,py:0,vx:0,vy:0,color:'#ff2200',w:3+wl*2,h:playerY+12,
          owner,dmg:(4+wl*3)*0.5,alive:true,isLaserBeam:true,life:4,wl};
}

function fireBullet(p) {
  const x=p.x, y=p.y, wl=p.weaponLevel;
  const delays=[7,11,3,18,11,8,20,10,18,14];
  p.shootTimer=Math.max(1,(delays[p.weapon]-(wl-1)*1)|0);

  switch(p.weapon) {
    case 0: { // 标准炮 - 5 levels, more barrels + speed
      bullets.push(mkB(x,y-12,0,-12,'#00ffff',3,7,p,14+wl*4));
      if(wl>=2){bullets.push(mkB(x-9,y-6,-.15,-12,'#00aaff',3,6,p,11));bullets.push(mkB(x+9,y-6,.15,-12,'#00aaff',3,6,p,11));}
      if(wl>=3){bullets.push(mkB(x-18,y,-.45,-11,'#0077ff',2,5,p,9));bullets.push(mkB(x+18,y,.45,-11,'#0077ff',2,5,p,9));}
      if(wl>=4){p.shootTimer=Math.max(1,p.shootTimer-1);}
      if(wl>=5){bullets.push(mkB(x-27,y,-.8,-10,'#44aaff',2,4,p,7));bullets.push(mkB(x+27,y,.8,-10,'#44aaff',2,4,p,7));}
      break;
    }
    case 1: { // 散弹枪 - spread, more pellets per level
      const num=3+wl*2, spread=0.7+wl*0.15;
      for(let i=0;i<num;i++){
        const t=num>1?(i/(num-1)-0.5)*2*spread:0;
        bullets.push(mkB(x,y-8,t*3.5,-9+Math.abs(t)*-.3,'#ff8800',3+Math.floor(wl/2),4,p,8+wl*3));
      }
      break;
    }
    case 2: { // 激光炮 - persistent beam
      const b=mkLaser(x,y,wl,p);
      bullets.push(b);
      if(wl>=3){bullets.push({...mkLaser(x-12,y,wl-1,p),color:'#ff4400'});bullets.push({...mkLaser(x+12,y,wl-1,p),color:'#ff4400'});}
      if(wl>=5){bullets.push({...mkLaser(x-24,y,wl-2,p),color:'#ff6600'});bullets.push({...mkLaser(x+24,y,wl-2,p),color:'#ff6600'});}
      p.shootTimer=3;
      break;
    }
    case 3: { // 制导导弹 - homing, more missiles per level
      const mCount=Math.min(1+Math.floor(wl/2)*2,5);
      const xOffsets=[-18,-8,0,8,18].slice(0,mCount).map((v,i,a)=>a[i]-(a[a.length-1]+a[0])/2);
      for(let i=0;i<mCount;i++){
        const b=mkB(x+(xOffsets[i]||0)*0.7,y-10,(xOffsets[i]||0)*0.06,-7-(i%2),'#ffcc00',4,8,p,22+wl*6);
        b.homing=true; b.homingStr=0.07+wl*0.015; bullets.push(b);
      }
      break;
    }
    case 4: { // 等离子炮 - large orbs
      const sz=8+wl*2;
      bullets.push(mkB(x,y-10,0,-7,'#cc00ff',sz,sz,p,28+wl*10));
      if(wl>=2){bullets.push(mkB(x-14,y-4,-.4,-7,'#aa00dd',sz-3,sz-3,p,18+wl*4));bullets.push(mkB(x+14,y-4,.4,-7,'#aa00dd',sz-3,sz-3,p,18+wl*4));}
      if(wl>=4){for(let i=0;i<6;i++){const ag=(i/6)*Math.PI*2;bullets.push(mkB(x,y,Math.cos(ag)*4,Math.sin(ag)*4-5,'#dd44ff',5,5,p,10+wl*2));}}
      if(wl>=5){bullets.push(mkB(x,y-10,0,-4,'#ffffff',sz+4,sz+4,p,50));}
      break;
    }
    case 5: { // 闪电链 - chain lightning bolts
      const lCount=1+wl;
      for(let i=0;i<lCount;i++){
        const ox=(i-(lCount-1)/2)*9;
        const b=mkB(x+ox,y-10,ox*.04,-13+Math.abs(ox)*.03,'#88ffff',3,12,p,16+wl*5);
        b.lightning=true; bullets.push(b);
      }
      break;
    }
    case 6: { // 回旋镖 - boomerangs
      const bCount=Math.ceil(wl/2);
      for(const s of[-1,1]){
        for(let i=0;i<bCount;i++){
          const b=mkB(x,y-8,s*(3+i*1.2),-9+i*.3,'#00ff88',5,5,p,13+wl*4);
          b.boomerang=true;b.bTimer=0; bullets.push(b);
        }
      }
      if(wl===5) bullets.push(mkB(x,y-14,0,-12,'#00ffaa',6,6,p,20));
      break;
    }
    case 7: { // 波动炮 - sinusoidal wave shots [NEW]
      const wCount=Math.min(wl,5);
      for(let i=0;i<wCount;i++){
        const ph=(i/Math.max(wCount-1,1))*Math.PI*1.5;
        const b={x,y,px:x|0,py:y|0,vx:0,vy:-10,color:'#00ddff',w:5,h:7,
                 owner:p,dmg:13+wl*4,alive:true,wave:true,wPhase:ph,wAmp:10+wl*2,baseX:x};
        bullets.push(b);
      }
      if(wl>=4) bullets.push(mkB(x,y-10,0,-14,'#66eeff',3,8,p,18+wl*4));
      break;
    }
    case 8: { // 龙卷炮 - tornado spiral rings [NEW]
      const rings=1+Math.floor(wl/2);
      for(let r=0;r<rings;r++){
        const n=8, baseAng=frame*0.15+r*(Math.PI/8);
        for(let i=0;i<n;i++){
          const ag=(i/n)*Math.PI*2+baseAng;
          bullets.push(mkB(x,y,Math.cos(ag)*4.5,Math.sin(ag)*4.5-10,'#ff44ff',4,4,p,10+wl*3+r*4));
        }
      }
      break;
    }
    case 9: { // 冰晶炮 - slow spreading ice crystals [NEW]
      const cCount=4+wl*2;
      for(let i=0;i<cCount;i++){
        const ag=(i/cCount)*Math.PI*2-Math.PI/2;
        const spd=4.5+wl;
        const b=mkB(x,y,Math.cos(ag)*spd*.55,(Math.sin(ag)*spd*.55)-5.5,'#aaeeff',5+wl,5+wl,p,20+wl*6);
        b.crystal=true; b.slowF=0.96; bullets.push(b);
      }
      if(wl>=5){const b=mkB(x,y-10,0,-3,'#ffffff',14,14,p,90);b.crystal=true;b.slowF=0.98;bullets.push(b);}
      break;
    }
  }
}

function updateBullets() {
  for(const b of bullets) {
    if(!b.alive) continue;
    if(b.isLaserBeam){b.life--;if(b.life<=0)b.alive=false;continue;}
    if(b.wave){b.wPhase+=0.2;b.x=b.baseX+Math.sin(b.wPhase)*b.wAmp;b.px=b.x|0;}
    if(b.crystal){b.vx*=b.slowF;b.vy*=b.slowF;if(Math.abs(b.vx)<0.15&&Math.abs(b.vy)<0.15){b.alive=false;continue;}}
    if(b.homing){
      const tgt=enemies.find(e=>e.alive&&e.y>-20)||(boss&&boss.alive?boss:null);
      if(tgt){const dx=tgt.x-b.x,dy=tgt.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;b.vx+=dx/d*b.homingStr;b.vy+=dy/d*b.homingStr;const sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(sp>12){b.vx=b.vx/sp*12;b.vy=b.vy/sp*12;}}
    }
    if(b.boomerang){b.bTimer++;if(b.bTimer>22)b.vx*=0.91;if(b.bTimer>32){b.vy=Math.abs(b.vy)*.25;}}
    b.x+=b.vx; b.y+=b.vy;
    b.px=b.x|0; b.py=b.y|0;
    if(b.x<-40||b.x>W+40||b.y<-40||b.y>H+40) b.alive=false;
  }
  bullets=bullets.filter(b=>b.alive);
}

function updateEnemyBullets() {
  for(const b of enemyBullets){b.x+=b.vx;b.y+=b.vy;b.px=b.x|0;b.py=b.y|0;if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+20)b.alive=false;}
  enemyBullets=enemyBullets.filter(b=>b.alive);
}

function drawBullets() {
  for(const b of bullets) {
    if(b.isLaserBeam) {
      const alpha=b.life/5;
      const lg=cx.createLinearGradient(b.px-b.w*3,0,b.px+b.w*3,0);
      lg.addColorStop(0,'transparent'); lg.addColorStop(.5,b.color+'88'); lg.addColorStop(1,'transparent');
      cx.fillStyle=lg; cx.fillRect(b.px-b.w*3,0,b.w*6,b.h);
      cx.fillStyle=b.color+'cc'; cx.fillRect(b.px-b.w/2,0,b.w,b.h);
      cx.fillStyle='rgba(255,255,255,0.6)'; cx.fillRect(b.px-1,0,2,b.h);
      continue;
    }
    if(b.wave||b.crystal||b.homing) {
      const rg=cx.createRadialGradient(b.px,b.py,0,b.px,b.py,b.w*1.8);
      rg.addColorStop(0,'#ffffffcc'); rg.addColorStop(.4,b.color); rg.addColorStop(1,b.color+'00');
      cx.fillStyle=rg; cx.beginPath(); cx.arc(b.px,b.py,b.w*1.8,0,Math.PI*2); cx.fill();
      continue;
    }
    if(b.lightning) {
      cx.strokeStyle=b.color; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(b.px,b.py);
      for(let s=0;s<3;s++) cx.lineTo(b.px+rnd(-4,4),(b.py-b.h/2)+s*(b.h/2));
      cx.stroke();
      cx.fillStyle=b.color+'aa'; cx.beginPath(); cx.arc(b.px,b.py,4,0,Math.PI*2); cx.fill();
      continue;
    }
    // Normal bullets with glow
    cx.fillStyle=b.color+'44'; cx.fillRect((b.px-b.w)|0,(b.py-b.h)|0,b.w*2,b.h*2);
    cx.fillStyle=b.color; cx.fillRect((b.px-b.w/2)|0,(b.py-b.h/2)|0,b.w,b.h);
  }
}

function drawEnemyBullets() {
  for(const b of enemyBullets) {
    const rg=cx.createRadialGradient(b.px,b.py,0,b.px,b.py,7);
    rg.addColorStop(0,'#ffaa44'); rg.addColorStop(.4,b.color||'#ff4400'); rg.addColorStop(1,(b.color||'#ff4400')+'00');
    cx.fillStyle=rg; cx.beginPath(); cx.arc(b.px,b.py,7,0,Math.PI*2); cx.fill();
    cx.fillStyle='#ffeeaa'; cx.beginPath(); cx.arc(b.px,b.py,2,0,Math.PI*2); cx.fill();
  }
}

function doBomb(p) {
  bombFlash=15;
  for(const e of enemies){if(!e.alive)continue;e.hp-=80;spawnExplosion(e.x,e.y,'medium');if(e.hp<=0)killEnemy(e);}
  if(boss&&boss.alive){boss.hp-=200;spawnExplosion(boss.x,boss.y,'large');}
  for(const b of enemyBullets) b.alive=false;
}

// ─── ENEMIES ─────────────────────────────────────────────────────────────────
function mkEnemy(type, x, y) {
  const cfg={
    basic:  {hp:20, spd:1.5,pts:100,w:20,h:18,col:'#ff4444',cv:1},
    zigzag: {hp:30, spd:2,  pts:150,w:18,h:16,col:'#ff8800',cv:2},
    bomber: {hp:60, spd:1,  pts:300,w:28,h:22,col:'#aa44ff',cv:3},
    gunship:{hp:80, spd:1.2,pts:250,w:30,h:24,col:'#44aaff',cv:2},
    tank:   {hp:150,spd:0.7,pts:400,w:36,h:28,col:'#44ff44',cv:4},
    speeder:{hp:15, spd:3.5,pts:80, w:14,h:12,col:'#ffff00',cv:1},
    carrier:{hp:200,spd:0.5,pts:600,w:50,h:40,col:'#ff44aa',cv:5},
  };
  const c=cfg[type]||cfg.basic;
  return {
    type,x,y,px:x|0,py:y|0,
    hp:c.hp*getDiff().hpMult, maxHp:c.hp*getDiff().hpMult,
    speed:c.spd*(0.7+level*0.04), pts:c.pts, w:c.w, h:c.h, col:c.col, cv:c.cv,
    alive:true, moveTimer:0, vx:rnd(-1,1), vy:c.spd,
  };
}

function updateEnemy(e) {
  if(!e.alive) return;
  e.moveTimer++;
  switch(e.type) {
    case 'basic':   e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.03)*0.5; break;
    case 'zigzag':  e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.08)*3; break;
    case 'bomber':
      e.y+=e.speed*0.7;
      if(e.moveTimer%65===0) fireEB(e,0,3);
      break;
    case 'gunship':
      e.y+=e.speed*0.5; e.x+=Math.sin(e.moveTimer*0.04)*2;
      if(e.moveTimer%45===0){fireEB(e,-1,3);fireEB(e,1,3);}
      break;
    case 'tank':
      e.y+=e.speed*0.4;
      if(e.moveTimer%55===0) for(let i=-2;i<=2;i++) fireEB(e,i*0.8,3);
      break;
    case 'speeder':
      e.y+=e.speed; e.x+=e.vx;
      if(e.x<10||e.x>W-10) e.vx*=-1;
      break;
    case 'carrier':
      e.y+=e.speed*0.3; e.x+=Math.sin(e.moveTimer*0.02)*1.5;
      if(e.moveTimer%35===0){fireEB(e,-2,3);fireEB(e,0,3);fireEB(e,2,3);}
      if(e.moveTimer%130===0) enemies.push(mkEnemy('speeder',e.x+rnd(-30,30),e.y+10));
      break;
  }
  e.x=clamp(e.x,e.w/2,W-e.w/2);
  e.px=e.x|0; e.py=e.y|0;
  if(e.y>H+60) e.alive=false;
}

function fireEB(e, dvx, dvy) {
  const t=players.find(p=>!p.dead);
  const sm=getDiff().bulletSpd;
  let vx=dvx*sm, vy=dvy*sm;
  if(t){const dx=t.x-e.x,dy=t.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;vx+=dx/d*(1+sm*0.8);vy+=dy/d*(1+sm*0.8);}
  enemyBullets.push({x:e.x,y:e.y+e.h/2,px:e.x|0,py:(e.y+e.h/2)|0,vx,vy,alive:true,color:'#ff4400'});
}

function drawEnemy(e) {
  if(!e.alive) return;
  const x=e.px, y=e.py;
  cx.save(); cx.translate(x, y);
  const rg=cx.createRadialGradient(0,-e.h*0.15,2,0,0,e.w*0.65);
  rg.addColorStop(0,'#ffffffaa'); rg.addColorStop(0.3,e.col); rg.addColorStop(1,e.col+'22');

  // Engine exhaust at top (rear of plane flying downward)
  const eg=cx.createRadialGradient(0,-e.h*.4,1,0,-e.h*.4,9);
  eg.addColorStop(0,'#ff8844cc'); eg.addColorStop(1,'transparent');
  cx.fillStyle=eg; cx.beginPath(); cx.arc(0,-e.h*.4,9,0,Math.PI*2); cx.fill();

  switch(e.type) {
    case 'basic': {
      // Sleek delta-wing interceptor — nose pointing DOWN
      cx.fillStyle=e.col+'99'; // swept delta wings
      cx.beginPath(); cx.moveTo(0,e.h*.5); cx.lineTo(-e.w*.5,-e.h*.15); cx.lineTo(-e.w*.2,-e.h*.5); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(0,e.h*.5); cx.lineTo(e.w*.5,-e.h*.15); cx.lineTo(e.w*.2,-e.h*.5); cx.closePath(); cx.fill();
      cx.fillStyle=rg; // body
      cx.beginPath(); cx.moveTo(0,e.h*.55); cx.lineTo(-e.w*.18,e.h*.1); cx.lineTo(-e.w*.15,-e.h*.5); cx.lineTo(e.w*.15,-e.h*.5); cx.lineTo(e.w*.18,e.h*.1); cx.closePath(); cx.fill();
      cx.fillStyle='rgba(0,255,220,.55)'; // cockpit
      cx.beginPath(); cx.ellipse(0,e.h*.2,3,5,0,0,Math.PI*2); cx.fill();
      break;
    }
    case 'zigzag': {
      // Forward-swept nimble fighter
      cx.fillStyle=e.col+'99';
      cx.beginPath(); cx.moveTo(-e.w*.05,e.h*.1); cx.lineTo(-e.w*.5,e.h*.4); cx.lineTo(-e.w*.35,-e.h*.3); cx.lineTo(-e.w*.1,-e.h*.5); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(e.w*.05,e.h*.1); cx.lineTo(e.w*.5,e.h*.4); cx.lineTo(e.w*.35,-e.h*.3); cx.lineTo(e.w*.1,-e.h*.5); cx.closePath(); cx.fill();
      cx.fillStyle=rg;
      cx.beginPath(); cx.moveTo(0,e.h*.55); cx.lineTo(-e.w*.16,0); cx.lineTo(-e.w*.12,-e.h*.5); cx.lineTo(e.w*.12,-e.h*.5); cx.lineTo(e.w*.16,0); cx.closePath(); cx.fill();
      cx.fillStyle='rgba(255,200,.55)';
      cx.beginPath(); cx.ellipse(0,e.h*.2,3,4,0,0,Math.PI*2); cx.fill();
      break;
    }
    case 'bomber': {
      // Heavy bomber — wide oval body with bomb bays
      cx.fillStyle=rg;
      cx.beginPath(); cx.ellipse(0,e.h*.05,e.w*.5,e.h*.45,0,0,Math.PI*2); cx.fill();
      cx.fillStyle=e.col+'77'; // stub wings
      cx.beginPath(); cx.moveTo(-e.w*.45,e.h*.1); cx.lineTo(-e.w*.8,-e.h*.05); cx.lineTo(-e.w*.5,-e.h*.2); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(e.w*.45,e.h*.1); cx.lineTo(e.w*.8,-e.h*.05); cx.lineTo(e.w*.5,-e.h*.2); cx.closePath(); cx.fill();
      cx.fillStyle='rgba(0,0,0,.5)'; // bomb bays
      cx.beginPath(); cx.ellipse(-e.w*.22,e.h*.15,e.w*.14,e.h*.22,0,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.ellipse(e.w*.22,e.h*.15,e.w*.14,e.h*.22,0,0,Math.PI*2); cx.fill();
      cx.fillStyle='rgba(200,80,255,.6)';
      cx.beginPath(); cx.ellipse(0,-e.h*.1,e.w*.16,e.h*.18,0,0,Math.PI*2); cx.fill();
      break;
    }
    case 'gunship': {
      // Armored hexagonal gunship
      cx.fillStyle=rg;
      cx.beginPath();
      for(let i=0;i<6;i++){const ag=i/6*Math.PI*2-Math.PI/2;cx.lineTo(Math.cos(ag)*e.w*.5,Math.sin(ag)*e.h*.5);}
      cx.closePath(); cx.fill();
      cx.strokeStyle=e.col+'cc'; cx.lineWidth=1.5; cx.stroke();
      cx.fillStyle=e.col+'aa'; // dual gun barrels pointing down
      cx.fillRect(-e.w*.46,-3,e.w*.2,7); cx.fillRect(e.w*.26,-3,e.w*.2,7);
      // barrel tips
      cx.fillStyle='#ffffff55';
      cx.fillRect(-e.w*.42,3,e.w*.12,3); cx.fillRect(e.w*.3,3,e.w*.12,3);
      cx.fillStyle='rgba(80,200,255,.65)';
      cx.beginPath(); cx.ellipse(0,-e.h*.08,e.w*.16,e.h*.18,0,0,Math.PI*2); cx.fill();
      break;
    }
    case 'tank': {
      // Fortress — wide armored hull with triple turrets
      cx.fillStyle=rg;
      cx.beginPath(); cx.roundRect(-e.w*.5,-e.h*.5,e.w,e.h,5); cx.fill();
      cx.strokeStyle=e.col; cx.lineWidth=1; cx.stroke();
      // armor plating lines
      cx.strokeStyle='rgba(0,0,0,.35)'; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(-e.w*.5,-e.h*.05); cx.lineTo(e.w*.5,-e.h*.05); cx.stroke();
      // 3 turrets
      for(let i=-1;i<=1;i++){
        cx.fillStyle=e.col+'cc';
        cx.beginPath(); cx.arc(i*e.w*.32,e.h*.12,e.w*.13,0,Math.PI*2); cx.fill();
        cx.fillStyle='#1a441a';
        cx.fillRect((i*e.w*.32-1.5)|0,e.h*.24|0,3,e.h*.22);
      }
      cx.fillStyle='rgba(100,255,100,.5)';
      cx.beginPath(); cx.ellipse(0,-e.h*.1,e.w*.15,e.h*.15,0,0,Math.PI*2); cx.fill();
      break;
    }
    case 'speeder': {
      // Needle-thin speed demon
      cx.fillStyle=e.col+'88'; // tiny clipped delta wings
      cx.beginPath(); cx.moveTo(-e.w*.1,-e.h*.05); cx.lineTo(-e.w*.5,-e.h*.15); cx.lineTo(-e.w*.15,-e.h*.4); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(e.w*.1,-e.h*.05); cx.lineTo(e.w*.5,-e.h*.15); cx.lineTo(e.w*.15,-e.h*.4); cx.closePath(); cx.fill();
      cx.fillStyle=rg; // needle body
      cx.beginPath(); cx.moveTo(0,e.h*.55); cx.lineTo(-e.w*.18,e.h*.1); cx.lineTo(-e.w*.12,-e.h*.5); cx.lineTo(e.w*.12,-e.h*.5); cx.lineTo(e.w*.18,e.h*.1); cx.closePath(); cx.fill();
      // speed streaks
      cx.strokeStyle=e.col+'55'; cx.lineWidth=1;
      cx.beginPath(); cx.moveTo(-3,e.h*.3); cx.lineTo(-3,e.h*.55); cx.stroke();
      cx.beginPath(); cx.moveTo(3,e.h*.3); cx.lineTo(3,e.h*.55); cx.stroke();
      cx.fillStyle='rgba(255,255,100,.6)';
      cx.beginPath(); cx.ellipse(0,e.h*.18,2,3,0,0,Math.PI*2); cx.fill();
      break;
    }
    case 'carrier': {
      // Massive carrier — wide armored hull
      cx.fillStyle=rg;
      cx.beginPath(); cx.roundRect(-e.w*.5,-e.h*.5,e.w,e.h,8); cx.fill();
      cx.strokeStyle='#ff44aa'; cx.lineWidth=1.5; cx.stroke();
      // side wings
      cx.fillStyle=e.col+'66';
      cx.beginPath(); cx.moveTo(-e.w*.5,-e.h*.05); cx.lineTo(-e.w*.75,e.h*.15); cx.lineTo(-e.w*.68,e.h*.35); cx.lineTo(-e.w*.5,e.h*.25); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(e.w*.5,-e.h*.05); cx.lineTo(e.w*.75,e.h*.15); cx.lineTo(e.w*.68,e.h*.35); cx.lineTo(e.w*.5,e.h*.25); cx.closePath(); cx.fill();
      // hangar bay (darker rect)
      cx.fillStyle='rgba(0,0,0,.6)';
      cx.beginPath(); cx.roundRect(-e.w*.35,e.h*.08,e.w*.7,e.h*.32,4); cx.fill();
      // command bridge
      cx.fillStyle=e.col+'bb';
      cx.beginPath(); cx.roundRect(-e.w*.14,-e.h*.35,e.w*.28,e.h*.22,3); cx.fill();
      cx.fillStyle='rgba(255,100,180,.6)';
      cx.beginPath(); cx.ellipse(0,-e.h*.24,e.w*.09,e.h*.1,0,0,Math.PI*2); cx.fill();
      break;
    }
  }
  cx.restore();
  // Health bar
  if(e.hp<e.maxHp){
    const hbx=x-e.w/2, hby=y-e.h/2-6;
    const hr=e.hp/e.maxHp;
    cx.fillStyle='#220000'; cx.fillRect(hbx|0,hby|0,e.w,3);
    cx.fillStyle=hr>.5?'#00ff44':hr>.25?'#ffcc00':'#ff2200';
    cx.fillRect(hbx|0,hby|0,(e.w*hr)|0,3);
  }
}

// ─── BOSS ────────────────────────────────────────────────────────────────────
function spawnBoss() {
  bossActive=true;
  SFX.bossAppear();
  boss={x:W/2,y:-80,px:W/2|0,py:-80,hp:1500+level*200,maxHp:1500+level*200,w:80,h:60,alive:true,phase:0,moveTimer:0,shootTimer:0,vx:1.5,entryDone:false,pts:5000};
}

function updateBoss() {
  if(!boss||!boss.alive) return;
  boss.moveTimer++;
  if(!boss.entryDone){boss.y+=2;if(boss.y>=80){boss.entryDone=true;boss.y=80;}boss.px=boss.x|0;boss.py=boss.y|0;return;}
  boss.x+=boss.vx;
  if(boss.x<60||boss.x>W-60) boss.vx*=-1;
  const hr=boss.hp/boss.maxHp;
  if(hr<0.5&&boss.phase===0)boss.phase=1;
  if(hr<0.25&&boss.phase===1)boss.phase=2;
  const fr=boss.phase===0?28:boss.phase===1?18:10;
  boss.shootTimer++;
  if(boss.shootTimer>=fr){boss.shootTimer=0;bossShoot();}
  boss.px=boss.x|0;boss.py=boss.y|0;
}

function bossShoot() {
  for(let i=-3;i<=3;i++) enemyBullets.push({x:boss.x,y:boss.y+30,px:boss.x|0,py:(boss.y+30)|0,vx:i*1.5,vy:4,alive:true,color:'#ff0088'});
  if(boss.phase>=1){
    for(let a=0;a<8;a++){const ag=(a/8)*Math.PI*2;enemyBullets.push({x:boss.x,y:boss.y,px:boss.x|0,py:boss.y|0,vx:Math.cos(ag)*3,vy:Math.sin(ag)*3,alive:true,color:'#ff00ff'});}
  }
}

function drawBoss() {
  if(!boss||!boss.alive) return;
  const x=boss.px, y=boss.py;
  const pulse=Math.sin(frame*0.12)*0.15+0.25;
  cx.save(); cx.translate(x, y);

  // Outer glow
  const og=cx.createRadialGradient(0,0,20,0,0,60);
  og.addColorStop(0,`rgba(255,0,80,${pulse})`); og.addColorStop(1,'rgba(255,0,80,0)');
  cx.fillStyle=og; cx.beginPath(); cx.arc(0,0,60,0,Math.PI*2); cx.fill();

  // Main body hull
  const bg=cx.createLinearGradient(-40,-30,40,30);
  bg.addColorStop(0,'#cc0044'); bg.addColorStop(0.5,'#880033'); bg.addColorStop(1,'#440022');
  cx.fillStyle=bg;
  cx.beginPath(); cx.moveTo(0,-40); cx.lineTo(-50,-10); cx.lineTo(-45,20); cx.lineTo(45,20); cx.lineTo(50,-10); cx.closePath(); cx.fill();

  // Wing strakes
  cx.fillStyle='#660022';
  cx.beginPath(); cx.moveTo(-20,-10); cx.lineTo(-70,30); cx.lineTo(-55,35); cx.lineTo(-10,15); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(20,-10); cx.lineTo(70,30); cx.lineTo(55,35); cx.lineTo(10,15); cx.closePath(); cx.fill();

  // Engine pods
  const ep=cx.createLinearGradient(0,20,0,40);
  ep.addColorStop(0,'#440022'); ep.addColorStop(1,'#220011');
  cx.fillStyle=ep;
  cx.beginPath(); cx.roundRect(-52,15,18,25,3); cx.fill();
  cx.beginPath(); cx.roundRect(34,15,18,25,3); cx.fill();
  // Engine glows
  const eg1=cx.createRadialGradient(-43,40,1,-43,40,10);
  eg1.addColorStop(0,'#ff4488'); eg1.addColorStop(1,'transparent');
  cx.fillStyle=eg1; cx.beginPath(); cx.arc(-43,40,10,0,Math.PI*2); cx.fill();
  const eg2=cx.createRadialGradient(43,40,1,43,40,10);
  eg2.addColorStop(0,'#ff4488'); eg2.addColorStop(1,'transparent');
  cx.fillStyle=eg2; cx.beginPath(); cx.arc(43,40,10,0,Math.PI*2); cx.fill();

  // Cockpit dome
  const cg=cx.createRadialGradient(-5,-20,2,0,-15,18);
  cg.addColorStop(0,'#ffddff'); cg.addColorStop(0.5,'#ff44aa'); cg.addColorStop(1,'#880033');
  cx.fillStyle=cg;
  cx.beginPath(); cx.ellipse(0,-15,16,20,0,0,Math.PI*2); cx.fill();
  // Canopy shine
  cx.fillStyle='rgba(255,255,255,0.25)';
  cx.beginPath(); cx.ellipse(-4,-20,7,9,0.3,0,Math.PI*2); cx.fill();

  // Gun barrels
  const phase=boss.phase||0;
  const barColor = phase>=2?'#ff0044':phase>=1?'#cc0033':'#880022';
  cx.fillStyle=barColor;
  cx.fillRect(-8,-42,5,16); cx.fillRect(3,-42,5,16);

  // Phase indicator lights
  if(phase>=1){cx.fillStyle='#ff8800';cx.beginPath();cx.arc(-35,-15,5,0,Math.PI*2);cx.fill();}
  if(phase>=2){cx.fillStyle='#ff0000';cx.beginPath();cx.arc(35,-15,5,0,Math.PI*2);cx.fill();}

  cx.restore();

  // Boss HP bar
  const bpw=240,bpx=(W-bpw)/2,bpy=H-28;
  cx.fillStyle='rgba(0,0,0,0.7)'; cx.fillRect(bpx-2,bpy-2,bpw+4,14);
  cx.fillStyle='#330011'; cx.fillRect(bpx|0,bpy|0,bpw,10);
  const hpRatio=boss.hp/boss.maxHp;
  const bHpGrad=cx.createLinearGradient(bpx,0,bpx+bpw,0);
  bHpGrad.addColorStop(0,'#ff0044'); bHpGrad.addColorStop(1,'#ff88aa');
  cx.fillStyle=bHpGrad; cx.fillRect(bpx|0,bpy|0,(bpw*hpRatio)|0,10);
  cx.fillStyle='#ff88aa'; cx.font="bold 11px sans-serif"; cx.textAlign='center';
  cx.fillText('★ BOSS ★',(W/2)|0,(bpy-4)|0); cx.textAlign='left';
}

// ─── PICKUPS ─────────────────────────────────────────────────────────────────
function spawnPickup(x,y,type,value) {
  pickups.push({x,y,px:x|0,py:y|0,type,value:value||1,alive:true,vy:1.5,bob:rnd(0,Math.PI*2)});

function updatePickups() {
  for(const pk of pickups){pk.y+=pk.vy;pk.px=pk.x|0;pk.py=pk.y|0;if(pk.y>H+20)pk.alive=false;}

const WINGMAN_COLORS=['#00ffff','#ffcc00','#00ff88','#ff8800','#ff4488'];

function drawPickupIcon(pk) {
  const x=pk.px, y=pk.py;
  const bob=Math.sin(frame*0.08+pk.bob)*2;
  cx.save(); cx.translate(x, y+bob);

  switch(pk.type) {
    case 'coin': {
      const g=cx.createRadialGradient(-2,-2,1,0,0,9);

      cx.fillText('$',0,1); cx.textBaseline='alphabetic';

    }
    case 'diamond': {

      cx.strokeStyle='#55ddff'; cx.lineWidth=1; cx.stroke();
      // Inner shine

      cx.beginPath(); cx.moveTo(0,-8); cx.lineTo(5,-2); cx.lineTo(0,0); cx.lineTo(-5,-2); cx.closePath(); cx.fill();

    }

      g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,'#ffff00'); g.addColorStop(1,'#ff8800');
      cx.fillStyle=g;
      cx.beginPath();
      for(let i=0;i<pts*2;i++){
        const a=(i/pts/2)*Math.PI*2-Math.PI/2;

        i===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);

      cx.closePath(); cx.fill();

    case 'life': {

      cx.strokeStyle='#ff4444'; cx.lineWidth=1; cx.stroke();

      cx.fillText('W'+(wt+1),0,13); cx.textBaseline='alphabetic';
      break;
    }
  }
  cx.restore();
}

function drawPickups() {
  for(const pk of pickups) drawPickupIcon(pk);
}

function collectPickups() {
  for(const p of players) {
    if(p.dead) continue;
    for(const pk of pickups) {
      if(!pk.alive) continue;
      if(Math.abs(p.x-pk.x)<20&&Math.abs(p.y-pk.py)<20) {
        pk.alive=false;
        switch(pk.type) {
          case 'coin':
            score+=pk.value; sessionCoins+=pk.value;
            addFT('+'+pk.value,pk.x,pk.y,'#ffcc00'); SFX.pickupCoin(); break;
          case 'diamond':
            sessionDiamonds+=pk.value;
            addFT('+'+pk.value+'💎',pk.x,pk.y,'#00aaff'); SFX.pickupDiamond(); break;
          case 'weapon':
            p.weapon=pk.value%10; p.weaponLevel=1;
            addFT(WEAPON_NAMES[p.weapon],pk.x,pk.y,'#ff8800'); SFX.pickupWeapon(); break;
          case 'star':
            if(p.weaponLevel<5){p.weaponLevel++;SFX.levelUp();}else SFX.pickupStar();
            addFT('★UP',pk.x,pk.y,'#ffff00'); break;
          case 'life':
            p.lives++; addFT('+1UP',pk.x,pk.y,'#ff4444'); SFX.pickupLife(); break;
          case 'bomb':
            p.bombs++; addFT('+BOMB',pk.x,pk.y,'#4444ff'); break;
          case 'shield':
            p.shield=300; addFT('SHIELD',pk.x,pk.y,'#00ffcc'); SFX.pickupShield(); break;
          case 'wingman':
            spawnWingman(p, pk.value);
            addFT(WINGMAN_NAMES[pk.value],pk.x,pk.y,WINGMAN_COLORS[pk.value]); SFX.pickupWeapon(); break;
        }
      }
    }
  }
}

// ─── WINGMEN ─────────────────────────────────────────────────────────────────
// wType: 0=laser, 1=missile, 2=shield, 3=spread, 4=bomber
const WINGMAN_OFFSETS=[
  {dx:-36,dy:-10},{dx:36,dy:-10},{dx:-60,dy:0},{dx:60,dy:0},{dx:0,dy:-50}
];

function spawnWingman(player, wType) {
  const slot=wingmen.filter(w=>w.owner===player).length;
  if(slot>=5) return; // max 5
  wingmen.push({
    owner:player, wType, alive:true,
    x:player.x, y:player.y,
    slot, fireTimer:0,
    dx:WINGMAN_OFFSETS[slot%5].dx,
    dy:WINGMAN_OFFSETS[slot%5].dy,
    shieldTimer: wType===2 ? 400 : 0,
  });
}

function updateWingmen() {
  for(const w of wingmen) {
    if(!w.alive) continue;
    if(w.owner.dead) { w.alive=false; continue; }
    // Smoothly follow player with offset
    const tx=w.owner.x+w.dx, ty=w.owner.y+w.dy;
    w.x+=(tx-w.x)*0.12; w.y+=(ty-w.y)*0.12;
    w.fireTimer++;
    const rates=[20,35,0,18,50]; // shield doesn't fire bullets
    if(w.wType===2) {
      // Shield wingman: gives player a shield that blocks 3 hits
      if(w.fireTimer>=60&&w.owner.shield<=0) {
        w.owner.shield=300; w.owner.shieldHits=3; w.fireTimer=0;
      }
    } else if(w.fireTimer>=rates[w.wType]) {
      w.fireTimer=0;
      fireWingmanBullet(w);
    }
  }
  wingmen=wingmen.filter(w=>w.alive);
}

function fireWingmanBullet(w) {
  const x=w.x, y=w.y;
  switch(w.wType) {
    case 0: // laser
      bullets.push(mkB(x,y,-0,- 14,'#00ffff',2,16,w.owner,12,true));
      break;
    case 1: // missile
      bullets.push(mkB(x,y,0,-8,'#ffcc00',4,8,w.owner,22));
      break;
    case 3: // spread
      [-2,0,2].forEach(vx=>bullets.push(mkB(x,y,vx,-10,'#ff8800',3,5,w.owner,9)));
      break;
    case 4: // bomber - fires a slow heavy shot
      bullets.push(mkB(x,y,0,-5,'#ff44aa',8,8,w.owner,40));
      break;
  }
}

function drawWingmen() {
  for(const w of wingmen) {
    if(!w.alive||w.owner.dead) continue;
    const wc=WINGMAN_COLORS[w.wType];
    // Draw mini escort plane
    cx.save(); cx.translate(w.x|0, w.y|0);
    cx.fillStyle=wc+'cc';
    cx.beginPath(); cx.moveTo(0,-10); cx.lineTo(-8,6); cx.lineTo(8,6); cx.closePath(); cx.fill();
    cx.fillRect(-11,2,22,3);
    // Engine glow
    const eg=cx.createRadialGradient(0,7,1,0,7,7);
    eg.addColorStop(0,wc); eg.addColorStop(1,wc+'00');
    cx.fillStyle=eg; cx.beginPath(); cx.arc(0,7,7,0,Math.PI*2); cx.fill();
    // Type indicator glow halo
    cx.strokeStyle=wc; cx.lineWidth=1; cx.globalAlpha=0.5+Math.sin(frame*0.15)*0.3;
    cx.beginPath(); cx.ellipse(0,0,14,14,0,0,Math.PI*2); cx.stroke();
    cx.globalAlpha=1;
    cx.restore();
  }
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function checkCollisions() {
  for(const b of bullets) {
    if(!b.alive) continue;
    if(b.isLaserBeam) {
      for(const e of enemies) {
        if(!e.alive) continue;
        if(Math.abs(e.x-b.x)<b.w/2+e.w/2&&e.y>0&&e.y<b.h) {
          e.hp-=b.dmg; if(Math.random()<0.25)SFX.hitEnemy(); if(e.hp<=0)killEnemy(e);
        }
      }
      if(boss&&boss.alive&&Math.abs(boss.x-b.x)<b.w/2+44&&boss.y<b.h) {
        boss.hp-=b.dmg; if(boss.hp<=0)killBoss();
      }
      continue;
    }
    for(const e of enemies) {
      if(!e.alive) continue;
      if(Math.abs(b.x-e.x)<(b.w/2+e.w/2)&&Math.abs(b.y-e.y)<(b.h/2+e.h/2)) {
        e.hp-=b.dmg; b.alive=false; SFX.hitEnemy();
        if(e.hp<=0) killEnemy(e);
        break;
      }
    }
    if(!b.alive) continue;
    if(boss&&boss.alive&&Math.abs(b.x-boss.x)<44&&Math.abs(b.y-boss.y)<34) {
      boss.hp-=b.dmg; b.alive=false; SFX.hitEnemy();
      if(boss.hp<=0) killBoss();
    }
  }
  for(const p of players) {
    if(p.dead||p.invTimer>0||invincible) continue;
    for(const b of enemyBullets) {
      if(!b.alive) continue;
      if(Math.abs(b.x-p.x)<8&&Math.abs(b.y-p.y)<12) {b.alive=false;hitPlayer(p);break;}
    }
    for(const e of enemies) {
      if(!e.alive) continue;
      if(Math.abs(e.x-p.x)<12&&Math.abs(e.y-p.y)<14) {hitPlayer(p);e.hp-=30;if(e.hp<=0)killEnemy(e);break;}
    }
    if(boss&&boss.alive&&Math.abs(boss.x-p.x)<48&&Math.abs(boss.y-p.y)<38) hitPlayer(p);
  }
}

function hitPlayer(p) {
  if(p.invTimer>0) return;
  if(p.shield>0){
    p.shieldHits=(p.shieldHits||1)-1;
    if(p.shieldHits<=0){p.shield=0;p.shieldHits=0;}
    else p.invTimer=20;
    SFX.hitPlayer(); return;
  }
  SFX.hitPlayer(); p.lives--;
  spawnExplosion(p.x,p.y,'medium');
  if(p.lives<=0){p.dead=true;p.lives=0;spawnExplosion(p.x,p.y,'large');checkGameOver();}
  else{p.dead=true;p.respawnTimer=120;}
}

function checkGameOver() {
  if(players.every(p=>p.lives<=0)) {
    setTimeout(()=>{
      finalScore=score;
      save.coins+=sessionCoins; save.diamonds+=sessionDiamonds;
      writeSave(); stopBGM(); screen='gameover';
    },1200);
  }
}

function killEnemy(e) {
  if(!e.alive) return;
  e.alive=false; score+=e.pts; killCount++;
  spawnExplosion(e.x,e.y,e.type==='carrier'||e.type==='tank'?'large':'medium');
  addFT('+'+e.pts,e.x,e.y,'#ffffff');
  const cv={basic:8,zigzag:12,bomber:25,gunship:20,tank:40,speeder:6,carrier:50}[e.type]||8;
  for(let i=0;i<e.cv;i++) spawnPickup(e.x+rnd(-15,15),e.y+rnd(-10,10),'coin',(cv/e.cv)|0||1);
  if(Math.random()<0.005) spawnPickup(e.x,e.y,'diamond',1);
  const dr=Math.random();
  if(dr<0.04) spawnPickup(e.x,e.y,'weapon',rndInt(0,9));
  else if(dr<0.10) spawnPickup(e.x,e.y,'star',1);
  else if(dr<0.12) spawnPickup(e.x,e.y,'life',1);
  else if(dr<0.14) spawnPickup(e.x,e.y,'bomb',1);
  else if(dr<0.17) spawnPickup(e.x,e.y,'wingman',rndInt(0,4));
  SFX[e.type==='carrier'||e.type==='tank'?'killBig':'killBasic']();
}

function killBoss() {
  if(!boss||!boss.alive) return;
  boss.alive=false; score+=boss.pts; bossActive=false;
  SFX.bossDefeat(); spawnExplosion(boss.x,boss.y,'huge');
  for(let i=0;i<rndInt(2,5);i++) spawnPickup(boss.x+rnd(-40,40),boss.y+rnd(-20,20),'diamond',1);
  for(let i=0;i<5;i++) spawnPickup(boss.x+rnd(-50,50),boss.y+rnd(-30,30),'coin',20);
  addFT('+'+boss.pts,boss.x,boss.y,'#ff88ff');
  level++; killCount=0; SFX.levelUp(); addFT('LEVEL '+level,W/2,H/2-20,'#ffff00');
  boss=null; waveTimer=0;
}

const EXP_COLORS=['#ff8800','#ffcc00','#ff4400','#ffffff','#ffff44'];

function spawnExplosion(x,y,size) {
  const n=size==='huge'?30:size==='large'?20:size==='medium'?12:6;
  const r=size==='huge'?50:size==='large'?30:size==='medium'?18:10;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=rnd(0.5,r/8);
    explosions.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rndInt(15,35),maxLife:35,size:rndInt(2,size==='huge'?8:size==='large'?6:4),color:EXP_COLORS[rndInt(0,4)]});
  }
}

function updateExplosions() {
  for(const e of explosions){e.x+=e.vx;e.y+=e.vy;e.vy+=0.05;e.life--;}
  explosions=explosions.filter(e=>e.life>0);
}

function drawExplosions() {
  for(const e of explosions){cx.globalAlpha=e.life/e.maxLife;fillPx(e.color,(e.x-e.size/2)|0,(e.y-e.size/2)|0,e.size,e.size);}

}

// ─── WAVE SPAWNING ───────────────────────────────────────────────────────────
const WAVE_TYPES=['basic','basic','zigzag','bomber','gunship','speeder','tank','carrier'];

// Difficulty scales with level: enemy speed, bullet speed, spawn rate, enemy HP
function getDiff() {
  const lv=Math.min(level,10);
  return {
    spawnRate: Math.max(120-lv*10, 45),   // frames between waves (starts slow)
    formRate:  Math.max(320-lv*20, 120),   // frames between formations
    enemyCount: 1+Math.floor(lv/2),
    typeRange:  Math.min(2+lv, WAVE_TYPES.length-1),
    bulletSpd:  0.35+lv*0.08,             // multiplier on enemy bullet speed
    hpMult:     1+lv*0.15,
  };
}

function updateWaves() {
  waveTimer++;
  if(bossActive) return;

  // Boss trigger: enough kills AND no enemies on screen
  const threshold = BOSS_KILL_THRESHOLD[Math.min(level-1, BOSS_KILL_THRESHOLD.length-1)];
  if(killCount>=threshold && enemies.length===0) { spawnBoss(); return; }

  const d=getDiff();
  if(waveTimer%d.spawnRate===0) {
    const type=WAVE_TYPES[rndInt(0,d.typeRange)];
    const count=rndInt(1,d.enemyCount+1);
    for(let i=0;i<count;i++) setTimeout(()=>enemies.push(mkEnemy(type,rnd(30,W-30),-30)),i*220);
  }
  if(waveTimer%d.formRate===0) {
    const type=WAVE_TYPES[rndInt(0,Math.min(d.typeRange,5))];
    const n=3+Math.min(level,4);
    for(let i=0;i<n;i++) enemies.push(mkEnemy(type,50+i*(W-100)/(n-1)||W/2,-50-i*18));
  }
}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='p'||e.key==='P'){paused=!paused;document.getElementById('btn-pause').classList.toggle('active',paused);}
  if(e.key==='g'||e.key==='G'){invincible=!invincible;document.getElementById('btn-invincible').classList.toggle('active',invincible);}
  if(e.key==='m'||e.key==='M') toggleBGM();
  if(e.key==='t'||e.key==='T'){bgmTrack=(bgmTrack+1)%BGM_TRACKS.length;stopBGM();if(bgmEnabled&&screen==='game')startBGM();}
  if((e.key==='Escape'||e.key==='Esc')&&screen==='game'){stopBGM();screen='title';}
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','z','Z','x','X'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  try{getAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}catch(er){}
  if(screen==='title') clickTitle(mx,my);
  else if(screen==='shop') clickShop(mx,my);
  else if(screen==='gameover') clickGameOver(mx,my);
});

document.getElementById('btn-pause').addEventListener('click',()=>{paused=!paused;document.getElementById('btn-pause').classList.toggle('active',paused);});
document.getElementById('btn-invincible').addEventListener('click',()=>{invincible=!invincible;document.getElementById('btn-invincible').classList.toggle('active',invincible);});
document.getElementById('btn-bgm').addEventListener('click',toggleBGM);
document.getElementById('btn-track').addEventListener('click',()=>{
  bgmTrack=(bgmTrack+1)%BGM_TRACKS.length;
  stopBGM();
  if(bgmEnabled&&screen==='game')startBGM();
  document.getElementById('btn-track').title='♬ '+BGM_TRACK_NAMES[bgmTrack];
});

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function update() {
  if(screen!=='game'||paused) return;
  frame++;
  updateBG();
  updateWaves();
  for(const p of players) updatePlayer(p,keys);
  updateWingmen();
  updateBullets();
  updateEnemyBullets();
  for(const e of enemies) updateEnemy(e);
  updateBoss();
  updatePickups();
  collectPickups();
  checkCollisions();
  updateExplosions();
  updateFTs();
  enemies=enemies.filter(e=>e.alive);
  if(bombFlash>0) bombFlash--;
}

function draw() {
  cx.imageSmoothingEnabled=true;
  if(screen==='title') {
    frame++;
    drawTitle();
  } else if(screen==='shop') {
    drawShop();
  } else if(screen==='game') {
    drawBackground();
    if(bombFlash>0){cx.fillStyle=`rgba(255,255,255,${bombFlash/15*0.7})`;cx.fillRect(0,0,W,H);}
    for(const e of enemies) drawEnemy(e);
    drawBoss();
    drawBullets();
    drawEnemyBullets();
    drawPickups();
    drawExplosions();
    drawWingmen();
    for(const p of players) drawPlayer(p);
    drawFTs();
    drawHUD();
    if(paused){cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);cx.fillStyle='#00ffff';cx.font="bold 32px 'Courier New', monospace";cx.textAlign='center';cx.fillText('PAUSED',W/2,H/2);cx.textAlign='left';}
  } else if(screen==='gameover') {
    frame++;
    drawGameOver();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initBGStars('space');
loop();
</script>
