// Helper: draw a soft drop shadow under a path
function drawAnimeWaifu(type) {
  const pal = ANIME_PALETTES[type] || ANIME_PALETTES.animeSakura;
  const t = frame * 0.02;

  // ── Stage-1: distant aura / godrays ───────────────────────────────────────
  const halo = cx.createRadialGradient(W/2, H*0.55, 40, W/2, H*0.55, 380);
  halo.addColorStop(0, pal.glow + '70');
  halo.addColorStop(0.45, pal.glow + '20');
  halo.addColorStop(1, 'transparent');
  cx.fillStyle = halo;
  cx.fillRect(0, 0, W, H);

  // Volumetric god-rays (radial streaks)
  cx.save();
  cx.globalAlpha = 0.18;
  cx.translate(W/2, H*0.45);
  for (let r = 0; r < 14; r++) {
    cx.save();
    cx.rotate(r * Math.PI/7 + t*0.4);
    const rg = cx.createLinearGradient(0,0,260,0);
    rg.addColorStop(0, pal.glow + 'cc');
    rg.addColorStop(1, 'transparent');
    cx.fillStyle = rg;
    cx.fillRect(0, -2, 260, 4);
    cx.restore();
  }
  cx.restore();

  // ── Stage-2: foreground ambient particles ───────────────────────────────
  const flakes = 36;
  for (let i = 0; i < flakes; i++) {
    const fx = ((i * 91 + frame * (0.35 + (i % 4) * 0.12)) % (W + 40)) - 20;
    const fy = ((i * 137 + frame * (0.28 + (i % 5) * 0.08)) % (H + 40)) - 20;
    const sw = 2 + (i % 3);
    const drift = Math.sin(frame * 0.04 + i) * 6;
    cx.globalAlpha = 0.45 + Math.sin(frame * 0.05 + i) * 0.25;
    if (type === 'animeSakura' || type === 'animeDusk') {
      cx.fillStyle = pal.flake;
      cx.beginPath();
      cx.ellipse(fx + drift, fy, sw + 1, sw + 2, frame * 0.04 + i, 0, Math.PI * 2);
      cx.fill();
    } else if (type === 'animeStar' || type === 'animeMoon' || type === 'animeGoddess') {
      cx.fillStyle = pal.flake;
      cx.fillRect((fx + drift) | 0, fy | 0, sw, sw);
      cx.fillRect((fx + drift - 1) | 0, (fy + 1) | 0, sw + 2, sw - 1);
    } else if (type === 'animeSnow') {
      cx.fillStyle = pal.flake;
      cx.beginPath(); cx.arc(fx + drift, fy, sw * 0.9, 0, Math.PI * 2); cx.fill();
    } else if (type === 'animeFlame') {
      const fg = cx.createRadialGradient(fx, fy, 0, fx, fy, 5);
      fg.addColorStop(0, pal.flake); fg.addColorStop(1, 'transparent');
      cx.fillStyle = fg;
      cx.beginPath(); cx.arc(fx, fy, 5, 0, Math.PI * 2); cx.fill();
    } else if (type === 'animeNeon' || type === 'animeRainbow') {
      cx.fillStyle = ['#ff00aa', '#00ffcc', '#ffff00', '#ff66ff'][i % 4];
      cx.fillRect((fx + drift) | 0, fy | 0, sw, sw);
    } else if (type === 'animePortrait') {
      // Soft warm bokeh disks — looks like out-of-focus street/car lights
      const palette = ['#ff8844', '#ffaa66', '#ffcc88', '#ffffff', '#ff5522'];
      const bg = cx.createRadialGradient(fx, fy, 0, fx, fy, 14);
      bg.addColorStop(0, palette[i % palette.length]);
      bg.addColorStop(0.45, palette[i % palette.length] + '88');
      bg.addColorStop(1, 'transparent');
      cx.fillStyle = bg;
      cx.beginPath(); cx.arc(fx, fy, 12 + (i % 4), 0, Math.PI * 2); cx.fill();
    } else {
      cx.strokeStyle = pal.flake; cx.lineWidth = 1;
      cx.beginPath(); cx.arc(fx + drift, fy, sw * 1.5, 0, Math.PI * 2); cx.stroke();
    }
  }
  cx.globalAlpha = 1;

  // ── Stage-3: HD anime portrait, anchored center-bottom ───────────────────
  const cxX = W / 2 + Math.sin(t) * 3;
  const cxY = H * 0.66 + Math.sin(t * 1.2) * 2;
  const breath = 1 + Math.sin(t * 1.1) * 0.015;

  cx.save();
  cx.translate(cxX, cxY);
  cx.scale(breath, breath);

  // Color shorthands
  const skin   = pal.skin;
  const skinSh = '#cc8a8a';
  const hair   = pal.hair;
  const hairSh = '#1a0a14';
  const eye    = pal.acc;
  const cloth  = pal.acc;
  const cheek  = '#ff7c9a';

  // ─ Long flowing hair (back layer, wavy + multi-strand) ─
  cx.save();
  cx.fillStyle = hairSh;
  cx.beginPath();
  cx.moveTo(-110, -90);
  for (let i = -110; i <= 110; i += 5) {
    const wy = 120 + Math.sin(i * 0.04 + t * 1.6) * 16 + Math.cos(i * 0.02 + t) * 8;
    cx.lineTo(i, wy);
  }
  cx.lineTo(110, -90);
  cx.closePath();
  cx.fill();
  // Mid strands (lighter)
  cx.fillStyle = hair;
  cx.beginPath();
  cx.moveTo(-90, -85);
  for (let i = -90; i <= 90; i += 5) {
    const wy = 100 + Math.sin(i * 0.05 + t * 2.0) * 14 + Math.cos(i * 0.03 + t) * 6;
    cx.lineTo(i, wy);
  }
  cx.lineTo(90, -85);
  cx.closePath();
  cx.fill();
  // Highlight strand
  cx.strokeStyle = '#ffffff66';
  cx.lineWidth = 1.4;
  for (let i = -70; i <= 70; i += 18) {
    cx.beginPath();
    cx.moveTo(i, -60);
    cx.bezierCurveTo(i - 4, 0, i + 4, 50, i + Math.sin(t)*4, 100);
    cx.stroke();
  }
  cx.restore();

  // ─ Shoulders + collarbone shadow ─
  cx.fillStyle = skin;
  cx.beginPath();
  cx.moveTo(-44, -22);
  cx.bezierCurveTo(-44, -10, -36, 4, -22, 12);
  cx.lineTo(22, 12);
  cx.bezierCurveTo(36, 4, 44, -10, 44, -22);
  cx.bezierCurveTo(44, -32, 38, -38, 22, -38);
  cx.lineTo(-22, -38);
  cx.bezierCurveTo(-38, -38, -44, -32, -44, -22);
  cx.closePath();
  cx.fill();
  cx.strokeStyle = skinSh + '44';
  cx.lineWidth = 1.2;
  cx.beginPath();
  cx.moveTo(-18, -10); cx.bezierCurveTo(-6, -6, 6, -6, 18, -10);
  cx.stroke();

  // ─ Dress / Outfit (gown with bust line) ─
  const dressG = cx.createLinearGradient(0, -10, 0, 130);
  dressG.addColorStop(0, cloth);
  dressG.addColorStop(0.5, '#1a1a2c');
  dressG.addColorStop(1, '#08081a');
  cx.fillStyle = dressG;
  cx.beginPath();
  cx.moveTo(-32, -8);
  cx.bezierCurveTo(-30, 12, -20, 16, -10, 18);
  cx.lineTo(0, 6);   // V-neck
  cx.lineTo(10, 18);
  cx.bezierCurveTo(20, 16, 30, 12, 32, -8);
  cx.lineTo(46, 14);
  cx.lineTo(60, 96);
  cx.lineTo(72, 130);
  cx.lineTo(-72, 130);
  cx.lineTo(-60, 96);
  cx.lineTo(-46, 14);
  cx.closePath();
  cx.fill();
  // Bust shading
  cx.fillStyle = '#00000033';
  cx.beginPath(); cx.ellipse(-12, 10, 8, 4, -0.3, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( 12, 10, 8, 4,  0.3, 0, Math.PI*2); cx.fill();
  // Dress trim
  cx.fillStyle = pal.glow + 'aa';
  cx.fillRect(-46, 14, 92, 3);
  cx.fillRect(-72, 128, 144, 4);
  // Waist ribbon
  cx.fillStyle = eye;
  cx.fillRect(-28, 50, 56, 8);
  cx.fillStyle = '#ffffff66';
  cx.fillRect(-28, 50, 56, 1.5);

  // ─ Stockings / thighs (peek under skirt) ─
  cx.fillStyle = '#1a1a2c';
  cx.fillRect(-22, 130, 18, 30);
  cx.fillRect(  4, 130, 18, 30);
  cx.fillStyle = skin;
  cx.fillRect(-22, 130, 18, 4);
  cx.fillRect(  4, 130, 18, 4);

  // ─ Neck ─
  cx.fillStyle = skin;
  cx.beginPath();
  cx.moveTo(-7, -52); cx.lineTo(7, -52);
  cx.lineTo(7, -36); cx.lineTo(-7, -36);
  cx.closePath();
  cx.fill();
  cx.fillStyle = skinSh + '55';
  cx.fillRect(-7, -38, 14, 2);

  // ─ Choker ─
  cx.fillStyle = '#1a1a2a';
  cx.fillRect(-8, -42, 16, 3);
  cx.fillStyle = pal.glow;
  cx.beginPath(); cx.arc(0, -40, 1.6, 0, Math.PI*2); cx.fill();

  // ─ Head shape ─
  cx.fillStyle = skin;
  cx.beginPath(); cx.ellipse(0, -72, 26, 30, 0, 0, Math.PI * 2); cx.fill();
  // Jaw shading
  cx.fillStyle = skinSh + '33';
  cx.beginPath(); cx.ellipse(0, -56, 14, 10, 0, 0, Math.PI*2); cx.fill();

  // ─ Hair fringe (thick + side bangs) ─
  cx.fillStyle = hair;
  cx.beginPath();
  cx.moveTo(-28, -82);
  cx.bezierCurveTo(-22, -106, 22, -106, 28, -82);
  cx.lineTo(24, -64);
  cx.lineTo(16, -78);
  cx.lineTo(8, -62);
  cx.lineTo(0, -78);
  cx.lineTo(-8, -62);
  cx.lineTo(-16, -78);
  cx.lineTo(-24, -64);
  cx.closePath();
  cx.fill();
  // Hair sheen
  cx.fillStyle = '#ffffff55';
  cx.beginPath();
  cx.ellipse(-6, -94, 9, 3, -0.3, 0, Math.PI*2);
  cx.fill();
  // Side hair tufts
  cx.fillStyle = hair;
  cx.beginPath(); cx.ellipse(-30, -64, 10, 26, 0.18, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse( 30, -64, 10, 26, -0.18, 0, Math.PI * 2); cx.fill();
  // Hair sub-shadow
  cx.fillStyle = hairSh + '88';
  cx.beginPath(); cx.ellipse(-30, -56, 6, 14, 0.18, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( 30, -56, 6, 14,-0.18, 0, Math.PI*2); cx.fill();

  // ─ Cheek blush ─
  cx.fillStyle = cheek + '99';
  cx.beginPath(); cx.ellipse(-12, -64, 5, 2.5, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( 12, -64, 5, 2.5, 0, 0, Math.PI*2); cx.fill();

  // ─ Eyes (HD multi-layer anime) ─
  const blink = Math.sin(t * 6) > 0.985 ? 0.1 : 1;
  cx.save();
  for (const ex of [-10, 10]) {
    cx.save();
    cx.translate(ex, -70);
    cx.scale(1, blink);
    // Eye-white
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.ellipse(0, 0, 5.6, 7, 0, 0, Math.PI*2); cx.fill();
    // Iris outer ring
    cx.fillStyle = '#0a0a22';
    cx.beginPath(); cx.ellipse(0, 0, 4.6, 6.2, 0, 0, Math.PI*2); cx.fill();
    // Iris gradient
    const ig = cx.createRadialGradient(0, -1, 0.5, 0, 0, 5.5);
    ig.addColorStop(0, '#ffffff');
    ig.addColorStop(0.35, eye);
    ig.addColorStop(0.85, '#1a1a3a');
    ig.addColorStop(1, '#000010');
    cx.fillStyle = ig;
    cx.beginPath(); cx.ellipse(0, 0, 4, 5.6, 0, 0, Math.PI*2); cx.fill();
    // Pupil
    cx.fillStyle = '#000010';
    cx.beginPath(); cx.ellipse(0, 0.5, 1.4, 2.2, 0, 0, Math.PI*2); cx.fill();
    // Big anime catch-light
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.ellipse(-1.4, -2.4, 1.8, 2.4, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse( 1.4,  2.4, 0.9, 1.2, 0, 0, Math.PI*2); cx.fill();
    cx.restore();
    // Eyelashes (above eye, outside scaling)
    cx.fillStyle = '#0a0010';
    cx.fillRect(ex - 6, -77, 12, 1.4);
    cx.beginPath();
    cx.moveTo(ex - 6, -77); cx.lineTo(ex - 8, -79); cx.lineTo(ex - 4, -76); cx.fill();
    cx.beginPath();
    cx.moveTo(ex + 6, -77); cx.lineTo(ex + 8, -79); cx.lineTo(ex + 4, -76); cx.fill();
    // Eyebrow
    cx.fillStyle = hairSh;
    cx.fillRect(ex - 7, -82, 14, 1.6);
  }
  cx.restore();

  // ─ Mouth (small smile + glossy lip) ─
  cx.strokeStyle = '#aa3355';
  cx.lineWidth = 1.4;
  cx.beginPath();
  cx.moveTo(-3, -56);
  cx.quadraticCurveTo(0, -54, 3, -56);
  cx.stroke();
  cx.fillStyle = '#ff8aa6';
  cx.fillRect(-2, -55, 4, 0.8);

  // ─ Nose hint ─
  cx.fillStyle = skinSh + '66';
  cx.fillRect(-0.4, -64, 1, 2);

  // ─ Hair accessory (varies per palette) ─
  cx.fillStyle = pal.acc;
  if (type === 'animeStar' || type === 'animeGoddess' || type === 'animeRainbow') {
    const ax = -22, ay = -94;
    cx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? 7 : 2.8;
      const px = ax + Math.cos(a) * r;
      const py = ay + Math.sin(a) * r;
      i === 0 ? cx.moveTo(px, py) : cx.lineTo(px, py);
    }
    cx.closePath(); cx.fill();
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.arc(ax, ay, 1.6, 0, Math.PI*2); cx.fill();
  } else {
    // ribbon bow
    cx.beginPath();
    cx.moveTo(-26, -98); cx.lineTo(-12, -90); cx.lineTo(-26, -82); cx.closePath(); cx.fill();
    cx.beginPath();
    cx.moveTo(  2, -98); cx.lineTo(-12, -90); cx.lineTo(  2, -82); cx.closePath(); cx.fill();
    cx.fillStyle = pal.glow;
    cx.beginPath(); cx.arc(-12, -90, 2.6, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#ffffff88';
    cx.fillRect(-26, -91, 28, 1);
  }

  // ─ Floating glow orb in raised hand ─
  const orbR = 22 + Math.sin(t * 3) * 4;
  const og = cx.createRadialGradient(48, 30, 1, 48, 30, orbR);
  og.addColorStop(0, '#ffffff');
  og.addColorStop(0.3, pal.glow);
  og.addColorStop(0.8, pal.glow + '44');
  og.addColorStop(1, 'transparent');
  cx.fillStyle = og;
  cx.beginPath(); cx.arc(48, 30, orbR, 0, Math.PI * 2); cx.fill();
  // Hand silhouette holding orb
  cx.fillStyle = skin;
  cx.beginPath();
  cx.ellipse(40, 36, 6, 9, 0.3, 0, Math.PI*2);
  cx.fill();

  cx.restore();

  // ── Stage-4: subtle vignette to push focus center ──────────────────────
  const vg = cx.createRadialGradient(W/2, H/2, 220, W/2, H/2, 460);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  cx.fillStyle = vg;
  cx.fillRect(0, 0, W, H);
}

function drawBackground() {
  const bgType = BG_SKINS[save.selBG][3];
  const colors = getBGColors(bgType);
  fillPx(colors.sky, 0, 0, W, H);

  if (bgType.startsWith('anime')) {
    // Subtle gradient sky
    if (colors.atmos) {
      const sg = cx.createLinearGradient(0, 0, 0, H);
      sg.addColorStop(0, colors.sky);
      sg.addColorStop(0.6, colors.atmos + '40');
      sg.addColorStop(1, colors.terrain);
      cx.fillStyle = sg;
      cx.fillRect(0, 0, W, H);
    }
    for (const star of bgStars) fillPx(star.color, star.x | 0, star.y | 0, star.size, star.size);
    drawAnimeWaifu(bgType);
    return;
  }

  if (bgType==='nebula') {
    for (let i=0;i<3;i++) {
      const ny = ((frame*0.3+i*200)%(H+100))-50;
      cx.fillStyle='rgba(80,0,120,0.07)';
      cx.fillRect(0,ny|0,W,120);
    }
  }
  if (bgType==='cyber') {
    cx.strokeStyle='rgba(0,80,80,0.18)';
    cx.lineWidth=1;
    const go=(frame*0.5)%20;
    for (let x=0;x<W;x+=20){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for (let y=-go;y<H;y+=20){cx.beginPath();cx.moveTo(0,y|0);cx.lineTo(W,y|0);cx.stroke();}
  }
  if (bgType==='sunset') {
    for (let i=0;i<5;i++) {
      const ly=(frame*0.4+i*140)%(H+60)-30;
      cx.fillStyle=`rgba(180,60,0,0.07)`;
      cx.fillRect(0,ly|0,W,30);
    }
  }
  if (bgType==='rift') {
    cx.strokeStyle='rgba(120,0,180,0.15)';
    cx.lineWidth=1;
    for (let i=0;i<3;i++) {
      const ry=(frame*0.4+i*233)%(H+100)-50;
      cx.beginPath(); cx.moveTo(rndInt(0,100),ry|0); cx.lineTo(rndInt(300,480),(ry+20)|0); cx.stroke();
    }
  }

  for (const star of bgStars) {
    fillPx(star.color, star.x|0, star.y|0, star.size, star.size);
  }

  const tc = colors.terrain;
  if (bgType==='city') {
    for (let b=0;b<10;b++) {
      const bx=((b*48+(frame*0.2|0))%(W+48))-48;
      const bh=40+(b*17)%60;
      fillPx('#0a1a3a',bx|0,(H-bh)|0,40,bh);
      fillPx('#112244',(bx+2)|0,(H-bh)|0,36,bh);
      for (let wy=H-bh+5;wy<H-5;wy+=8)
        for (let wx=bx+4;wx<bx+36;wx+=8)
          if ((wx+wy+frame/30|0)%3!==0) fillPx('#ffff88',wx|0,wy|0,4,4);
    }
  } else if (bgType==='ocean') {
    for (let i=0;i<3;i++) {
      const wo=(frame*(0.8+i*0.3))%W;
      for (let wx=-wo;wx<W+20;wx+=20) {
        const wy=H-30-i*15+Math.sin((wx+frame*0.5)*0.1)*4;
        fillPx(i===0?'#0066cc':'#004488',wx|0,wy|0,18,5);
      }
    }
    fillPx('#003366',0,H-20,W,20);
  } else if (bgType==='volcanic') {
    // Two volcanic peaks scrolling slowly — silhouette shape, glowing crater + lava streams
    cx.save();
    cx.globalAlpha = 0.85;
    for (let v = 0; v < 2; v++) {
      const vx = ((v*240 + (frame*0.15|0)) % (W+240)) - 120;
      const baseY = H - 30;
      const peakH = 130 + (v*23)%40;
      // Mountain silhouette
      cx.fillStyle = '#3a1010';
      cx.beginPath();
      cx.moveTo(vx - 70, baseY);
      cx.lineTo(vx - 22, baseY - peakH + 14);
      cx.lineTo(vx - 6, baseY - peakH);
      cx.lineTo(vx + 8, baseY - peakH + 8);
      cx.lineTo(vx + 28, baseY - peakH + 18);
      cx.lineTo(vx + 80, baseY);
      cx.closePath();
      cx.fill();
      // Glowing crater + rim
      const cg = cx.createRadialGradient(vx, baseY - peakH + 6, 1, vx, baseY - peakH + 6, 22);
      cg.addColorStop(0, '#ffff66'); cg.addColorStop(0.5, '#ff4400'); cg.addColorStop(1, 'rgba(255,40,0,0)');
      cx.fillStyle = cg;
      cx.beginPath(); cx.arc(vx, baseY - peakH + 6, 22, 0, Math.PI*2); cx.fill();
      // Lava streams down two sides
      cx.fillStyle = '#ff5522';
      cx.beginPath();
      cx.moveTo(vx - 4, baseY - peakH + 10);
      cx.lineTo(vx - 16, baseY - peakH + 50);
      cx.lineTo(vx - 24, baseY - 10);
      cx.lineTo(vx - 18, baseY - 8);
      cx.lineTo(vx - 10, baseY - peakH + 60);
      cx.lineTo(vx - 1, baseY - peakH + 14);
      cx.closePath(); cx.fill();
      cx.beginPath();
      cx.moveTo(vx + 4, baseY - peakH + 10);
      cx.lineTo(vx + 18, baseY - peakH + 60);
      cx.lineTo(vx + 28, baseY - 12);
      cx.lineTo(vx + 22, baseY - 10);
      cx.lineTo(vx + 12, baseY - peakH + 50);
      cx.lineTo(vx + 1, baseY - peakH + 14);
      cx.closePath(); cx.fill();
    }
    cx.restore();
    // Lava ground stripes
    fillPx('#330000',0,H-40,W,40);
    for (let l=0;l<6;l++) {
      const lx=((l*80+frame*0.3)|0)%(W+80)-80;
      fillPx('#ff4400',lx,(H-8)|0,60,8);
      fillPx('#ff8800',(lx+10)|0,(H-12)|0,40,4);
    }
  } else if (bgType==='arctic') {
    // Snow mountains with white peaks + drifting snowflakes
    cx.save();
    cx.globalAlpha = 0.85;
    for (let m = 0; m < 4; m++) {
      const mx = ((m*150 + (frame*0.12|0)) % (W+150)) - 75;
      const baseY = H - 30;
      const peakH = 90 + (m*23)%60;
      // Mountain
      cx.fillStyle = '#5a7080';
      cx.beginPath();
      cx.moveTo(mx - 70, baseY);
      cx.lineTo(mx - 18, baseY - peakH + 18);
      cx.lineTo(mx + 4, baseY - peakH);
      cx.lineTo(mx + 22, baseY - peakH + 22);
      cx.lineTo(mx + 70, baseY);
      cx.closePath(); cx.fill();
      // Snow cap
      cx.fillStyle = '#ffffff';
      cx.beginPath();
      cx.moveTo(mx - 18, baseY - peakH + 18);
      cx.lineTo(mx - 8, baseY - peakH + 30);
      cx.lineTo(mx, baseY - peakH + 22);
      cx.lineTo(mx + 4, baseY - peakH);
      cx.lineTo(mx + 12, baseY - peakH + 22);
      cx.lineTo(mx + 22, baseY - peakH + 22);
      cx.closePath(); cx.fill();
    }
    cx.restore();
    // Snow ground line
    fillPx('#dde8ee',0,H-30,W,30);
    // Snowflakes
    for (let s = 0; s < 28; s++) {
      const sx = (s*43 + frame*0.4) % W;
      const sy = (s*97 + frame*(1.0 + (s%3)*0.3)) % H;
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.fillRect(sx|0, sy|0, 2, 2);
    }
  } else if (bgType==='ruins') {
    // Ancient broken pillars + sand dunes
    for (let s = 0; s < 3; s++) {
      const dy = (frame*(0.4 + s*0.15)) % 80;
      cx.fillStyle = '#221814';
      cx.beginPath();
      cx.moveTo(0, H - 30 + dy*0.05);
      for (let dx = 0; dx < W; dx += 30) {
        cx.lineTo(dx, H - 30 + Math.sin((dx + dy*4) * 0.04 + s) * 8);
      }
      cx.lineTo(W, H);
      cx.lineTo(0, H);
      cx.closePath();
      cx.fill();
    }
    // Broken pillars
    for (let p = 0; p < 3; p++) {
      const px2 = ((p*180 + (frame*0.2|0)) % (W+180)) - 90;
      const baseY = H - 35;
      cx.fillStyle = '#332218';
      cx.fillRect(px2 - 8, baseY - 100, 16, 100);
      // Broken top
      cx.beginPath();
      cx.moveTo(px2 - 14, baseY - 100);
      cx.lineTo(px2 - 8, baseY - 110);
      cx.lineTo(px2 + 8, baseY - 105);
      cx.lineTo(px2 + 14, baseY - 100);
      cx.closePath();
      cx.fill();
      // Cracks
      cx.strokeStyle = '#1a0e08';
      cx.lineWidth = 1;
      cx.beginPath();
      cx.moveTo(px2 - 4, baseY - 80); cx.lineTo(px2 + 4, baseY - 60);
      cx.moveTo(px2 + 2, baseY - 50); cx.lineTo(px2 - 3, baseY - 30);
      cx.stroke();
    }
  } else if (bgType==='cyber') {
    // Neon city silhouettes (atop existing grid)
    for (let b = 0; b < 8; b++) {
      const bx = ((b*60 + (frame*0.18|0)) % (W+60)) - 30;
      const bh = 50 + (b*23)%80;
      fillPx('#001a22', bx|0, (H-bh)|0, 36, bh);
      // Neon stripes
      cx.fillStyle = b%2===0 ? '#00ffcc' : '#ff00aa';
      cx.fillRect(bx|0, (H-bh)|0, 36, 1.5);
      cx.fillRect(bx|0, (H-bh+18)|0, 36, 1);
      // Window blocks
      for (let wy = H-bh+6; wy < H-6; wy += 10) {
        for (let wx = bx+3; wx < bx+33; wx += 8) {
          if (((wx+wy+frame/40)|0)%4 !== 0) {
            cx.fillStyle = b%2===0 ? '#00ffcc' : '#ff44aa';
            cx.fillRect(wx|0, wy|0, 3, 3);
          }
        }
      }
    }
  } else if (bgType==='sunset') {
    // Silhouette mountain ridge against orange sky
    cx.save();
    cx.fillStyle = '#3a1408';
    cx.beginPath();
    cx.moveTo(0, H);
    for (let dx = 0; dx <= W; dx += 20) {
      const dy = H - 60 - Math.sin(dx*0.04 + frame*0.005) * 20 - ((dx*7)%30);
      cx.lineTo(dx, dy);
    }
    cx.lineTo(W, H);
    cx.closePath(); cx.fill();
    // Distant second ridge
    cx.fillStyle = '#220804';
    cx.beginPath();
    cx.moveTo(0, H - 40);
    for (let dx = 0; dx <= W; dx += 30) {
      const dy = H - 35 - Math.sin(dx*0.025 + frame*0.003 + 1.6) * 14 - ((dx*5)%18);
      cx.lineTo(dx, dy);
    }
    cx.lineTo(W, H);
    cx.closePath(); cx.fill();
    cx.restore();
    // Setting sun glow band
    const sg = cx.createRadialGradient(W*0.7, H*0.55, 4, W*0.7, H*0.55, 130);
    sg.addColorStop(0, 'rgba(255,180,80,0.6)');
    sg.addColorStop(0.5, 'rgba(255,80,30,0.25)');
    sg.addColorStop(1, 'rgba(255,40,0,0)');
    cx.fillStyle = sg;
    cx.fillRect(0, 0, W, H);
  } else if (bgType==='rift') {
    // Floating geometric shards drifting up + cracks (shards rotate)
    for (let s = 0; s < 6; s++) {
      const sx = (s*97 + 200) % W;
      const sy = (s*131 + frame*(0.4 + s*0.1)) % (H+80) - 40;
      cx.save();
      cx.translate(sx, sy);
      cx.rotate(frame*0.005 + s);
      cx.fillStyle = `rgba(${100+s*20}, 0, ${180+(s%3)*20}, 0.55)`;
      const ssz = 6 + (s*3)%8;
      cx.fillRect(-ssz, -ssz, ssz*2, ssz*2);
      cx.strokeStyle = 'rgba(255,150,255,0.7)';
      cx.lineWidth = 1;
      cx.strokeRect(-ssz, -ssz, ssz*2, ssz*2);
      cx.restore();
    }
  } else {
    // Distant planets — realistic far-away celestial bodies with biome-style
    // surface textures (Earth-blue / Mars-rust / Jupiter-bands / Moon-cratered).
    // Heavier transparency so they recede into the background.
    cx.save();
    cx.globalAlpha = 0.40;       // more transparent overall (was 0.55)
    for (const t of bgTerrain) {
      if (!t.r) continue;
      const px = t.x|0, py = t.y|0, r = t.r;
      // Pick a "biome" deterministically from the radius value so each planet
      // keeps a stable look across recycles. 0=earth 1=mars 2=jupiter 3=moon 4=neptune
      const biomeId = (r * 13) % 5;
      // Soft, larger atmospheric outer glow
      const gg = cx.createRadialGradient(px, py, r*0.6, px, py, r*2.4);
      gg.addColorStop(0, t.glow + '38');
      gg.addColorStop(0.55, t.glow + '14');
      gg.addColorStop(1, t.glow + '00');
      cx.fillStyle = gg;
      cx.beginPath(); cx.arc(px, py, r*2.4, 0, Math.PI*2); cx.fill();
      // Planet base sphere (lit from upper-left)
      const bg = cx.createRadialGradient(px - r*0.4, py - r*0.45, r*0.05, px, py, r);
      bg.addColorStop(0, t.glow);
      bg.addColorStop(0.45, t.core);
      bg.addColorStop(0.88, shadeHex(t.core, -35));
      bg.addColorStop(1, '#020208');
      cx.fillStyle = bg;
      cx.beginPath(); cx.arc(px, py, r, 0, Math.PI*2); cx.fill();
      // Surface texture — clipped to sphere, biome-specific
      cx.save();
      cx.beginPath(); cx.arc(px, py, r, 0, Math.PI*2); cx.clip();
      const bandSeed = (r * 7) | 0;
      // Deterministic pseudo-random — same seed per planet across recycles
      const _hash = (n) => { let x = (n * 9301 + 49297 + bandSeed) % 233280; return x / 233280; };
      if (biomeId === 0) {
        // Earth-like: irregular green continents drawn as jagged polygons +
        // pixel-grain texture noise + soft cloud strands.
        cx.globalAlpha = 0.55;
        cx.fillStyle = '#3b8855';
        const drawContinent = (cxBase, cyBase, baseR, pts) => {
          cx.beginPath();
          for (let k = 0; k < pts; k++) {
            const a = (k / pts) * Math.PI * 2;
            const rJ = baseR * (0.65 + _hash(k * 17 + cxBase * 3) * 0.55);
            const x = cxBase + Math.cos(a) * rJ;
            const y = cyBase + Math.sin(a) * rJ * 0.85;
            if (k === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
          }
          cx.closePath(); cx.fill();
        };
        drawContinent(px - r*0.25, py - r*0.20, r*0.30, 14);
        drawContinent(px + r*0.18, py + r*0.15, r*0.28, 12);
        drawContinent(px - r*0.30, py + r*0.40, r*0.18, 10);
        // Texture noise — small varying shade specks (rocky/forest grain)
        for (let ni = 0; ni < 80; ni++) {
          const a = _hash(ni * 7) * Math.PI * 2;
          const rad = _hash(ni * 13) * r * 0.92;
          const nx = px + Math.cos(a) * rad, ny = py + Math.sin(a) * rad;
          const v = _hash(ni * 19);
          cx.globalAlpha = 0.18 + v * 0.18;
          cx.fillStyle = v < 0.3 ? '#0e2810'
                        : v < 0.6 ? '#1a4022'
                        : v < 0.85 ? '#2f6840'
                        : '#3d7a52';
          cx.fillRect(nx | 0, ny | 0, 1, 1);
        }
        // Subtle cloud strands — muted blue-grey, not bright white
        cx.globalAlpha = 0.14;
        cx.fillStyle = '#5b7a8a';
        for (let ci = 0; ci < 7; ci++) {
          const ay = py + (_hash(ci * 31) - 0.5) * r * 1.4;
          const aw = r * (0.25 + _hash(ci * 11) * 0.45);
          const ax = px + (_hash(ci * 53) - 0.5) * r * 0.6;
          for (let p = 0; p < 14; p++) {
            const fx = ax + (p / 13 - 0.5) * aw + Math.sin(p * 0.5 + ci) * 1.2;
            const fy = ay + Math.cos(p * 0.4 + ci) * 1.5;
            cx.fillRect(fx | 0, fy | 0, 1, 1);
          }
        }
        // No polar caps — keep the surface tonally consistent with the planet.
      } else if (biomeId === 1) {
        // Mars-like: rust pixel grain + canyon scratches + small storm vortex.
        // Layered noise = rocky regolith feel.
        for (let ni = 0; ni < 180; ni++) {
          const a = _hash(ni * 5) * Math.PI * 2;
          const rad = _hash(ni * 11) * r * 0.96;
          const nx = px + Math.cos(a) * rad, ny = py + Math.sin(a) * rad;
          const v = _hash(ni * 23);
          cx.globalAlpha = 0.22 + v * 0.30;
          cx.fillStyle = v < 0.30 ? '#3a0e04'    // dark canyon
                        : v < 0.55 ? '#6a2810'   // rust shadow
                        : v < 0.82 ? '#9a4818'   // mid rust
                        :            '#b85420';  // bright rust (no longer pale)
          cx.fillRect(nx | 0, ny | 0, 1, 1);
        }
        // Canyon lines (Valles Marineris feel) — thin diagonal scratches
        cx.globalAlpha = 0.6;
        cx.strokeStyle = '#3a0e04';
        cx.lineWidth = 1;
        for (let li = 0; li < 4; li++) {
          const a = _hash(li * 41) * Math.PI;
          const cx0 = px + (_hash(li * 17) - 0.5) * r * 0.7;
          const cy0 = py + (_hash(li * 23) - 0.5) * r * 0.5;
          cx.beginPath();
          cx.moveTo(cx0, cy0);
          for (let p = 1; p < 6; p++) {
            cx.lineTo(cx0 + Math.cos(a) * p * r * 0.06 + (_hash(li * 100 + p) - 0.5) * 2,
                      cy0 + Math.sin(a) * p * r * 0.06 + (_hash(li * 200 + p) - 0.5) * 2);
          }
          cx.stroke();
        }
        // Dust storm — curved arc trail of dots in deeper rust (no pale color)
        cx.globalAlpha = 0.32;
        cx.fillStyle = '#7a3614';
        for (let p = 0; p < 22; p++) {
          const a = (p / 22) * Math.PI * 1.5;
          const rad = r * 0.55 - p * 0.05;
          cx.fillRect(
            (px + Math.cos(a + 0.6) * rad) | 0,
            (py + Math.sin(a + 0.6) * rad) | 0,
            2, 2
          );
        }
        // No polar caps — keep the surface a uniform rust palette.
      } else if (biomeId === 2) {
        // Jupiter-like: turbulent cloud bands with per-pixel texture noise +
        // animated swirl arcs + a Great Red Spot drawn from layered curves.
        // Base bands
        cx.globalAlpha = 0.32;
        for (let bi = -4; bi <= 4; bi++) {
          const bandY = py + bi * (r * 0.22) + ((bandSeed + bi*13) % 5);
          cx.fillStyle = (bi & 1) ? shadeHex(t.core, 28) : shadeHex(t.core, -22);
          const widthShrink = 1 - Math.abs(bi) * 0.08;
          cx.fillRect(px - r * widthShrink, bandY - r*0.085, r*2 * widthShrink, r*0.13);
        }
        // Per-pixel turbulence noise inside bands (no white highlights)
        for (let ni = 0; ni < 220; ni++) {
          const a = _hash(ni * 7) * Math.PI * 2;
          const rad = _hash(ni * 13) * r * 0.94;
          const nx = px + Math.cos(a) * rad, ny = py + Math.sin(a) * rad;
          const v = _hash(ni * 19);
          cx.globalAlpha = 0.10 + v * 0.18;
          cx.fillStyle = v < 0.3 ? shadeHex(t.core, -40)
                        : v < 0.7 ? shadeHex(t.core, 0)
                        :            shadeHex(t.core, 18);
          cx.fillRect(nx | 0, ny | 0, 1, 1);
        }
        // Great Red Spot — layered curved oval with swirl ring
        const spX = px - r*0.15, spY = py + r*0.25;
        cx.globalAlpha = 0.55;
        cx.fillStyle = '#7a1c10';
        cx.beginPath();
        for (let k = 0; k < 16; k++) {
          const a = (k / 16) * Math.PI * 2;
          const rJ = (0.12 + (k & 1) * 0.04) * r;
          const x = spX + Math.cos(a) * rJ * 1.4;
          const y = spY + Math.sin(a) * rJ * 0.85;
          if (k === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
        }
        cx.closePath(); cx.fill();
        cx.fillStyle = '#a02818';
        cx.beginPath();
        cx.ellipse(spX, spY, r * 0.10, r * 0.06, -0.2, 0, Math.PI*2);
        cx.fill();
        // Swirl arcs — muted core-tone trails (no white)
        cx.globalAlpha = 0.22;
        cx.strokeStyle = shadeHex(t.core, 18);
        cx.lineWidth = 1;
        for (let si = 0; si < 5; si++) {
          const sy = py + ((bandSeed * 0.21 + si * 0.6) % 1 - 0.5) * r * 1.4;
          cx.beginPath();
          for (let p = 0; p <= 20; p++) {
            const xx = px - r * 0.85 + p * (r * 1.7 / 20);
            const yy = sy + Math.sin(p * 0.55 + si) * r * 0.025;
            if (p === 0) cx.moveTo(xx, yy); else cx.lineTo(xx, yy);
          }
          cx.stroke();
        }
      } else if (biomeId === 3) {
        // Moon-like: pixel rocky regolith + sharp craters with lit rims +
        // dark mare drawn as a chunky shape (not smooth ellipse).
        // Base regolith pixel grain
        for (let ni = 0; ni < 200; ni++) {
          const a = _hash(ni * 5) * Math.PI * 2;
          const rad = _hash(ni * 11) * r * 0.96;
          const nx = px + Math.cos(a) * rad, ny = py + Math.sin(a) * rad;
          const v = _hash(ni * 23);
          cx.globalAlpha = 0.20 + v * 0.30;
          cx.fillStyle = v < 0.30 ? '#0a0a0a'
                        : v < 0.55 ? '#2a2a2a'
                        : v < 0.82 ? '#4a4a4a'
                        :            '#6a6a6a';
          cx.fillRect(nx | 0, ny | 0, 1, 1);
        }
        // Craters — circle with shadow + lit rim, deterministic placement
        for (let mi = 0; mi < 14; mi++) {
          const ma = _hash(mi * 7) * Math.PI * 2;
          const md = r * (0.20 + _hash(mi * 13) * 0.65);
          const cR = r * (0.06 + _hash(mi * 19) * 0.05);
          const cx0 = px + Math.cos(ma) * md;
          const cy0 = py + Math.sin(ma) * md;
          // Shadow (lower-right inside)
          cx.globalAlpha = 0.55;
          cx.fillStyle = '#0a0a0a';
          cx.beginPath();
          cx.arc(cx0, cy0, cR, 0, Math.PI*2);
          cx.fill();
          // Lit rim (upper-left outside) — dimmed grey, no near-white
          cx.globalAlpha = 0.40;
          cx.strokeStyle = '#5a564e';
          cx.lineWidth = 1.2;
          cx.beginPath();
          cx.arc(cx0, cy0, cR * 1.05, Math.PI * 0.85, Math.PI * 1.85);
          cx.stroke();
          // Inner highlight (subtle mid-grey)
          cx.globalAlpha = 0.28;
          cx.fillStyle = '#4a4a4a';
          cx.beginPath();
          cx.arc(cx0 - cR*0.25, cy0 - cR*0.25, cR * 0.5, 0, Math.PI*2);
          cx.fill();
        }
        // Dark mare — irregular chunky polygon, not smooth ellipse
        cx.globalAlpha = 0.40;
        cx.fillStyle = '#1a1a1a';
        cx.beginPath();
        const mcx = px + r * 0.10, mcy = py - r * 0.05;
        for (let k = 0; k < 14; k++) {
          const a = (k / 14) * Math.PI * 2;
          const rJ = r * (0.20 + _hash(k * 31) * 0.16);
          const x = mcx + Math.cos(a) * rJ;
          const y = mcy + Math.sin(a) * rJ * 0.7;
          if (k === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
        }
        cx.closePath(); cx.fill();
      } else {
        // Neptune / ice-giant: pale blue with subtle bands, ripple lines, and
        // a deep methane storm drawn as concentric pixel rings.
        cx.globalAlpha = 0.22;
        for (let bi = -3; bi <= 3; bi++) {
          const bandY = py + bi * (r * 0.30) + ((bandSeed + bi*7) % 4);
          cx.fillStyle = (bi & 1) ? shadeHex(t.core, 18) : shadeHex(t.core, -18);
          cx.fillRect(px - r, bandY - r*0.06, r*2, r*0.09);
        }
        // Ripple texture — pale-blue tone, no pure white
        cx.globalAlpha = 0.14;
        cx.fillStyle = shadeHex(t.core, 28);
        for (let ri = 0; ri < 5; ri++) {
          const ry = py + (ri - 2) * r * 0.32 + _hash(ri * 19) * r * 0.06;
          for (let p = 0; p < 16; p++) {
            const xx = px - r * 0.85 + p * (r * 1.7 / 15);
            const yy = ry + Math.sin(p * 0.7 + ri) * 1.4;
            cx.fillRect(xx | 0, yy | 0, 1, 1);
          }
        }
        // Deep storm — concentric pixel rings
        cx.globalAlpha = 0.55;
        const stX = px + r*0.18, stY = py - r*0.10;
        cx.fillStyle = '#1a4488';
        cx.beginPath(); cx.arc(stX, stY, r*0.10, 0, Math.PI*2); cx.fill();
        cx.strokeStyle = '#0a2266';
        cx.lineWidth = 1;
        cx.beginPath(); cx.arc(stX, stY, r*0.13, 0, Math.PI*2); cx.stroke();
        cx.fillStyle = '#0c2a55';
        cx.fillRect((stX - 1) | 0, (stY - 1) | 0, 2, 2);
      }
      cx.restore();
      // Day/night terminator (right side darkens)
      const term = cx.createRadialGradient(px - r*0.3, py - r*0.3, r*0.4, px + r*0.3, py + r*0.3, r);
      term.addColorStop(0, 'rgba(0,0,0,0)');
      term.addColorStop(0.7, 'rgba(0,0,0,0.32)');
      term.addColorStop(1, 'rgba(0,0,0,0.65)');
      cx.save();
      cx.beginPath(); cx.arc(px, py, r, 0, Math.PI*2); cx.clip();
      cx.fillStyle = term;
      cx.fillRect(px - r, py - r, r*2, r*2);
      // No specular white highlight — keep planet tonally consistent.
      cx.restore();
      // Atmospheric rim (softer, double layer)
      cx.strokeStyle = t.glow + '88';
      cx.lineWidth = 1.4;
      cx.beginPath(); cx.arc(px, py, r-0.5, 0, Math.PI*2); cx.stroke();
      cx.strokeStyle = t.glow + '33';
      cx.lineWidth = 3.5;
      cx.beginPath(); cx.arc(px, py, r+1.5, 0, Math.PI*2); cx.stroke();
      // Optional ring (now also a thin secondary inner ring)
      if (t.ring) {
        cx.save();
        cx.translate(px, py);
        cx.rotate(t.tilt);
        cx.strokeStyle = t.glow + 'aa';
        cx.lineWidth = 3;
        cx.beginPath(); cx.ellipse(0, 0, r*1.85, r*0.55, 0, 0, Math.PI*2); cx.stroke();
        cx.strokeStyle = '#000000';
        cx.lineWidth = 1;
        cx.beginPath(); cx.ellipse(0, 0, r*1.6, r*0.46, 0, 0, Math.PI*2); cx.stroke();
        cx.strokeStyle = t.core + '88';
        cx.lineWidth = 2;
        cx.beginPath(); cx.ellipse(0, 0, r*1.35, r*0.37, 0, 0, Math.PI*2); cx.stroke();
        // Inner thin ring
        cx.strokeStyle = t.glow + '66';
        cx.lineWidth = 1;
        cx.beginPath(); cx.ellipse(0, 0, r*1.18, r*0.32, 0, 0, Math.PI*2); cx.stroke();
        cx.restore();
      }
      // Up to 2 tiny moons — darker palette so they don't pop bright.
      const moonCount = ((r % 3) === 0) ? 2 : ((r % 5) === 0) ? 1 : 0;
      for (let mi = 0; mi < moonCount; mi++) {
        const mr = r * (0.13 + mi * 0.08);
        const ma = (bandSeed * 0.13 + mi * 1.7);
        const mx = px + Math.cos(ma) * (r + mr*3 + 4 + mi*6);
        const my = py + Math.sin(ma) * (r * 0.45);
        const mg = cx.createRadialGradient(mx - mr*0.3, my - mr*0.3, 1, mx, my, mr);
        mg.addColorStop(0, '#5a5a5a');
        mg.addColorStop(0.6, '#3a3a3a');
        mg.addColorStop(1, '#0a0a0a');
        cx.fillStyle = mg;
        cx.beginPath(); cx.arc(mx, my, mr, 0, Math.PI*2); cx.fill();
        cx.fillStyle = 'rgba(0,0,0,0.55)';
        cx.beginPath(); cx.arc(mx - mr*0.25, my - mr*0.1, mr*0.18, 0, Math.PI*2); cx.fill();
        cx.beginPath(); cx.arc(mx + mr*0.15, my + mr*0.20, mr*0.13, 0, Math.PI*2); cx.fill();
      }
    }
    cx.restore();   // close globalAlpha for planets
  }
}

function updateBG() {
  const bgType = BG_SKINS[save.selBG][3];
  for (const s of bgStars) {
    s.y += s.speed;
    if (s.y > H) { s.y=-2; s.x=rnd(0,W); }
  }
  if (bgType!=='city'&&bgType!=='ocean'&&bgType!=='volcanic') {
    for (const t of bgTerrain) {
      t.y += t.speed;
      if (t.r && t.y > H + t.r*2) {
        // Recycle planet to top with a fresh palette so variety repeats
        const preset = PLANET_PRESETS[rndInt(0, PLANET_PRESETS.length-1)];
        t.y = -t.r*2 - rnd(0, 80);
        t.x = rnd(20, W-60);
        t.r = rndInt(18, 46);
        t.speed = rnd(0.2, 0.8);
        t.core = preset.core;
        t.glow = preset.glow;
        t.ring = preset.ring;
        t.tilt = rnd(-0.4, 0.4);
      }
    }
  }
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const WEAPON_NAMES=['标准炮','散弹枪','激光炮','制导弹','等离子','闪电链','回旋镖','波动炮','龙卷炮','冰晶炮'];

function createPlayer(pNum, skinIdx) {
  const C = save.console || defaultConsole();
  return {
    x: pNum===1 ? W*0.65 : W*0.35,
    y: H-120,
    px:0, py:0,
    speed: C.playerSpeed,
    lives: C.playerLives, bombs: C.playerBombs,
    skinIdx,
    weapon:0, weaponLevel:1,
    weaponMax:0,            // frames remaining of LV MAX state
    bank:0,                 // -1..1 banking factor (left/right roll)
    shield:0, invTimer:0, shootTimer:0,
    pNum, dead:false, respawnTimer:0,
    _bombHeld:false,
  };
}

function drawPlayer(p) {
  if (p.dead) return;
  if (p.invTimer>0 && Math.floor(p.invTimer/4)%2===1) return;
  const skin = PLANE_SKINS[p.skinIdx];
  const colors = [...skin[4]];
  if (p.pNum===2) colors[0]=shiftColor(colors[0],30);
  // Track recent positions for afterimage/comet trail
  ensureTrailHistory(p);
  drawPlaneTrail(p);
  // Tier from shop currency — drives idle FX intensity
  const tierMap = { free:0, g:1, d:2 };
  const tier = tierMap[skin[2]] || 0;
  // Shape-aware shadow — banks with plane, lighter pitch, slight scale on dive/climb
  const pitch = p.pitch || 0;
  const shadowOffsetX = 6 + (p.bank||0) * 4;
  const shadowOffsetY = 14 + pitch * 4;
  cx.save();
  cx.globalAlpha = 0.34;
  drawVectorPlane(skin[3], ['#0a0a14','#000010','#06060a','#000000'], cx,
    p.px + shadowOffsetX, p.py + shadowOffsetY, 1, false, p.bank || 0, pitch * 0.4, 0);
  cx.restore();
  // Soft ground oval underneath — width sways with bank, height with pitch
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.beginPath();
  cx.ellipse(p.px + shadowOffsetX, p.py + 26,
            16 * (1 - 0.25*Math.abs(p.bank||0)),
            3.2 * (1 + 0.2 * Math.abs(pitch)),
            0, 0, Math.PI*2);
  cx.fill();
  // LV MAX rainbow halo behind plane
  if (p.weaponMax > 0) {
    const t = frame * 0.3;
    for (let i = 0; i < 3; i++) {
      const ag = t + i * 2.094;
      cx.strokeStyle = `hsl(${(t*40+i*120)%360}, 100%, 65%)`;
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.ellipse(p.px, p.py, 24 + i*3, 30 + i*3, ag, 0, Math.PI * 1.4);
      cx.stroke();
    }
  }
  drawVectorPlane(skin[3], colors, cx, p.px, p.py, 1, false, p.bank || 0, p.pitch || 0, tier);
  // Vulnerability indicator: tiny red dot on cockpit head
  cx.fillStyle = `rgba(255, 60, 60, ${0.7 + Math.sin(frame*0.4)*0.3})`;
  cx.beginPath(); cx.arc(p.px, p.py - 12, 2.4, 0, Math.PI*2); cx.fill();
  cx.fillStyle = 'rgba(255,200,200,0.9)';
  cx.beginPath(); cx.arc(p.px, p.py - 12, 1, 0, Math.PI*2); cx.fill();
  if (p.shield>0) {
    cx.strokeStyle=`rgba(0,200,255,${0.4+Math.sin(frame*0.2)*0.3})`;
    cx.lineWidth=2;
    cx.beginPath(); cx.ellipse(p.px,p.py,22,28,0,0,Math.PI*2); cx.stroke();
  }
}

function updatePlayer(p, keys) {
  if (p.dead) {
    if (p.respawnTimer>0) p.respawnTimer--;
    if (p.respawnTimer===0&&p.lives>0) {
      p.dead=false;
      p.x=p.pNum===1?W*0.65:W*0.35; p.y=H-120;
      const Cr = save.console || defaultConsole();
      p.invTimer = Math.max(30, Math.round((Cr.reviveInvSec || 2) * 60));
      p.shield=0;
    }
    return;
  }
  if (p.invTimer>0) p.invTimer--;
  if (p.shootTimer>0) p.shootTimer--;
  if (p.shield>0) p.shield--;
  // Lv MAX countdown — when it ends, weapon falls back to Lv5 (still maxed level)
  if (p.weaponMax > 0) {
    p.weaponMax--;
    if (p.weaponMax === 0) addFT('LV MAX 已结束', p.x, p.y-22, '#ffaaaa');
  }

  let dx=0,dy=0;
  if (p.pNum===1) {
    if (keys['ArrowLeft']) dx=-1;
    if (keys['ArrowRight']) dx=1;
    if (keys['ArrowUp']) dy=-1;
    if (keys['ArrowDown']) dy=1;
    // Mobile virtual joystick (P1 only)
    if (IS_MOBILE && joy.active) {
      dx = joy.dx;
      dy = joy.dy;
    }
  } else {
    if (keys['a']||keys['A']) dx=-1;
    if (keys['d']||keys['D']) dx=1;
    if (keys['w']||keys['W']) dy=-1;
    if (keys['s']||keys['S']) dy=1;
  }
  const sX = (typeof save.moveSensX === 'number') ? save.moveSensX : 1;
  const sY = (typeof save.moveSensY === 'number') ? save.moveSensY : 1;
  // Black hole gravity-well — closer to a hole's core = slower input response.
  // _bhDamp is reset to 1 each frame after movement; updateBlackHoles writes a
  // smaller value when the player is inside a hole's pull radius.
  const bhDamp = (typeof p._bhDamp === 'number') ? p._bhDamp : 1;
  p.x+=dx*p.speed*sX*bhDamp; p.y+=dy*p.speed*sY*bhDamp;
  p._bhDamp = 1;  // reset for next frame
  p.x=clamp(p.x,12,W-12); p.y=clamp(p.y,12,H-12);
  p.px=p.x|0; p.py=p.y|0;
  // Banking + pitch — eased toward dx/dy for wing-roll + nose-up/down feel
  p.bank  = (p.bank ||0)*0.82 + dx*0.18;
  p.pitch = (p.pitch||0)*0.82 + dy*0.18;

  // Fire: P1 auto-fires (mobile + desktop); P2 keeps manual key J
  let fireKey;
  if (p.pNum===1) {
    fireKey = true;
  } else {
    fireKey = keys['j']||keys['J'];
  }
  if (fireKey&&p.shootTimer<=0) { fireBullet(p); SFX.shoot(p.weapon); }

  // Bomb: keyboard on desktop (P1 = Space, P2 = K); mobile uses double-tap
  if (!IS_MOBILE) {
    const bombKey=p.pNum===1?(keys[' ']||keys['Spacebar']):(keys['k']||keys['K']);
    if (bombKey && !p._bombHeld) {
      // Invincible mode → infinite bombs (no stock consumed); otherwise need stock.
      if (invincible) {
        p._bombHeld = true; doBomb(p); SFX.bomb();
      } else if (p.bombs > 0) {
        p._bombHeld = true; p.bombs--; doBomb(p); SFX.bomb();
      }
    }
    if (!bombKey) p._bombHeld=false;
  }
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
function mkB(x,y,vx,vy,color,w,h,owner,dmg) {
  const C = save.console || defaultConsole();
  const isPlayer = !!owner && (owner.pNum !== undefined);
  // Per-weapon damage override
  const wIdx = isPlayer ? (owner.weapon || 0) : -1;
  const eachWpn = (isPlayer && C.weaponDmgEach && typeof C.weaponDmgEach[wIdx] === 'number') ? C.weaponDmgEach[wIdx] : 1;
  let finalDmg = (dmg || 10) * (isPlayer ? C.weaponDmgMul : 1) * eachWpn;
  let crit = false;
  // Crit rune: roll at bullet creation, doubles damage (×critDmgMul), gold tint
  if (isPlayer && isRuneEquipped('crit') && Math.random() < runeProb('crit')) {
    crit = true;
    finalDmg *= 2 * (C.critDmgMul || 1);
  }
  const sm = isPlayer ? C.bulletSpeedMul : 1;
  return {x, y, px:x|0, py:y|0,
          vx: vx*sm, vy: vy*sm,
          color: crit ? '#ffcc44' : color,
          w: crit ? w + 1 : w, h: crit ? h + 1 : h,
          owner, dmg: finalDmg, alive:true, crit};
}

// Apply rune procs at the moment a player bullet hits an enemy.
function applyRuneOnHit(e, b) {
  if (!b || !b.owner || b.owner.pNum === undefined) return;
  const isBoss = !!e && e === boss;
  // Crit visual — large floating golden number with damage shown
  if (b.crit) {
    const dmgInt = Math.max(1, Math.round(b.dmg));
    addFT('-' + dmgInt, e.x + rnd(-6,6), e.y - 14, '#ffcc44');
    addFT('★暴击', e.x + rnd(-6,6), e.y - 28, '#ffaa00');
    // Golden burst sparkle
    for (let i = 0; i < 6; i++) {
      const a = (i/6) * Math.PI * 2;
      explosions.push({
        x:e.x, y:e.y, vx:Math.cos(a)*3, vy:Math.sin(a)*3,
        life:18, maxLife:18, size:3, color:'#ffcc44'
      });
    }
  }
  // Burn
  if (isRuneEquipped('burn') && Math.random() < runeProb('burn')) {
    e.burn = Math.max(e.burn || 0, 180);
    addFT('🔥 燃烧', e.x, e.y - 14, '#ff8844');
    // Flame burst
    for (let i = 0; i < 5; i++) {
      explosions.push({
        x:e.x + rnd(-6,6), y:e.y + rnd(-4,4),
        vx:rnd(-1,1), vy:rnd(-2,-0.5),
        life:24, maxLife:24, size:3, color: i%2===0 ? '#ff8844' : '#ffcc44'
      });
    }
  }
  // Poison
  if (isRuneEquipped('poison') && Math.random() < runeProb('poison')) {
    e.poison = Math.max(e.poison || 0, 240);
    addFT('☠ 中毒', e.x, e.y - 14, '#88ff44');
    for (let i = 0; i < 4; i++) {
      explosions.push({
        x:e.x + rnd(-5,5), y:e.y + rnd(-5,5),
        vx:rnd(-0.6,0.6), vy:rnd(-1.2,-0.3),
        life:26, maxLife:26, size:2.5, color:'#88ff44'
      });
    }
  }
  // Freeze (large slow chance, smaller hard-freeze chance)
  if (isRuneEquipped('freeze')) {
    const p = runeProb('freeze');
    if (Math.random() < p) {
      e.slow = Math.max(e.slow || 0, 120);
      addFT('❄ 减速', e.x, e.y - 14, '#88eeff');
      for (let i = 0; i < 5; i++) {
        explosions.push({
          x:e.x + rnd(-7,7), y:e.y + rnd(-7,7),
          vx:rnd(-0.5,0.5), vy:rnd(-0.8,0.4),
          life:22, maxLife:22, size:2.5, color:'#aaeeff'
        });
      }
    }
    if (Math.random() < p * 0.25) {
      e.freeze = Math.max(e.freeze || 0, 60);
      addFT('❄❄ 冻 结!', e.x, e.y - 26, '#aaffff');
    }
  }
  // Plague
  if (isRuneEquipped('plague') && Math.random() < runeProb('plague')) {
    e.plague = Math.max(e.plague || 0, 180);
    addFT('☣ 疫病', e.x, e.y - 14, '#cc44ff');
  }
  // Decap — non-boss only
  if (!isBoss && isRuneEquipped('decap') && Math.random() < runeProb('decap')) {
    addFT('斩  首!', e.x, e.y - 10, '#ff4488');
    spawnExplosion(e.x, e.y, 'large');
    e.hp = 0;
  }
}
function mkLaser(x,playerY,wl,owner) {
  return {x,y:0,px:x|0,py:0,vx:0,vy:0,color:'#ff2200',w:3+wl*2,h:playerY+12,
          owner,dmg:(4+wl*3)*0.5,alive:true,isLaserBeam:true,life:4,wl};

function fireBullet(p) {
  const x=p.x, y=p.y, wl=p.weaponLevel;
  const C = save.console || defaultConsole();
  const delays=[7,11,3,18,11,8,20,10,18,14];
  // Per-weapon fire-rate override (×interval; <1 = faster)
  const eachWpnFire = (C.weaponFireEach && typeof C.weaponFireEach[p.weapon] === 'number') ? C.weaponFireEach[p.weapon] : 1;
  p.shootTimer=Math.max(1, Math.round((delays[p.weapon]-(wl-1)*1) * C.fireRateMul * eachWpnFire));

  // ─ LV MAX 超级形态 (5s) ─
  if (p.weaponMax > 0) {
    fireBulletMax(p);
    return;
  }

  switch(p.weapon) {
    case 0: { // 标准炮 - 5 levels, more barrels + speed
      bullets.push(mkB(x,y-12,0,-12,'#00ffff',3,7,p,14+wl*4));
      if(wl>=2){bullets.push(mkB(x-9,y-6,-.15,-12,'#00aaff',3,6,p,11));bullets.push(mkB(x+9,y-6,.15,-12,'#00aaff',3,6,p,11));}
      if(wl>=3){bullets.push(mkB(x-18,y,-.45,-11,'#0077ff',2,5,p,9));bullets.push(mkB(x+18,y,.45,-11,'#0077ff',2,5,p,9));}
      if(wl>=4){p.shootTimer=Math.max(1,p.shootTimer-1);}
      if(wl>=5){bullets.push(mkB(x-27,y,-.8,-10,'#44aaff',2,4,p,7));bullets.push(mkB(x+27,y,.8,-10,'#44aaff',2,4,p,7));}
      break;
    }
    case 1: { // 散弹枪 - spread, more pellets per level
      const num=3+wl*2, spread=0.7+wl*0.15;
      for(let i=0;i<num;i++){
        const t=num>1?(i/(num-1)-0.5)*2*spread:0;
        bullets.push(mkB(x,y-8,t*3.5,-9+Math.abs(t)*-.3,'#ff8800',3+Math.floor(wl/2),4,p,8+wl*3));
      }

    }
    case 2: { // 激光炮 - persistent beam
      const b=mkLaser(x,y,wl,p);
      bullets.push(b);
      if(wl>=3){bullets.push({...mkLaser(x-12,y,wl-1,p),color:'#ff4400'});bullets.push({...mkLaser(x+12,y,wl-1,p),color:'#ff4400'});}
      if(wl>=5){bullets.push({...mkLaser(x-24,y,wl-2,p),color:'#ff6600'});bullets.push({...mkLaser(x+24,y,wl-2,p),color:'#ff6600'});}
      p.shootTimer=3;
      break;
    }
    case 3: { // 制导导弹 - homing, more missiles per level
      const mCount=Math.min(1+Math.floor(wl/2)*2,5);
      const xOffsets=[-18,-8,0,8,18].slice(0,mCount).map((v,i,a)=>a[i]-(a[a.length-1]+a[0])/2);
      for(let i=0;i<mCount;i++){
        const b=mkB(x+(xOffsets[i]||0)*0.7,y-10,(xOffsets[i]||0)*0.06,-7-(i%2),'#ffcc00',4,8,p,22+wl*6);
        b.homing=true; b.homingStr=0.07+wl*0.015; bullets.push(b);
      }
      break;
    }
    case 4: { // 等离子炮 - large orbs
      const sz=8+wl*2;
      bullets.push(mkB(x,y-10,0,-7,'#cc00ff',sz,sz,p,28+wl*10));
      if(wl>=2){bullets.push(mkB(x-14,y-4,-.4,-7,'#aa00dd',sz-3,sz-3,p,18+wl*4));bullets.push(mkB(x+14,y-4,.4,-7,'#aa00dd',sz-3,sz-3,p,18+wl*4));}
      if(wl>=4){for(let i=0;i<6;i++){const ag=(i/6)*Math.PI*2;bullets.push(mkB(x,y,Math.cos(ag)*4,Math.sin(ag)*4-5,'#dd44ff',5,5,p,10+wl*2));}}
      if(wl>=5){bullets.push(mkB(x,y-10,0,-4,'#ffffff',sz+4,sz+4,p,50));}
      break;
    }
    case 5: { // 闪电链 - chain lightning bolts
      const lCount=1+wl;
      for(let i=0;i<lCount;i++){
        const ox=(i-(lCount-1)/2)*9;
        const b=mkB(x+ox,y-10,ox*.04,-13+Math.abs(ox)*.03,'#88ffff',3,12,p,16+wl*5);
        b.lightning=true; bullets.push(b);
      }
      break;
    }
    case 6: { // 回旋镖 - 持续整关，下关清除
      const bCount=Math.ceil(wl/2);
      for(const s of[-1,1]){
        for(let i=0;i<bCount;i++){
          const b=mkB(x,y-8,s*(3+i*1.2),-9+i*.3,'#00ff88',5,5,p,13+wl*4);
          b.boomerang=true; b.bTimer=0; b.boomerangSticky=true;
          bullets.push(b);

      if(wl===5) {
        const bb = mkB(x,y-14,0,-12,'#00ffaa',6,6,p,20);
        bb.boomerang=true; bb.bTimer=0; bb.boomerangSticky=true;
        bullets.push(bb);
      }
      break;
    }
    case 7: { // 波动炮 - sinusoidal wave shots [NEW]
      const wCount=Math.min(wl,5);
      for(let i=0;i<wCount;i++){
        const ph=(i/Math.max(wCount-1,1))*Math.PI*1.5;
        const b={x,y,px:x|0,py:y|0,vx:0,vy:-10,color:'#00ddff',w:5,h:7,
                 owner:p,dmg:13+wl*4,alive:true,wave:true,wPhase:ph,wAmp:10+wl*2,baseX:x};
        bullets.push(b);
      }
      if(wl>=4) bullets.push(mkB(x,y-10,0,-14,'#66eeff',3,8,p,18+wl*4));
      break;
    }
    case 8: { // 龙卷炮 - tornado spiral rings [NEW]
      const rings=1+Math.floor(wl/2);
      for(let r=0;r<rings;r++){
        const n=8, baseAng=frame*0.15+r*(Math.PI/8);
        for(let i=0;i<n;i++){
          const ag=(i/n)*Math.PI*2+baseAng;
          bullets.push(mkB(x,y,Math.cos(ag)*4.5,Math.sin(ag)*4.5-10,'#ff44ff',4,4,p,10+wl*3+r*4));
        }
      }
      break;
    }
    case 9: { // 冰晶炮 - slow spreading ice crystals [NEW]
      const cCount=4+wl*2;
      for(let i=0;i<cCount;i++){
        const ag=(i/cCount)*Math.PI*2-Math.PI/2;
        const spd=4.5+wl;
        const b=mkB(x,y,Math.cos(ag)*spd*.55,(Math.sin(ag)*spd*.55)-5.5,'#aaeeff',5+wl,5+wl,p,20+wl*6);
        b.crystal=true; b.slowF=0.96; bullets.push(b);
      }
      if(wl>=5){const b=mkB(x,y-10,0,-3,'#ffffff',14,14,p,90);b.crystal=true;b.slowF=0.98;bullets.push(b);}
      break;
    }
  }
}

function updateBullets() {
  for(const b of bullets) {
    if(!b.alive) continue;
    if(b.isLaserBeam){b.life--;if(b.life<=0)b.alive=false;continue;}
    if(b.wave){b.wPhase+=0.2;b.x=b.baseX+Math.sin(b.wPhase)*b.wAmp;b.px=b.x|0;}
    if(b.crystal){b.vx*=b.slowF;b.vy*=b.slowF;if(Math.abs(b.vx)<0.15&&Math.abs(b.vy)<0.15){b.alive=false;continue;}}
    if(b.homing){
      // Pick the NEAREST visible enemy; fall back to boss
      let tgt = null, bestD = Infinity;
      for (const e of enemies) {
        if (!e.alive || e.y < -10 || e.y > H+10) continue;
        const dx = e.x - b.x, dy = e.y - b.y;
        const d = dx*dx + dy*dy;
        if (d < bestD) { bestD = d; tgt = e; }
      }
      if (!tgt && boss && boss.alive) tgt = boss;
      if (tgt) {
        const dx = tgt.x - b.x, dy = tgt.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        // Boost steering strength so missiles can fully reverse direction
        const str = (b.homingStr || 0.07) * 1.6;
        b.vx += dx/d * str;
        b.vy += dy/d * str;
        const sp = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        if (sp > 12) { b.vx = b.vx/sp*12; b.vy = b.vy/sp*12; }
      }
    }
    if(b.boomerang){
      if (b.boomerangSticky) {
        // Bounce off screen edges, never die — cleared at level change
        if (b.x < 12 && b.vx < 0) b.vx = -b.vx;
        if (b.x > W-12 && b.vx > 0) b.vx = -b.vx;
        if (b.y < 12 && b.vy < 0) b.vy = -b.vy;
        if (b.y > H-12 && b.vy > 0) b.vy = -b.vy;
      } else {
        b.bTimer++; if(b.bTimer>22) b.vx*=0.91;
        if(b.bTimer>32){b.vy=Math.abs(b.vy)*.25;}
      }
    }
    b.x+=b.vx; b.y+=b.vy;
    b.px=b.x|0; b.py=b.y|0;
    if (!b.boomerangSticky && (b.x<-40||b.x>W+40||b.y<-40||b.y>H+40)) b.alive=false;
  }
  bullets=bullets.filter(b=>b.alive);
}

// Global enemy bullet speed multiplier (slower = easier to dodge)
const ENEMY_BULLET_SPD_GLOBAL = 0.7;
function updateEnemyBullets() {
  for(const b of enemyBullets){
    // Homing missiles (eliteHomer) — keep orbiting / chasing the player.
    if (b.homing) {
      const tgt = players.find(p => !p.dead);
      if (tgt) {
        const dx = tgt.x - b.x, dy = tgt.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const str = b.homingStr || 0.045;
        b.vx += (dx/d) * str;
        b.vy += (dy/d) * str;
        // Cap speed so it slowly orbits instead of beelining
        const cap = b.maxSpeed || 2.4;
        const cs = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        if (cs > cap) { b.vx = b.vx/cs * cap; b.vy = b.vy/cs * cap; }
      }
      // Lifetime: missiles persist longer than normal bullets so they actually orbit
      b.life = (b.life || 0) + 1;
      if (b.life > 600) b.alive = false;   // 10s cap to prevent runaway
      b.x += b.vx;       // missiles ignore the global slowdown
      b.y += b.vy;
      b.px = b.x|0; b.py = b.y|0;
      // Off-screen for missiles only kills if WAY off, since they curve back
      if (b.x < -60 || b.x > W + 60 || b.y < -60 || b.y > H + 60) b.alive = false;
      continue;
    }
    // 'fast' bullets (e.g. sniper rounds) skip the global slowdown so they
    // read as truly high-velocity projectiles.
    const sm = b.fast ? 1 : ENEMY_BULLET_SPD_GLOBAL;
    b.x+=b.vx*sm;
    b.y+=b.vy*sm;
    b.px=b.x|0;b.py=b.y|0;
    if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+20)b.alive=false;
  }
  enemyBullets=enemyBullets.filter(b=>b.alive);
}

function drawBullets() {
  for(const b of bullets) {
    if (b.px < -20 || b.px > W+20 || b.py < -40 || b.py > H+20) continue;
    if(b.isLaserBeam) {
      const alpha=b.life/5;
      const lg=cx.createLinearGradient(b.px-b.w*3,0,b.px+b.w*3,0);
      lg.addColorStop(0,'transparent'); lg.addColorStop(.5,b.color+'88'); lg.addColorStop(1,'transparent');
      cx.fillStyle=lg; cx.fillRect(b.px-b.w*3,0,b.w*6,b.h);
      cx.fillStyle=b.color+'cc'; cx.fillRect(b.px-b.w/2,0,b.w,b.h);
      cx.fillStyle='rgba(255,255,255,0.6)'; cx.fillRect(b.px-1,0,2,b.h);
      continue;
    }
    if(b.wave||b.crystal||b.homing) {
      // Crystal bullets get a tighter halo so the screen doesn't wash out;
      // wave/homing keep the showy bloom.
      const rad = b.crystal ? b.w * 1.05 : b.w * 1.8;
      const rg=cx.createRadialGradient(b.px,b.py,0,b.px,b.py,rad);
      rg.addColorStop(0,'#ffffffcc'); rg.addColorStop(.4,b.color); rg.addColorStop(1,b.color+'00');
      cx.fillStyle=rg; cx.beginPath(); cx.arc(b.px,b.py,rad,0,Math.PI*2); cx.fill();
      // Solid crystalline core for crisp readability
      if (b.crystal) {
        cx.fillStyle = '#ffffff';
        cx.fillRect((b.px - b.w*0.35)|0, (b.py - b.h*0.35)|0, Math.max(2, b.w*0.7|0), Math.max(2, b.h*0.7|0));
      }
      continue;
    }
    if(b.lightning) {
      cx.strokeStyle=b.color; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(b.px,b.py);
      for(let s=0;s<3;s++) cx.lineTo(b.px+rnd(-4,4),(b.py-b.h/2)+s*(b.h/2));
      cx.stroke();
      cx.fillStyle=b.color+'aa'; cx.beginPath(); cx.arc(b.px,b.py,4,0,Math.PI*2); cx.fill();
      continue;
    }
    // Normal bullets with glow
    cx.fillStyle=b.color+'44'; cx.fillRect((b.px-b.w)|0,(b.py-b.h)|0,b.w*2,b.h*2);
    cx.fillStyle=b.color; cx.fillRect((b.px-b.w/2)|0,(b.py-b.h/2)|0,b.w,b.h);
  }
}

function drawEnemyBullets() {
  for(const b of enemyBullets) {
    if (b.px < -20 || b.px > W+20 || b.py < -20 || b.py > H+20) continue;
    const rg=cx.createRadialGradient(b.px,b.py,0,b.px,b.py,7);
    rg.addColorStop(0,'#ffaa44'); rg.addColorStop(.4,b.color||'#ff4400'); rg.addColorStop(1,(b.color||'#ff4400')+'00');
    cx.fillStyle=rg; cx.beginPath(); cx.arc(b.px,b.py,7,0,Math.PI*2); cx.fill();
    cx.fillStyle='#ffeeaa'; cx.beginPath(); cx.arc(b.px,b.py,2,0,Math.PI*2); cx.fill();
    if (b.cancelable) {
      // Pulsing white outline marks "shootable" hazard
      cx.strokeStyle = `rgba(255,255,255,${0.45+Math.sin(frame*0.2)*0.35})`;
      cx.lineWidth = 1.5;
      cx.beginPath(); cx.arc(b.px, b.py, 9, 0, Math.PI*2); cx.stroke();
      if (b.kind === 'mine') {
        cx.strokeStyle = '#ffffff'; cx.lineWidth = 1;
        cx.beginPath();
        cx.moveTo(b.px-3, b.py); cx.lineTo(b.px+3, b.py);
        cx.moveTo(b.px, b.py-3); cx.lineTo(b.px, b.py+3);
        cx.stroke();
      }
    }
  }
}

function doBomb(p) {
  bombFlash=22;
  triggerShake(10, 22);
  // Clear all small enemies entirely
  for(const e of enemies){
    if(!e.alive) continue;
    spawnExplosion(e.x,e.y,'large');
    e.hp = 0;
    killEnemy(e);
  }
  // Boss takes ~1/3 of MAX hp
  if(boss&&boss.alive){
    const dmg = Math.ceil(boss.maxHp / 3);
    boss.hp -= dmg;
    spawnExplosion(boss.x,boss.y,'huge');
    addFT('-'+dmg, boss.x, boss.y-30, '#ffff44');
    if(boss.hp<=0) killBoss();
  }
  if (boss2 && boss2.alive) {
    const dmg2 = Math.ceil(boss2.maxHp / 3);
    boss2.hp -= dmg2;
    spawnExplosion(boss2.x, boss2.y, 'huge');
    addFT('-' + dmg2, boss2.x, boss2.y-30, '#ffff44');
    if (boss2.hp <= 0) {
      const _o = boss; boss = boss2; boss._isSecondary = true; killBoss();
      if (!boss || !boss.alive) boss2 = null; else boss2 = boss;
      boss = _o;
    }
  }
  // Black holes take ~1/3 of MAX hp too — bombs destabilize them.
  for (const h of blackHoles) {
    const dmg = Math.ceil(h.maxHp / 3);
    h.hp -= dmg;
    spawnExplosion(h.x, h.y, 'large');
    addFT('-' + dmg, h.x, h.y - 30, '#ff88ff');
  }
  // Wipe enemy bullets
  for(const b of enemyBullets) b.alive=false;
}

  saucer:   {hp:200,spd:0.9,pts:280,w:30,h:18,col:'#aaffaa',cv:2},
  scout:    {hp:40, spd:4.2,pts:60, w:12,h:12,col:'#ffffaa',cv:1},
  sniper:   {hp:260,spd:0.4,pts:320,w:24,h:24,col:'#ff66ff',cv:2},
  mortar:   {hp:170,spd:0.6,pts:240,w:24,h:22,col:'#cc8855',cv:2},
  swarmlet: {hp:30, spd:2.6,pts:40, w:10,h:10,col:'#ff77aa',cv:1},
  hive:     {hp:460,spd:0.7,pts:480,w:36,h:30,col:'#cc44ff',cv:4},
  turret:   {hp:400,spd:0.0,pts:280,w:24,h:24,col:'#888888',cv:2},
  stealth:  {hp:120,spd:1.6,pts:220,w:22,h:18,col:'#553388',cv:2},
  splitter: {hp:170,spd:1.1,pts:240,w:24,h:22,col:'#88ddff',cv:2},
  minelayer:{hp:300,spd:0.7,pts:330,w:26,h:22,col:'#aaaa44',cv:3},
  jet:      {hp:85, spd:5,  pts:110,w:14,h:22,col:'#88ccff',cv:1},
  elite:    {hp:850,spd:0.9,pts:700,w:38,h:32,col:'#ff2244',cv:5},
  // Ramming-only types: no bullets, only deal contact damage
  asteroid: {hp:80, spd:0.9,pts:120,w:60,h:60,col:'#888899',cv:2},
  ramship:  {hp:50, spd:2.4,pts:140,w:22,h:22,col:'#aa44ff',cv:2},
  // 爆炸怪 — fast dasher; on death, 2s fuse → AOE blast that hurts player.
  exploder: {hp:90, spd:3.2,pts:200,w:22,h:22,col:'#ffaa22',cv:3},
  // 3 elite enemies
  eliteTank:  {hp:480,spd:0.4,pts:900,w:46,h:38,col:'#7788aa',cv:8},  // 重甲不发子弹
  eliteHomer: {hp:140,spd:1.0,pts:520,w:30,h:26,col:'#ff8866',cv:4},  // 发射可击毁追踪弹
  eliteClone: {hp:120,spd:1.2,pts:600,w:24,h:24,col:'#aaccff',cv:4},  // 克隆玩家武器(削弱)
};

// Computed boss HP at the current level — used by black holes and large asteroids
// so their durability scales 1:1 with whatever the boss would be.
function currentBossBaselineHp() {
  const C = save.console || defaultConsole();
  const cappedLv = Math.min(level, ENDLESS_DIFF_CAP);
  // Take a representative bar count of 5 (mid-fight) and the average boss base 800.
  const baseHp = (800 + cappedLv * 150) * 5 * (C.bossHpMul || 1);
  return baseHp;
}

function mkEnemy(type, x, y) {
  const c=ENEMY_CFG[type]||ENEMY_CFG.basic;
  const diff=getDiff();
  const C = save.console || defaultConsole();
  const sp = c.spd*(0.7+level*0.03)*C.enemySpeedMul;
  // Asteroid: HP = 1.5× full current-level boss baseline (true road-block).
  let hp = c.hp * diff.hpMult;
  if (type === 'asteroid') {
    hp = currentBossBaselineHp() * 1.5;
  }
  // Per-enemy-type overrides (console)
  const eachHp = (C.enemyHpEach && typeof C.enemyHpEach[type] === 'number') ? C.enemyHpEach[type] : 1;
  const eachSp = (C.enemySpdEach && typeof C.enemySpdEach[type] === 'number') ? C.enemySpdEach[type] : 1;
  hp *= eachHp;
  return {
    type,x,y,px:x|0,py:y|0,
    hp, maxHp: hp,
    speed: sp * eachSp, pts:c.pts, w:c.w, h:c.h, col:c.col, cv:c.cv,
    alive:true, moveTimer:0, vx:rnd(-1,1), vy:sp,
    splitChild:false,
  };
}

function updateEnemy(e) {
  if(!e.alive) return;
  // Pre-tick: rune effects (burn / plague drain HP, freeze stops everything, slow halves motion)
  if (e.burn   > 0) { e.burn--;   e.hp -= e.maxHp * 0.005 * (save.console.burnDmgMul || 1); }
  if (e.poison > 0) e.poison--;
  if (e.freeze > 0) { e.freeze--; e.px = e.x|0; e.py = e.y|0; if (e.hp <= 0) killEnemy(e); return; }
  if (e.slow   > 0) e.slow--;
  if (e.plague > 0) {
    e.plague--;
    e.hp -= e.maxHp * 0.004 * (save.console.plagueDmgMul || 1);
    if (e.plague % 30 === 0) {
      let near = null, bestD = 60*60;
      for (const o of enemies) {
        if (!o.alive || o === e || (o.plague||0) > 0) continue;
        const dx = o.x - e.x, dy = o.y - e.y, d = dx*dx + dy*dy;
        if (d < bestD) { bestD = d; near = o; }
      }
      if (near) near.plague = 180;
    }
  }
  if (e.hp <= 0) { killEnemy(e); return; }
  e.moveTimer++;
  const C = save.console || defaultConsole();
  // Poisoned enemies fire much less often: skip ~70% ticks AND lengthen fire interval ×2.5
  if (e.poison > 0 && Math.random() < 0.7) e.moveTimer--;
  const _poisonFireMul = (e.poison > 0) ? (2.5 * (save.console.poisonSlowMul || 1)) : 1.0;
  const fireMul = (endlessMode ? 1.6 : 1.0) * C.enemyFireRateMul * _poisonFireMul;
  // Pre-record position for slow modifier
  const _slowApply = e.slow > 0;
  const _xPre = e.x, _yPre = e.y;
  switch(e.type) {
    case 'basic':   e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.03)*0.5; break;
    case 'zigzag':  e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.08)*3; break;
    case 'bomber':
      e.y+=e.speed*0.7;
      if(e.moveTimer%((90*fireMul)|0)===0) fireEB(e,0,3);
      break;
    case 'gunship':
      e.y+=e.speed*0.5; e.x+=Math.sin(e.moveTimer*0.04)*2;
      if(e.moveTimer%((65*fireMul)|0)===0){fireEB(e,-1,3);fireEB(e,1,3);}
      break;
    case 'tank':
      e.y+=e.speed*0.4;
      if(e.moveTimer%((75*fireMul)|0)===0) for(let i=-2;i<=2;i++) fireEB(e,i*0.8,3);
      break;
    case 'speeder':
      e.y+=e.speed; e.x+=e.vx;
      if(e.x<10||e.x>W-10) e.vx*=-1;
      break;
    case 'carrier':
      e.y+=e.speed*0.3; e.x+=Math.sin(e.moveTimer*0.02)*1.5;
      if(e.moveTimer%((50*fireMul)|0)===0){fireEB(e,-2,3);fireEB(e,0,3);fireEB(e,2,3);}
      if(e.moveTimer%160===0) enemies.push(mkEnemy('speeder',e.x+rnd(-30,30),e.y+10));
      break;
    case 'dart':
      // Steep dive; one fast bullet
      e.y+=e.speed*1.2;
      if(e.moveTimer===28) fireEB(e,0,4.2);
      break;
    case 'saucer':
      // Sweeps horizontally; shoots ring
      e.y+=e.speed*0.5; e.x+=Math.cos(e.moveTimer*0.06)*2.5;
      if(e.moveTimer%((100*fireMul)|0)===0)
        for(let i=0;i<6;i++){
          const ag=(i/6)*Math.PI*2 + e.moveTimer*0.02;
          enemyBullets.push({x:e.x,y:e.y,px:e.x|0,py:e.y|0,vx:Math.cos(ag)*2.4,vy:Math.sin(ag)*2.4,alive:true,color:'#aaffaa'});
        }
      break;
    case 'scout':
      // Fast rammer, no shoot
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.12)*2.5;
      break;
    case 'sniper':
      // Glide to top zone, then aimed laser-like burst.
      // Sniper rounds bypass the global enemy-bullet slowdown so they read as
      // genuinely fast (true sniper feel) — vy is aimed and ≈ 9.5 px/frame.
      e.y+=e.speed; if(e.y>110) e.y=110;
      if (e.moveTimer % ((140*fireMul)|0) === 90) {
        const t = players.find(p => !p.dead);
        if (t) {
          const dx = t.x - e.x, dy = t.y - e.y, d = Math.sqrt(dx*dx + dy*dy) || 1;
          const sp = 9.5;   // raw speed BEFORE the global ENEMY_BULLET_SPD_GLOBAL multiplier
          enemyBullets.push({
            x: e.x, y: e.y + e.h/2, px: e.x|0, py: (e.y + e.h/2)|0,
            vx: dx/d * sp, vy: dy/d * sp,
            alive: true, color: '#ff66ff',
            fast: true,         // skip global 0.7× slowdown in updateEnemyBullets
            w: 5, h: 9,
          });
        }
      }
      break;
    case 'mortar':
      // Lobs slow arcing shells — can be shot down (cancelable)
      e.y+=e.speed*0.6;
      if(e.moveTimer%((90*fireMul)|0)===0)
        for(let i=-1;i<=1;i++) {
          const t=players.find(p=>!p.dead);
          const tx=t?t.x:W/2;
          const dx=(tx-e.x)/60;
          enemyBullets.push(mkEBSpecial(e.x, e.y, dx+i*0.6, 1.5, '#cc8855', 2, 'shell'));
        }
      break;
    case 'swarmlet':
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.18+e.x*0.03)*2;
      break;
    case 'hive':
      e.y+=e.speed*0.4;
      // More aggressive swarmlet production: every 90 frames, 5-7 swarmlets in a cone
      if (e.moveTimer % 90 === 0) {
        const burst = 5 + rndInt(0, 2);
        for (let i = 0; i < burst; i++) {
          if (enemies.length >= MAX_ENEMIES - 2) break;
          const ang = (i / (burst-1) - 0.5) * 1.4;   // -0.7..+0.7 rad fan
          const dx = Math.sin(ang) * 18;
          const c = mkEnemy('swarmlet', e.x + dx, e.y + 16);
          // Give swarmlets a small lateral push so the cone reads as a burst
          c.vx = Math.sin(ang) * 1.6;
          enemies.push(c);
        }
      }
      break;
    case 'turret':
      // Stationary; descends to fixed Y then fires sweep
      if(e.y<80) e.y+=1.2;
      if(e.moveTimer%((45*fireMul)|0)===0) {
        const ag = (e.moveTimer*0.05) % (Math.PI*2);
        for(const a of [ag, ag+Math.PI*0.66, ag+Math.PI*1.33])
          enemyBullets.push({x:e.x,y:e.y,px:e.x|0,py:e.y|0,vx:Math.cos(a)*2.6,vy:Math.sin(a)*2.6+1,alive:true,color:'#ddccaa'});
      }
      break;
    case 'stealth':
      // Fades visibility periodically
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.05)*1.5;
      if(e.moveTimer%((110*fireMul)|0)===0) fireEB(e,0,3.4);
      break;
    case 'splitter':
      e.y+=e.speed; e.x+=Math.sin(e.moveTimer*0.04)*1.5;
      if(e.moveTimer%((80*fireMul)|0)===0) fireEB(e,0,3);
      break;
    case 'minelayer':
      e.y+=e.speed*0.6;
      if(e.moveTimer%((70*fireMul)|0)===0) {
        // Drop slow-falling MINES — can be shot down by player
        enemyBullets.push(mkEBSpecial(e.x, e.y+10, rnd(-.5,.5), 0.9, '#ffff66', 4, 'mine'));
      }
      break;
    case 'jet':
      e.y+=e.speed; // pure speed, no shooting
      break;
    case 'asteroid':
      // 缓慢垂直下落, 不发子弹, 撞击伤害 (大陨石)
      e.y += e.speed * 0.7;
      e.x += Math.sin(e.moveTimer*0.018) * 0.4;
      e.spin = (e.spin || 0) + 0.025;
      break;
    case 'exploder': {
      // Fuse mode (death-triggered) — pulse outward without moving until blast.
      if (e.fuse > 0) {
        e.fuse--;
        e._pulse = (e._pulse || 0) + 0.15;
        if (e.fuse === 0) {
          // BOOM — AOE damage to player, plus visual shockwave.
          const blastR = 70;
          for (const p of players) {
            if (p.dead || p.invTimer > 0 || invincible) continue;
            const dx = p.x - e.x, dy = (p.y - 12) - e.y;
            if (dx*dx + dy*dy < blastR*blastR) hitPlayer(p);
          }
          // Light ring of damage particles
          for (let k = 0; k < 18; k++) {
            const a = (k/18) * Math.PI * 2;
            explosions.push({
              x: e.x, y: e.y, vx: Math.cos(a) * 5, vy: Math.sin(a) * 5,
              life: 28, maxLife: 28, size: 5, color: k%2 ? '#ffcc44' : '#ff6622'
            });
          }
          spawnExplosion(e.x, e.y, 'large');
          triggerShake(10, 16);
          e.alive = false;
          score += e.pts;
        }
        break;
      }
      // Active mode — sprint diagonally toward the nearest player.
      const t = players.find(p => !p.dead);
      if (t) {
        const dx = t.x - e.x, dy = (t.y - 12) - e.y, d = Math.sqrt(dx*dx + dy*dy) || 1;
        e.x += (dx/d) * e.speed * 1.3;
        e.y += (dy/d) * e.speed * 1.3;
      } else {
        e.y += e.speed;
      }
      break;
    }
    case 'exploder': {
      // Spiked diamond hull with glowing core; flashes red while fuse counts down.
      const fusing = e.fuse > 0;
      const flash = fusing ? (Math.sin(e._pulse || 0) * 0.5 + 0.5) : 0;
      // Outer warning ring while fusing
      if (fusing) {
        cx.strokeStyle = `rgba(255,80,40,${0.5 + flash * 0.5})`;
        cx.lineWidth = 2;
        cx.beginPath(); cx.arc(0, 0, 18 + flash * 14, 0, Math.PI*2); cx.stroke();
        cx.strokeStyle = `rgba(255,200,80,${0.4 + flash * 0.4})`;
        cx.beginPath(); cx.arc(0, 0, 28 + flash * 22, 0, Math.PI*2); cx.stroke();
      }
      // Spiked body
      cx.fillStyle = fusing ? '#ff5522' : rg;
      cx.beginPath();
      const spikes = 8;
      for (let k = 0; k < spikes * 2; k++) {
        const r = (k % 2 === 0) ? e.w * 0.55 : e.w * 0.30;
        const a = (k / (spikes * 2)) * Math.PI * 2 + (e.moveTimer * 0.04);
        const px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (k === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
      }
      cx.closePath(); cx.fill();
      cx.strokeStyle = '#ffcc44'; cx.lineWidth = 1; cx.stroke();
      // Glowing core
      const cg = cx.createRadialGradient(0, 0, 1, 0, 0, e.w * 0.32);
      cg.addColorStop(0, '#ffffff');
      cg.addColorStop(0.4, fusing ? '#ff2200' : '#ffaa22');
      cg.addColorStop(1, 'rgba(255,80,0,0)');
      cx.fillStyle = cg;
      cx.beginPath(); cx.arc(0, 0, e.w * 0.32, 0, Math.PI*2); cx.fill();
      break;
    }
    case 'mirrorClone': {
      // Mirror clone — moves like a player, fires player-style bullets at the real player
      const target = players.find(p => !p.dead);
      if (target) {
        // Drift toward the player but stay in the upper 60% of the screen
        const dx = target.x - e.x;
        e.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.02, 1.4);
        if (e.y < 90) e.y += 1.4;
        else e.y += Math.sin(e.moveTimer * 0.04) * 0.6;
      }
      // Fire at half player rate
      e.fireCD = (e.fireCD || 0) - 1;
      if (e.fireCD <= 0) {
        e.fireCD = 36;
        const wl = e.weaponLevel || 1;
        for (let i = -1; i <= 1; i++) {
          enemyBullets.push({
            x: e.x + i * 6, y: e.y + 14, px: e.x|0, py: (e.y+14)|0,
            vx: i * 0.5, vy: 4 + wl * 0.3,
            alive: true, color: e.col || '#88ccff'
          });
        }
      }
      break;
    }
    case 'eliteTank':
      // 慢速重装, 锁屏中段, 不开火, 撞击伤害
      if (e.y < H * 0.32) e.y += e.speed * 1.4;
      else                e.x += Math.sin(e.moveTimer * 0.02) * 1.5;
      break;
    case 'eliteHomer':
      // Hover around upper third of screen, periodically launch persistent
      // homing missiles that orbit-chase the player until shot down.
      if (e.y < 110) e.y += e.speed * 0.8;
      else           e.y += Math.sin(e.moveTimer * 0.03) * 0.4;
      e.x += Math.sin(e.moveTimer * 0.03) * 1.2;
      if (e.moveTimer % ((75 * fireMul) | 0) === 0) {
        const t = players.find(p => !p.dead);
        if (t) {
          // Launch from a random side angle so missiles spiral in instead of
          // flying straight at the player.
          const launchAng = rnd(-0.9, 0.9);
          const sp = 1.3;
          const m = mkEBSpecial(e.x, e.y + 14,
            Math.sin(launchAng) * sp, Math.cos(launchAng) * sp,
            '#ff8866', 4, 'homer');
          m.homing    = true;
          m.homingStr = 0.06 + Math.min(level, 50) * 0.001;
          m.maxSpeed  = 2.3;
          m.w = 6; m.h = 8;
          enemyBullets.push(m);
        }
      }
      break;
    case 'eliteClone': {
      // 克隆玩家武器, 削弱版本; 慢速跟踪移动
      e.y += e.speed * 0.6;
      const tgt = players.find(p => !p.dead);
      if (tgt) {
        if (e.x < tgt.x - 2) e.x += 1.2;
        else if (e.x > tgt.x + 2) e.x -= 1.2;
      }
      // 武器克隆: 取玩家当前武器, 用敌弹模式发出
      if (tgt && e.moveTimer % ((28 * fireMul) | 0) === 0) {
        const w = tgt.weapon || 0;
        const wl = Math.max(1, (tgt.weaponLevel || 1) - 1);   // 削弱一级
        const baseSp = 4 + wl * 0.4;
        if (w === 0 || w === 7) {
          enemyBullets.push({x:e.x, y:e.y+12, px:e.x|0, py:(e.y+12)|0,
            vx:0, vy: baseSp, alive:true, color:'#88ccff'});
        } else if (w === 1) { // 散弹
          for (let i=-1;i<=1;i++) enemyBullets.push({x:e.x, y:e.y+12, px:0,py:0,
            vx:i*1.4, vy: baseSp - 0.6, alive:true, color:'#aaccff'});
        } else if (w === 2) { // 激光: 短促直射
          enemyBullets.push({x:e.x, y:e.y+12, px:0,py:0, vx:0, vy: baseSp + 1.4, alive:true, color:'#ffaaaa'});
        } else if (w === 3) { // 制导
          const dx=tgt.x-e.x, dy=tgt.y-e.y, d=Math.sqrt(dx*dx+dy*dy)||1;
          enemyBullets.push({x:e.x, y:e.y+12, px:0,py:0,
            vx:dx/d*baseSp, vy:dy/d*baseSp, alive:true, color:'#ffcc99'});
        } else if (w === 4) { // 等离子: 大球
          enemyBullets.push({x:e.x, y:e.y+12, px:0,py:0, vx:0, vy: baseSp - 1, alive:true, color:'#cc88ff'});
        } else { // 默认: 直射
          enemyBullets.push({x:e.x, y:e.y+12, px:0,py:0, vx:0, vy: baseSp, alive:true, color:'#aaccff'});
        }
      }
      break;
    }
    case 'ramship':
      // 锁定追击玩家, 横向缓慢拉近, 不发子弹
      e.y += e.speed * 0.85;
      {
        const t = players.find(p=>!p.dead);
        if (t) {
          if (e.x < t.x - 2) e.x += 1.4;
          else if (e.x > t.x + 2) e.x -= 1.4;
        }
      }
      break;
    case 'elite':
      e.y+=e.speed*0.5; e.x+=Math.sin(e.moveTimer*0.03)*2;
      if(e.moveTimer%((55*fireMul)|0)===0)
        for(let i=-2;i<=2;i++) fireEB(e,i*0.7,2.6);
      if(e.moveTimer%((180*fireMul)|0)===0) {
        for(let a=0;a<8;a++){
          const ag=(a/8)*Math.PI*2;
          enemyBullets.push({x:e.x,y:e.y,px:e.x|0,py:e.y|0,vx:Math.cos(ag)*2.4,vy:Math.sin(ag)*2.4,alive:true,color:'#ff66aa'});
        }
      }
      break;
  }
  // Apply slow: 50% of frame movement when slowed
  if (_slowApply) {
    e.x = _xPre + (e.x - _xPre) * 0.5;
    e.y = _yPre + (e.y - _yPre) * 0.5;
  }
  e.x=clamp(e.x,e.w/2,W-e.w/2);
  e.px=e.x|0; e.py=e.y|0;
  if(e.y>H+60) e.alive=false;
}

function fireEB(e, dvx, dvy) {
  const t=players.find(p=>!p.dead);
  const sm=getDiff().bulletSpd;
  let vx=dvx*sm, vy=dvy*sm;
  if(t){const dx=t.x-e.x,dy=t.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;vx+=dx/d*(1+sm*0.8);vy+=dy/d*(1+sm*0.8);}
  enemyBullets.push({x:e.x,y:e.y+e.h/2,px:e.x|0,py:(e.y+e.h/2)|0,vx,vy,alive:true,color:'#ff4400'});
}
// Cancelable enemy bullet (mines / homing missiles): can be shot down by player
function mkEBSpecial(x, y, vx, vy, color, hp, kind) {
  return {x, y, px:x|0, py:y|0, vx, vy, alive:true,
          color: color || '#ffff66', cancelable:true, hp: hp||3, kind: kind||'mine'};
}

function drawEnemy(e) {
  if(!e.alive) return;
  const x=e.px, y=e.py;
  // Off-screen cull — skip work entirely
  if (x < -e.w || x > W + e.w || y < -e.h || y > H + e.h) return;
  // Mirror clone — render the player's plane silhouette flipped vertically + tinted red.
  if (e.type === 'mirrorClone') {

      cx.beginPath(); cx.arc(0,-e.h*.10, 1.6, 0, Math.PI*2); cx.fill();
      // Aim warning laser
      const t=players.find(p=>!p.dead);
      if (t && e.moveTimer%140 > 70 && e.moveTimer%140 < 90) {
        cx.strokeStyle='rgba(255,80,255,.55)';
        cx.lineWidth=1.4;
        cx.setLineDash([4,3]);
        cx.beginPath(); cx.moveTo(0,e.h*.5); cx.lineTo(t.x-e.x, t.y-e.y); cx.stroke();
        cx.setLineDash([]);
      }
      break;
    }
    case 'mortar': {
      // Stout bombardier — bulldog fuselage with twin pod-launchers, stubby wings,
      // glowing mortar tube belching smoke.
      // Stubby outer wings
      cx.fillStyle=e.col+'88';
      cx.beginPath();
      cx.moveTo(-e.w*.30,-e.h*.05);
      cx.lineTo(-e.w*.55, e.h*.10);
      cx.lineTo(-e.w*.50, e.h*.28);
      cx.lineTo(-e.w*.30, e.h*.20);
      cx.closePath(); cx.fill();
      cx.beginPath();
      cx.moveTo( e.w*.30,-e.h*.05);
      cx.lineTo( e.w*.55, e.h*.10);
      cx.lineTo( e.w*.50, e.h*.28);
      cx.lineTo( e.w*.30, e.h*.20);
      cx.closePath(); cx.fill();
      // Bulldog hull
      cx.fillStyle=rg;
      cx.beginPath(); cx.roundRect(-e.w*.35,-e.h*.40,e.w*.70,e.h*.80,7); cx.fill();
      cx.strokeStyle='rgba(0,0,0,0.45)'; cx.lineWidth=1; cx.stroke();
      // Riveted plating lines
      cx.strokeStyle='rgba(255,220,160,0.25)'; cx.lineWidth=0.6;
      cx.beginPath(); cx.moveTo(-e.w*.30,-e.h*.18); cx.lineTo(e.w*.30,-e.h*.18); cx.stroke();
      cx.beginPath(); cx.moveTo(-e.w*.30, e.h*.06); cx.lineTo(e.w*.30, e.h*.06); cx.stroke();
      for (let i=-2;i<=2;i++) {
        cx.fillStyle='rgba(255,255,255,0.25)';
        cx.fillRect(i*e.w*.10, -e.h*.32, 1, 1);
      }
      // Side launch pods (mini missiles loaded)
      for (let s=-1;s<=1;s+=2) {
        cx.fillStyle='#332211';
        cx.beginPath(); cx.roundRect(s*e.w*.30 - 3, -e.h*.10, 6, e.h*.32, 1.5); cx.fill();
        cx.fillStyle='#ffaa55';
        cx.fillRect(s*e.w*.30 - 1, -e.h*.05, 2, e.h*.12);
      }
      // Tinted forward canopy
      cx.fillStyle='rgba(255,200,140,0.6)';
      cx.beginPath(); cx.ellipse(0,-e.h*.22,e.w*.13,e.h*.13,0,0,Math.PI*2); cx.fill();
      cx.strokeStyle='rgba(0,0,0,0.5)'; cx.lineWidth=0.5; cx.stroke();
      // Center mortar tube — dark with glowing core (charge cycle)
      cx.fillStyle='#1a0805';
      cx.beginPath(); cx.arc(0,e.h*.18,e.w*.20,0,Math.PI*2); cx.fill();
      const charge = (e.moveTimer % 90) / 90;
      const cg = cx.createRadialGradient(0,e.h*.18,1, 0,e.h*.18, e.w*.18);
      cg.addColorStop(0,'#fff'); cg.addColorStop(0.4,'#ffaa44'); cg.addColorStop(1,'rgba(255,80,0,0)');
      cx.globalAlpha = 0.4 + charge * 0.6;
      cx.fillStyle = cg;
      cx.beginPath(); cx.arc(0,e.h*.18,e.w*.13,0,Math.PI*2); cx.fill();
      cx.globalAlpha = 1;
      // Smoke wisps trailing back
      for (let i=0;i<2;i++) {
        cx.fillStyle = `rgba(120,90,70,${0.25 - i*0.08})`;
        cx.beginPath();
        cx.arc(rnd(-2,2), e.h*.40 + i*4, 3 - i*0.6, 0, Math.PI*2);
        cx.fill();
      }
      break;
    }
    case 'swarmlet': {
      // Small triangle bug
      cx.fillStyle=e.col;
      cx.beginPath(); cx.moveTo(0,e.h*.55); cx.lineTo(-e.w*.5,-e.h*.4); cx.lineTo(e.w*.5,-e.h*.4); cx.closePath(); cx.fill();
      cx.fillStyle='#440022';
      cx.beginPath(); cx.arc(0,0,1.5,0,Math.PI*2); cx.fill();
      break;
    }
    case 'hive': {
      // Bio-organic dropship — segmented hex thorax with translucent wings
      // and a glowing brood chamber visible through the hull.
      // Translucent wings beating
      const wingFlap = Math.sin(e.moveTimer*0.18)*0.18 + 1;
      cx.save();
      cx.scale(wingFlap, 1);
      cx.fillStyle = 'rgba(180,90,220,0.32)';
      cx.beginPath();
      cx.moveTo(-e.w*.20,-e.h*.10);
      cx.bezierCurveTo(-e.w*.65,-e.h*.30, -e.w*.70, e.h*.10, -e.w*.30, e.h*.05);
      cx.closePath(); cx.fill();
      cx.beginPath();
      cx.moveTo( e.w*.20,-e.h*.10);
      cx.bezierCurveTo( e.w*.65,-e.h*.30,  e.w*.70, e.h*.10,  e.w*.30, e.h*.05);
      cx.closePath(); cx.fill();
      // Wing veins
      cx.strokeStyle='rgba(220,180,255,0.5)'; cx.lineWidth=0.6;
      cx.beginPath(); cx.moveTo(-e.w*.20,-e.h*.05); cx.lineTo(-e.w*.55, 0); cx.stroke();
      cx.beginPath(); cx.moveTo( e.w*.20,-e.h*.05); cx.lineTo( e.w*.55, 0); cx.stroke();
      cx.restore();
      // Hex thorax (5 stacked segments shrinking toward head)
      const segCount = 5;
      for (let i = 0; i < segCount; i++) {
