<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RAIDEN 雷电</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { background:#000; width:100%; height:100%; overflow:hidden; touch-action:none; overscroll-behavior:none; -webkit-user-select:none; user-select:none; }
body { display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:100dvh; }
#wrap { position:relative; width:480px; height:700px; max-width:100vw; max-height:100dvh; }
canvas { display:block; width:100%; height:100%; image-rendering:auto; }
.side-btn {
  position:absolute; right:-52px; width:44px; height:44px;
  background:#111; border:2px solid #444; color:#fff;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  border-radius:4px; user-select:none;
  z-index:5;
}
#btn-pause { top:10px; }
#btn-invincible { top:64px; }
.side-btn:hover { background:#333; border-color:#888; }
.side-btn.active { border-color:#0ff; background:#002233; }
#btn-speed {
  position:absolute; right:-52px; top:118px; width:44px; height:44px;
  background:#221a00; border:2px solid #ffaa00; color:#ffcc44;
  font-size:14px; font-weight:bold; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:4px; user-select:none; z-index:5;
}
#btn-speed:hover { background:#332200; border-color:#ffcc44; }
#btn-infbomb {
  /* Sits below codex (top:226 + 44 + 8 gap = 280) so it appears as the 5th
     side-bar slot whenever invincible mode is on. */
  position:absolute; right:-52px; top:280px; width:44px; height:44px;
  background:#221122; border:2px solid #ff44ff; color:#ffaaff;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:4px; user-select:none; z-index:5;
  display:none;
}
#btn-infbomb.show { display:flex; }
#btn-infbomb:active { transform:scale(0.92); }
/* Mobile-only on-screen bomb / pause; hidden on desktop */
.touch-only { display:none; }
@media (hover: none) and (pointer: coarse), (max-width: 640px) {
  body.is-mobile #wrap { width:100vw; height:auto; aspect-ratio:480/700; max-height:100dvh; }
  body.is-mobile .side-btn { right:auto; width:34px; height:34px; font-size:13px; }
  body.is-mobile #btn-pause      { top:6px; left:6px; }
  body.is-mobile #btn-invincible { top:6px; left:44px; opacity:.55; }
  body.is-mobile .touch-only { display:flex; }
  body.is-mobile #btn-speed   { right:auto; left:82px;  top:6px; width:34px; height:34px; font-size:10px; }
  body.is-mobile #btn-infbomb { right:auto; left:120px; top:6px; width:34px; height:34px; font-size:13px; }
  body.is-mobile #btn-shop    { right:auto; left:158px; top:6px; width:34px; height:34px; font-size:13px; }
  body.is-mobile #btn-codex   { right:auto; left:196px; top:6px; width:34px; height:34px; font-size:13px; }
}
/* Very narrow phones — wrap to a second row so buttons don't get clipped */
@media (max-width: 360px) {
  body.is-mobile #btn-shop    { left:6px;  top:44px; }
  body.is-mobile #btn-codex   { left:44px; top:44px; }
}
#btn-bomb {
  position:absolute; right:14px; bottom:18px;
  width:52px; height:52px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #6688ff, #1133aa 60%, #001144);
  border:2px solid #88aaff; color:#fff; font-size:22px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 10px rgba(80,120,255,0.55); user-select:none;
  z-index:6; padding:0;
}
#btn-bomb:active { transform:scale(0.92); background:radial-gradient(circle at 30% 30%, #aabbff, #4477ff 60%, #002288); }
#btn-bomb .count { position:absolute; top:-4px; right:-4px; background:#ff4422; border-radius:50%; min-width:18px; height:18px; font-size:10px; display:flex; align-items:center; justify-content:center; padding:0 3px; font-weight:bold; }
#console-panel {
  position:absolute; left:0; top:0; right:0; bottom:0;
  background:rgba(0,8,24,0.97);
  display:none; flex-direction:column;
  color:#fff; font-family:'Courier New', monospace;
  z-index:40; padding:14px 12px; overflow:hidden;
}
#console-panel.show { display:flex; }
#console-panel h2 { font-size:18px; color:#00ffff; margin-bottom:6px; text-align:center; letter-spacing:3px; }
#console-panel .sub { font-size:10px; color:#88aacc; text-align:center; margin-bottom:10px; }
#console-panel .tabs { display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap; }
#console-panel .tab { flex:1; padding:6px 4px; background:#0a1828; border:1px solid #244466; color:#88aacc; font-size:11px; cursor:pointer; text-align:center; border-radius:3px; }
#console-panel .tab.active { background:#114466; border-color:#00ffff; color:#aaffff; }
#console-panel .body { flex:1; overflow-y:auto; padding:6px 2px; font-size:11px; }
#console-panel .row { display:flex; align-items:center; padding:4px 6px; gap:6px; border-bottom:1px dashed #1f3a5a; }
#console-panel .row label { flex:1; color:#aaccee; font-size:11px; }
#console-panel .row .desc { color:#557799; font-size:9px; }
#console-panel input[type=number] { width:64px; background:#001828; border:1px solid #335577; color:#ffcc44; font-family:inherit; font-size:11px; padding:3px 5px; border-radius:2px; text-align:right; -moz-appearance:textfield; }
#console-panel input[type=number]::-webkit-inner-spin-button, #console-panel input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
#console-panel .footer { display:flex; gap:8px; margin-top:8px; }
#console-panel .footer button { flex:1; padding:8px; background:#112233; border:2px solid #4488aa; color:#88ccee; font-family:inherit; font-size:12px; cursor:pointer; border-radius:3px; }
#console-panel .footer button:hover { background:#226688; border-color:#00ffff; color:#fff; }
#console-panel .footer button.warn { border-color:#aa4444; color:#ff8888; }
#console-panel .footer button.warn:hover { background:#660000; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="480" height="700"></canvas>
  <button class="side-btn" id="btn-pause" title="Pause (P)">⏸</button>
  <button class="side-btn" id="btn-invincible" title="Invincible (G)">💀</button>
  <!-- BGM mute / track switch removed — use Pause menu instead -->
  <button id="btn-speed" title="切换倍速">1.0x</button>
  <button id="btn-infbomb" title="无限核弹">💥∞</button>
  <button class="side-btn" id="btn-shop" style="top:172px;display:none;font-size:18px;" title="商城">🛒</button>
  <button class="side-btn" id="btn-codex" style="top:226px;display:none;font-size:18px;" title="图鉴">📖</button>
  <!-- Bomb hidden: 移动端双击屏幕触发，桌面端 X 键 -->
  <div id="console-panel">
    <h2>🛠 控制台</h2>
    <div class="sub">实时调整游戏数据 · 自动保存</div>
    <div class="tabs" id="console-tabs"></div>
    <div class="body" id="console-body"></div>
    <div class="footer">
      <button id="console-unlock-shop">🛒 商品全解锁满级</button>
      <button id="console-unlock-stage">🏅 关卡全解锁</button>
      <button id="console-endless-pick">🌌 选关无尽</button>
    </div>
    <div class="footer">
      <button id="console-reset" class="warn">重置默认</button>
      <button id="console-back">← 返回设置</button>
    </div>
  </div>
</div>
<script>
'use strict';
window.addEventListener('error', e => {
  document.body.style.background='#300';
  const d=document.createElement('div');
  d.style.cssText='color:#f88;font:14px monospace;position:fixed;top:0;left:0;padding:8px;z-index:9999;white-space:pre';
  d.textContent='JS ERROR: '+e.message+'\nLine: '+e.lineno+':'+e.colno;
  document.body.appendChild(d);
});

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const cx = canvas.getContext('2d');
const W = 480, H = 700;
cx.imageSmoothingEnabled = true;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const SAVE_KEY = 'raiden_v2';

// Note frequencies
const D3=146.83,E3=164.81,F3=174.61,G3=196,A3=220,Bb3=233.08,B3=246.94,C4=261.63,D4=293.66;
const A4=440,B4=493.88,C5=523.25,D5=587.33,E5=659.25,F5=698.46,G5=784,A5=880,B5=987.77,Bb5=932.33,C6=1046.5;

// ─── SMOOTH PLANE DRAWING ────────────────────────────────────────────────────
// shapeIdx 0-3 correspond to different plane silhouettes

// PLANE_SKINS: [name, price, currency, shapeIdx (0..7 distinct silhouettes), colors[4]]
// colors: [body, cockpit, wing, engine_glow]
const PLANE_SKINS = [
  ['蓝色战机',0,   'free', 0, ['#44aaff','#00ffff','#2266cc','#0088ff']],
  ['红色凤凰',800, 'g',    1, ['#ff4422','#ffaa44','#cc2200','#ff6600']],
  ['绿色飞龙',800, 'g',    2, ['#44cc44','#aaffaa','#228822','#00ff44']],
  ['金色雄鹰',1200,'g',    3, ['#ffcc00','#ffffff','#cc8800','#ffaa00']],
  ['紫色幻影',1200,'g',    4, ['#aa44ff','#ffaaff','#6600cc','#8800ff']],
  ['白色天使',1500,'g',    5, ['#eeeeff','#ffffff','#aaaacc','#ccccff']],
  ['黑色隐形',1500,'g',    6, ['#222233','#4444ff','#111122','#2233aa']],
  ['橙色闪光',1500,'g',    7, ['#ff8800','#ffff00','#cc5500','#ff4400']],
  ['青色冰晶',2000,'g',    0, ['#00ccff','#aaffff','#0088cc','#0044ff']],
  ['粉色樱花',2000,'g',    2, ['#ff88cc','#ffffff','#dd4488','#ff44aa']],
  ['炎焰冲锋',2500,'g',    4, ['#ff4444','#ff8800','#cc0000','#ff0000']],
  ['暗物质',  5,   'd',    6, ['#110022','#ff00ff','#220044','#8800ff']],
  ['雷狼战机',6,   'd',    1, ['#334444','#00ffcc','#223333','#00ddff']],
  ['风暴猎鹰',6,   'd',    3, ['#442200','#ff8800','#664400','#ffcc00']],
  ['古龙守护',8,   'd',    7, ['#553300','#ff4400','#442200','#aa2200']],
  ['水晶之翼',8,   'd',    5, ['#aaeeff','#ffffff','#88ddff','#44bbff']],
  ['影之幽灵',10,  'd',    6, ['#111111','#ff0000','#000000','#220000']],
  ['霓虹赛车',10,  'd',    4, ['#ff0088','#00ffff','#cc0066','#ff00ff']],
  ['太阳神焰',15,  'd',    7, ['#ff6600','#ffff00','#ff3300','#ff8800']],
  ['虚空收割',20,  'd',    6, ['#220033','#ff00ff','#330044','#9900ff']],
  // 四象神兽（限定）
  ['青龙·东方',25, 'd',    8, ['#00aa66','#aaffcc','#006633','#44ff88']],
  ['白虎·西方',25, 'd',    9, ['#dddddd','#ffffff','#888888','#ffaaaa']],
  ['朱雀·南方',25, 'd',    10,['#ff4400','#ffcc44','#cc2200','#ff8822']],
  ['玄武·北方',25, 'd',    11,['#1a3355','#aaccee','#0a2244','#88aacc']],
  // 骷髅战机
  ['骷髅死神',30, 'd',    12,['#dcdcdc','#ff2200','#666666','#ff4422']],
  // 12 生肖机甲(机械感金属配色, 每个生肖独立外观)
  ['鼠·机偷',  18, 'd',    6, ['#5a5a6a','#aaaacc','#3a3a4a','#88ccff']],   // mouse / 灰金属潜行
  ['牛·重铠',  18, 'd',    9, ['#7a4422','#ffaa55','#552200','#ff8844']],   // ox / 铜赤重甲
  ['虎·斩刃',  18, 'd',    11,['#ffaa22','#222222','#aa6600','#ff4422']],   // tiger / 虎纹+黑虎刃
  ['兔·跳影',  18, 'd',    7, ['#eeddff','#ffffff','#aaaadd','#ff88aa']],   // rabbit / 月白闪电
  ['龙·天枢',  20, 'd',    8, ['#00ccaa','#aaffee','#006688','#88ffcc']],   // dragon / 翡翠龙鳞
  ['蛇·毒鳞',  18, 'd',    2, ['#226633','#88ee44','#114422','#aaff44']],   // snake / 暗绿毒鳞
  ['马·疾风',  18, 'd',    1, ['#cc4444','#ffaa66','#882222','#ff8844']],   // horse / 红棕疾风
  ['羊·云螺',  18, 'd',    5, ['#eeeeee','#ffffff','#aaaaaa','#ffe0aa']],   // goat / 云白螺角
  ['猴·机灵',  18, 'd',    4, ['#aa66ff','#ffeebb','#553388','#ffaa44']],   // monkey / 紫金灵巧
  ['鸡·锐喙',  18, 'd',    10,['#ffcc00','#ff4400','#aa8800','#ff8800']],   // rooster / 金红锐喙
  ['犬·守夜',  18, 'd',    0, ['#5588cc','#ddeeff','#224477','#aaccee']],   // dog / 蓝白守卫
  ['猪·铁壁',  18, 'd',    3, ['#cc88aa','#ffddee','#884466','#ffaaee']],   // pig / 粉铁壁垒
];

// BG_SKINS: [name, price, currency, bgType]
const BG_SKINS = [
  ['深空星海',0,'free','space'],
  ['星云风暴',1500,'g','nebula'],
  ['城市夜景',2000,'g','city'],
  ['海面低飞',2000,'g','ocean'],
  ['极地冰原',2500,'g','arctic'],
  ['火山地狱',2500,'g','volcanic'],
  ['赛博都市',5,'d','cyber'],
  ['日落云海',5,'d','sunset'],
  ['远古遗迹',8,'d','ruins'],
  ['次元裂隙',12,'d','rift'],
  // New anime-girl portrait background (warm street-light glow + bokeh)
  ['夜行少女',15,'d','animePortrait'],
];
const ANIME_BG_TYPES = ['animePortrait'];

// ─── RUNES ───────────────────────────────────────────────────────────────────
// Each rune: name, key, color, base proc rate, lv 10 max rate, diamond cost per lv up
const RUNE_DEFS = [
  { key:'burn',   name:'燃烧符文', icon:'🔥', col:'#ff8844',
    base:0.04, max:0.30, desc:'子弹击中有概率引燃, 持续掉血' },
  { key:'poison', name:'淬毒符文', icon:'☠',  col:'#88ff44',
    base:0.05, max:0.35, desc:'中毒敌军子弹间隔变长' },
  { key:'freeze', name:'冰冻符文', icon:'❄',  col:'#88eeff',
    base:0.10, max:0.45, desc:'大概率减速 / 小概率冻结' },
  { key:'plague', name:'疫病符文', icon:'☣',  col:'#cc44ff',
    base:0.03, max:0.25, desc:'感染敌人持续掉血并传染相邻敌人' },
  { key:'crit',   name:'暴击符文', icon:'⚡', col:'#ffcc44',
    base:0.06, max:0.35, desc:'子弹概率双倍伤害, 显示暴击效果' },
  { key:'decap',  name:'斩首符文', icon:'🗡', col:'#ff4488',
    base:0.01, max:0.10, desc:'对小怪小概率秒杀, Boss 不适用' },
  { key:'dodge',  name:'闪避符文', icon:'💨', col:'#aaffee',
    base:0.05, max:0.40, desc:'被子弹击中时有概率完全闪避' },
];
function runeProb(key) {
  const lv = (save.runes && save.runes[key]) || 0;
  if (lv <= 0) return 0;
  const def = RUNE_DEFS.find(r => r.key === key);
  if (!def) return 0;
  const base = def.base + (def.max - def.base) * ((lv - 1) / 9);
  const C = save.console || defaultConsole();
  const mul = (typeof C.runeProcMul === 'number') ? C.runeProcMul : 1;
  // Per-rune individual override (defaults to 1×)
  const each = (C.runeProcEach && typeof C.runeProcEach[key] === 'number') ? C.runeProcEach[key] : 1;
  return Math.min(1, base * mul * each);
}
function isRuneEquipped(key) {
  return save.equippedRunes && save.equippedRunes.indexOf(key) >= 0;
}
function runeUpgradeCost(lv) {
  // lv 0→1: 1💎; lv 9→10: 10💎. Triangular total = 55💎
  return Math.max(1, lv + 1);
}

// ─── SAVE DATA ───────────────────────────────────────────────────────────────
// Tier multipliers for stage difficulty (must be defined before loadSave runs)
const TIER_MUL = { novice:1.0, veteran:1.55, hell:2.4 };
function currentTier() {
  return (save && save.tier && TIER_MUL[save.tier]) ? save.tier : 'novice';
}
function defaultSave() {
  return {
    coins: 500, diamonds: 2,
    planes: Array(PLANE_SKINS.length).fill(false).map((_,i)=>i===0),
    bgs: Array(BG_SKINS.length).fill(false).map((_,i)=>i===0),
    selP1: 0, selBG: 0,
    stageProgress: { novice:1, veteran:0, hell:0 },
    medals: { novice:false, veteran:false, hell:false },
    tier: 'novice',
    moveSensX: 1.0, moveSensY: 1.0,
    pixelScale: 1.0,
    bgmVol: 0.65, sfxVol: 0.65,
    endlessState: null,
    endlessLeaderboard: [],
    console: defaultConsole(),
    runes: { burn:0, poison:0, freeze:0, plague:0, crit:0, decap:0, dodge:0 },
    equippedRunes: [],
    trails: Array(20).fill(false).map((_,i) => i === 0),
    selTrail: 0,
  };
}
function defaultConsole() {
  return {
    // Player
    playerSpeed: 4,         // base move speed (px/frame)
    playerLives: 3,         // initial lives
    playerBombs: 3,         // initial bombs
    weaponDmgMul: 1.0,      // global player bullet damage multiplier
    fireRateMul: 1.0,       // shoot interval multiplier (>1 slower, <1 faster)
    bulletSpeedMul: 1.0,    // player bullet velocity multiplier
    starMaxDuration: 5,     // LV MAX seconds when picking star at Lv5
    reviveBombs: 5,         // bombs granted on revive
    reviveInvSec: 3,        // invincibility seconds after a revive (also after natural respawn)
    // Enemy
    enemyHpMul: 1.0,        // global enemy HP multiplier
    enemySpeedMul: 1.0,     // enemy move speed multiplier
    enemyBulletSpdMul: 1.0, // enemy bullet velocity multiplier
    enemyFireRateMul: 1.0,  // enemy fire interval multiplier
    spawnRateMul: 1.0,      // spawn frequency multiplier (lower → faster)
    enemyCountMul: 1.0,     // wave size multiplier
    // Boss
    bossHpMul: 1.0,         // boss HP multiplier
    bossFireRateMul: 1.0,   // boss attack interval multiplier
    bossBarMul: 1.0,        // bar count multiplier
    // Pickups & Difficulty
    dropRateMul: 1.0,       // overall drop rate multiplier (cap 95%)
    coinMul: 1.0,           // coin reward multiplier
    diamondMul: 1.0,        // diamond reward multiplier
    bossKillMul: 1.0,       // boss-kill threshold multiplier (more kills needed)
    // Black hole tuning
    bhHpMul: 1.0,           // ×blackhole HP (final = base × this)
    bhPullMul: 1.0,          // ×blackhole pull strength
    bhMaxCount: 3,          // hard cap on simultaneous holes
    bhSpawnIntervalMul: 1.0, // ×spawn interval (>1 slower)
    // Map-missile (ICBM) tuning
    missileWarnSec: 3.0,    // warning red-line duration (seconds @ 1×)
    missileFireSec: 0.47,   // beam sweep duration (seconds)
    missileMaxAxis: 5,      // max same-axis warnings (cap)
    missileSpawnIntervalMul: 1.0, // ×spawn interval
    // Rune strength multipliers (1.0 = stock; >1 amplifies proc rate, capped at 1.0)
    runeProcMul: 1.0,       // global rune proc-rate multiplier
    burnDmgMul: 1.0,        // burn DoT %hp/tick multiplier
    poisonSlowMul: 1.0,     // poison fire-interval ×; >1 = slower fire
    plagueDmgMul: 1.0,      // plague DoT %hp/tick multiplier
    critDmgMul: 1.0,        // crit damage multiplier (stock = 2x; this scales it)
    // Per-entity overrides — keyed by ENEMY_CFG type, BOSS_DEFS index, WEAPON idx, RUNE key
    // Each value is a multiplier that applies on top of the global one (1.0 = stock).
    enemyHpEach:    {},     // {basic: 1.5, asteroid: 2.0, ...}
    enemySpdEach:   {},
    enemyDmgEach:   {},     // contact damage multiplier
    bossHpEach:     {},     // {0: 2.0, 7: 1.2, 12: 0.5}
    bossFireRateEach:{},
    bossBarEach:    {},
    weaponDmgEach:  {},     // {0: 2.0, 1: 0.5, ...}
    weaponFireEach: {},     // <1 = faster
    runeProcEach:   {},     // {burn: 2, dodge: 5, ...}
  };
}
let save = defaultSave();
function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d) {
      save = defaultSave();
      if (typeof d.coins === 'number') save.coins = d.coins;
      if (typeof d.diamonds === 'number') save.diamonds = d.diamonds;
      if (Array.isArray(d.planes)) {
        // Pad/truncate to current PLANE_SKINS length
        for (let i=0; i<Math.min(d.planes.length, save.planes.length); i++) save.planes[i] = !!d.planes[i];
      }
      if (Array.isArray(d.bgs)) {
        // forward-compat: pad shorter arrays to current BG_SKINS length
        for (let i=0; i<Math.min(d.bgs.length, save.bgs.length); i++) save.bgs[i] = !!d.bgs[i];
      }
      if (typeof d.selP1 === 'number') save.selP1 = d.selP1;
      if (typeof d.selBG === 'number' && d.selBG < BG_SKINS.length) save.selBG = d.selBG;
      // stageProgress: migrate legacy number → {novice,veteran,hell}
      if (typeof d.stageProgress === 'number') {
        save.stageProgress = { novice: Math.max(1, d.stageProgress), veteran:0, hell:0 };
      } else if (d.stageProgress && typeof d.stageProgress === 'object') {
        save.stageProgress = {
          novice: d.stageProgress.novice || 1,
          veteran: d.stageProgress.veteran || 0,
          hell: d.stageProgress.hell || 0,
        };
      }
      if (d.medals && typeof d.medals === 'object') {
        save.medals = {
          novice: !!d.medals.novice,
          veteran: !!d.medals.veteran,
          hell: !!d.medals.hell,
        };
      }
      if (typeof d.tier === 'string' && TIER_MUL[d.tier]) save.tier = d.tier;
      if (typeof d.moveSensX === 'number') save.moveSensX = clamp(d.moveSensX, 0.3, 4.0);
      if (typeof d.moveSensY === 'number') save.moveSensY = clamp(d.moveSensY, 0.3, 4.0);
      if (typeof d.pixelScale === 'number') save.pixelScale = clamp(d.pixelScale, 0.5, 3.0);
      if (typeof d.bgmVol === 'number') save.bgmVol = clamp(d.bgmVol, 0, 1);
      if (typeof d.sfxVol === 'number') save.sfxVol = clamp(d.sfxVol, 0, 1);
      if (d.endlessState && typeof d.endlessState === 'object') save.endlessState = d.endlessState;
      if (Array.isArray(d.endlessLeaderboard)) save.endlessLeaderboard = d.endlessLeaderboard.slice(0,10);
      if (d.console && typeof d.console === 'object') {
        const def = defaultConsole();
        for (const k in def) {
          if (typeof d.console[k] === 'number') def[k] = d.console[k];
          // Preserve per-entity override buckets (objects)
          else if (def[k] && typeof def[k] === 'object' && d.console[k] && typeof d.console[k] === 'object') {
            for (const sub in d.console[k]) {
              if (typeof d.console[k][sub] === 'number') def[k][sub] = d.console[k][sub];
            }
          }
        }
        save.console = def;
      }
      if (d.runes && typeof d.runes === 'object') {
        for (const k of Object.keys(save.runes)) {
          if (typeof d.runes[k] === 'number') save.runes[k] = clamp(d.runes[k], 0, 10);
        }
      }
      if (Array.isArray(d.equippedRunes)) {
        save.equippedRunes = d.equippedRunes.filter(k => k in save.runes).slice(0, 2);
      }
      if (Array.isArray(d.trails) && d.trails.length === 20) save.trails = d.trails;
      if (typeof d.selTrail === 'number') save.selTrail = clamp(d.selTrail, 0, 19);
    }
  } catch(e) {}
}

// Each is an arpeggio over a slow chord cadence in a different key — generated
// programmatically from chord roots so no copyrighted material is reproduced.
function makeArpeggio(roots, octaveLow, octaveHigh) {
  const m = [], b = [];
  // Each "root" represents a chord; we walk an arpeggio (1-3-5-octave) across it.
  for (const root of roots) {
    const r = root;            // base Hz
    const third = r * 1.189;   // ~major 3rd
    const minorThird = r * 1.122;
    const fifth = r * 1.498;
    const oct = r * 2;
    // Choose major/minor randomly per note set so each track varies
    const t3 = (root * 13) % 2 === 0 ? minorThird : third;
    const seq = [r, t3, fifth, oct, fifth, t3, r, oct];
    const ohi = octaveHigh || 2;
    for (let s = 0; s < seq.length; s++) {
      m.push([seq[s] * ohi, 1]);
    }
    // Bass holds the root for one bar
    b.push([r * (octaveLow || 0.5), 4], [r * (octaveLow || 0.5), 4]);
  }
  return { m, b };
}

  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();        // SFX bus
    masterGain.gain.value = (typeof save.sfxVol === 'number') ? save.sfxVol : 0.65;
    masterGain.connect(audioCtx.destination);
    bgmGain = audioCtx.createGain();           // BGM bus (independent)
    bgmGain.gain.value = (typeof save.bgmVol === 'number') ? save.bgmVol : 0.65;
    bgmGain.connect(audioCtx.destination);
  }
  return audioCtx;
}
function setSfxVol(v) {
  save.sfxVol = clamp(v, 0, 1);
  if (masterGain) masterGain.gain.setValueAtTime(save.sfxVol, audioCtx.currentTime);
  writeSave();
}
function setBgmVol(v) {
  save.bgmVol = clamp(v, 0, 1);
  if (bgmGain) bgmGain.gain.setValueAtTime(save.bgmVol, audioCtx.currentTime);
  writeSave();
}

function playNote(freq, type, vol, startTime, duration, dest) {
  if (!freq || freq === 0) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
  } catch(e) {}
}

function playKick(startTime, dest) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, startTime);
    osc.frequency.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    gain.gain.setValueAtTime(0.4, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
    osc.connect(gain);
    gain.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + 0.2);
  } catch(e) {}
}

function scheduleBGM() {
  if (!bgmEnabled || !bgmScheduled) return;
  try {
    const ctx = getAudio();
    const LOOKAHEAD = 0.5;
    const now = ctx.currentTime;
    const scheduleUntil = now + LOOKAHEAD;

    let bassIdx = Math.floor(bgmNoteIdx / 2) % BASS_BGM.length;

    const track=BGM_TRACKS[bgmTrack]||BGM_TRACKS[0];
    const isSax = !!track.sax;
    const tempo = track.tempo || 1;
    const meloWave = isSax ? 'triangle' : 'square';
    const bassWave = isSax ? 'sine'     : 'sawtooth';
    const meloVol  = isSax ? 0.11 : 0.09;
    const bassVol  = isSax ? 0.06 : 0.07;
    while (bgmStartTime < scheduleUntil) {
      const [mf, md] = track.m[bgmNoteIdx % track.m.length];
      const [bf, bd] = track.b[Math.floor(bgmNoteIdx / 2) % track.b.length];
      const dur = EIGHTH * tempo;
      const bgmDest = bgmGain || masterGain;
      playNote(mf, meloWave, meloVol, bgmStartTime, dur * md * 0.9, bgmDest);
      if (bgmNoteIdx % 2 === 0) playNote(bf, bassWave, bassVol, bgmStartTime, dur * bd * 0.85, bgmDest);
      if (mf && bgmNoteIdx % 4 === 2) {
        playNote(mf*0.75, isSax?'sine':'triangle', isSax?0.05:0.04, bgmStartTime, dur * md * 0.7, bgmDest);
      }
      const posInBar = bgmNoteIdx % 8;
      if (isSax) {
        if (posInBar === 0) playKick(bgmStartTime, bgmDest);
        if (posInBar % 2 === 1) {
          try {
            const hatBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.04, audioCtx.sampleRate);
            const hd = hatBuf.getChannelData(0);
            for(let si=0;si<hd.length;si++) hd[si]=(Math.random()*2-1)*0.4*(1-si/hd.length);
            const hSrc = audioCtx.createBufferSource(), hG = audioCtx.createGain();
            hG.gain.setValueAtTime(0.05, bgmStartTime);
            hG.gain.exponentialRampToValueAtTime(0.001, bgmStartTime+0.04);
            hSrc.buffer=hatBuf; hSrc.connect(hG); hG.connect(bgmDest);
            hSrc.start(bgmStartTime); hSrc.stop(bgmStartTime+0.05);
          } catch(e) {}
        }
      } else {
        if (posInBar === 0 || posInBar === 4) playKick(bgmStartTime, bgmDest);
        if (posInBar === 2 || posInBar === 6) {
          try {
            const snBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.08, audioCtx.sampleRate);
            const sd = snBuf.getChannelData(0);
            for(let si=0;si<sd.length;si++) sd[si]=(Math.random()*2-1)*(1-si/sd.length);
            const snSrc = audioCtx.createBufferSource(), snG = audioCtx.createGain();
            snG.gain.setValueAtTime(0.12, bgmStartTime);
            snG.gain.exponentialRampToValueAtTime(0.001, bgmStartTime+0.08);
            snSrc.buffer=snBuf; snSrc.connect(snG); snG.connect(bgmDest);
            snSrc.start(bgmStartTime); snSrc.stop(bgmStartTime+0.09);
          } catch(e) {}
        }
      }
      bgmStartTime += dur;
      bgmNoteIdx++;
      if (bgmNoteIdx >= track.m.length) bgmNoteIdx = 0;
    }
  } catch(e) {}

  bgmTimeout = setTimeout(scheduleBGM, 200);
}

// Ambient noise generator — schedules short noise bursts shaped by a band-pass
// filter to evoke the chosen environment (rain / fire / waves / forest / night).
function scheduleAmbient(track, scheduleUntil) {
  try {
    const ctx = audioCtx;
    const def = track.ambientDef || { kind:'rain', filterFreq:1200, rate:1.2, crackle:false };
    const bgmDest = bgmGain || masterGain;
    while (bgmStartTime < scheduleUntil) {
      // Each chunk is 0.18s of pre-generated noise → smooth crossfade with next
      const dur = 0.18 / Math.max(0.5, def.rate);
      const sr = ctx.sampleRate;
      const len = Math.max(64, (sr * dur) | 0);
      const buf = ctx.createBuffer(1, len, sr);
      const ch = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        // White noise core; fire kind injects rare crackles
        let v = (Math.random() * 2 - 1) * 0.7;
        if (def.crackle && Math.random() < 0.0008) v += (Math.random() * 2 - 1) * 5;
        ch[i] = v;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.loop = false;
      const filt = ctx.createBiquadFilter();
      filt.type = (def.kind === 'fire') ? 'lowpass' : 'bandpass';
      filt.frequency.value = def.filterFreq;
      filt.Q.value = (def.kind === 'forest') ? 4 : 1;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0, bgmStartTime);
      g.gain.linearRampToValueAtTime(0.18, bgmStartTime + 0.02);
      g.gain.linearRampToValueAtTime(0.0, bgmStartTime + dur);
      src.connect(filt); filt.connect(g); g.connect(bgmDest);
      src.start(bgmStartTime);
      src.stop(bgmStartTime + dur + 0.02);
      // Wave kind — add a slow LFO on the filter cutoff to simulate ebb/flow
      if (def.kind === 'waves') {
        const t = bgmStartTime;
        filt.frequency.setValueAtTime(def.filterFreq, t);
        filt.frequency.linearRampToValueAtTime(def.filterFreq * 1.6, t + dur * 0.5);
        filt.frequency.linearRampToValueAtTime(def.filterFreq, t + dur);
      }
      // Forest — add a tiny chirp every few chunks
      if (def.kind === 'forest' && Math.random() < 0.06) {
        const o = ctx.createOscillator(), og = ctx.createGain();
        o.type = 'sine';
        const f = 1800 + Math.random() * 1200;
        o.frequency.setValueAtTime(f, bgmStartTime);
        o.frequency.linearRampToValueAtTime(f * 1.3, bgmStartTime + 0.08);
        og.gain.setValueAtTime(0.04, bgmStartTime);
        og.gain.exponentialRampToValueAtTime(0.001, bgmStartTime + 0.10);
        o.connect(og); og.connect(bgmDest);
        o.start(bgmStartTime); o.stop(bgmStartTime + 0.12);
      }
      bgmStartTime += dur;
      bgmNoteIdx++;
    }
  } catch(e) {}
}

function startBGM() {
  if (bgmScheduled) return;
  try {
    getAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    bgmScheduled = true;
    bgmStartTime = audioCtx.currentTime + 0.1;
    bgmNoteIdx = 0;
    scheduleBGM();
  } catch(e) {}
}

function stopBGM() {
  bgmScheduled = false;
  if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
}

function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  if (!bgmEnabled) stopBGM();
  else if (screen === 'game') startBGM();
}

const MISSILE_FIRE_FRAMES = 28;    // ~0.45s 致命光束 (default; runtime uses console value)
function missileWarnFrames() {
  const C = save.console || defaultConsole();
  return Math.max(20, Math.round((C.missileWarnSec || 3.0) * 60));
}
function missileFireFrames() {
  const C = save.console || defaultConsole();
  return Math.max(6, Math.round((C.missileFireSec || 0.47) * 60));
}
const MISSILE_GAP = 110;           // 同轴最小间距, 保证有路可走
function shouldEnableScreenMissiles() {
  if (!endlessMode) {
    const tier = currentTier();
    return tier === 'veteran' || tier === 'hell';
  }
  return level >= 10;
}
function maxConcurrentMissiles() {
  if (endlessMode) {
    // Endless ramps to chaos territory — many sims simultaneous at high lv
    if (level < 10) return 1;
    if (level < 20) return 2;
    if (level < 35) return 4;
    if (level < 55) return 6;
    if (level < 75) return 8;
    return 10;
  }
  const lvScale = Math.min(level / 12, 1);
  if (currentTier() === 'hell')    return clamp(1 + Math.floor(lvScale * 5),   1, 6);
  if (currentTier() === 'veteran') return clamp(1 + Math.floor(lvScale * 3),   1, 4);
  return clamp(1 + Math.floor(lvScale * 2), 1, 3);
}
function maxSameAxisMissiles() {
  const C = save.console || defaultConsole();
  const cap = (typeof C.missileMaxAxis === 'number') ? C.missileMaxAxis : 5;
  let n;
  if (endlessMode) {
    if (level < 25) n = 2;
    else if (level < 45) n = 3;
    else if (level < 70) n = 4;
    else n = 5;
  } else {
    if (currentTier() === 'hell')    n = 3;
    else if (currentTier() === 'veteran') n = 2;
    else n = 2;
  }
  return Math.min(cap, n);
}

  const axis = Math.random() < 0.5 ? 'h' : 'v';
  const minP = axis === 'h' ? 80 : 30;
  const maxP = axis === 'h' ? H - 80 : W - 30;

    if (h.y < 50)         { h.y = 50;         h.vy = Math.abs(h.vy); }

    for (let i = 0; i < hist.length; i++) {
      const x = hist[i].x + rnd(-3,3), y = hist[i].y + 12;
      if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
    }
    cx.stroke();
  } else if (style === 'petal') {
    for (let i = 0; i < hist.length; i++) {
      const a = i / hist.length;
      cx.globalAlpha = a * 0.7;
      cx.fillStyle = i % 2 === 0 ? col : '#ffffff';
      cx.beginPath();
      cx.ellipse(hist[i].x + rnd(-4,4), hist[i].y + 12 + i, 3, 1.5, frame*0.05+i, 0, Math.PI*2);
      cx.fill();
    }
  } else if (style === 'plasma') {
    for (let i = 0; i < hist.length; i++) {
      const a = i / hist.length;
      cx.globalAlpha = a * 0.5;
      cx.fillStyle = col;
      cx.beginPath(); cx.arc(hist[i].x, hist[i].y + 12, 7 - i*0.3, 0, Math.PI*2); cx.fill();
      cx.fillStyle = '#ffffff';
      cx.beginPath(); cx.arc(hist[i].x, hist[i].y + 12, 2.5 - i*0.1, 0, Math.PI*2); cx.fill();
    }
  } else if (style === 'echo') {
    // 每 3 帧画一次完整复制(更显残影)
    for (let i = 0; i < hist.length; i += 3) {
      const a = i / hist.length;
      cx.globalAlpha = a * 0.35;
      cx.fillStyle = col;
      cx.fillRect(hist[i].x - 3, hist[i].y - 12, 6, 24);
    }
  } else if (style === 'meteor') {
    for (let i = 0; i < hist.length; i++) {
      const a = i / hist.length;
      cx.globalAlpha = a * 0.5;
      cx.fillStyle = i % 2 === 0 ? col : '#ffffff';
      cx.fillRect(hist[i].x + (i*2)%5 - 2, hist[i].y + 12, 2, 4);
    }
  } else if (style === 'aurora') {
    cx.strokeStyle = col;
    cx.lineWidth = 4;
    cx.globalAlpha = 0.35;
    cx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = hist[i].x + Math.sin(i*0.4)*4, y = hist[i].y + 12;
      if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
    }
    cx.stroke();
  }
  cx.restore();
}

// Per-skin idle FX. `tier` 0=free, 1=coin, 2=diamond → more elaborate animations.
function drawPlaneIdleFX(cx2, bc, gc, frame, tier) {
  const r = parseInt(bc.slice(1,3),16) | 0;
  const g = parseInt(bc.slice(3,5),16) | 0;
  const b = parseInt(bc.slice(5,7),16) | 0;
  const mode = (r*3 + g*7 + b*11) % 5;
  const t = frame * 0.1;
  const T = tier || 0;
  cx2.save();
  // Tier 2 (diamond): extra big pulsing halo behind everything
  if (T >= 2) {
    cx2.globalAlpha = 0.28 + Math.sin(t*2)*0.12;
    const hg = cx2.createRadialGradient(0,0,4,0,0,40);
    hg.addColorStop(0, gc);
    hg.addColorStop(0.5, gc + '44');
    hg.addColorStop(1, 'transparent');
    cx2.fillStyle = hg;
    cx2.beginPath(); cx2.arc(0, 0, 40, 0, Math.PI*2); cx2.fill();
    cx2.globalAlpha = 1;
  }
  // Particle count multiplier scales with tier
  const particleMul = 1 + T * 0.6;
  const sparkCount = mode === 0 ? Math.round(4 * particleMul) :
                     mode === 1 ? Math.round(6 * particleMul) :
                     mode === 4 ? Math.round(3 * particleMul) : 0;
  if (mode === 0) {
    // White-angel style: pulsing halo + feather sparks
    cx2.globalAlpha = 0.45 + Math.sin(t)*0.25;
    const hg = cx2.createRadialGradient(0,0,2,0,0,28);
    hg.addColorStop(0, '#ffffff'); hg.addColorStop(1, 'transparent');
    cx2.fillStyle = hg;
    cx2.beginPath(); cx2.arc(0, 0, 28 + T*4, 0, Math.PI*2); cx2.fill();
    cx2.globalAlpha = 1;
    for (let i=0;i<sparkCount;i++) {
      const a = t*0.6 + i*Math.PI*2/sparkCount;
      cx2.fillStyle = '#ffffffcc';
      cx2.fillRect(Math.cos(a)*(22+T*2)|0, Math.sin(a)*(22+T*2)|0, 2 + T, 2 + T);
    }
  } else if (mode === 1) {
    // Phoenix flame trail
    for (let i=0;i<sparkCount;i++) {
      const off = (frame + i*8) % 48;
      cx2.fillStyle = i%2===0 ? '#ff6622' : '#ffaa00';
      cx2.globalAlpha = 1 - off/48;
      cx2.beginPath();
      cx2.arc(rnd(-3,3), 18 + off*0.3, (2.5 + T*0.6) - off*0.04, 0, Math.PI*2);
      cx2.fill();
    }
    cx2.globalAlpha = 1;
  } else if (mode === 2) {
    // Crystalline rotating hex (extra outer ring at higher tiers)
    cx2.save();
    cx2.rotate(t);
    cx2.strokeStyle = gc;
    cx2.lineWidth = 1.2 + T*0.4;
    for (let layer=0; layer < 1 + T; layer++) {
      cx2.beginPath();
      for (let k=0;k<6;k++) {
        const a = (k/6)*Math.PI*2;
        const r2 = 18 + layer*4 + Math.sin(t*1.5+k+layer)*2;
        cx2.lineTo(Math.cos(a)*r2, Math.sin(a)*r2);
      }
      cx2.closePath(); cx2.stroke();
    }
    cx2.restore();
  } else if (mode === 3) {
    // Lightning crackles around the cockpit
    cx2.strokeStyle = '#aaeeff';
    cx2.lineWidth = 0.9 + T*0.3;
    const arms = 2 + T;
    for (let i=0;i<arms;i++) {
      const ang = t + i*Math.PI*2/arms;
      cx2.beginPath();
      cx2.moveTo(Math.cos(ang)*8, Math.sin(ang)*8);
      cx2.lineTo(Math.cos(ang)*16 + rnd(-2,2), Math.sin(ang)*16 + rnd(-2,2));
      cx2.lineTo(Math.cos(ang)*(22+T*3) + rnd(-3,3), Math.sin(ang)*(22+T*3) + rnd(-3,3));
      cx2.stroke();
    }
  } else {
    // Engine pulse rings (more rings at higher tier)
    for (let i=0;i<sparkCount;i++) {
      const off = (frame + i*16) % 48;
      cx2.strokeStyle = gc;
      cx2.globalAlpha = 1 - off/48;
      cx2.lineWidth = 1.2 + T*0.3;
      cx2.beginPath(); cx2.arc(0, 17, 5 + off*0.18, 0, Math.PI*2); cx2.stroke();
    }
    cx2.globalAlpha = 1;
  }
  // (Orbiting particle ring removed — keep the player silhouette clean)
  cx2.restore();
}

function drawVectorPlane(shapeIdx, colors, cx2, px, py, sc, flip, bank, pitch, tier) {
  const [bc, cc, wc, gc] = colors;
  const s = sc || 1;
  const bcL = shadeHex(bc, 35), bcD = shadeHex(bc, -45);
  const wcD = shadeHex(wc, -35);
  const bk = clamp(bank || 0, -1, 1);
  const pt = clamp(pitch || 0, -1, 1);
  cx2.save();
  cx2.translate(px, py);
  // Pitch: vertical squash + slight Y shift to fake forward/back tilt
  if (pt !== 0) {
    cx2.scale(1, 1 - 0.18 * Math.abs(pt));
    cx2.translate(0, pt * 3);
  }
  // Banking: rotate slightly + horizontal squash to fake wing-roll
  if (bk !== 0) {
    cx2.rotate(bk * 0.18);
    cx2.scale(1 - 0.32 * Math.abs(bk), 1);
  }
  cx2.scale(s, flip ? -s : s);
  // Per-skin idle FX (hash body color → mode), tier scales intensity
  drawPlaneIdleFX(cx2, bc, gc, frame, tier || 0);
  cx2.lineCap = 'round'; cx2.lineJoin = 'round';

  // Twin afterburner exhaust
  for (const nx of [-3.5, 3.5]) {
    const gg = cx2.createRadialGradient(nx, 17, 0.5, nx, 17, 8);
    gg.addColorStop(0, '#ffffff');
    gg.addColorStop(0.35, gc);
    gg.addColorStop(1, gc + '00');
    cx2.fillStyle = gg;
    cx2.beginPath(); cx2.arc(nx, 17, 8, 0, Math.PI*2); cx2.fill();
  }

  if (shapeIdx === 0) {
    // ─ Sleek interceptor (delta wing) ─
    // Lower wing layer
    cx2.fillStyle = wcD;
    cx2.beginPath(); cx2.moveTo(-3,-2); cx2.lineTo(-22,14); cx2.lineTo(-12,14); cx2.lineTo(-4,6); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 3,-2); cx2.lineTo( 22,14); cx2.lineTo( 12,14); cx2.lineTo( 4,6); cx2.closePath(); cx2.fill();
    // Wingtip missiles
    cx2.fillStyle = '#888'; cx2.fillRect(-22,12,2,5); cx2.fillRect(20,12,2,5);
    cx2.fillStyle = '#ddd'; cx2.fillRect(-22,11,2,1); cx2.fillRect(20,11,2,1);
    cx2.fillStyle = '#ff4422'; cx2.fillRect(-22,16,2,1); cx2.fillRect(20,16,2,1);
    // Wing top highlight
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-3,-1); cx2.lineTo(-19,11); cx2.lineTo(-12,11); cx2.lineTo(-4,5); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 3,-1); cx2.lineTo( 19,11); cx2.lineTo( 12,11); cx2.lineTo( 4,5); cx2.closePath(); cx2.fill();

    // Fuselage with metallic gradient
    const bg = cx2.createLinearGradient(-7,-22, 7,18);
    bg.addColorStop(0, bcL);
    bg.addColorStop(0.5, bc);
    bg.addColorStop(1, bcD);
    cx2.fillStyle = bg;
    cx2.beginPath();
    cx2.moveTo(0,-22); cx2.lineTo(-3,-12); cx2.lineTo(-7,2); cx2.lineTo(-6,15); cx2.lineTo(-2,17); cx2.lineTo(2,17); cx2.lineTo(6,15); cx2.lineTo(7,2); cx2.lineTo(3,-12); cx2.closePath();
    cx2.fill();
    // Center crease + panel lines
    cx2.strokeStyle = 'rgba(0,0,0,0.45)';
    cx2.lineWidth = 0.6;
    cx2.beginPath();
    cx2.moveTo(0,-22); cx2.lineTo(0,17);
    cx2.moveTo(-5,2); cx2.lineTo(5,2);

    // Twin nose cannons
    cx2.fillStyle = '#1a1a1a';

    cx2.fillStyle = '#ff8800';
    cx2.fillRect(-2,-15,1.5,1); cx2.fillRect(0.5,-15,1.5,1);
    // Outline
    cx2.strokeStyle = bcD; cx2.lineWidth = 0.7;
    cx2.beginPath();
    cx2.moveTo(0,-22); cx2.lineTo(-3,-12); cx2.lineTo(-7,2); cx2.lineTo(-6,15); cx2.lineTo(-2,17); cx2.lineTo(2,17); cx2.lineTo(6,15); cx2.lineTo(7,2); cx2.lineTo(3,-12); cx2.closePath();
    cx2.stroke();

  } else if (shapeIdx === 1) {

    cx2.fillStyle = '#ff5522';
    cx2.fillRect(-18,12,3,1); cx2.fillRect(-12,13,3,1);
    cx2.fillRect(15,12,3,1); cx2.fillRect(9,13,3,1);
    // Wing top highlight

    cx2.beginPath(); cx2.moveTo(-2,0); cx2.lineTo(-21,11); cx2.lineTo(-19,4); cx2.lineTo(-8,-1); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 2,0); cx2.lineTo( 21,11); cx2.lineTo( 19,4); cx2.lineTo( 8,-1); cx2.closePath(); cx2.fill();
    // Fuselage

    cx2.fill();

    cx2.beginPath(); cx2.ellipse(-5,-2,2,3,0,0,Math.PI*2); cx2.fill();
    cx2.beginPath(); cx2.ellipse( 5,-2,2,3,0,0,Math.PI*2); cx2.fill();
    cx2.fillStyle = '#000';
    cx2.beginPath(); cx2.ellipse(-5,-2,1.2,2,0,0,Math.PI*2); cx2.fill();

    // Panel lines

    cx2.beginPath(); cx2.moveTo( 3,8); cx2.lineTo( 2,16); cx2.lineTo( 1,16); cx2.lineTo( 2,8); cx2.closePath(); cx2.fill();
    // Nose cannon
    cx2.fillStyle = '#1a1a1a'; cx2.fillRect(-1,-16,2,7);
    // Outline

    cx2.beginPath();
    cx2.moveTo(0,-20); cx2.lineTo(-4,-10); cx2.lineTo(-8,4); cx2.lineTo(-6,16); cx2.lineTo(-2,18); cx2.lineTo(2,18); cx2.lineTo(6,16); cx2.lineTo(8,4); cx2.lineTo(4,-10); cx2.closePath();
    cx2.stroke();

  } else if (shapeIdx === 2) {
    // ─ Arrow-head assault (twin engines) ─
    cx2.fillStyle = wcD;
    cx2.beginPath(); cx2.moveTo(0,-8); cx2.lineTo(-21,9); cx2.lineTo(-15,2); cx2.lineTo(-4,6); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo(0,-8); cx2.lineTo( 21,9); cx2.lineTo( 15,2); cx2.lineTo( 4,6); cx2.closePath(); cx2.fill();
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(0,-7); cx2.lineTo(-18,7); cx2.lineTo(-13,3); cx2.lineTo(-4,5); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo(0,-7); cx2.lineTo( 18,7); cx2.lineTo( 13,3); cx2.lineTo( 4,5); cx2.closePath(); cx2.fill();

    cx2.fillStyle = '#000';
    cx2.fillRect(-9,17,3,3); cx2.fillRect(6,17,3,3);
    // Fuselage
    const bg = cx2.createLinearGradient(-6,-22, 6,18);
    bg.addColorStop(0, bcL); bg.addColorStop(0.5, bc); bg.addColorStop(1, bcD);
    cx2.fillStyle = bg;
    cx2.beginPath();
    cx2.moveTo(0,-22); cx2.lineTo(-4,-10); cx2.lineTo(-6,-1); cx2.lineTo(-5,16); cx2.lineTo(-1,18); cx2.lineTo(1,18); cx2.lineTo(5,16); cx2.lineTo(6,-1); cx2.lineTo(4,-10); cx2.closePath();

    cx2.moveTo(0,-22); cx2.lineTo(-2,-12); cx2.lineTo(-7,-2); cx2.lineTo(-6,12); cx2.lineTo(-3,18); cx2.lineTo(3,18); cx2.lineTo(6,12); cx2.lineTo(7,-2); cx2.lineTo(2,-12); cx2.closePath();
    cx2.fill();
    // Faceted panels

  } else if (shapeIdx === 5) {

    cx2.fillStyle = '#444';

    const eg2 = cx2.createRadialGradient(3,-12, 0, 3,-12, 3);
    eg2.addColorStop(0, '#ffffff'); eg2.addColorStop(0.4, '#ff2200'); eg2.addColorStop(1, 'rgba(255,30,0,0)');
    cx2.fillStyle = eg2;
    cx2.beginPath(); cx2.arc( 3,-12, 3, 0, Math.PI*2); cx2.fill();
    // Teeth (small notches at the front)
    cx2.fillStyle = '#1a1a1a';
    for (let i = -3; i <= 3; i += 1.5) cx2.fillRect(i - 0.4, -7, 0.8, 1.5);
    // Cross-bone wing struts
    cx2.strokeStyle = '#888';
    cx2.lineWidth = 0.8;
    cx2.beginPath();
    cx2.moveTo(-6, 0); cx2.lineTo(-22, 4);
    cx2.moveTo( 6, 0); cx2.lineTo( 22, 4);
    cx2.stroke();
    // Cannon
    cx2.fillStyle = '#1a1a1a';
    cx2.fillRect(-1,-22, 2, 8);

  } else {
    // ─ Heavy gunship (wide-body, gun pods) ─
    cx2.fillStyle = wcD;
    cx2.beginPath(); cx2.moveTo(-4,-4); cx2.lineTo(-25,12); cx2.lineTo(-22,2); cx2.lineTo(-10,-2); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 4,-4); cx2.lineTo( 25,12); cx2.lineTo( 22,2); cx2.lineTo( 10,-2); cx2.closePath(); cx2.fill();
    cx2.fillStyle = wc;
    cx2.beginPath(); cx2.moveTo(-4,-4); cx2.lineTo(-22,9); cx2.lineTo(-20,3); cx2.lineTo(-10,-1); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 4,-4); cx2.lineTo( 22,9); cx2.lineTo( 20,3); cx2.lineTo( 10,-1); cx2.closePath(); cx2.fill();
    // 4 wing-mounted gun pods
    cx2.fillStyle = bcD;
    for (const px2 of [-15,-9,9,15]) {
      cx2.fillRect(px2-1.5, 1, 3, 12);
      cx2.fillStyle = '#1a1a1a'; cx2.fillRect(px2-0.7, 12, 1.5, 3);
      cx2.fillStyle = bcD;
    }
    // Wing missile rails
    cx2.fillStyle = '#ff4422';
    cx2.fillRect(-22,7,2,1); cx2.fillRect(20,7,2,1);
    // Wide fuselage
    const bg = cx2.createLinearGradient(-9,-18, 9,20);
    bg.addColorStop(0, bcL); bg.addColorStop(0.5, bc); bg.addColorStop(1, bcD);
    cx2.fillStyle = bg;
    cx2.beginPath();
    cx2.moveTo(0,-18); cx2.lineTo(-5,-8); cx2.lineTo(-9,3); cx2.lineTo(-7,18); cx2.lineTo(-2,20); cx2.lineTo(2,20); cx2.lineTo(7,18); cx2.lineTo(9,3); cx2.lineTo(5,-8); cx2.closePath();
    cx2.fill();
    // Heavy panel lines
    cx2.strokeStyle='rgba(0,0,0,0.5)'; cx2.lineWidth=0.7;
    cx2.beginPath();
    cx2.moveTo(0,-18); cx2.lineTo(0,20);
    cx2.moveTo(-8,5); cx2.lineTo(8,5);
    cx2.moveTo(-7,12); cx2.lineTo(7,12);
    cx2.stroke();
    // Twin tail fins
    cx2.fillStyle = bcD;
    cx2.beginPath(); cx2.moveTo(-3,10); cx2.lineTo(-3,18); cx2.lineTo(-2,18); cx2.lineTo(-2,10); cx2.closePath(); cx2.fill();
    cx2.beginPath(); cx2.moveTo( 3,10); cx2.lineTo( 3,18); cx2.lineTo( 2,18); cx2.lineTo( 2,10); cx2.closePath(); cx2.fill();
    // Heavy nose cannon
    cx2.fillStyle = '#1a1a1a';
    cx2.fillRect(-2,-13,4,8);
    cx2.fillStyle = '#ff8800';
    cx2.fillRect(-2,-14,4,1);
    // Outline
    cx2.strokeStyle = bcD; cx2.lineWidth = 0.8;
    cx2.beginPath();
    cx2.moveTo(0,-18); cx2.lineTo(-5,-8); cx2.lineTo(-9,3); cx2.lineTo(-7,18); cx2.lineTo(-2,20); cx2.lineTo(2,20); cx2.lineTo(7,18); cx2.lineTo(9,3); cx2.lineTo(5,-8); cx2.closePath();
    cx2.stroke();
  }

  // Cockpit canopy (multi-layer for sharpness)
  const cg = cx2.createLinearGradient(0,-15, 0,-2);
  cg.addColorStop(0, '#ffffff');
  cg.addColorStop(0.35, cc);
  cg.addColorStop(1, shadeHex(cc, -50));
  cx2.fillStyle = cg;
  cx2.beginPath(); cx2.ellipse(0, -8, 3.5, 6.5, 0, 0, Math.PI*2); cx2.fill();
  // Canopy frame
  cx2.strokeStyle = 'rgba(0,0,0,0.6)';
  cx2.lineWidth = 0.6;
  cx2.beginPath(); cx2.ellipse(0, -8, 3.5, 6.5, 0, 0, Math.PI*2); cx2.stroke();
  // Canopy split line
  cx2.beginPath(); cx2.moveTo(0,-14); cx2.lineTo(0,-2); cx2.stroke();
  // Highlight
  cx2.fillStyle = 'rgba(255,255,255,0.6)';
  cx2.beginPath(); cx2.ellipse(-1, -10, 1.2, 2.8, -0.2, 0, Math.PI*2); cx2.fill();

  cx2.restore();
}

function drawButton(bx, by, bw, bh, text, highlighted) {
  fillPx('#000', bx+3, by+3, bw, bh);
  fillPx(highlighted ? '#226688' : '#112233', bx, by, bw, bh);
  cx.strokeStyle = highlighted ? '#00ffff' : '#4488aa';
  cx.lineWidth = 2;
  cx.strokeRect((bx+1)|0, (by+1)|0, (bw-2)|0, (bh-2)|0);
  cx.fillStyle = highlighted ? '#00ffff' : '#88ccee';
  cx.font = "bold 16px 'Courier New', monospace";
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, (bx + bw/2)|0, (by + bh/2)|0);
  cx.textAlign = 'left';
  cx.textBaseline = 'alphabetic';
}

function shiftColor(hex, db) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return '#'+[r,g,clamp(b+db,0,255)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

  { core:'#664433', glow:'#cc8855', ring:true  },  // dusty saturn-like
  { core:'#553344', glow:'#aa6688', ring:false },  // crimson red

  { core:'#665533', glow:'#ddcc77', ring:false },  // amber

function initBGStars(type) {
  bgStars = [];
  const count = type==='arctic' ? 40 : 100;
  for (let i=0;i<count;i++) {
    bgStars.push({
      x: rnd(0,W), y: rnd(0,H),
      speed: rnd(0.3,1.5),
      size: rndInt(1,2),
      color: getBGStarColor(type),
    });
  }
  bgTerrain = [];
  for (let i=0;i<6;i++) {
    const preset = PLANET_PRESETS[rndInt(0, PLANET_PRESETS.length-1)];
    bgTerrain.push({
      x: rnd(20,W-60),
      y: rnd(-200,H),
      r: rndInt(18, 46),         // planet radius
      speed: rnd(0.2, 0.8),
      core: preset.core,
      glow: preset.glow,
      ring: preset.ring,
      tilt: rnd(-0.4, 0.4),
    });
  }
}

function getBGStarColor(type) {
  if (type==='nebula') return ['#ff88ff','#aaaaff','#88ffff','#ffffff'][rndInt(0,3)];
  if (type==='arctic') return '#ffffff';
  if (type==='volcanic') return ['#ff4400','#ffaa00','#ff6600'][rndInt(0,2)];
  if (type==='cyber') return ['#00ffcc','#0088ff','#88ff00'][rndInt(0,2)];
  return '#ffffff';
}

const ANIME_PALETTES = {

  animeStar:    {hair:'#88aaff', skin:'#e0e8ff', acc:'#ffffff', glow:'#aaccff', flake:'#ffffff'},
